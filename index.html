{"1": "インフルエンザワクチンは不活化ワクチンであり、その後に生ワクチンを接種する場合でも27日以上の間隔は不要であるため誤り。", "2": "麻疹に対する免疫獲得には2回接種が推奨されており正しい。", "3": "水痘抗体検査にはEIA法が推奨されており、CF法は推奨されないため誤り。", "4": "異なる種類のワクチンの同時接種は可能であり、禁忌ではないため誤り。"}}, "category": "ワクチン", "subcategory": "医療従事者ワクチン", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "9": {"question_no": "9", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "薬剤耐性菌に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "感染症法に基づくと、メロペネムのMIC値が2μg/mL以上の腸内細菌科細菌による感染症であっても、カルバペネマーゼを産生していなければ届け出の必要はない。", "b": "日本において、基質特異性拡張型βーラクタマーゼ（ESBL）産生腸管出血性大腸菌感染症が報告されている。", "c": "感染症法において、薬剤耐性緑膿菌感染症とは広域βーラクタム剤、アミノ配糖体、フルオロキノロンの3系統の薬剤に対して耐性を示す緑膿菌による感染症と定義されている。", "d": "バンコマイシン耐性腸球菌（VRE）は、染色体にmecA遺伝子が組み込まれることで、β-ラクタム系抗菌薬に耐性を獲得した腸球菌である。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "ESBL産生腸管出血性大腸菌感染症は国内でも報告されている。薬剤耐性緑膿菌感染症は、広域β-ラクタム剤、アミノ配糖体、フルオロキノロンの3系統に耐性を示す緑膿菌による感染症であるため、bとcが正しい。", "each": {"a": "カルバペネマーゼ産生の有無だけで届出不要とは判断できないため誤り。", "b": "国内でESBL産生腸管出血性大腸菌感染症の報告があり正しい。", "c": "薬剤耐性緑膿菌感染症は3系統の薬剤に耐性を示す緑膿菌による感染症であり正しい。", "d": "mecA遺伝子はMRSAのβ-ラクタム耐性に関与する遺伝子であり、VREの説明としては誤り。"}}, "category": "薬剤耐性菌", "subcategory": "感染症法・耐性機序", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "10": {"question_no": "10", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "Clostridioides difficile（Clostridium difficile）に関する説明として、正しいのはどれか。", "choices": {"1": "迅速検査では、GDH抗原が陽性でもトキシンが陰性であれば病原性はないと判断してよい。", "2": "毒素検出検査を行うために採取した便検体は、採取後2～8°Cで保管する。", "3": "患者が使用したトイレは、0.01%（100ppm）の次亜塩素酸ナトリウム溶液で清拭消毒を行う。", "4": "感染者が発生した場合は、同室者にメトロニダゾールの予防投与をする。"}, "answer": "2", "explanation": {"overall": "Clostridioides difficileの毒素検査用検体は速やかな提出が望ましいが、提出できない場合は2～8°Cで冷蔵保管する。環境消毒には高濃度の次亜塩素酸ナトリウムが必要であり、予防投与は推奨されない。", "each": {"1": "GDH陽性・トキシン陰性の場合でも病原性を完全には否定できず、NAATなど追加検査を検討するため誤り。", "2": "便検体は速やかな提出が望ましいが、提出できない場合は2～8°Cで保管するため正しい。", "3": "Clostridioides difficileの環境消毒には0.1%以上の次亜塩素酸ナトリウムが推奨され、0.01%では不十分であるため誤り。", "4": "同室者へのメトロニダゾール予防投与は推奨されていないため誤り。"}}, "category": "感染症", "subcategory": "Clostridioides difficile感染症", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "11": {"question_no": "11", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "感染症法に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "梅毒は、定点報告の疾患である。", "b": "麻疹は2日以内に届け出る必要がある。", "c": "腸管出血性大腸菌感染症は、3類感染症に分類されている。", "d": "鳥インフルエンザ（H5N1）は、2類感染症に分類されている。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "腸管出血性大腸菌感染症は3類感染症に分類される。鳥インフルエンザ（H5N1）は2類感染症に分類される。梅毒は全数把握対象疾患であり、麻疹は直ちに届出が必要である。", "each": {"a": "梅毒は定点報告ではなく全数把握対象疾患であるため誤り。", "b": "麻疹は2日以内ではなく直ちに届出が必要であるため誤り。", "c": "腸管出血性大腸菌感染症は3類感染症であり正しい。", "d": "鳥インフルエンザ（H5N1）は2類感染症であり正しい。"}}, "category": "感染症法", "subcategory": "届出・分類", "difficulty": "easy", "source_file": "第30回認定看護師認定審査.docx"}, "12": {"question_no": "12", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "小児の感染症に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "ロタウイルスは冬季の乳幼児の急性下痢症の主な原因ウイルスで、エンベロープを持つウイルスである。", "b": "流行性耳下腺炎（ムンプス）は、24～48時間の潜伏期を経て発症する。", "c": "RSウイルス感染症の感染経路は、接触感染である。", "d": "咽頭結膜熱（プール熱）は、学校保健安全法で、主要症状が消退した後2日を経過するまで出席停止とされている。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "RSウイルス感染症は主に接触感染で伝播する。咽頭結膜熱は学校保健安全法において、主要症状消退後2日を経過するまで出席停止とされている。ロタウイルスはノンエンベロープウイルスであり、ムンプスの潜伏期間は通常2～3週間程度である。", "each": {"a": "ロタウイルスはノンエンベロープウイルスであるため誤り。", "b": "流行性耳下腺炎の潜伏期間は通常2～3週間程度であり、24～48時間ではないため誤り。", "c": "RSウイルス感染症は主に接触感染で伝播するため正しい。", "d": "咽頭結膜熱は主要症状消退後2日を経過するまで出席停止とされており正しい。"}}, "category": "感染症", "subcategory": "小児感染症", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "13": {"question_no": "13", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "2011年公開の「血管内留置カテーテル関連感染予防のためのCDCガイドライン」において推奨されている対策として、正しい組み合わせはどれか。", "stem_items": {"a": "中心静脈カテーテル、末梢挿入型中心ライン（PICC）挿入の際は、マキシマル・バリア・プリコーションを行う。", "b": "中心静脈カテーテル、PICC、血液透析カテーテル、肺動脈カテーテルは、血流感染を予防するためにカテーテルを7日毎に交換する。", "c": "血液、血液製剤または脂肪乳剤を投与するのに用いる輸液ラインは、輸液開始から72時間以内に交換する。", "d": "カテーテル挿入部位の被覆は、滅菌ガーゼまたは滅菌フィルムドレッシング剤を使用する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "2", "explanation": {"overall": "中心静脈カテーテルやPICC挿入時にはマキシマル・バリア・プリコーションを実施する。挿入部位の被覆には滅菌ガーゼまたは滅菌フィルムドレッシング剤を使用する。カテーテルは感染予防目的でルーチン交換しない。", "each": {"a": "中心静脈カテーテルおよびPICC挿入時にはマキシマル・バリア・プリコーションを行うため正しい。", "b": "感染予防目的での定期的なカテーテル交換は推奨されていないため誤り。", "c": "血液・血液製剤・脂肪乳剤投与ラインは24時間以内の交換が推奨されており、72時間以内ではないため誤り。", "d": "挿入部位は滅菌ガーゼまたは滅菌フィルムドレッシング剤で被覆するため正しい。"}}, "category": "デバイス関連感染", "subcategory": "CRBSI", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "14": {"question_no": "14", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "薬剤耐性機構に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "緑膿菌は、外膜の透過性が低いことや薬剤排出ポンプを複数持つことにより、多くの抗菌薬に自然耐性を示す。", "b": "ESBLは、セリンーβーラクタマーゼの遺伝子変異により、カルバペネム系薬を分解する。", "c": "Mycoplasma pneumoniaeのマクロライド耐性機序は、DNA gyraseが変化して、薬剤との親和性を低下させることによる。", "d": "β-ラクタマーゼは、βラクタム環を加水分解する酵素である。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "2", "explanation": {"overall": "緑膿菌は外膜透過性低下や薬剤排出ポンプにより自然耐性を示す。β-ラクタマーゼはβラクタム環を加水分解する酵素である。ESBLは通常カルバペネムを分解せず、Mycoplasma pneumoniaeのマクロライド耐性は50Sリボソーム変異による。", "each": {"a": "緑膿菌は外膜透過性低下や薬剤排出ポンプにより多くの抗菌薬に自然耐性を示し正しい。", "b": "ESBLは主にセフェム系を分解するが、通常カルバペネム系薬は分解できないため誤り。", "c": "マクロライド耐性は50Sリボソーム変異によるものであり、DNA gyrase変化ではないため誤り。", "d": "β-ラクタマーゼはβラクタム環を加水分解する酵素であり正しい。"}}, "category": "薬剤耐性菌", "subcategory": "耐性機序", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "15": {"question_no": "15", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "微生物検査のための検体採取方法に関する説明として、正しいのはどれか。", "choices": {"1": "髄膜炎菌感染の可能性がある髄液検体は、冷却しながら速やかに搬送する。", "2": "尿道カテーテル留置中の患者の尿培養検体は、採尿バッグの排液口から採取する。", "3": "外観が白色または透明の喀痰は、Miller&Jonesの分類でP3に分類される。", "4": "抗菌薬投与中の血液培養検体を採取する場合は、血中濃度が最も低い時期に行う。"}, "answer": "4", "explanation": {"overall": "血液培養は抗菌薬血中濃度が最も低いタイミングで採取することが望ましい。髄膜炎菌が疑われる髄液検体は冷却せず速やかに搬送する。尿培養は採尿ポートから採取する。白色または透明の喀痰はMiller&Jones分類でMに分類される。", "each": {"1": "髄膜炎菌は低温に弱いため、髄液検体は冷却せず速やかに搬送するため誤り。", "2": "尿培養検体は採尿バッグ排液口ではなく、採尿ポートから無菌的に採取するため誤り。", "3": "白色または透明の喀痰はMiller&Jones分類でMに分類され、P3ではないため誤り。", "4": "抗菌薬投与中は血中濃度が最も低い時期に血液培養を採取するため正しい。"}}, "category": "微生物検査", "subcategory": "検体採取", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "16": {"question_no": "16", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "手術部位感染予防策として、正しいのはどれか。", "choices": {"1": "手術後は、バンコマイシンを投与する。", "2": "黄色ブドウ球菌やA群連鎖球菌を保菌している職員は、日常的に業務から除外する。", "3": "手術室内圧は周囲に対して陰圧に保つ。", "4": "一次閉鎖した切開創は、術後24～48時間、滅菌された被覆剤で保護する。"}, "answer": "4", "explanation": {"overall": "一次閉鎖創は術後24～48時間、滅菌被覆材で保護する。SSI予防目的でのルーチンなバンコマイシン投与は推奨されない。保菌職員もルーチンに業務制限しない。手術室は陽圧管理とする。", "each": {"1": "SSI予防目的でルーチンにバンコマイシンを投与することは推奨されないため誤り。", "2": "黄色ブドウ球菌やA群連鎖球菌保菌のみで日常的に業務から除外することは推奨されないため誤り。", "3": "手術室は周囲に対して陽圧管理とするため誤り。", "4": "一次閉鎖した切開創は術後24～48時間、滅菌被覆材で保護するため正しい。"}}, "category": "手術部位感染", "subcategory": "SSI予防", "difficulty": "easy", "source_file": "第30回認定看護師認定審査.docx"}, "17": {"question_no": "17", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "血液透析室における感染予防策に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "透析装置外装は、透析が終了するたびに0.01%（100ppm）次亜塩素酸ナトリウム液を用いて消毒する。", "b": "HBs抗原陽性の患者を個室管理できない場合は、隣にHBs抗体陽性の患者を配置する。", "c": "インフルエンザ患者に接触した血液透析患者には、抗インフルエンザ薬の予防投与を行う。", "d": "血液透析患者に対する肺炎球菌ワクチン接種は禁忌である。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "HBs抗原陽性患者を個室管理できない場合は、HBs抗体陽性患者を隣接配置する対応が行われる。インフルエンザ曝露後の血液透析患者には予防投与を検討する。透析装置外装消毒にはより高濃度の消毒薬が必要であり、肺炎球菌ワクチン接種は禁忌ではない。", "each": {"a": "透析装置外装消毒には0.01%ではなく、0.05～0.1%次亜塩素酸ナトリウムなどを使用するため誤り。", "b": "HBs抗原陽性患者を個室管理できない場合は、HBs抗体陽性患者を隣接配置する対応があり正しい。", "c": "インフルエンザ患者接触後の血液透析患者には抗インフルエンザ薬の予防投与を検討するため正しい。", "d": "血液透析患者に対する肺炎球菌ワクチン接種は推奨されており、禁忌ではないため誤り。"}}, "category": "透析感染対策", "subcategory": "血液透析", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "18": {"question_no": "18", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "消毒薬の適応に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "B型肝炎患者の血液で汚染した床は、0.1%ベンザルコニウム塩化物液で清拭する。", "b": "創傷部位の消毒は、1%クロルヘキシジングルコン酸塩液を用いる。", "c": "腸管出血性大腸菌O-157感染症患者が使用した便座は、アルコールで清拭する。", "d": "流行性角結膜炎患者に使用したスリーミラーレンズ（拡大鏡）は、洗浄後に0.1%（1,000ppm）次亜塩素酸ナトリウム液に30分間浸漬する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "腸管出血性大腸菌O-157に対してアルコール消毒は有効である。流行性角結膜炎患者に使用した器具は、次亜塩素酸ナトリウムによる消毒を行う。血液汚染には次亜塩素酸ナトリウムを使用し、創傷部位には高濃度クロルヘキシジンは使用しない。", "each": {"a": "血液汚染にはベンザルコニウム塩化物ではなく、次亜塩素酸ナトリウムを使用するため誤り。", "b": "創傷部位に1%クロルヘキシジングルコン酸塩液は刺激性が強く通常使用しないため誤り。", "c": "腸管出血性大腸菌O-157にはアルコール消毒が有効であり正しい。", "d": "流行性角結膜炎患者に使用した器具は、0.1%次亜塩素酸ナトリウム液による浸漬消毒を行うため正しい。"}}, "category": "消毒・滅菌", "subcategory": "消毒薬", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "19": {"question_no": "19", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "疫学に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "迅速検査の感度が90%とは、疾患を持つ人の10%が陰性と判定される可能性があることを意味する。", "b": "迅速検査の特異度が90%とは、検査で陽性であった場合に、疾患を有する確率が90%であることを意味する。", "c": "症例・対照研究では、リスク因子に曝露した群と曝露しない群における罹患率の差を明らかにすることができる。", "d": "致命率は、特定の疾患により死亡するリスクを表す指標である。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "2", "explanation": {"overall": "感度90%とは、疾患を持つ人のうち10%が偽陰性となる可能性があることを示す。致命率は特定疾患に罹患した患者がその疾患で死亡する割合を表す。特異度は疾患を持たない人が陰性となる割合であり、症例対照研究では罹患率を直接求めることはできない。", "each": {"a": "感度90%とは、疾患を持つ人の10%が陰性となる可能性があることを意味し正しい。", "b": "特異度90%は、疾患を持たない人が陰性となる割合を示すため誤り。", "c": "症例対照研究では罹患率を直接算出できず、オッズ比を用いて関連を推定するため誤り。", "d": "致命率は特定疾患により死亡するリスクを示す指標であり正しい。"}}, "category": "疫学", "subcategory": "疫学指標", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "20": {"question_no": "20", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "アスペルギルス症対策に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "侵襲性アスペルギルス症は、アスペルギルス胞子の吸入により起こるが、胞子は環境中に常在しているため、移植病棟では定期的な環境の細菌検査が必要である。", "b": "粉じんの飛散が予想される改修工事を行う病棟では、工事期間中は、移植患者など侵襲性アスペルギルス症のリスクが高い患者の入院を制限する。", "c": "工事の際に行うインフェクション・コントロール・リスクアセスメント（Infection Control Risk Assessment）とは、工事内容と工事区域に応じた感染リスクを評価し、求められる対策を明らかにする活動である。", "d": "造血細胞移植患者の病室では、生花を活ける花瓶の水は毎日交換する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "改修工事時には、侵襲性アスペルギルス症高リスク患者への配慮が必要であり、ICRAを実施して感染リスク評価と対策を行う。定期的な環境細菌検査は routine に推奨されず、造血細胞移植患者病室への生花持ち込みは避ける。", "each": {"a": "移植病棟で routine の定期的環境細菌検査は推奨されていないため誤り。", "b": "粉じん飛散が予想される工事期間中は、高リスク患者の入院制限などを検討するため正しい。", "c": "ICRAは工事内容や区域に応じた感染リスクを評価し、必要対策を明確化する活動であり正しい。", "d": "造血細胞移植患者病室では生花の持ち込みを避けるため誤り。"}}, "category": "真菌感染対策", "subcategory": "アスペルギルス症", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}}, "section2": {"title": "問題2", "cases": {"case1": {"case_no": "1", "description": "事例1\n次の文を読み、問21から問23に対する適切な答えを一つ選んでください。あなたは病院の感染管理認定看護師です。1月10日に地域の高齢者施設から「複数の入所者がインフルエンザを発症し、職員の中にも体調不良の者がいる。指導を仰ぎたい」と連絡がありました。あなたが施設を訪問すると以下のことが分かりました。\n・入所者のA氏とB氏が1月6日に外泊から戻った後、1月7日から発熱し、1月8日にインフルエンザと診断された。\n・A氏とB氏の同室のC氏が1月8日に発熱し、インフルエンザと診断された。\n・個室のD氏は1月9日夜に37.8度の発熱があり、本日検査したがインフルエンザは陰性であった。\n・1月8日から勤務している職員のE氏が本日出勤してきたが、昼頃より体調不良となり帰宅した。近医でインフルエンザの検査をした結果は陰性であった。\n・施設の入所者は20名で、通所サービスで毎日15名を受け入れている。", "assets": {}, "questions": {"21": {"question_no": "21", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "1", "type": "single_best", "question": "1月10日の時点で入所者に行う対策として、正しいのはどれか。", "choices": {"1": "直ちにA氏、B氏、C氏、D氏以外の入所者にインフルエンザ迅速診断検査キットによる検査を実施する。", "2": "直ちにA氏、B氏、C氏以外の入所者に抗ウイルス薬の予防投与を行う。", "3": "A氏、B氏、C氏は同室のままとし、食事は室内とし集合イベントの参加は控える。", "4": "D氏は今まで通り食堂での食事や集合イベントの参加を可能とする。"}, "answer": "3", "explanation": {"overall": "インフルエンザ患者はコホート管理し、食事は室内対応とし、集合イベントへの参加を控える。無症状者への一斉迅速検査や、全入所者への一律の予防投与は適切ではない。D氏は発熱があり、迅速検査が陰性でも偽陰性の可能性があるため通常通りの集団活動は避ける。", "each": {"1": "無症状者全員に直ちに迅速検査を行う対応は適切ではないため誤り。", "2": "抗ウイルス薬の予防投与は適応を検討して行うものであり、全員に一律で投与する対応は適切ではないため誤り。", "3": "インフルエンザ患者を同室でコホート管理し、食事を室内対応、集合イベントを控える対応は適切であり正しい。", "4": "D氏は発熱があり迅速検査陰性でも偽陰性の可能性があるため、食堂や集合イベントへの参加は避ける必要があり誤り。"}}, "category": "高齢者施設感染対策", "subcategory": "インフルエンザ", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "22": {"question_no": "22", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "1", "type": "single_best", "question": "この高齢者施設の対策として、正しい組み合わせはどれか。", "stem_items": {"a": "施設内でインフルエンザが発生していることは伝えず、面会者の症状の確認を行う。", "b": "通所者は利用前に必ず検温や体調の確認を行い、発熱がある人のサービス利用は断る。", "c": "入所者、通所者、面会者や職員など全ての人の手指衛生を強化する。", "d": "インフルエンザを発症した通所者は利用を控えてもらうが、熱が下がればすぐにサービスの利用を可能とする。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "高齢者施設でインフルエンザが発生した場合は、利用者・面会者・職員への感染対策を強化する必要がある。通所者の体調確認や手指衛生の徹底は重要である。一方、発生状況を隠す対応や、解熱直後に通所を再開させる対応は不適切である。", "each": {"a": "施設内での発生状況は必要に応じて周知し、感染拡大防止に努める必要があるため誤り。", "b": "通所前の検温や体調確認を行い、発熱者の利用を控えてもらう対応は正しく、感染拡大防止に有効である。", "c": "入所者、通所者、面会者、職員を含めた全ての人に対する手指衛生の強化は重要であり正しい。", "d": "インフルエンザは解熱後も感染性を有するため、解熱後すぐの利用再開は不適切であり誤り。"}}, "category": "高齢者施設感染対策", "subcategory": "インフルエンザ", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "23": {"question_no": "23", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "1", "type": "single_best", "question": "この高齢者施設の職員に対する対策として、正しい組み合わせはどれか。", "stem_items": {"a": "職員のE氏は体調が改善すれば、1月12日から勤務可能とする。", "b": "体調がすぐれない職員は直ちに受診し、インフルエンザ迅速診断検査を行い、陰性の場合のみ勤務可能とする。", "c": "職員のインフルエンザ様症状の有無を確認する。", "d": "A氏、B氏、C氏のケアを担当した職員に対し、抗ウイルス薬の予防投与を検討する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "高齢者施設でインフルエンザが発生した場合は、職員の健康観察を強化し、インフルエンザ様症状の有無を確認する。また、濃厚接触した職員には抗ウイルス薬の予防投与を検討する。迅速検査陰性のみを根拠に勤務可能と判断することは適切ではなく、発症早期は偽陰性の可能性がある。", "each": {"a": "インフルエンザは解熱後も感染性を有するため、体調改善のみで早期復帰を判断することは適切ではなく誤り。", "b": "迅速検査は発症早期に偽陰性となる可能性があり、陰性のみを根拠に勤務可能と判断することは不適切であるため誤り。", "c": "職員のインフルエンザ様症状の有無を継続的に確認することは感染拡大防止に重要であり正しい。", "d": "濃厚接触した職員に対して抗ウイルス薬の予防投与を検討することは適切であり正しい。"}}, "category": "高齢者施設感染対策", "subcategory": "インフルエンザ", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}}}, "case2": {"case_no": "2", "description": "事例2\n次の文を読み、問24から問26に対する適切な答えを一つ選んでください。\nあなたの勤務する病院では、集中治療室（ICU）において尿道カテーテル関連尿路感染（CAUTI）サーベイランスを実施しています。2021年度の結果は表1の通りでした。また、表1の結果を表2・表3のベンチマークと比較しました。", "assets": {"tables": {"table1_summary": {"title": "表1 CAUTIサーベイランス結果 2021年度", "data": [{"CAUTI発生件数": 7, "尿道カテーテル使用日数": 1300, "延べ入院患者数": 3000, "CAUTI発生密度率": "(a)", "カテーテル使用比": "(b)"}]}, "table2_benchmark_rate": {"title": "表2 尿道カテーテル関連尿路感染率（期間及び病床種類別）", "data": [{"集計期間": "①", "感染": "UTI", "病床種類": "ICU（1層）", "病棟数": 79, "感染件数": 94, "尿道カテーテル使用日": 61217, "感染率": 1.5, "p10": 0, "p25": 0, "median": 0.6, "p75": 2.6, "p90": 4.1}, {"集計期間": "②", "感染": "UTI", "病床種類": "ICU（1層）", "病棟数": 93, "感染件数": 491, "尿道カテーテル使用日": 355072, "感染率": 1.4, "p10": 0, "p25": 0.5, "median": 1.1, "p75": 1.9, "p90": 3.4}]}, "table3_benchmark_utilization": {"title": "表3 尿道留置カテーテル・器具使用比（期間及び病床種類別）", "data": [{"集計期間": "①", "病床種類": "ICU（1層）", "病棟数": 79, "尿道カテーテル使用日": 61217, "延べ入院患者数": 87585, "器具使用比": 0.7, "p10": 0.37, "p25": 0.62, "median": 0.78, "p75": 0.9, "p90": 0.93}, {"集計期間": "②", "病床種類": "ICU（1層）", "病棟数": 93, "尿道カテーテル使用日": 355072, "延べ入院患者数": 510986, "器具使用比": 0.69, "p10": 0.32, "p25": 0.58, "median": 0.79, "p75": 0.88, "p90": 0.91}]}}}, "questions": {"24": {"question_no": "24", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "2", "type": "single_best", "question": "表1の（a）に当てはまる数値として、正しいのはどれか。", "choices": {"1": "5.4", "2": "2.3", "3": "0.5", "4": "0.2"}, "answer": "1", "explanation": {"overall": "CAUTI発生密度率は、『CAUTI発生件数 ÷ 尿道カテーテル使用日数 × 1,000』で算出する。7 ÷ 1300 × 1000 = 5.38となり、小数第1位で四捨五入すると5.4となる。", "each": {"1": "7 ÷ 1300 × 1000 = 5.4であり正しい。", "2": "計算結果と一致しないため誤り。", "3": "計算結果と一致しないため誤り。", "4": "計算結果と一致しないため誤り。"}}, "category": "サーベイランス", "subcategory": "CAUTI", "difficulty": "easy", "source_file": "第30回認定看護師認定審査.docx"}, "25": {"question_no": "25", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "2", "type": "single_best", "question": "表1の（b）に当てはまる数値として、正しいのはどれか。", "choices": {"1": "0.2", "2": "0.4", "3": "0.5", "4": "2.3"}, "answer": "2", "explanation": {"overall": "カテーテル使用比は、『尿道カテーテル使用日数 ÷ 延べ入院患者数』で算出する。1300 ÷ 3000 = 0.433…となり、小数第1位で四捨五入すると0.4となる。", "each": {"1": "1300 ÷ 3000 の計算結果と一致しないため誤り。", "2": "1300 ÷ 3000 = 0.43 → 0.4であり正しい。", "3": "計算結果と一致しないため誤り。", "4": "計算結果と一致しないため誤り。"}}, "category": "サーベイランス", "subcategory": "CAUTI", "difficulty": "easy", "source_file": "第30回認定看護師認定審査.docx"}, "26": {"question_no": "26", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "2", "type": "single_best", "question": "表1のデータを表2・表3のベンチマークと比較した結果に関する説明として、正しいのはどれか。", "choices": {"1": "感染率と尿道カテーテル使用比が高いことから、不要な尿道カテーテルを速やかに抜去する取り組みが必要である。", "2": "感染率が高く尿道カテーテル使用比が低いことから、尿道カテーテル使用に不慣れと考え、挿入手技や管理方法の見直し、感染対策を振り返る必要がある。", "3": "感染率が低く尿道カテーテル使用比が高いことから、尿道カテーテルの使用頻度を下げることができれば、感染率も更に減少することができる。", "4": "感染率と尿道カテーテル使用比が低いことから、尿道カテーテルの使用頻度が上がった時に感染率も上がる可能性があり、日頃からマニュアルの整備する必要がある。"}, "answer": "2", "explanation": {"overall": "表1のCAUTI発生密度率は5.4であり、表2のベンチマーク（90パーセンタイル4.1）より高い。一方、カテーテル使用比は0.43であり、表3の中央値や75パーセンタイルより低い。このことから、カテーテル使用頻度そのものよりも、挿入手技や管理方法など感染対策上の問題が考えられる。", "each": {"1": "カテーテル使用比は高くなく、不要カテーテルの多さを示す状況ではないため誤り。", "2": "感染率が高く、カテーテル使用比が低いことから、手技や管理方法など感染対策を見直す必要があり正しい。", "3": "感染率は低くなく高値であるため誤り。", "4": "感染率とカテーテル使用比はいずれも低い状況ではないため誤り。"}}, "category": "サーベイランス", "subcategory": "CAUTI", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}}}, "case3": {"case_no": "3", "description": "事例3\n次の文を読み、問27から問29に対する適切な答えを一つ選んでください。\nあなたは病院の感染管理認定看護師です。2021年1月15日に近隣の介護老人保健施設から、「ノロウイルスによる胃腸炎の入居者が複数いるので、感染対策について指導をして欲しい」と言われました。この施設で情報収集を行ったところ、以下のことがわかりました。\n・入居者F氏、G氏、H氏の3名に2日前から嘔吐や下痢の症状が出現した。\n・本日3名の便検査を実施したところノロウイルス抗原陽性であった。\n・F氏、G氏は同室（4人室）、H氏は個室である。F氏、G氏はおむつを使用している。\n・H氏の個室にはトイレはなく、介助にて共有トイレを使用している。\n・F氏とG氏と同室であるI氏とJ氏に消化器症状はみられていない。\n・その他の入居者と職員に、消化器症状がある者はいない。\n・I氏は、今朝、あなたが勤務する病院の眼科病棟に入院した。", "assets": {}, "questions": {"27": {"question_no": "27", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "3", "type": "single_best", "question": "ノロウイルス感染症に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "ヒトの大腸に感染し、増殖する。", "b": "確定診断には、ウイルス培養検査が有効である。", "c": "効果のある抗ウイルス薬はない。", "d": "感染力は強く、100コピー程度の摂取でも感染する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "ノロウイルスは小腸で増殖し、感染力が非常に強いウイルスである。特異的な抗ウイルス薬はなく、治療は対症療法が中心となる。", "each": {"a": "ノロウイルスはヒトの小腸で増殖するため誤り。", "b": "迅速抗原検査が有用であり、一般的にウイルス培養検査は行わない。", "c": "特異的な抗ウイルス薬はなく、治療は対症療法のみ。", "d": "少量のウイルスでも感染が成立するため正しい。"}}, "category": "感染症", "subcategory": "ノロウイルス", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "28": {"question_no": "28", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "type": "single_best", "question": "この施設の感染対策の指導として、正しいのはどれか。", "stem_items": {"1": "おむつ交換時はアルコール手指消毒剤による手指衛生を徹底する。", "2": "F氏とG氏の部屋のベッド柵やドアノブは、次亜塩素酸ナトリウム液で清拭する。", "3": "J氏は、他の4床室の部屋に移動させる。", "4": "嘔吐物や下痢便で汚染したリネンは、他の入居者のリネンとまとめて洗濯する。"}, "choices": {"1": "おむつ交換時はアルコール手指消毒剤による手指衛生を徹底する", "2": "F氏とG氏の部屋のベッド柵やドアノブは、次亜塩素酸ナトリウム液で清拭する", "3": "J氏は、他の4床室の部屋に移動させる", "4": "嘔吐物や下痢便で汚染したリネンは、他の入居者のリネンとまとめて洗濯する"}, "answer": "2", "explanation": {"overall": "ノロウイルス対策では、接触感染対策と環境消毒が重要である。環境表面は次亜塩素酸ナトリウムによる消毒を行う。", "each": {"1": "ノロウイルスにはアルコール抵抗性があるため、流水と石鹸による手洗いを行う。", "2": "ノロウイルス汚染環境には次亜塩素酸ナトリウムによる消毒が有効であり正しい。", "3": "J氏は潜伏期の可能性があり、他室へ移動させない。", "4": "汚染リネンは他と分けて適切に処理する必要がある。"}}, "category": "感染管理", "subcategory": "ノロウイルス", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "29": {"question_no": "29", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "3", "type": "single_best", "question": "I氏は眼科病棟の個室に入院しており、1月18日に白内障の手術が予定されている。眼科病棟の看護師に指導する内容として、正しいのはどれか。", "choices": {"1": "スタッフの混乱を避けるため、眼科病棟内で情報を共有する職員を限定する。", "2": "I氏の部屋への入室時には、N95微粒子用マスク、手袋、エプロンを着用する。", "3": "I氏の嘔吐や下痢の症状に注意し、スタッフの手指衛生を強化する。", "4": "I氏に嘔吐や下痢の症状が出現した時は、便検査でノロウイルス抗原検査を行い、陰性が確認できれば予定通り手術を行う。"}, "answer": "3", "explanation": {"overall": "I氏はノロウイルス患者と同室であったため、発症していなくても潜伏期間中の可能性がある。眼科病棟では情報共有を行い、嘔吐・下痢などの症状出現に注意し、スタッフの手指衛生を強化する必要がある。", "each": {"1": "感染拡大防止のため、必要な職員間で情報共有する必要があり、情報共有を限定する対応は不適切である。", "2": "ノロウイルスは空気感染ではないため、N95微粒子用マスクは不要である。", "3": "I氏は潜伏期間中の可能性があるため、嘔吐や下痢の症状に注意し、手指衛生を強化する対応は正しい。", "4": "ノロウイルス抗原検査は偽陰性の可能性があり、陰性のみを根拠に予定通り手術を行う判断は不適切である。下痢や嘔吐が治まるまでは手術延期を検討する。"}}, "category": "感染管理", "subcategory": "ノロウイルス", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}}}, "case4": {"case_no": "4", "description": "事例4\n次の文を読み、問30から問32に対する適切な答えを一つ選んでください。\nあなたは病院の感染管理認定看護師です。2021年6月15日、細菌検査室から、ICUに入院している患者K氏の喀痰と血液培養から、薬剤耐性アシネトバクター・バウマニ（Multiple drug resistant Acinetobacter baumannii：MDR-Ab）が検出されたと連絡が入りました。喀痰は6月12日に気管挿管チューブから吸引して採取したものでした。\nICUを訪問したところ、以下のことがわかりました。\n・K氏は、6月12日に発熱、呼吸不全、意識障害があり、他院で気管挿管され人工呼吸器を装着した状態で、当院のICUに転院となった。\n・K氏は6月12日の胸部X線検査で両肺野に浸潤影が認められ、肺炎と診断された。\n・ICUには2つの個室があるが、K氏はカーテンで仕切られた8床のオープンフロアーのベッドに入院していた。\n・6月12日～6月15日までにICUに入室していた患者は15名であった。", "assets": {}, "questions": {"30": {"question_no": "30", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "4", "type": "single_best", "question": "MDR-Abに関する説明として、正しいのはどれか。", "choices": {"1": "グラム陽性菌である。", "2": "肺炎、血流感染症、創部感染症など多彩な感染症を引き起こす。", "3": "バイオフィルムを形成しない。", "4": "コリスチンに耐性を示すAcinetobacter baumanniiの報告はない。"}, "answer": "2", "explanation": {"overall": "MDR-Ab（薬剤耐性Acinetobacter baumannii）はグラム陰性桿菌であり、人工呼吸器関連肺炎（VAP）、血流感染、創部感染症など多彩な院内感染を引き起こす。バイオフィルム形成能を持ち、コリスチン耐性株も報告されている。", "each": {"1": "Acinetobacter baumanniiはグラム陰性桿菌であり誤り。", "2": "肺炎、血流感染症、創部感染症など多彩な感染症を引き起こし正しい。", "3": "バイオフィルム形成能を有するため誤り。", "4": "コリスチン耐性Acinetobacter baumanniiの報告は存在するため誤り。"}}, "category": "薬剤耐性菌", "subcategory": "MDR-Ab", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "31": {"question_no": "31", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "4", "type": "single_best", "question": "K氏への対応として、正しい組み合わせはどれか。", "stem_items": {"a": "個室管理とし、入室時は手袋とガウンを着用する。", "b": "薬剤耐性アシネトバクター感染症として届け出をする。", "c": "ケアに使用した個人防護具は、病室を出てから外し、室外に設置した感染性廃棄物容器に廃棄する。", "d": "発熱や呼吸不全などの肺炎症状が改善したら、接触予防策を解除する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "1", "explanation": {"overall": "MDR-Abは接触感染対策が必要であり、可能であれば個室管理を行う。入室時には手袋・ガウンを着用する。また、薬剤耐性アシネトバクター感染症は5類全数把握疾患であり届出対象である。", "each": {"a": "接触予防策として個室管理、手袋・ガウン着用を行うため正しい。", "b": "薬剤耐性アシネトバクター感染症は5類全数把握疾患であり届出対象であるため正しい。", "c": "個人防護具は病室内で外して廃棄するため誤り。", "d": "症状改善のみでは解除せず、保菌状態などを考慮して接触予防策解除を検討するため誤り。"}}, "category": "薬剤耐性菌", "subcategory": "MDR-Ab", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "32": {"question_no": "32", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "4", "type": "single_best", "question": "6月15日のスクリーニング検査の結果を受けて、今後あなたが実施する必要があると考える対策として、正しい組み合わせはどれか。", "stem_items": {"a": "MDR-Abは乾燥した環境で生息できないため、水回りの清浄化を強化する。", "b": "K氏とL氏を担当する看護師は、他の患者を担当しないようにする。", "c": "ICUで継続的に監視培養を実施する。", "d": "L氏に対してムピロシンを投与し、除菌する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "MDR-Abは乾燥環境でも長期間生存可能であり、ICU内での接触感染対策とサーベイランス強化が重要となる。保菌患者が確認された場合は、担当スタッフの固定化や継続的な監視培養を検討する。", "each": {"a": "MDR-Abは乾燥環境でも生存可能であり、この説明は誤り。", "b": "交差感染防止のため、担当看護師を固定化する対応は適切であり正しい。", "c": "ICU内での伝播状況確認のため、継続的な監視培養を実施することは適切であり正しい。", "d": "ムピロシンは主にMRSAの鼻腔除菌に使用され、MDR-Abの除菌目的には使用しないため誤り。"}}, "category": "薬剤耐性菌", "subcategory": "MDR-Ab", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}}}, "case5": {"case_no": "5", "description": "事例5\n次の文を読み、問33から問35に対する適切な答えを一つ選んでください。\nあなたは病院の感染管理認定看護師です。2021年3月10日、救命救急センターから「昨夜搬送され、入院した患者M氏が結核を発病している可能性がある」と連絡がありました。あなたは以下のような状況を確認しました。\n・搬送時に撮影したM氏の胸部X線上、右肺上葉に異常陰影を認めた。\n・M氏の呼吸状態は悪く、初療室で気管挿管が行われた。\n・初療の担当は医師1名、研修医1名、看護師1名で、全員がサージカルマスクを着用していた。\n・現在M氏は、人工呼吸器管理中で救命救急センターの個室に入室している。\n・気管挿管時に提出した喀痰塗抹検査の結果、抗酸菌が陽性（1+）であった。\n・M氏は1か月前から咳をしていたが、病院を受診していなかった。\n・核酸増幅検査（PCR法）の結果は3月12日に判明する予定である。", "assets": {}, "questions": {"33": {"question_no": "33", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "5", "type": "single_best", "question": "3月10日の状況に基づく判断として、正しい組み合わせはどれか。", "stem_items": {"a": "結核の発生届を3月10日から7日以内に提出する必要がある。", "b": "喀痰塗抹検査で「抗酸菌陽性（1+）」であることから、M氏は結核菌を排菌している。", "c": "核酸増幅検査（PCR法）が陰性であったとしても、偽陰性の可能性を疑う必要がある。", "d": "結核菌の耐性化を避けるため、作用点の異なる抗結核薬を複数組み合わせた多剤併用療法を少なくとも6か月間継続する必要がある。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "抗酸菌陽性のみでは結核菌とは断定できず、非結核性抗酸菌症の可能性もある。一方、PCR陰性でも偽陰性の可能性があり、臨床所見から結核を否定できない場合がある。また、結核治療では耐性化防止のため多剤併用療法を行う。", "each": {"a": "結核の届出は診断後直ちに行うため、「7日以内」という記載は誤り。", "b": "抗酸菌陽性のみでは結核菌とは断定できず、非結核性抗酸菌の可能性もあるため誤り。", "c": "PCR陰性でも偽陰性の可能性があり、結核を完全には否定できないため正しい。", "d": "結核治療では耐性化防止のため多剤併用療法を行い、通常6か月以上継続するため正しい。"}}, "category": "結核", "subcategory": "診断・治療", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "34": {"question_no": "34", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "5", "type": "single_best", "question": "救命救急センターの職員に対して指導する内容として、正しいのはどれか。", "choices": {"1": "M氏が使用した初療室内の床や壁は、結核に有効な薬剤を用いて消毒する。", "2": "ツベルクリン反応陽性の看護師を優先的にM氏の担当にする。", "3": "N95微粒子用マスクの着用のたびに、ユーザーシールチェックを実施する。", "4": "M氏は人工呼吸器を装着しているため、陰圧室に収容する必要はない。"}, "answer": "3", "explanation": {"overall": "結核患者対応では空気予防策を実施し、N95微粒子用マスク着用時には毎回ユーザーシールチェックを行う必要がある。結核菌は環境表面からの感染リスクは低く、通常の環境清掃で対応する。人工呼吸器装着中であっても陰圧室管理が推奨される。", "each": {"1": "結核菌は主に空気感染であり、床や壁に対して特別な消毒は通常不要であるため誤り。", "2": "ツベルクリン反応陽性のみでは免疫の有無を十分判断できず、優先的担当とする根拠にはならないため誤り。", "3": "N95微粒子用マスクは着用のたびにユーザーシールチェックを実施する必要があり正しい。", "4": "人工呼吸器装着中であっても、結核が疑われる場合は陰圧室収容が必要であり誤り。"}}, "category": "結核", "subcategory": "空気予防策", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "35": {"question_no": "35", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "5", "type": "single_best", "question": "3月12日に核酸増幅検査（PCR法）の結果から結核菌陽性であると判明したため、「感染症法に基づく結核の接触者健康診断の手引き（改訂第5版）」に従い、M氏との接触者に対して健診を行うこととなった。接触者健診に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "M氏の初療を担当した3名は「濃厚接触者」と定義される。", "b": "M氏の感染性期間の始期は結核診断日の3か月前とする。", "c": "接触者には、4月初旬にインターフェロンγ遊離試験（Interferon-gamma release-assay，IGRA）を実施する。", "d": "接触者健診でIGRAの結果が「陽性」であった場合は、直ちに就業制限を行う。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "1", "explanation": {"overall": "M氏は1か月前から咳があり、結核診断時点から3か月前までを感染性期間の始期として接触者健診を考える。また、初療を担当した医師・研修医・看護師の3名は、気管挿管時にサージカルマスクのみで対応しており、空気感染対策が不十分な濃厚接触者として扱う。IGRAは接触直後ではなく、最終接触から8週経過後に実施するのが基本であり、4月初旬では時期が早い。IGRA陽性のみで直ちに就業制限とはならない。したがってaとbが正しい。", "each": {"a": "初療を担当した3名は、気管挿管時にサージカルマスクのみで対応しており、空気感染対策が不十分な濃厚接触者として扱うため正しい。", "b": "M氏は1か月前から咳があり、結核診断時点から3か月前までを感染性期間の始期として評価するため正しい。", "c": "IGRAは感染成立までの期間を考慮し、最終接触から8週経過後に実施するのが基本であり、4月初旬では早すぎるため誤り。", "d": "IGRA陽性のみでは直ちに就業制限とはならず、活動性結核の有無を評価する必要があるため誤り。"}}, "category": "結核", "subcategory": "接触者健診", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}}}, "case6": {"case_no": "6", "description": "事例6\n次の文を読み、問36から問38に対する適切な答えを一つ選んでください。\nあなたは病院の感染管理認定看護師です。2021年4月10日に、細菌検査室から、メタロ-β-ラクタマーゼ産生Enterobacter cloacae（以下、MBL-EC）が3階病棟に入院中の患者N氏から検出されたとの報告を受けました。N氏は4人部屋の301号室に入院中で、同室にO氏とP氏が入院しています。また、この日以前にMBL-ECが検出されたことはありません。2021年4月30日までの間に、さらにO氏と303号室に入院中のQ氏からMBL-ECが検出されました。2021年4月30日現在、MBL-EC検出患者一覧は下表の通りです。\nまた、3階病棟における2021年4月1日から4月30日までの入院患者数は合計300人でした。", "questions": {"36": {"question_no": "36", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "6", "type": "single_best", "question": "あなたは3階病棟に勤務する職員に、MBL-ECについて説明することになりました。本菌に関する説明として、正しい組み合わせはどれか。", "assets": {"tables": [{"title": "メタロ-β-ラクタマーゼ産生E.cloacae検出者一覧", "subtitle": "2021年4月30日現在　3階病棟", "headers": ["検出患者", "入院日", "検査日", "材料", "移動情報"], "rows": [["患者N", "2020/12/15", "2021/4/5", "吸引痰", "入院中"], ["患者O", "2021/3/27", "2021/4/10", "吸引痰", "入院中"], ["患者Q", "2021/4/15", "2021/4/15", "吸引痰", "入院中"]]}]}, "stem_items": {"a": "MBL-ECは薬剤耐性菌であるが、すべてのβ-ラクタム系抗菌薬に対して感受性がある。", "b": "カルバペネム分解酵素（カルバペネマーゼ）は、IMP型やNDM型を含むメタロβ-ラクタマーゼと、KPC型やOXA-48型を含むセリン型カルバペネマーゼに大別される。", "c": "カルバペネム耐性Enterobacter属菌には、カルバペネマーゼを産生せず、染色体性のクラスC型β-ラクタマーゼ産生と膜の透過性低下により、カルバペネム耐性を示すものが多い。", "d": "メロペネムのMIC値が2μg/ml未満の腸内細菌科細菌は、カルバペネマーゼ非産生株と判断される。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "カルバペネマーゼにはメタロβ-ラクタマーゼ型とセリン型があり、薬剤感受性はCREであってもカルバペネマーゼを産生している菌種も存在する。", "each": {"a": "感受性ではなく耐性があるため誤り。", "b": "IMP型・NDM型はメタロβ-ラクタマーゼ、KPC型・OXA-48型はセリン型カルバペネマーゼであり正しい。", "c": "カルバペネマーゼ非産生でもAmpC産生や膜透過性低下により耐性化することがあり正しい。", "d": "カルバペネマーゼ産生している可能性もある（nonCRE-CPE）。薬剤感受性はCREではないがカルバペネマーゼ産生している菌種もあるため誤り。"}}, "category": "薬剤耐性菌", "subcategory": "MBL-EC", "difficulty": "hard", "source_file": "第30回認定看護師認定審査.docx"}, "37": {"question_no": "37", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "6", "type": "single_best", "question": "N氏からのMBL-EC検出の連絡を受けて、2021年4月10日時点で行う対策として、正しいのはどれか。", "choices": {"1": "N氏を陰圧室に隔離する。", "2": "3階病棟に入院中の患者を対象にしたMBL-ECのスクリーニング培養検査の実施を提案する。", "3": "301号室の床を0.01%（100ppm）の次亜塩素酸ナトリウム溶液で消毒する。", "4": "血圧計は患者N氏、O氏、P氏で共有し、301号室から持ち出さない。"}, "answer": "2", "explanation": {"overall": "MBL-EC検出時には接触予防策を基本とし、アウトブレイク対策として接触患者へのスクリーニング培養を検討する。陰圧室は不要であり、環境消毒濃度や共有物品管理にも注意が必要である。", "each": {"1": "MBL-ECは空気感染ではないため陰圧室は不要である。", "2": "アウトブレイク対応としてスクリーニング培養検査を実施することは適切である。", "3": "100ppmでは低濃度であり不十分。通常はより高濃度で実施する。", "4": "共有は避け、専用化または患者ごとの消毒が必要である。"}}, "category": "薬剤耐性菌", "subcategory": "MBL-EC", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "38": {"question_no": "38", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "6", "type": "single_best", "question": "あなたの病院では、入院4日目以降に検出された薬剤耐性菌を院内獲得と判定しています。3階病棟における2021年4月のMBL-EC発生状況に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "院内獲得のMBL-ECの発生率（incidence rate）は、2%である。", "b": "薬剤耐性菌の発生率（incidence rate）は、観察期間に存在するすべての保菌者数を分子として計算する。", "c": "MBL-ECの有病率（prevalence rate）は、1%である。", "d": "薬剤耐性菌の有病率（prevalence rate）は、耐性菌の伝播の起こりやすさを表す指標である。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "有病率（prevalence）は観察時点・期間内に存在する全保菌者数を対象とし、伝播状況の把握に用いられる。一方、発生率（incidence）は新規発生例のみを分子として算出する。", "each": {"a": "院内獲得例は患者N・Oの2例であり、2/300×100＝0.67%であるため誤り。", "b": "発生率（incidence）は新規発生例数を分子として計算するため誤り。", "c": "有病率は全保菌者数3例を用いて、3/300×100＝1%となるため正しい。", "d": "有病率は耐性菌の伝播状況や病棟内での広がりを評価する指標として用いられるため正しい。"}}, "category": "薬剤耐性菌", "subcategory": "MBL-EC", "difficulty": "hard", "source_file": "第30回認定看護師認定審査.docx"}}}, "case7": {"case_no": "7", "description": "事例7\n次の文を読み、問39から問40に対する適切な答えを一つ選んでください。\nあなたは病院の感染管理認定看護師です。ある日、血液内科病棟の師長から「移植件数が普段より多く、防護環境（移植室）が足りない。ベッド配置をどのようにすれば良いか」との相談がありました。当該病棟には防護環境が2床しかありません。あなたが、確認したところ、以下のような状況でした。\n・現在防護環境には、20日前に同種造血細胞移植を受けたR氏と、35日前に同種造血細胞移植を受けたS氏の2人が入院している。\n・R氏は移植後、移植片対宿主病（Graft-versus-host Disease：以下GVHD）を発症しており、好中球減少も遷延している。\n・S氏はGVHDの発症はなく、好中球の回復も順調である。\n・翌週からT氏、U氏の2名が移植治療を受ける予定である。\n・T氏は同種造血細胞移植、U氏は自家移植を実施する予定である。", "questions": {"39": {"question_no": "39", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "7", "type": "single_best", "question": "防護環境に優先的に入室する必要がある患者は誰か。", "choices": {"1": "R氏とS氏", "2": "R氏とT氏", "3": "R氏とU氏", "4": "T氏とU氏"}, "answer": "2", "explanation": {"overall": "防護環境は、重度免疫抑制状態やGVHDを伴う同種造血細胞移植患者を優先する。R氏はGVHDと好中球減少遷延があり高リスクであり、T氏も同種造血細胞移植予定であるため優先度が高い。", "each": {"1": "S氏はGVHDなく好中球回復も順調であり、優先度は低下する。", "2": "GVHDを発症しているR氏と、同種造血細胞移植予定のT氏が優先的に入室するため正しい。", "3": "U氏は自家移植であり、同種移植患者より優先度は低い。", "4": "R氏はGVHDと好中球減少遷延があり、防護環境継続が必要である。"}}, "category": "防護環境", "subcategory": "造血細胞移植", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "40": {"question_no": "40", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "7", "type": "single_best", "question": "病棟スタッフより、防護環境に入る面会者の基準が曖昧なので、面会基準を見直したいと相談された。防護環境に入室する面会者への指導内容として、正しいのはどれか。", "choices": {"1": "上気道炎症状がある場合は、サージカルマスクを着用する。", "2": "防護環境内での飲食は禁止する。", "3": "水痘生ワクチン接種後6週間以内に水痘様発疹が認められる場合でも、面会は可能である。", "4": "自宅で洗濯した寝衣は、病室に持ち込まない。"}, "answer": "2", "explanation": {"overall": "防護環境では、免疫抑制患者への感染持ち込み防止が重要である。上気道症状や水痘様発疹がある場合は面会を避け、防護環境内での飲食は禁止する。", "each": {"1": "上気道症状がある場合は、マスク着用ではなく面会を控える必要がある。", "2": "防護環境内での飲食は禁止されており正しい。", "3": "水痘様発疹が認められる場合は面会不可であり誤り。", "4": "自宅で洗濯した寝衣の持ち込み自体は禁止されていない。"}}, "category": "防護環境", "subcategory": "面会基準", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}}}}}}};


window.EXAM_DATA_31 = {"第31回":{"meta":{"title":"第31回認定看護師認定審査","year":2023,"course":"感染管理(B課程)"},"questions":{"1":{"question_no":"1","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"感染症に関する説明として、正しい組み合わせはどれか。","stem_items":{"a":"MERSコロナウイルス(MERS-CoV)によって引き起こされる中東呼吸器症候群(MERS)の、医療機関におけるヒトーヒト感染は、報告されていない。","b":"ペストは、コウモリを介して伝播するウイルス疾患である。","c":"ジカウイルス感染症は、フラビウイルス科フラビウイルス属のウイルスによる蚊媒介感染症である。","d":"重症熱性血小板減少症候群は、ブニヤウイルス科フレボウイルス属のSFTSウイルスによるマダニが媒介する感染症である。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"4","explanation":{"overall":"ジカウイルス感染症はフラビウイルス科フラビウイルス属の蚊媒介感染症であり正しい。SFTSはブニヤウイルス科フレボウイルス属のSFTSウイルスをマダニが媒介する感染症であり正しい。MERSの医療機関内でのヒト－ヒト感染は複数報告されており、ペストはノミを介して伝播する細菌性疾患である。","each":{"a":"MERSの医療機関内ヒト－ヒト感染は報告されているため誤り。","b":"ペストはコウモリではなくノミを介して伝播する細菌性（Yersinia pestis）疾患であるため誤り。","c":"ジカウイルス感染症はフラビウイルス科フラビウイルス属の蚊媒介感染症であり正しい。","d":"SFTSはブニヤウイルス科フレボウイルス属のSFTSウイルスをマダニが媒介する感染症であり正しい。"}},"category":"感染症","subcategory":"新興・再興感染症","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"2":{"question_no":"2","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"消毒薬の濃度と適用として、正しい組み合わせはどれか。","stem_items":{"a":"膣炎患者の膣内は、1%クロルヘキシジングルコン酸塩液で洗浄する。","b":"ノロウイルス患者の吐物汚染を受けた床の消毒には、0.1%(1,000ppm)次亜塩素酸ナトリウムを使用する。","c":"腸管出血性大腸菌O26感染症患者が使用した便座は、アルコールで清拭する。","d":"手術に使用した膀胱鏡は、フタラールで消毒する。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"3","explanation":{"overall":"ノロウイルス患者の吐物で汚染された床の消毒には0.1%(1,000ppm)次亜塩素酸ナトリウムを使用する。腸管出血性大腸菌O26はアルコール感受性があり、便座の清拭にアルコールを使用できる。一方、1%クロルヘキシジングルコン酸塩液の膣内洗浄は適切ではない。また、手術に使用した膀胱鏡はクリティカル器材として滅菌が必要であり、フタラールによる高水準消毒では不十分である。","each":{"a":"クロルヘキシジングルコン酸塩1%の膣内洗浄は適切ではないため誤り。","b":"ノロウイルス患者の吐物で汚染された床には0.1%(1,000ppm)次亜塩素酸ナトリウムを使用するため正しい。","c":"腸管出血性大腸菌O26はアルコール感受性があり、アルコール清拭は有効であるため正しい。","d":"手術に使用した膀胱鏡はクリティカル器材として滅菌が必要であり、フタラールによる高水準消毒では不十分であるため誤り。"}},"category":"消毒・滅菌","subcategory":"消毒薬","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"3":{"question_no":"3","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"血液への職業曝露に関する説明として、正しいのはどれか。","choices":{"1":"B型肝炎ワクチンを1シリーズ接種し抗体獲得した看護師の抗体力価が10mIU/ml未満となった場合、追加接種を行う。","2":"HIV抗体陽性血液の粘膜曝露により、HIVに感染するリスクは約0.3%である。","3":"HIV抗体陽性血液に曝露した後の抗HIV薬の予防内服は、10週間継続することが推奨されている。","4":"HIV抗体陽性血液で汚染された針による経皮的曝露が発生した場合、曝露後5日以内に抗HIV薬の予防内服を行う。"},"answer":"1","explanation":{"overall":"B型肝炎ワクチンで抗体獲得後に抗体価が10mIU/ml未満に低下した場合は追加接種が推奨される。HIV粘膜曝露のリスクは約0.09%であり0.3%は経皮的曝露のリスク、予防内服は4週間継続、開始は72時間以内が原則である。","each":{"1":"抗体獲得後に抗体価が10mIU/ml未満に低下した場合は追加接種が推奨されるため正しい。","2":"HIV陽性血液の粘膜曝露による感染リスクは約0.09%であり、0.3%は経皮的曝露のリスクであるため誤り。","3":"HIV曝露後予防内服は4週間継続が推奨されており、10週間ではないため誤り。","4":"曝露後予防内服は72時間以内に開始することが推奨されており、5日以内では遅すぎるため誤り。"}},"category":"職業感染対策","subcategory":"血液曝露","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"4":{"question_no":"4","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"感染管理の関係法規に関する説明として、正しい組み合わせはどれか。","stem_items":{"a":"破傷風トキソイドは3～8週間間隔で2回接種し、初回免疫後6か月以上の間隔をおいて1回追加接種する。","b":"小児で接種する肺炎球菌ワクチンは、23価莢膜ポリサッカライドワクチンである。","c":"劇症型溶血性レンサ球菌感染症は、定点把握対象の感染症である。","d":"梅毒は、診断した場合は7日以内に届出する。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"2","explanation":{"overall":"破傷風トキソイドは3〜8週間隔で2回接種後、6か月以上あけて追加1回接種が正しい。梅毒は全数把握対象疾患であり、診断後7日以内の届出が必要である。小児の肺炎球菌ワクチンは13価結合型ワクチンであり、劇症型溶血性レンサ球菌感染症は全数把握対象である。","each":{"a":"破傷風トキソイドは3〜8週間隔で2回、その後6か月以上あけて追加1回接種であり正しい。","b":"小児に接種する肺炎球菌ワクチンは13価結合型（PCV13）であり、23価は成人向けであるため誤り。","c":"劇症型溶血性レンサ球菌感染症は定点把握ではなく全数把握対象疾患であるため誤り。","d":"梅毒は全数把握対象疾患であり、診断後7日以内に届出が必要であるため正しい。"}},"category":"感染症法","subcategory":"届出・ワクチン","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"5":{"question_no":"5","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"手術部位感染予防に有効性が認められている対策として、正しい組み合わせはどれか。","stem_items":{"a":"手術当日朝にシャワー浴を行う。","b":"感染症患者の手術を行った手術室は、高水準消毒薬を用いて消毒する。","c":"手術時手洗いは、水道水より滅菌水を用いた方が有効である。","d":"「手術部位感染予防のためのCDCガイドライン2017」では、周術期の血糖コントロールを行い200mg/dl未満を目標とするとしている。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"2","explanation":{"overall":"手術当日朝のシャワー浴はSSI予防に有効と認められている。CDC2017ガイドラインでは周術期血糖コントロールの目標値として200mg/dl未満を推奨している。感染症患者の手術室は通常の清掃・消毒で対応可能であり、手術時手洗いは水道水と滅菌水で有効性に差はない。","each":{"a":"手術当日朝のシャワー浴はSSI予防に有効であり正しい。","b":"感染症患者使用後の手術室に高水準消毒薬は不要であり、通常の環境清掃で対応するため誤り。","c":"手術時手洗いにおいて滅菌水と水道水の有効性に差はないとされているため誤り。","d":"CDC2017ではすべての手術患者で周術期血糖200mg/dl未満を目標とすることが推奨されており正しい。"}},"category":"手術部位感染","subcategory":"SSI予防","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"6":{"question_no":"6","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"小児の感染症に関する説明として、正しい組み合わせはどれか。","stem_items":{"a":"手足口病は、口腔粘膜および手や足などに現れる水疱性の発疹を主症状とした急性細菌感染症である。","b":"乳幼児に急性胃腸炎を引き起こすロタウイルスは、ノンエンベロープウイルスである。","c":"ヘルパンギーナの感染経路は、接触感染、飛沫感染、糞口感染である。","d":"咽頭結膜熱(プール熱)は、学校保健安全法で、主要症状が消退するまで出席停止とされている。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"3","explanation":{"overall":"ロタウイルスはノンエンベロープウイルスであり正しい。ヘルパンギーナの感染経路は接触・飛沫・糞口感染であり正しい。手足口病はウイルス性疾患であり細菌感染症ではない。咽頭結膜熱の出席停止基準は主要症状消退後2日を経過するまでである。","each":{"a":"手足口病はエンテロウイルス属によるウイルス性疾患であり、細菌感染症ではないため誤り。","b":"ロタウイルスはノンエンベロープウイルスであり正しい。","c":"ヘルパンギーナの感染経路は接触感染・飛沫感染・糞口感染であり正しい。","d":"咽頭結膜熱の出席停止基準は主要症状消退後2日を経過するまでであり、『消退するまで』では不十分であるため誤り。"}},"category":"感染症","subcategory":"小児感染症","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"7":{"question_no":"7","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"ファシリティマネジメントに関する説明として、正しい組み合わせはどれか。","stem_items":{"a":"レジオネラ属菌に対する熱消毒は50℃以上で行う。","b":"リネン類は80℃で10分間以上の洗濯処理を行う。","c":"「大量調理施設衛生管理マニュアル」では、調理従事者の検便には腸管出血性大腸菌の検査を含めることとしている。","d":"「大量調理施設衛生管理マニュアル」では、調理従事者がノロウイルス保有者と判明した場合、症状消失後48時間経過するまでの間、調理に直接従事しないこととしている。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"3","explanation":{"overall":"リネン類は80℃10分間以上の熱水洗濯が標準的な処理方法として正しい。大量調理施設衛生管理マニュアルでは調理従事者の検便に腸管出血性大腸菌検査を含めることが規定されている。レジオネラの熱消毒は50℃では不十分であり、ノロウイルス保有者の就業制限は症状消失後48時間のみではない。","each":{"a":"レジオネラ属菌の熱消毒は50℃では不十分であるため誤り。","b":"リネン類は80℃10分間以上の洗濯処理が推奨されており正しい。","c":"大量調理施設衛生管理マニュアルでは調理従事者の検便に腸管出血性大腸菌検査を含めることが規定されており正しい。","d":"ノロウイルス保有者の調理従事制限は症状消失後48時間のみを基準とするものではないため誤り。"}},"category":"ファシリティマネジメント","subcategory":"環境管理・給食管理","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"8":{"question_no":"8","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"image_question","question":"あるホテルで5月1日に朝食で提供されたサラダの喫食に由来する腸管出血性大腸菌O157による食中毒が発生した。このような単一の感染源による事例の典型的な流行曲線として、正しいのはどれか。","answer":"全員正解","explanation":{"overall":"原問題は流行曲線の図を参照して解答する形式であるが、引用元の図が存在しないため判定不能とした。","each":{}},"category":"疫学","subcategory":"流行曲線","difficulty":"excluded","source_file":"第31回認定看護師認定審査.docx","note":"図欠落のため全員正解扱い"},"9":{"question_no":"9","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"統計学に関する説明として、正しいのはどれか。","choices":{"1":"ASAスコアの分布をヒストグラムで表した。","2":"二群の平均値の差の検定にt検定を用いた。","3":"入院患者の年齢が正規分布を示していたため、代表値として中央値を用いた。","4":"対象数10人と1,000人のデータでは、信頼区間の幅は10人の方が小さい。"},"answer":"2","explanation":{"overall":"二群の平均値の差の検定にはt検定を用いるのが適切である。ASAスコアは順序尺度でありヒストグラムではなく棒グラフが適切、正規分布では代表値として平均値を用い、対象数が多いほど信頼区間の幅は小さくなる。","each":{"1":"ASAスコアは順序尺度であり、ヒストグラムではなく棒グラフで表すのが適切であるため誤り。","2":"二群の平均値の差の検定にはt検定を用いるため正しい。","3":"正規分布を示す場合の代表値は中央値ではなく平均値を用いるため誤り。","4":"対象数が多いほど信頼区間の幅は小さくなるため、10人の方が小さいという記載は誤り。"}},"category":"疫学","subcategory":"統計学","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"10":{"question_no":"10","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"ノロウイルスに関する説明として、正しい組み合わせはどれか。","stem_items":{"a":"嘔吐物で汚染されたリネンの消毒は、85℃で1分間以上、熱水消毒する。","b":"消化器症状がある場合は、飛沫予防策を実施する。","c":"ヒトの大腸に感染し、増殖する。","d":"ノンエンベロープのRNAウイルスである。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"2","explanation":{"overall":"ノロウイルス汚染リネンの熱水消毒は85℃1分間以上が推奨されており正しい。ノロウイルスはノンエンベロープのRNAウイルスであり正しい。ノロウイルスは接触・経口感染が主であり飛沫予防策は通常不要、感染部位は大腸ではなく小腸である。","each":{"a":"ノロウイルス汚染リネンは85℃1分間以上の熱水消毒が推奨されており正しい。","b":"ノロウイルスは接触予防策が主体であり、飛沫予防策は通常適応されないため誤り。","c":"ノロウイルスはヒトの小腸で増殖するため誤り。","d":"ノロウイルスはノンエンベロープのRNAウイルスであり正しい。"}},"category":"感染症","subcategory":"ノロウイルス","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"11":{"question_no":"11","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"人工呼吸器関連肺炎予防の対策として、正しいのはどれか。","choices":{"1":"医学的に禁忌でなければ、経鼻気管挿管よりも、経口気管挿管を優先的に選択する。","2":"人工呼吸器装着中は、過鎮静を維持する。","3":"人工呼吸器の回路は、定期的に交換することが推奨されている。","4":"人工呼吸器の回路は、中水準消毒を行う。"},"answer":"1","explanation":{"overall":"経口気管挿管は経鼻に比べて副鼻腔炎リスクが低くVAP予防上優先される。過鎮静は人工呼吸器離脱を遅らせVAPリスクを高めるため避けるべきであり、回路の定期交換は推奨されず、回路は高水準消毒または滅菌が必要である。","each":{"1":"経口気管挿管は副鼻腔炎リスクが低くVAP予防上推奨されており正しい。","2":"過鎮静は人工呼吸器装着期間を延長しVAPリスクを高めるため誤り。","3":"人工呼吸器回路の定期交換はVAP予防効果がなく推奨されていないため誤り。","4":"人工呼吸器回路は高水準消毒または滅菌が必要であり、中水準消毒では不十分であるため誤り。"}},"category":"医療関連感染","subcategory":"VAP","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"12":{"question_no":"12","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"薬剤耐性菌に関する説明として、正しい組み合わせはどれか。","stem_items":{"a":"基質拡張型β-ラクタマーゼ(ESBL)産生大腸菌は、家畜類から分離され、食肉を介してヒトに伝播する可能性が指摘されている。","b":"感染症法において、薬剤耐性アシネトバクター(MDRA)感染症は定点把握対象疾患である。","c":"感染症法において、カルバペネム耐性腸内細菌目細菌感染症は、広域β-ラクタム薬、アミノ配糖体、フルオロキノロンの3系統の薬剤に対して耐性を示す腸内細菌目細菌による感染症と定義付けられている。","d":"バンコマイシン耐性腸球菌(VRE)のvanC型は、自然耐性菌である。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"2","explanation":{"overall":"ESBL産生大腸菌は家禽類から分離され食肉を介したヒトへの伝播が指摘されており正しい。VREのvanC型は自然耐性であり正しい。MDRAは定点把握ではなく全数把握対象疾患であり、3系統耐性の定義はCREではなく薬剤耐性緑膿菌（MDRP）の定義である。","each":{"a":"ESBL産生大腸菌は家畜類から分離され、食肉を介してヒトに伝播する可能性が指摘されており正しい。","b":"薬剤耐性アシネトバクター感染症は定点把握ではなく5類全数把握対象疾患であるため誤り。","c":"広域β-ラクタム薬・アミノ配糖体・フルオロキノロンの3系統耐性の定義は薬剤耐性緑膿菌（MDRP）の定義であり、CREの定義ではないため誤り。","d":"VREのvanC型はEnterococcus casseliflavus等が本来保有する自然耐性であり正しい。"}},"category":"薬剤耐性菌","subcategory":"AMR","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"13":{"question_no":"13","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"微生物に関する説明として、正しい組み合わせはどれか。","stem_items":{"a":"つつが虫病は、ヒトスジシマカを介してヒトに感染する感染症である。","b":"水痘は、単純ヘルペスウイルス(herpes simplex virus:HSV)によって起こる感染症である。","c":"ポリオウイルスは、ノンエンベロープウイルスである。","d":"流行性角結膜炎(EKC)は、アデノウイルスによる感染症である。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"4","explanation":{"overall":"ポリオウイルスはノンエンベロープウイルスであり正しい。流行性角結膜炎はアデノウイルスによる感染症であり正しい。つつが虫病はツツガムシを介した感染症であり、水痘は水痘・帯状疱疹ウイルス（VZV）による感染症である。","each":{"a":"つつが虫病はヒトスジシマカではなくツツガムシを介して感染するため誤り。","b":"水痘は単純ヘルペスウイルスではなく水痘・帯状疱疹ウイルス（VZV）による感染症であるため誤り。","c":"ポリオウイルスはノンエンベロープウイルスであり正しい。","d":"流行性角結膜炎はアデノウイルスによる感染症であり正しい。"}},"category":"微生物","subcategory":"ウイルス・媒介感染症","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"14":{"question_no":"14","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"感染経路別予防策に関する説明として、正しい組み合わせはどれか。","stem_items":{"a":"髄膜炎菌による敗血症には、効果的な治療を開始後24時間が経過するまで飛沫予防策を実施する。","b":"播種性病変がみられる帯状疱疹の患者には、空気予防策と接触予防策を行う。","c":"多剤耐性緑膿菌(MDRP)による肺炎患者には、飛沫予防策を行う。","d":"B型肝炎の治療中の患者には、接触予防策を行う。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"1","explanation":{"overall":"髄膜炎菌感染症は効果的な治療開始後24時間まで飛沫予防策を実施する。播種性帯状疱疹は空気予防策と接触予防策の両方が必要である。MDRPは接触予防策が主体であり飛沫予防策は不要、B型肝炎は標準予防策で対応し接触予防策は不要である。","each":{"a":"髄膜炎菌感染症は効果的な治療開始後24時間まで飛沫予防策を実施するため正しい。","b":"播種性帯状疱疹は空気感染と接触感染のリスクがあるため、空気予防策と接触予防策の両方を実施するため正しい。","c":"MDRPによる肺炎には飛沫予防策ではなく接触予防策を実施するため誤り。","d":"B型肝炎治療中の患者には接触予防策ではなく標準予防策で対応するため誤り。"}},"category":"感染経路別予防策","subcategory":"標準予防策・感染経路別予防策","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"15":{"question_no":"15","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"手指衛生について、正しい組み合わせはどれか。","stem_items":{"a":"芽胞形成菌保有者のケアの後は、擦式アルコール手指消毒薬で手指衛生を行う。","b":"エンベロープを有するウイルス保有者のケアの後は、擦式アルコール手指消毒薬で手指衛生を行う。","c":"手指衛生の直接観察法は、観察者の影響を受け、遵守率が高くなる可能性があることが欠点である。","d":"手術時手洗いのラビング法は、ブラシと石鹸を用いた手洗い後、擦式アルコール手指消毒薬で消毒する方法である。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"3","explanation":{"overall":"エンベロープを有するウイルスはアルコールで不活化可能であり擦式アルコール手指消毒薬が有効である。手指衛生の直接観察法はホーソン効果により遵守率が実態より高く観察される可能性があることが欠点として知られている。芽胞形成菌にはアルコールが無効であり流水と石鹸による手洗いが必要で、ラビング法はブラシを使用しない。","each":{"a":"芽胞形成菌にはアルコールが無効であるため、流水と石鹸による手洗いが必要であり誤り。","b":"エンベロープを有するウイルスはアルコールで不活化可能であり、擦式アルコール手指消毒薬が有効であるため正しい。","c":"直接観察法はホーソン効果により遵守率が実態より高く評価される可能性があることが欠点であり正しい。","d":"ラビング法はブラシや石鹸を使用せず、擦式アルコール手指消毒薬を用いる方法であるため誤り。"}},"category":"手指衛生","subcategory":"WHO・手術時手洗い","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"16":{"question_no":"16","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"防護環境に関する説明として、正しいのはどれか。","choices":{"1":"防護環境は、廊下に対して等圧でなければならない。","2":"防護環境は、レジオネラへの曝露予防に有効である。","3":"自家造血幹細胞移植を受けた患者は、防護環境に入室させる必要がある。","4":"防護環境では、室内の換気回数を12回/時間以上とする。"},"answer":"4","explanation":{"overall":"防護環境は陽圧管理、HEPAフィルター、12回/時間以上の換気を備えた環境であり、主にアスペルギルスなど空気中真菌から易感染患者を保護することを目的とする。自家造血幹細胞移植患者には通常推奨されず、主な対象は同種造血幹細胞移植患者である。","each":{"1":"防護環境は廊下に対して陽圧管理が必要であり、等圧では不十分であるため誤り。","2":"防護環境の主目的はアスペルギルスなど空気中真菌からの保護であり、レジオネラ予防を主目的とした環境ではないため誤り。","3":"防護環境はCDCガイドラインで同種造血幹細胞移植患者に推奨されており、自家移植患者には通常不要であるため誤り。","4":"防護環境では12回/時間以上の換気、HEPAフィルター、陽圧管理が求められるため正しい。"}},"category":"環境管理","subcategory":"防護環境","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"17":{"question_no":"17","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"滅菌に関する説明として、正しいのはどれか。","choices":{"1":"ボウィー・ディックテストは、高圧蒸気滅菌器内の滅菌効果を確認するものである。","2":"過酸化水素低温ガスプラズマ滅菌には残留毒性があるため、滅菌処理工程が終了した後にエアレーションを行う。","3":"高圧蒸気滅菌を行う場合、滅菌温度121℃で5分間の保持時間が必要である。","4":"過酸化水素低温ガスプラズマ滅菌は、セルロースやパルプを含む製品の滅菌には不向きである。"},"answer":"4","explanation":{"overall":"過酸化水素低温ガスプラズマ滅菌はセルロース・パルプ・リネン類を含む製品には不向きであり正しい。ボウィー・ディックテストは蒸気浸透性の確認であり滅菌効果の確認ではない。エアレーションが必要なのはEOG滅菌であり、高圧蒸気滅菌121℃では15分間以上の保持が必要である。","each":{"1":"ボウィー・ディックテストは高圧蒸気滅菌器内の空気残留や蒸気浸透性を確認するものであり、滅菌効果の確認ではないため誤り。","2":"エアレーションが必要なのは酸化エチレンガス（EOG）滅菌であり、過酸化水素低温ガスプラズマ滅菌には残留毒性がなくエアレーション不要であるため誤り。","3":"高圧蒸気滅菌121℃では15分間以上の保持時間が必要であり、5分間では不十分であるため誤り。","4":"過酸化水素低温ガスプラズマ滅菌はセルロースやパルプを含む製品には不向きであるため正しい。"}},"category":"滅菌・消毒","subcategory":"滅菌法","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"18":{"question_no":"18","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"ワクチンに関する説明として、正しいのはどれか。","choices":{"1":"水痘ワクチンは、定期接種のワクチンである。","2":"インフルエンザワクチン接種後に水痘ワクチン接種をする場合は、6日以上間隔をあける。","3":"MRワクチンとは、麻疹と水痘の混合ワクチンである。","4":"医療従事者の水痘に対する免疫を確認するための抗体検査は、補体結合試験(CF法)で行うことが推奨されている。"},"answer":"1","explanation":{"overall":"水痘ワクチンは2014年より定期接種に追加されており正しい。インフルエンザワクチンは不活化ワクチンであるため、その後に生ワクチンを接種する場合でも間隔制限は不要である。MRワクチンは麻疹と風疹の混合ワクチンであり、水痘抗体検査はCF法ではなくEIA法が推奨されている。","each":{"1":"水痘ワクチンは2014年より定期接種に追加されており正しい。","2":"インフルエンザワクチンは不活化ワクチンであり、その後に生ワクチンを接種する場合でも間隔制限は不要であるため誤り。","3":"MRワクチンは麻疹（Measles）と風疹（Rubella）の混合ワクチンであり、水痘ではないため誤り。","4":"水痘抗体検査はCF法ではなくEIA法が推奨されているため誤り。"}},"category":"ワクチン","subcategory":"予防接種","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"19":{"question_no":"19","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"インフルエンザに関する説明として、正しい組み合わせはどれか。","stem_items":{"a":"学校保健安全法において、インフルエンザを発症した場合の出席停止期間は、解熱後2日を経過するまでとされている。","b":"感染症法において、鳥インフルエンザA(H5N1)と鳥インフルエンザA(H7N9)は、二類感染症に位置づけられている。","c":"インフルエンザウイルスは、エンベロープを有するRNAウイルスである。","d":"インフルエンザと診断された患者は、陰圧個室に隔離しなければならない。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"3","explanation":{"overall":"鳥インフルエンザA(H5N1)とA(H7N9)はともに二類感染症に分類されている。インフルエンザウイルスはエンベロープを有するRNAウイルスである。学校保健安全法での出席停止期間は発症後5日かつ解熱後2日（幼児は3日）を経過するまでであり、インフルエンザ対策の基本は飛沫予防策である。","each":{"a":"学校保健安全法ではインフルエンザの出席停止期間は『発症後5日かつ解熱後2日（幼児は3日）を経過するまで』であり、解熱後2日のみでは不十分であるため誤り。","b":"鳥インフルエンザA(H5N1)およびA(H7N9)は感染症法上の二類感染症に分類されており正しい。","c":"インフルエンザウイルスはエンベロープを有するRNAウイルスであり正しい。","d":"インフルエンザの標準的な感染対策は飛沫予防策であり、陰圧個室への隔離は必須ではないため誤り。"}},"category":"感染症","subcategory":"インフルエンザ","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"20":{"question_no":"20","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"細菌培養検査の検体採取として、正しいのはどれか。","choices":{"1":"血液検体は、好気性菌用ボトル、嫌気性菌用ボトルの順に血液を注入する。","2":"喀痰の肉眼的品質評価Miller & Jonesの分類でPⅠに該当する喀痰検体は、唾液、完全な喀痰であるため検査に適さない。","3":"髄液検体は、室温または37℃保存とする。","4":"尿道カテーテルを留置している患者の尿検体は、採尿バッグの廃液口から採取する。"},"answer":"3","explanation":{"overall":"髄液検体は低温に弱い菌を含む可能性があるため室温または37℃保存が推奨される。血液培養のボトル注入順は採血方法によって異なり、喀痰は品質評価を行う。尿道カテーテル留置患者の尿検体は採尿ポートから無菌的に採取する。","each":{"1":"血液培養のボトル注入順は採血方法によって異なり、常に好気性菌用ボトルを先に注入するわけではないため誤り。","2":"Miller & Jones分類では品質評価を行うが、記載内容は不正確であり誤り。","3":"髄液検体は低温に弱い菌を含む可能性があるため室温または37℃保存が推奨されており正しい。","4":"尿道カテーテル留置患者の尿検体は採尿バッグ廃液口ではなく採尿ポートから無菌的に採取するため誤り。"}},"category":"微生物検査","subcategory":"検体採取","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"}},"section2":{"title":"問題2","cases":{"case1":{"case_no":"1","description":"事例1\n次の文を読み、問21から問23に対する適切な答えを一つ選んでください。\nあなたは病院の感染管理認定看護師です。2020年8月10日に臨床検査技師より内科病棟でメチシリン耐性黄色ブドウ球菌（MRSA）が検出された患者について連絡がありました。\n院内獲得の判定は、入院48時間以降に起こった感染症としています。\n・A氏は4人部屋に入院しており、同室にB氏、C氏、D氏がいる。\n・A氏の褥瘡からMRSAが検出されている。\n・A氏は、褥瘡の感染を発症しており治療が開始されている。\n\n8月12日に、同室者のB氏、C氏の2名と、別の個室に入院中のE氏から新たにMRSAが検出されました。MRSAが検出された4名の状況は、以下の通りです。","assets":{"tables":{"table1_mrsa_patients":{"title":"表1 MRSA検出患者一覧","data":[{"患者":"A氏","入院日":"8/6","検査日":"8/7","検出検体":"褥瘡滲出液"},{"患者":"B氏","入院日":"7/27","検査日":"8/8","検出検体":"褥瘡滲出液"},{"患者":"C氏","入院日":"8/1","検査日":"8/9","検出検体":"喀痰"},{"患者":"E氏","入院日":"8/1","検査日":"8/10","検出検体":"喀痰"}]}}},"questions":{"21":{"question_no":"21","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"1","question":"MRSAに関する説明として、正しい組み合わせはどれか。","stem_items":{"a":"MRSAの指定届出医療機関は、月毎に保健所に届けなければならない。","b":"MRSAのメシチリン耐性は、mecA遺伝子にコードされたバンコマイシン低親和性の細胞壁合成酵素PBP2'による。","c":"MRSA保菌患者に対して、除菌を目的とした抗MRSA薬の投与を行う。","d":"薬剤耐性(AMR)対策アクションプランのヒトに関しての成果指標は、黄色ブドウ球菌のメチシリン耐性率を20％以下に低下させることである。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"2","explanation":{"overall":"MRSA感染症は感染症法上の定点把握対象疾患であり、指定届出医療機関は月ごとに報告する。また、AMR対策アクションプランでは黄色ブドウ球菌のメチシリン耐性率20％以下が成果指標として設定されている。mecA遺伝子はβ-ラクタム薬低親和性PBP2aをコードし、保菌者に対する抗MRSA薬による除菌は推奨されない。","each":{"a":"MRSA感染症は定点把握対象疾患であり、指定届出医療機関は月ごとに保健所へ報告するため正しい。","b":"mecA遺伝子がコードするのはβ-ラクタム薬低親和性PBP2aであり、バンコマイシン低親和性ではないため誤り。","c":"MRSA保菌のみを理由とした抗MRSA薬による除菌は推奨されないため誤り。","d":"AMR対策アクションプランでは黄色ブドウ球菌のメチシリン耐性率を20％以下に低下させることが成果指標となっており正しい。"}},"category":"薬剤耐性菌","subcategory":"MRSA","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"22":{"question_no":"22","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"1","type":"single_best","question":"連絡を受けたあなたが実施する対策として、正しい組み合わせはどれか。","stem_items":{"a":"高頻度接触表面を低水準消毒薬を含むクロスで清拭する。","b":"D氏を別室に移動し、A氏、B氏、C氏、E氏でコホート隔離する。","c":"A氏とD氏は同室のため、血圧計を共有する。","d":"C氏とE氏は、飛沫予防策を実施する。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"1","explanation":{"overall":"MRSA対策では高頻度接触表面を低水準消毒薬含有クロスで清拭することは標準的な環境整備として正しい。またMRSA検出患者をコホート隔離し未検出のD氏を別室に移動する対応は適切である。MRSAは接触予防策が基本であり飛沫予防策は不要、医療器具は患者間で共有せず専用化が原則である。","each":{"a":"高頻度接触表面を低水準消毒薬含有クロスで清拭することは接触予防策の環境整備として正しい。","b":"未検出のD氏を別室に移動し、MRSA検出患者でコホート隔離する対応は適切であり正しい。","c":"血圧計等の医療器具は患者間で共有せず専用化または使用後消毒が必要であるため誤り。","d":"MRSAの感染経路は接触感染であり、喀痰からの検出であっても飛沫予防策は通常適応されないため誤り。"}},"category":"薬剤耐性菌","subcategory":"MRSAアウトブレイク対応","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"23":{"question_no":"23","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"1","type":"single_best","question":"当該内科病棟の8月のMRSAに関する説明として、正しいのはどれか。","choices":{"1":"院内獲得の発生率(incidence rate)は、10%である。","2":"内科病棟の致死率(case fatality rate)は、33.3%である。","3":"内科病棟の発生密度率(incidence density rate)は、1.0%である。","4":"内科病棟の有病率は、1.3%である。"},"answer":"4","explanation":{"overall":"有病率はMRSA発症患者4名を8月1日から8月31日までの入院患者数300名で割り、4÷300×100=1.33%となるため1.3%である。致死率は死亡1名を発症患者4名で割るため25%であり、院内獲得発生率はB氏、C氏、E氏の3名を300名で割るため1.0%である。発生密度率は人日を分母とする指標であり、%表記で1.0%とする記述は不適切である。","each":{"1":"院内獲得はB氏、C氏、E氏の3名であり、3÷300×100=1.0%であるため誤り。","2":"致死率の分母は発症者全員4名であり、死亡1名÷発症4名×100=25%となるため33.3%は誤り。","3":"発生密度率は人日を分母とする指標であり、%表記での1.0%という記述は不適切であるため誤り。","4":"有病率はMRSA発症患者4名÷入院患者300名×100=1.3%であり正しい。"}},"category":"サーベイランス","subcategory":"発生率・発生密度率・有病率","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"}}},"case2":{"case_no":"2","description":"事例2\n次の文を読み、問24から問26に対する適切な答えを一つ選んでください。\n\nあなたは病院の感染管理認定看護師です。3月10日、内科一般病棟から「3月8日に入院した患者F氏が、肺結核の可能性がある」と連絡がありました。あなたが病棟で確認すると以下の事がわかりました。\n・入院時に撮影した胸部X線の放射線科読影結果で、F氏に結節影と空洞影が確認された。\n・F氏は微熱と頻繁な咳嗽があり、肺炎疑いで4人部屋に入院している。\n・F氏と接触した職員は、担当医師2名と担当の看護チーム、胸部X線を撮影した技師のみである。\n・3月10日に採取した喀痰塗抹検査(チール・ニールセン染色)の結果、抗酸菌が陽性(1+)であった。\n・同室患者は他に3名いるが、F氏の入院時から部屋を移動した患者はいない。\n・F氏の喀痰の核酸増幅検査(PCR)の結果は、3月12日に判明する予定である。","questions":{"24":{"question_no":"24","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"2","type":"single_best","question":"3月10日の状況に基づく判断として、正しい組み合わせはどれか。","stem_items":{"a":"感染症法の規定による結核の届出を行う。","b":"2回目以降の喀痰抗酸菌塗抹検査は、前回の検体採取から8～24時間以上の間隔を空ける。","c":"F氏を空気感染隔離室(陰圧室)へ移動する。","d":"F氏と接触した職員を就業制限とする。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"3","explanation":{"overall":"抗酸菌塗抹陽性の時点で結核を強く疑い、空気感染隔離室への移動は直ちに実施すべきである。複数回の喀痰検査は8～24時間以上の間隔をあけて採取するのが標準的手順である。結核の届出は確定診断後に行うものであり塗抹陽性のみでは届出不要、接触職員の就業制限はこの時点では不要である。","each":{"a":"結核の届出は確定診断後に行うものであり、塗抹陽性のみでは届出の要件を満たさないため誤り。","b":"2回目以降の喀痰抗酸菌塗抹検査は前回採取から8～24時間以上の間隔をあけて採取するため正しい。","c":"抗酸菌塗抹陽性で結核を強く疑う状況であり、直ちに空気感染隔離室へ移動する必要があるため正しい。","d":"接触職員の就業制限はこの時点では不要であり、確定診断後に接触者健診を実施して判断するため誤り。"}},"category":"結核","subcategory":"空気予防策・接触者対応","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"25":{"question_no":"25","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"2","type":"single_best","question":"当該内科一般病棟の職員に対して指導する内容として、正しいのはどれか。","choices":{"1":"F氏が滞在していたベッド周囲の床や壁は、次亜塩素酸ナトリウムを用いて消毒する。","2":"F氏の病室へ入る際は、N95レスピレーター着用時に毎回ユーザーシールチェックを実施する。","3":"飛沫核拡散防止のため、F氏にはN95レスピレーターを着用してもらう。","4":"空気感染隔離室使用時は、差圧の確認を週1回実施する。"},"answer":"2","explanation":{"overall":"N95レスピレーターは着用のたびにユーザーシールチェックを実施することが必須である。結核菌は環境表面からの感染リスクは低く床・壁への次亜塩素酸消毒は不要、患者にはサージカルマスクを着用させるのが正しく、空気感染隔離室の差圧確認は週1回ではなく毎日実施する。","each":{"1":"結核菌は空気感染であり床・壁の次亜塩素酸消毒は通常不要であるため誤り。","2":"N95レスピレーターは着用のたびにユーザーシールチェックを実施する必要があり正しい。","3":"飛沫核拡散防止のため患者にはサージカルマスクを着用させるのが正しく、N95レスピレーターは医療者が着用するものであるため誤り。","4":"空気感染隔離室の差圧確認は週1回ではなく毎日実施する必要があるため誤り。"}},"category":"結核","subcategory":"空気予防策","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"26":{"question_no":"26","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"2","type":"single_best","question":"3月12日、F氏の喀痰のPCRの結果で結核菌と判明したため、「感染症法に基づく結核の接触者健康診断の手引き(改訂第6版)」に従い、F氏との接触者に対して健康診断を行うことになりました。接触者の健康診断に関する説明として、正しい組み合わせはどれか。","stem_items":{"a":"医療従事者とF氏の合計接触時間は8時間を超えていないため、同室患者のみ濃厚接触者と判断する。","b":"F氏の感染性期間の始期は、診断の3か月前とする。","c":"濃厚接触者には、最終接触から2〜3か月後にインターフェロンγ遊離試験（IGRA）を実施する。","d":"IGRAの結果が陽性であった接触者は、無症状であれば受診を見送る。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"3","explanation":{"overall":"結核の感染性期間の始期は診断の3か月前とするのが原則である。IGRAは最終接触から2〜3か月後に実施する。医療従事者は累積接触時間にかかわらず濃厚接触者として扱われる場合があり、IGRA陽性者は無症状でも受診・精査が必要である。","each":{"a":"医療従事者は接触時間が8時間未満でも感染リスクがあり濃厚接触者として扱うため誤り。","b":"感染性期間の始期は診断の3か月前とするため正しい。","c":"IGRAは最終接触から2〜3か月後に実施するため正しい。","d":"IGRA陽性者は無症状であっても活動性結核の除外のために受診・精査が必要であるため誤り。"}},"category":"結核","subcategory":"接触者健診","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"}}},"case3":{"case_no":"3","description":"事例3\n次の文を読み、問27から問29に対する適切な答えを一つ選んでください。\nあなたは病院の感染管理認定看護師です。集中治療室（ICU）において中心ライン関連血流感染（CLABSI）サーベイランスを実施しています。臨床的敗血症は判定していません。2022年度の結果は表1の通りでした。また、表1の結果は表2、3のベンチマークと比較しました。","assets":{"tables":{"table1_clabsi_surveillance":{"title":"表1 CLABSIサーベイランス結果 ICU 2022年度","columns":["CLABSI発生件数","延べ中心ライン使用日数","延べ入院患者日数","入院患者数","CLABSI発生密度率","中心ライン使用比"],"data":[{"CLABSI発生件数":10,"延べ中心ライン使用日数":2500,"延べ入院患者日数":4000,"入院患者数":3000,"CLABSI発生密度率":"a","中心ライン使用比":"b"}]},"table2_clabsi_benchmark":{"title":"表2 中心ライン関連血流感染率（期間及び病床種類別）","note":"集計期間：①2022/07/01～2022/12/31、②2020/01/01～2022/12/31","columns":["集計期間","感染","病床種類","病棟数","感染件数","中心ライン使用日","Pooled mean","10%","25%","50%(median)","75%","90%"],"data":[{"集計期間":"①","感染":"LCBI","病床種類":"ICU(2層)","病棟数":87,"感染件数":71,"中心ライン使用日":49223,"Pooled mean":1.4,"10%":0,"25%":0,"50%(median)":0,"75%":2.3,"90%":3.8},{"集計期間":"②","感染":"LCBI","病床種類":"ICU(2層)","病棟数":96,"感染件数":421,"中心ライン使用日":255404,"Pooled mean":1.6,"10%":0,"25%":0.4,"50%(median)":1.4,"75%":2.3,"90%":3.7}]},"table3_central_line_utilization_ratio":{"title":"表3 中心ライン・器具使用比（期間及び病床種類別）","note":"集計期間：①2022/07/01～2022/12/31、②2020/01/01～2022/12/31","columns":["集計期間","病床種類","病棟数","中心ライン使用日","延べ入院患者数","Pooled mean","10%","25%","50%(median)","75%","90%"],"data":[{"集計期間":"①","病床種類":"ICU(2層)","病棟数":87,"中心ライン使用日":49223,"延べ入院患者数":104613,"Pooled mean":0.47,"10%":0.13,"25%":0.32,"50%(median)":0.49,"75%":0.61,"90%":0.73},{"集計期間":"②","病床種類":"ICU(2層)","病棟数":96,"中心ライン使用日":255404,"延べ入院患者数":529579,"Pooled mean":0.48,"10%":0.15,"25%":0.35,"50%(median)":0.52,"75%":0.64,"90%":0.72}]}}},"questions":{"27":{"question_no":"27","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"3","type":"single_best","question":"表1のaに当てはまる数値について、正しいのはどれか。","choices":{"1":"0.3","2":"0.4","3":"3.3","4":"4.0"},"answer":"4","explanation":{"overall":"CLABSI発生密度率はCLABSI発生件数÷延べ中心ライン使用日数×1,000で算出する。10÷2,500×1,000=4.0となる。","each":{"1":"0.3は計算結果と一致しないため誤り。","2":"0.4は計算結果と一致しないため誤り。","3":"3.3は計算結果と一致しないため誤り。","4":"10÷2,500×1,000=4.0であり正しい。"}},"category":"サーベイランス","subcategory":"CLABSI発生密度率","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"28":{"question_no":"28","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"3","type":"single_best","question":"表1のbに当てはまる数値について、正しいのはどれか。","choices":{"1":"0.75","2":"0.83","3":"0.63","4":"1.60"},"answer":"3","explanation":{"overall":"中心ライン使用比は延べ中心ライン使用日数÷延べ入院患者日数で算出する。2,500÷4,000=0.625≒0.63となる。","each":{"1":"0.75は計算結果と一致しないため誤り。","2":"0.83は計算結果と一致しないため誤り。","3":"2,500÷4,000=0.625≒0.63であり正しい。","4":"1.60は計算結果と一致しないため誤り。"}},"category":"サーベイランス","subcategory":"中心ライン使用比","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"29":{"question_no":"29","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"3","type":"single_best","question":"表1のデータを表2・表3のベンチマークデータと比較した結果に関する説明として、正しいのはどれか。","choices":{"1":"感染率と中心ライン使用比がともに高いことから、不要な中心ラインを速やかに抜去する取り組みが必要である。","2":"感染率が高く中心ライン使用比が低いことから、中心ライン使用に不慣れと考え、挿入手技や管理方法の見直し、感染対策を振り返る必要がある。","3":"感染率が低く中心ライン使用比が高いことから、中心ラインの使用頻度を下げることができれば、感染率も更に減少することができる。","4":"感染率と中心ライン使用比が低いことから、中心ラインの使用頻度が上がった時に感染率も上がる可能性があり、日頃からマニュアルを整備する必要がある。"},"answer":"1","explanation":{"overall":"自院のCLABSI発生密度率は4.0であり、ベンチマーク②の90パーセンタイル3.7を超えているため感染率は高い。中心ライン使用比は0.63であり、ベンチマーク②の中央値0.52より高く、75パーセンタイル0.64付近であるため高めと判断する。したがって感染率と中心ライン使用比がともに高く、不要な中心ラインを速やかに抜去する取り組みが必要である。","each":{"1":"感染率4.0は90パーセンタイルを超えており、中心ライン使用比0.63も中央値より高く75パーセンタイル付近であるため正しい。","2":"感染率は高いが、中心ライン使用比は低くないため誤り。","3":"感染率は低くなく高値であるため誤り。","4":"感染率と中心ライン使用比はいずれも低いとはいえないため誤り。"}},"category":"サーベイランス","subcategory":"CLABSIベンチマーク比較","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"}}},"case4":{"case_no":"4","description":"事例4\n次の文を読み、問30から問31に対する適切な答えを一つ選んでください。\nあなたは病院の感染管理認定看護師です。7月8日に小児病棟の師長から、入院中の患児G氏に麻疹の疑いがあると報告がありました。あなたが情報収集したところ、G氏について以下のことがわかりました。\n・7月3日　38℃の発熱、脱水のため4人部屋に入院した。\n・7月5日　37℃に解熱した。\n・7月6日　39℃の発熱と発疹が出現したため、医師は麻疹を疑い抗体検査を行った。\n・7月8日　麻疹抗体検査の結果、麻疹IgM陽性、IgG陰性であった。\n同室者の情報は以下の通りでした。\n・すべての患児が、7月3日以前から入院しており、麻疹罹患歴はなかった。また、麻疹ワクチンの接種歴は以下の通りであった。\nH氏（7歳）　0歳時と7歳時に接種\nI氏（6歳）　1歳時に接種\nJ氏（7歳）　接種歴なし","assets":{},"questions":{"30":{"question_no":"30","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"4","type":"single_best","question":"7月8日現在のG氏への対応として、正しいのはどれか。","choices":{"1":"G氏を陰圧室に収容する。","2":"G氏にMRワクチンを接種する。","3":"G氏に72時間以内にγ-グロブリンを投与する。","4":"感染症法五類の全数把握のため、7日以内に保健所へ麻疹発生届を提出する。"},"answer":"1","explanation":{"overall":"G氏は発熱・発疹があり、麻疹IgM陽性、IgG陰性で麻疹が強く疑われるため、空気予防策として陰圧室に収容する対応が必要である。発症後のG氏本人にMRワクチンやγ-グロブリンを投与する対応ではない。麻疹は感染症法上の五類全数把握対象疾患であるが、診断後は7日以内ではなく直ちに届出が必要である。","each":{"1":"麻疹は空気感染するため、G氏を陰圧室に収容し空気予防策を実施する必要があり正しい。","2":"G氏はすでに麻疹を発症している状況であり、本人へのMRワクチン接種は対応として適切ではないため誤り。","3":"γ-グロブリンは主に麻疹曝露後の感受性者への発症予防として検討するものであり、発症しているG氏本人への対応ではないため誤り。","4":"麻疹は五類全数把握対象疾患であるが、届出は7日以内ではなく直ちに行う必要があるため誤り。"}},"category":"感染症","subcategory":"麻疹","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"31":{"question_no":"31","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"4","type":"single_best","question":"7月8日現在の同室者への対応として、正しいものを2つ選択しなさい。","stem_items":{"a":"H氏、I氏、J氏の麻疹IgG検査を行う。","b":"H氏、I氏、J氏に緊急麻疹ワクチンを接種する。","c":"J氏にγ-グロブリンの投与は必要ない。","d":"H氏、I氏、J氏を発症する可能性のある期間は、個室に移動する。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"2","explanation":{"overall":"同室者全員の麻疹IgG検査で免疫状態を確認することは適切である。麻疹の潜伏期間は8〜12日であり発症可能性のある期間は個室隔離が必要である。緊急ワクチンは曝露後72時間以内が有効であり全員への一律接種は不適切、J氏は接種歴なし・罹患歴なしのため免疫がなくγ-グロブリンが必要な可能性がある。","each":{"a":"同室者全員の麻疹IgG検査で免疫状態を確認することは適切であり正しい。","b":"緊急ワクチンは曝露後72時間以内が対象であり、免疫状態確認前の全員への一律接種は不適切であるため誤り。","c":"J氏は接種歴・罹患歴ともになく免疫がないためγ-グロブリン投与が必要な可能性があり誤り。","d":"麻疹の潜伏期間を考慮し、発症可能性のある期間は個室隔離が必要であり正しい。"}},"category":"感染症","subcategory":"麻疹曝露後対応","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"}}},"case5":{"case_no":"5","description":"事例5\n次の文を読み、問32から問34に対する適切な答えを一つ選んでください。\nあなたは病院の感染管理認定看護師です。3月24日に内科病棟の看護師長から「昨日入院したK氏に発疹が出現し風疹の疑いがあると言われた。どうしたらいいか」と相談を受けました。情報収集を行ったところ、以下のことがわかりました。\n・K氏は43歳男性で個室に入院した。\n・入院時より耳介後部の腫脹があり、微熱（37.2℃）があった。\n・3月24日、顔に発疹が出現し皮膚科を受診した。","assets":{},"questions":{"32":{"question_no":"32","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"5","type":"single_best","question":"当該内科病棟で行う感染対策として、正しいものを2つ選択しなさい。","stem_items":{"a":"K氏に対して空気予防策を実施する。","b":"内科病棟に入院している患者全員の風疹IgMを測定する。","c":"K氏へのケアは、ウイルスに対して十分量の特異抗体価を有する者が優先して行う。","d":"K氏が病室の外へ出る際は、K氏にサージカルマスクを着用してもらう。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"4","explanation":{"overall":"風疹は飛沫感染であり空気予防策は不要でサージカルマスクで対応可能、ケアは風疹抗体を有する者が優先して行うことで医療者への感染リスクを下げられる。入院患者全員のIgM測定は不要であり、K氏が病室外に出る際はサージカルマスク着用が適切である。","each":{"a":"風疹の感染経路は飛沫感染であり空気予防策は不要であるため誤り。","b":"接触者を特定した上で対応すべきであり、入院患者全員のIgM測定は過剰対応であるため誤り。","c":"風疹に対して十分な抗体価を有する者がケアを優先して行うことは適切であり正しい。","d":"K氏が病室外に出る際はサージカルマスクを着用させることで飛沫拡散を防止でき正しい。"}},"category":"感染症","subcategory":"風疹","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"33":{"question_no":"33","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"5","type":"single_best","question":"検査の結果、K氏は風疹と診断された。当該内科病棟の職員への対応として、正しいものを2つ選択しなさい。","stem_items":{"a":"K氏に接触した職員をリストアップし、風疹IgG抗体とワクチン接種歴を確認する。","b":"K氏に接触した職員のうち風疹特異抗体価陰性者は、最終接触後5日目から14日目まで就業制限とする。","c":"K氏に接触した職員のうち風疹特異抗体価陰性者に、緊急風疹ワクチンを接種する。","d":"風疹ウイルスの潜伏期間は14日～21日である。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"2","explanation":{"overall":"接触職員のリストアップと抗体価・接種歴確認は接触者対応の基本手順として正しい。風疹の潜伏期間は14〜21日であり正しい。就業制限は最終接触後5日目からではなく潜伏期間を考慮した期間が必要であり、緊急ワクチンは曝露後効果が限定的で一律接種は推奨されない。","each":{"a":"接触職員のリストアップと風疹IgG抗体・接種歴確認は標準的な接触者対応であり正しい。","b":"風疹の就業制限は最終接触後5日目からではなく潜伏期間（14〜21日）を考慮した期間に設定するため誤り。","c":"曝露後の緊急風疹ワクチン接種は発症予防効果が限定的であり一律接種は推奨されないため誤り。","d":"風疹の潜伏期間は14〜21日であり正しい。"}},"category":"感染症","subcategory":"風疹接触者対応","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"34":{"question_no":"34","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"5","type":"single_best","question":"内科病棟の看護師長から「妊娠30週の看護師Lが勤務している。どうしたらいいか」と相談された。看護師Lの勤務を確認したところ、看護師Lの勤務は3月23日が日勤、24日と25日は休みであり、看護師Lの風疹特異抗体価やワクチン接種歴は不明でした。看護師長と看護師Lへの説明として、正しいものを2つ選択しなさい。","stem_items":{"a":"看護師Lは妊娠30週であり、一般的に先天性風疹症候群の発生頻度は高いと伝える。","b":"先天性風疹症候群の三大症状は、先天性心疾患、難聴、白内障であると伝える。","c":"看護師Lの風疹特異抗体価、ワクチン接種歴を確認するよう伝える。","d":"看護師Lは3月24日以降休みのため、感染の危険性はないと伝える。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"3","explanation":{"overall":"妊婦が風疹に感染した場合、特に妊娠初期では先天性風疹症候群（CRS）のリスクが高くなるため、まず風疹特異抗体価とワクチン接種歴を確認する必要がある。先天性風疹症候群の三大症状は先天性心疾患、難聴、白内障である。妊娠30週では一般的にCRS発生リスクは高くなく、休みであったことだけでは感染リスクを否定できない。","each":{"a":"先天性風疹症候群のリスクが最も高いのは妊娠初期であり、妊娠30週では一般的に発生頻度は高くないため誤り。","b":"先天性風疹症候群の三大症状は、先天性心疾患、難聴、白内障であり正しい。","c":"風疹曝露時には風疹特異抗体価およびワクチン接種歴を確認する必要があり正しい。","d":"3月24日以降が休みであっても、3月23日に接触している可能性があり感染リスクは否定できないため誤り。"}},"category":"感染症","subcategory":"風疹・妊婦対応","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"}}},"case6":{"case_no":"6","description":"事例6\n次の文を読み、問35から問37に対する適切な答えを一つ選んでください。\nあなたは病院の感染管理認定看護師です。現在、市中では新型コロナウイルス感染症が流行しています。1月10日に病棟の看護師長から「新型コロナウイルス感染症の患者が複数出た。指示を仰ぎたい」と連絡がありました。あなたが病棟で確認すると以下のことがわかりました。\n・M氏は、前年の12月中旬から入院している。1月9日から発熱し、1月10日に新型コロナウイルス感染症と診断された。\n・同室のN氏は、1月5日に入院し、1月10日から発熱し、同日新型コロナウイルス感染症と診断された。\n・同室のO氏は、1月5日に入院し、1月7日から発熱、咳、咽頭痛が出現したが、同日の新型コロナウイルス抗原定性検査は陰性であった。\n・同室のP氏は、1月8日に入院し、1月10日時点で、発熱や上気道症状は認めていない。\nなお、院内では核酸増幅検査と抗原定性検査の実施が可能です。","questions":{"35":{"question_no":"35","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"6","type":"single_best","question":"1月10日の時点で行う対策として、正しい組み合わせはどれか。","stem_items":{"a":"M氏とN氏はコホート隔離とする。","b":"P氏は、他の4人部屋に移動する。","c":"M氏とN氏に対し、接触予防策のみを講じる。","d":"他の病室の患者と、当該病棟の職員の症状を確認する。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"2","explanation":{"overall":"確定診断のM氏とN氏をコホート隔離することは適切である。アウトブレイク発生時は他病室の患者と職員の症状確認が必要である。P氏は無症状だが同室で曝露しており他の4人部屋への移動は感染拡大リスクがあり不適切、新型コロナウイルスは接触予防策のみでなく飛沫・空気予防策も必要である。","each":{"a":"確定診断のM氏とN氏をコホート隔離することは適切であり正しい。","b":"P氏は無症状だが同室曝露者であり他の4人部屋へ移動させると感染拡大リスクがあるため誤り。","c":"新型コロナウイルスは飛沫・空気感染もあり接触予防策のみでは不十分であるため誤り。","d":"アウトブレイク発生時は他病室患者と職員の症状確認が必要であり正しい。"}},"category":"感染症","subcategory":"新型コロナウイルス感染症アウトブレイク対応","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"36":{"question_no":"36","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"6","type":"single_best","question":"新型コロナウイルス検査について、正しいのはどれか。","choices":{"1":"O氏は、新型コロナウイルス感染症を否定できる。","2":"P氏に新型コロナウイルス検査を行う場合は、抗原定性検査を第一優先とする。","3":"患者に、唾液を用いて検査する場合は、歯磨き後すぐに検体採取するよう指導する。","4":"M氏とN氏は、PCR検査で陰性化を確認しなくても隔離解除ができる。"},"answer":"4","explanation":{"overall":"新型コロナウイルス感染症の隔離解除は発症日からの経過日数や症状改善で判断可能であり、PCR陰性確認は必須ではない。O氏は抗原定性検査陰性だが発症後早期は偽陰性があり否定できない。無症状のP氏には感度の高い核酸増幅検査が優先される。唾液検体採取前の歯磨きは避けるべきである。","each":{"1":"抗原定性検査は発症早期に偽陰性となることがあるため、O氏の感染を否定できないため誤り。","2":"無症状のP氏には感度の高い核酸増幅検査（PCR）が優先されるため誤り。","3":"唾液検体採取前の歯磨き・飲食・うがいは検体に影響するため避けるよう指導するため誤り。","4":"新型コロナウイルス感染症の隔離解除はPCR陰性確認ではなく発症からの日数と症状改善で判断可能であり正しい。"}},"category":"感染症","subcategory":"新型コロナウイルス検査","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"37":{"question_no":"37","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"6","type":"single_best","question":"1月11日に、別の病室の患者や職員から有症状者がいると報告があり、最終的に患者5名、職員3名が新型コロナウイルス感染症と診断された。この病棟での対策として、正しい組み合わせはどれか。","stem_items":{"a":"新型コロナウイルス感染症を疑う症状がある職員は、新型コロナウイルス検査を行い、陰性の場合のみ勤務可とする。","b":"陽性の患者を担当した職員については、曝露予防のためのモルヌピラビル（ラゲブリオ®）の予防投与を検討する。","c":"病棟単位でゾーニングする場合は、病室内をウイルスがいるエリア、廊下をウイルスがいないエリアとし、廊下に出る前に手袋、ガウン、フェイスシールドを脱いで廃棄する。","d":"入院患者には、症状の有無に関わらず、可能な限りマスク着用の協力を依頼する。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"4","explanation":{"overall":"病棟内で新型コロナウイルス感染症のアウトブレイクが発生した場合は、ゾーニングを実施し、適切なPPEの着脱を徹底する。また、患者にも可能な限りマスク着用を依頼し感染拡大を防止する。有症状職員は検査陰性のみで勤務可とは判断せず、モルヌピラビルは曝露後予防には使用しない。","each":{"a":"有症状職員は検査陰性であっても偽陰性の可能性があり、陰性のみを理由に勤務可とはしないため誤り。","b":"モルヌピラビル（ラゲブリオ®）は治療薬であり、曝露後予防投与の適応はないため誤り。","c":"病棟単位でゾーニングする場合は、病室内を汚染区域、廊下を清潔区域とし、区域外へ出る前にPPEを脱衣するため正しい。","d":"入院患者にも可能な限りマスク着用を依頼することは感染拡大防止に有効であり正しい。"}},"category":"感染症","subcategory":"新型コロナウイルス感染症アウトブレイク対応","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"}}},"case7":{"case_no":"7","description":"事例7\n次の文を読み、問38から問40に対する適切な答えを一つ選んでください。\nあなたは、急性期病院の感染管理認定看護師です。消化器内科病棟の看護師長から「入院患者Q氏、R氏、S氏の3名に下痢症状がある。Clostridioides difficileの検査結果は3名とも陽性であった。Q氏とR氏はともに4人部屋の210号室に入院中である。S氏は3週間前にもClostridioides difficile感染症を起こし、それ以来個室に入院している」と連絡がありました。状況を確認したところ、以下のことがわかりました。\n・Clostridioides difficile毒素抗原検査の結果、Q氏とR氏はトキシンA陰性、トキシンB陽性、S氏はトキシンA陽性、トキシンB陽性であった。\n・Q氏には2日前より1日に10回程度の水様便を認めている。\n・210号室にはトイレがあり、同室患者4名が使用している。\n・210号室にはQ氏とR氏以外にT氏とU氏が入院している。\n・T氏には昨日から水様便を認めている。\n・U氏には現時点で下痢を認めていない。\n・医師がT氏のClostridioides difficile毒素抗原検査を指示している。\n・S氏はメトロニダゾールによる治療終了後、一週間ほど下痢が治まっていたが、昨日から再び水様便がみられるようになった。\n・211号室（4人部屋）には、現在下痢を認めない患者が2名入院しており、2名分のベッドの空きがある。","questions":{"38":{"question_no":"38","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"7","type":"single_best","question":"210号室の患者および個室のS氏のC.difficile毒素抗原検査に関する説明として、正しいものを2つ選択しなさい。","stem_items":{"a":"T氏の便検体は、3時間前に採取し、室温で保管していたため、すぐに提出するように促した。","b":"S氏のC.difficileは、トキシンAとトキシンBの両方を産生するが、毒素を産生しないC.difficile株も存在する。","c":"Q氏とR氏のC.difficileの病原性はトキシンBに由来すると考えられる。","d":"U氏の固形便を採取し、C.difficile毒素抗原検査を行う必要がある。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"3","explanation":{"overall":"C. difficileにはトキシンを産生しない非毒素産生株が存在しており、S氏の説明として正しい。Q氏とR氏はトキシンA陰性・トキシンB陽性であり病原性はトキシンBに由来すると考えられる。便検体は採取後2時間以内の提出が推奨されており3時間室温保管は不適切、U氏は下痢がなく固形便でのC. difficile毒素抗原検査は推奨されない。","each":{"a":"C. difficile検体は採取後速やかに（2時間以内）提出が必要であり、3時間室温保管後の提出促しは不適切であるため誤り。","b":"C. difficileには毒素を産生しない非毒素産生株が存在しており正しい。","c":"Q氏とR氏はトキシンA陰性・トキシンB陽性であり病原性はトキシンBに由来すると考えられるため正しい。","d":"C. difficile毒素抗原検査は下痢便で実施するものであり、固形便での検査は推奨されないため誤り。"}},"category":"感染症","subcategory":"C.difficile検査","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"39":{"question_no":"39","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"7","type":"single_best","question":"210号室の患者および個室のS氏に使用する抗菌薬に関する説明として、正しいのはどれか。","choices":{"1":"下痢症状の強いQ氏には、メトロニダゾールと止瀉薬を併用することが推奨される。","2":"R氏にメトロニダゾールを使用したところ、服用開始から3日後に下痢症状が治まったため速やかに投与を中止するのが望ましい。","3":"U氏には、予防的にメトロニダゾールを投与する。","4":"S氏には、バンコマイシン塩酸塩の使用が推奨される。"},"answer":"4","explanation":{"overall":"C. difficile感染症では止瀉薬の併用は推奨されず、症状が改善しても抗菌薬は必要な治療期間を継続する。無症状のU氏に予防的抗菌薬投与は行わない。S氏はメトロニダゾール治療後に一度改善した後、再び水様便が出現しており再発例と考えられるため、バンコマイシン塩酸塩の使用が推奨される。","each":{"1":"C. difficile感染症では止瀉薬により毒素や菌が腸管内に停滞し重症化する可能性があるため誤り。","2":"下痢症状が改善しても速やかに中止せず、推奨される治療期間を継続する必要があるため誤り。","3":"U氏は現時点で下痢を認めておらず、予防的なメトロニダゾール投与は推奨されないため誤り。","4":"S氏はC. difficile感染症の再発が疑われるため、バンコマイシン塩酸塩の使用が推奨され正しい。"}},"category":"感染症","subcategory":"C.difficile治療","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"40":{"question_no":"40","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"7","type":"single_best","question":"T氏のC.difficile毒素抗原検査結果はトキシンA、トキシンBともに陰性であった。当該消化器内科病棟で実施するC.difficile感染症対策として、正しい組み合わせはどれか。","stem_items":{"a":"消化器内科病棟で他に下痢症状を認める患者はいないか確認する。","b":"210号室のトイレは0.5％（5,000ppm）の次亜塩素酸ナトリウム溶液で1日1回以上消毒する。","c":"擦式アルコール製剤を用いた手指衛生を強化する。","d":"T氏とU氏を早急に211号室に移動させる。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"1","explanation":{"overall":"アウトブレイク時は病棟全体の下痢患者の把握が必要である。C. difficile芽胞は次亜塩素酸ナトリウムが有効であり0.5%（5,000ppm）での環境消毒は適切である。C. difficile芽胞にはアルコールが無効であり流水と石鹸による手洗いが必要、T氏は陰性だが下痢症状があり211号室（非感染患者2名入室）への移動は感染拡大リスクがある。","each":{"a":"アウトブレイク時は病棟全体で下痢症状のある患者を確認することが必要であり正しい。","b":"C. difficile芽胞には0.5%（5,000ppm）次亜塩素酸ナトリウムによる環境消毒が有効であり正しい。","c":"C. difficile芽胞はアルコールに抵抗性があるため、擦式アルコール製剤では不十分であり流水石鹸手洗いが必要であるため誤り。","d":"T氏は下痢症状があり211号室の非感染患者への感染拡大リスクがあるため移動は不適切であり誤り。"}},"category":"感染症","subcategory":"C.difficile感染対策","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"}}}}}}};

    .replaceAll('"',"&quot;")

function getExamRoot(examId){
  const raw = EXAM_FILES[examId].data;
  if(raw.questions) return raw;
  return raw[Object.keys(raw)[0]];
}

function loadQuestions(examId){
  const examInfo = EXAM_FILES[examId];
  const exam = getExamRoot(examId);
  const arr = [];

  // eラーニング形式：期 → subjects → units → questions を平坦化
  if(examInfo?.kind === "elearning" || exam.subjects){
    Object.entries(exam.subjects || {}).forEach(([subjectId, subject]) => {
      Object.entries(subject.units || {}).forEach(([unitId, unit]) => {
        Object.entries(unit.questions || {}).forEach(([qKey, q]) => {
          const uniqueId = `${subjectId}__${unitId}__${q.question_no || qKey}`;
          arr.push({
            ...q,
            _id: uniqueId,
            _display_no: `${unit.unit_no || unitId}-${q.question_no || qKey}`,
            _subject: subject.meta?.subject || subjectId,
            _unit_no: unit.unit_no || unitId,
            _unit_title: unit.title || "",
            _case_description: null,
            _case_no: null,
            _assets: q.assets || null,
            category: q.category || unit.category || subject.meta?.subject || "未分類",
            subcategory: q.subcategory || unit.subcategory || unit.title || "未分類"
          });
        });
      });
    });
    arr.sort((a,b)=>{
      const s = String(a._subject).localeCompare(String(b._subject), 'ja');
      if(s !== 0) return s;
      const u = Number(a._unit_no) - Number(b._unit_no);
      if(u !== 0) return u;
      return Number(a.question_no) - Number(b.question_no);
    });
    return arr;
  }

  Object.entries(exam.questions || {}).forEach(([no, q]) => {
    arr.push({...q, _id:String(q.question_no || no), _display_no:q.question_no || no, _case_description:null, _case_no:null, _assets:q.assets || null});
  });

  Object.entries(exam.section2?.cases || {}).forEach(([caseId, c]) => {
    const caseQuestions = Object.entries(c.questions || {});
    const sharedAssets = c.assets || (caseQuestions.find(([no, q]) => q.assets)?.[1]?.assets) || null;

    caseQuestions.forEach(([no, q]) => {
      arr.push({...q, _id:String(q.question_no || no), _display_no:q.question_no || no, _case_description:c.description || "", _case_no:c.case_no || caseId, _assets:q.assets || sharedAssets || null});
    });
  });

  arr.sort((a,b)=>Number(a.question_no)-Number(b.question_no));
  return arr;
}

function objectTable(rows, title){
  if(!Array.isArray(rows) || rows.length === 0) return "";
  const keys = [...new Set(rows.flatMap(r => Object.keys(r)))];
  return `
    <div class="tablewrap">
      <table>
        <caption>${esc(title || "表")}</caption>
        <thead>
          <tr>${keys.map(k => `<th>${esc(k)}</th>`).join("")}</tr>
        </thead>
        <tbody>
          ${rows.map(r => `<tr>${keys.map(k => `<td>${esc(r[k] ?? "")}</td>`).join("")}</tr>`).join("")}
        </tbody>
      </table>
    </div>
  `;
}

function matrixTable(t, title){
  if(!t || !Array.isArray(t.headers) || !Array.isArray(t.rows)) return "";
  return `
    <div class="tablewrap">
      <table>
        <caption>${esc(t.title || title || "表")}${t.subtitle ? `<br><span class="small">${esc(t.subtitle)}</span>` : ""}</caption>
        <thead>
          <tr>${t.headers.map(h => `<th>${esc(h)}</th>`).join("")}</tr>
        </thead>
        <tbody>
          ${t.rows.map(r => `<tr>${r.map(v => `<td>${esc(v ?? "")}</td>`).join("")}</tr>`).join("")}
        </tbody>
      </table>
    </div>
  `;
}

function renderAssets(assets){
  if(!assets || !assets.tables) return "";
  let out = `<h3>【表・資料】</h3>`;

  if(Array.isArray(assets.tables)){
    assets.tables.forEach((t, i) => {
      if(t && Array.isArray(t.headers) && Array.isArray(t.rows)){
        out += matrixTable(t, t.title || `表${i+1}`);
      }else if(Array.isArray(t)){
        out += objectTable(t, `表${i+1}`);
      }else if(t && Array.isArray(t.data)){
        out += objectTable(t.data, t.title || `表${i+1}`);
      }else{
        out += `<div class="box prebox">${esc(JSON.stringify(t, null, 2))}</div>`;
      }
    });
    return out;
  }

  Object.entries(assets.tables).forEach(([name, t]) => {
    if(Array.isArray(t)){
      out += objectTable(t, name);
    }else if(t && Array.isArray(t.headers) && Array.isArray(t.rows)){
      out += matrixTable(t, t.title || name);
    }else if(t && Array.isArray(t.data)){
      out += objectTable(t.data, t.title || name);
    }else{
      out += `<div class="box prebox">${esc(JSON.stringify(t, null, 2))}</div>`;
    }
  });
  return out;
}
