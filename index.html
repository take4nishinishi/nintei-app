<script>
window.EXAM_DATA_30 = {"第30回": {"meta": {"title": "第30回認定看護師認定審査", "year": 2022, "course": "感染管理(B課程)"}, "questions": {"1": {"question_no": "1", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "エンベロープを有するウイルスとして、正しい組み合わせはどれか。", "stem_items": {"a": "ポリオウイルス", "b": "コロナウイルス", "c": "インフルエンザウイルス", "d": "ノロウイルス"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "コロナウイルスとインフルエンザウイルスはエンベロープを有する。ポリオウイルスとノロウイルスはノンエンベロープウイルスであるため、bとcが正しい。", "each": {"a": "ポリオウイルスはノンエンベロープウイルスであり誤り。", "b": "コロナウイルスはエンベロープを有するため正しい。", "c": "インフルエンザウイルスはエンベロープを有するため正しい。", "d": "ノロウイルスはノンエンベロープウイルスであり誤り。"}}, "category": "微生物", "subcategory": "ウイルス", "difficulty": "easy", "source_file": "第30回認定看護師認定審査.docx"}, "2": {"question_no": "2", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "「カテーテル関連尿路感染の予防のためのCDCガイドライン2009」において、尿道留置カテーテルの適正使用例として、誤っているのはどれか。", "choices": {"1": "尿量の正確な測定を必要とする重篤な患者", "2": "患者が随意的に排尿可能な場合の培養検査の採尿手段", "3": "失禁患者の仙骨部または会陰部の開放創の治癒の促進", "4": "終末期ケアにおける快適さの改善"}, "answer": "2", "explanation": {"overall": "CDC 2009 CAUTIガイドラインでは、尿量の厳密な測定が必要な重症患者、仙骨部・会陰部創傷管理、終末期ケアでの快適性向上は適正使用例である。一方、随意排尿可能な患者の培養検査目的のみでのカテーテル留置は不適切使用である。", "each": {"1": "重篤患者の正確な尿量測定は適正使用例であり正しい。", "2": "培養検査目的のみでの留置は不適切使用であり誤り。", "3": "失禁による創部汚染防止目的は適正使用例であり正しい。", "4": "終末期ケアにおける快適性向上は適正使用例であり正しい。"}}, "category": "デバイス関連感染", "subcategory": "CAUTI", "difficulty": "easy", "source_file": "第30回認定看護師認定審査.docx"}, "3": {"question_no": "3", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "血液曝露に関する説明として、正しいのはどれか。", "choices": {"1": "B型肝炎ワクチンにより免疫が獲得できなかった看護師が、HBs抗原陽性血液に曝露した場合、曝露後24時間以内に抗HBsヒト免疫グロブリン（HBIG）の投与を行う。", "2": "HIV抗体陽性血液の粘膜曝露により、HIVに感染するリスクは約3%である。", "3": "HIV抗体陽性血液に曝露した後の抗HIV薬の予防内服は、10週間継続することが推奨されている。", "4": "HIV抗体陽性血液で汚染された針による経皮的曝露が発生した場合、曝露後7日以内に抗HIV薬の予防内服を行う。"}, "answer": "1", "explanation": {"overall": "HBs抗原陽性血液への曝露時、B型肝炎ワクチン無効者にはHBIG投与を速やかに行う。HIV曝露後予防はできるだけ早期に開始し、通常4週間継続する。", "each": {"1": "HBIGは曝露後できるだけ早期（24時間以内が望ましい）に投与するため正しい。", "2": "HIV粘膜曝露による感染リスクは約0.3%であり、3%ではないため誤り。", "3": "HIV曝露後予防内服は通常4週間継続であり、10週間ではないため誤り。", "4": "曝露後予防は可能な限り早期（72時間以内が望ましい）に開始するため、7日以内では遅すぎ誤り。"}}, "category": "職業感染対策", "subcategory": "血液曝露", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "4": {"question_no": "4", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "統計学に関する説明として、正しいのはどれか。", "choices": {"1": "ASAスコアの分布をヒストグラムで表した。", "2": "2つの病棟の手指衛生遵守率の差の検定にt検定を用いた。", "3": "入院患者の年齢が正規分布を示していたので代表値として平均値を用いた。", "4": "対象数10人と1,000人のデータでは、信頼区間の幅は10人の方が小さい。"}, "answer": "3", "explanation": {"overall": "ASAスコアのような順序尺度は棒グラフで表す。手指衛生遵守率のような割合の差の検定にはχ2乗検定またはFisherの正確確率検定を用いる。正規分布であれば代表値として平均値を用いることが適切である。対象数が多いほど信頼区間の幅は小さくなるため、正答は3である。", "each": {"1": "ASAスコアは順序尺度であり、ヒストグラムではなく棒グラフが適切であるため誤り。", "2": "割合の差の検定には、t検定ではなくχ2乗検定またはFisherの正確確率検定を用いるため誤り。", "3": "正規分布であれば代表値として平均値を用いることが適切であるため正しい。", "4": "対象数が多いほど信頼区間の幅は小さくなるため、10人の方が小さいという記載は誤り。"}}, "category": "疫学", "subcategory": "統計学", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "5": {"question_no": "5", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "流行性角結膜炎に関する説明として、正しいのはどれか。", "choices": {"1": "症状出現日からウイルスが排出される。", "2": "原因ウイルスは、エンベロープを持つウイルスである。", "3": "潜伏期は、1～2週間である。", "4": "コクサッキーウイルスによる感染である。"}, "answer": "3", "explanation": {"overall": "流行性角結膜炎はアデノウイルスによる感染症であり、潜伏期間は約1～2週間である。アデノウイルスはノンエンベロープウイルスであり、原因ウイルスはコクサッキーウイルスではない。", "each": {"1": "ウイルス排出は発症前からみられるため、「症状出現日から」という記載は誤り。", "2": "アデノウイルスはノンエンベロープウイルスであり誤り。", "3": "潜伏期間は一般的に1～2週間程度であり正しい。", "4": "原因はアデノウイルスであり、コクサッキーウイルスではないため誤り。"}}, "category": "感染症", "subcategory": "ウイルス感染症", "difficulty": "easy", "source_file": "第30回認定看護師認定審査.docx"}, "6": {"question_no": "6", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "飛沫予防策に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "髄膜炎菌による敗血症に対して、効果的な治療開始後24時間が経過するまで飛沫予防策を実施する。", "b": "MRSA肺炎に対して、痰の排出が多い時期は飛沫予防策を実施する。", "c": "免疫不全患者のレジオネラ肺炎に対して、飛沫予防策を実施する。", "d": "百日咳に対して、効果的な治療開始後5日が経過するまで飛沫予防策を実施する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "2", "explanation": {"overall": "髄膜炎菌感染症および百日咳では飛沫予防策を実施する。レジオネラはヒト―ヒト感染を起こさないため飛沫予防策は不要である。MRSA肺炎は標準予防策が基本であり、 routine に飛沫予防策は推奨されない。", "each": {"a": "髄膜炎菌感染症では、効果的な抗菌薬治療開始後24時間まで飛沫予防策を実施するため正しい。", "b": "MRSA肺炎では標準予防策が基本であり、 routine の飛沫予防策は不要であるため誤り。", "c": "レジオネラはヒト―ヒト感染を起こさないため飛沫予防策は不要であり誤り。", "d": "百日咳では、効果的治療開始後5日まで飛沫予防策を行うため正しい。"}}, "category": "感染対策", "subcategory": "感染経路別予防策", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "7": {"question_no": "7", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "消化器内視鏡検査に関する説明として、正しいのはどれか。", "choices": {"1": "消化器内視鏡の漏水テストは、少なくとも1日1回実施する。", "2": "消化器内視鏡は、送気・送水ボタン、吸引ボタン、鉗子栓などを装着し保管庫に保管する。", "3": "リユーザブル生検鉗子は、検査ごとに適切な洗浄・高水準消毒を行う。", "4": "消化器内視鏡検査室の室内圧は、廊下や隣接区域に対して等圧とする。"}, "answer": "4", "explanation": {"overall": "漏水テストは毎回実施する。内視鏡保管時はボタン類や鉗子栓は外して保管する。リユーザブル生検鉗子は滅菌が必要であり、高水準消毒では不十分である。消化器内視鏡検査室は廊下や隣接区域に対して等圧とする。", "each": {"1": "漏水テストは1日1回ではなく、使用ごとに毎回実施するため誤り。", "2": "送気・送水ボタン、吸引ボタン、鉗子栓などは外して保管するため誤り。", "3": "リユーザブル生検鉗子は高水準消毒ではなく滅菌が必要であるため誤り。", "4": "消化器内視鏡検査室は等圧管理が推奨されており正しい。"}}, "category": "消毒・滅菌", "subcategory": "内視鏡管理", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "8": {"question_no": "8", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "医療従事者のワクチン接種に関する説明として、正しいのはどれか。", "choices": {"1": "インフルエンザワクチン接種後に風疹ワクチンを接種する場合は、27日以上の間隔をあける。", "2": "麻疹に未罹患で、ワクチン接種により免疫を獲得する場合は、2回接種が推奨されている。", "3": "水痘に対する免疫を確認するための抗体検査は、補体結合試験（CF法）で行うことが推奨されている。", "4": "異なる種類のワクチンの同時接種は、副反応が出現するリスクが高いため禁忌である。"}, "answer": "2", "explanation": {"overall": "麻疹ワクチンは2回接種が推奨されている。不活化ワクチン接種後に生ワクチンを接種する際に接種間隔は不要である。水痘抗体検査にはEIA法が推奨されている。異なる種類のワクチンの同時接種は可能である。", "each": {"1": "インフルエンザワクチンは不活化ワクチンであり、その後に生ワクチンを接種する場合でも27日以上の間隔は不要であるため誤り。", "2": "麻疹に対する免疫獲得には2回接種が推奨されており正しい。", "3": "水痘抗体検査にはEIA法が推奨されており、CF法は推奨されないため誤り。", "4": "異なる種類のワクチンの同時接種は可能であり、禁忌ではないため誤り。"}}, "category": "ワクチン", "subcategory": "医療従事者ワクチン", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "9": {"question_no": "9", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "薬剤耐性菌に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "感染症法に基づくと、メロペネムのMIC値が2μg/mL以上の腸内細菌科細菌による感染症であっても、カルバペネマーゼを産生していなければ届け出の必要はない。", "b": "日本において、基質特異性拡張型βーラクタマーゼ（ESBL）産生腸管出血性大腸菌感染症が報告されている。", "c": "感染症法において、薬剤耐性緑膿菌感染症とは広域βーラクタム剤、アミノ配糖体、フルオロキノロンの3系統の薬剤に対して耐性を示す緑膿菌による感染症と定義されている。", "d": "バンコマイシン耐性腸球菌（VRE）は、染色体にmecA遺伝子が組み込まれることで、β-ラクタム系抗菌薬に耐性を獲得した腸球菌である。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "ESBL産生腸管出血性大腸菌感染症は国内でも報告されている。薬剤耐性緑膿菌感染症は、広域β-ラクタム剤、アミノ配糖体、フルオロキノロンの3系統に耐性を示す緑膿菌による感染症であるため、bとcが正しい。", "each": {"a": "カルバペネマーゼ産生の有無だけで届出不要とは判断できないため誤り。", "b": "国内でESBL産生腸管出血性大腸菌感染症の報告があり正しい。", "c": "薬剤耐性緑膿菌感染症は3系統の薬剤に耐性を示す緑膿菌による感染症であり正しい。", "d": "mecA遺伝子はMRSAのβ-ラクタム耐性に関与する遺伝子であり、VREの説明としては誤り。"}}, "category": "薬剤耐性菌", "subcategory": "感染症法・耐性機序", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "10": {"question_no": "10", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "Clostridioides difficile（Clostridium difficile）に関する説明として、正しいのはどれか。", "choices": {"1": "迅速検査では、GDH抗原が陽性でもトキシンが陰性であれば病原性はないと判断してよい。", "2": "毒素検出検査を行うために採取した便検体は、採取後2～8°Cで保管する。", "3": "患者が使用したトイレは、0.01%（100ppm）の次亜塩素酸ナトリウム溶液で清拭消毒を行う。", "4": "感染者が発生した場合は、同室者にメトロニダゾールの予防投与をする。"}, "answer": "2", "explanation": {"overall": "Clostridioides difficileの毒素検査用検体は速やかな提出が望ましいが、提出できない場合は2～8°Cで冷蔵保管する。環境消毒には高濃度の次亜塩素酸ナトリウムが必要であり、予防投与は推奨されない。", "each": {"1": "GDH陽性・トキシン陰性の場合でも病原性を完全には否定できず、NAATなど追加検査を検討するため誤り。", "2": "便検体は速やかな提出が望ましいが、提出できない場合は2～8°Cで保管するため正しい。", "3": "Clostridioides difficileの環境消毒には0.1%以上の次亜塩素酸ナトリウムが推奨され、0.01%では不十分であるため誤り。", "4": "同室者へのメトロニダゾール予防投与は推奨されていないため誤り。"}}, "category": "感染症", "subcategory": "Clostridioides difficile感染症", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "11": {"question_no": "11", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "感染症法に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "梅毒は、定点報告の疾患である。", "b": "麻疹は2日以内に届け出る必要がある。", "c": "腸管出血性大腸菌感染症は、3類感染症に分類されている。", "d": "鳥インフルエンザ（H5N1）は、2類感染症に分類されている。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "腸管出血性大腸菌感染症は3類感染症に分類される。鳥インフルエンザ（H5N1）は2類感染症に分類される。梅毒は全数把握対象疾患であり、麻疹は直ちに届出が必要である。", "each": {"a": "梅毒は定点報告ではなく全数把握対象疾患であるため誤り。", "b": "麻疹は2日以内ではなく直ちに届出が必要であるため誤り。", "c": "腸管出血性大腸菌感染症は3類感染症であり正しい。", "d": "鳥インフルエンザ（H5N1）は2類感染症であり正しい。"}}, "category": "感染症法", "subcategory": "届出・分類", "difficulty": "easy", "source_file": "第30回認定看護師認定審査.docx"}, "12": {"question_no": "12", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "小児の感染症に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "ロタウイルスは冬季の乳幼児の急性下痢症の主な原因ウイルスで、エンベロープを持つウイルスである。", "b": "流行性耳下腺炎（ムンプス）は、24～48時間の潜伏期を経て発症する。", "c": "RSウイルス感染症の感染経路は、接触感染である。", "d": "咽頭結膜熱（プール熱）は、学校保健安全法で、主要症状が消退した後2日を経過するまで出席停止とされている。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "RSウイルス感染症は主に接触感染で伝播する。咽頭結膜熱は学校保健安全法において、主要症状消退後2日を経過するまで出席停止とされている。ロタウイルスはノンエンベロープウイルスであり、ムンプスの潜伏期間は通常2～3週間程度である。", "each": {"a": "ロタウイルスはノンエンベロープウイルスであるため誤り。", "b": "流行性耳下腺炎の潜伏期間は通常2～3週間程度であり、24～48時間ではないため誤り。", "c": "RSウイルス感染症は主に接触感染で伝播するため正しい。", "d": "咽頭結膜熱は主要症状消退後2日を経過するまで出席停止とされており正しい。"}}, "category": "感染症", "subcategory": "小児感染症", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "13": {"question_no": "13", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "2011年公開の「血管内留置カテーテル関連感染予防のためのCDCガイドライン」において推奨されている対策として、正しい組み合わせはどれか。", "stem_items": {"a": "中心静脈カテーテル、末梢挿入型中心ライン（PICC）挿入の際は、マキシマル・バリア・プリコーションを行う。", "b": "中心静脈カテーテル、PICC、血液透析カテーテル、肺動脈カテーテルは、血流感染を予防するためにカテーテルを7日毎に交換する。", "c": "血液、血液製剤または脂肪乳剤を投与するのに用いる輸液ラインは、輸液開始から72時間以内に交換する。", "d": "カテーテル挿入部位の被覆は、滅菌ガーゼまたは滅菌フィルムドレッシング剤を使用する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "2", "explanation": {"overall": "中心静脈カテーテルやPICC挿入時にはマキシマル・バリア・プリコーションを実施する。挿入部位の被覆には滅菌ガーゼまたは滅菌フィルムドレッシング剤を使用する。カテーテルは感染予防目的でルーチン交換しない。", "each": {"a": "中心静脈カテーテルおよびPICC挿入時にはマキシマル・バリア・プリコーションを行うため正しい。", "b": "感染予防目的での定期的なカテーテル交換は推奨されていないため誤り。", "c": "血液・血液製剤・脂肪乳剤投与ラインは24時間以内の交換が推奨されており、72時間以内ではないため誤り。", "d": "挿入部位は滅菌ガーゼまたは滅菌フィルムドレッシング剤で被覆するため正しい。"}}, "category": "デバイス関連感染", "subcategory": "CRBSI", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "14": {"question_no": "14", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "薬剤耐性機構に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "緑膿菌は、外膜の透過性が低いことや薬剤排出ポンプを複数持つことにより、多くの抗菌薬に自然耐性を示す。", "b": "ESBLは、セリンーβーラクタマーゼの遺伝子変異により、カルバペネム系薬を分解する。", "c": "Mycoplasma pneumoniaeのマクロライド耐性機序は、DNA gyraseが変化して、薬剤との親和性を低下させることによる。", "d": "β-ラクタマーゼは、βラクタム環を加水分解する酵素である。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "2", "explanation": {"overall": "緑膿菌は外膜透過性低下や薬剤排出ポンプにより自然耐性を示す。β-ラクタマーゼはβラクタム環を加水分解する酵素である。ESBLは通常カルバペネムを分解せず、Mycoplasma pneumoniaeのマクロライド耐性は50Sリボソーム変異による。", "each": {"a": "緑膿菌は外膜透過性低下や薬剤排出ポンプにより多くの抗菌薬に自然耐性を示し正しい。", "b": "ESBLは主にセフェム系を分解するが、通常カルバペネム系薬は分解できないため誤り。", "c": "マクロライド耐性は50Sリボソーム変異によるものであり、DNA gyrase変化ではないため誤り。", "d": "β-ラクタマーゼはβラクタム環を加水分解する酵素であり正しい。"}}, "category": "薬剤耐性菌", "subcategory": "耐性機序", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "15": {"question_no": "15", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "微生物検査のための検体採取方法に関する説明として、正しいのはどれか。", "choices": {"1": "髄膜炎菌感染の可能性がある髄液検体は、冷却しながら速やかに搬送する。", "2": "尿道カテーテル留置中の患者の尿培養検体は、採尿バッグの排液口から採取する。", "3": "外観が白色または透明の喀痰は、Miller&Jonesの分類でP3に分類される。", "4": "抗菌薬投与中の血液培養検体を採取する場合は、血中濃度が最も低い時期に行う。"}, "answer": "4", "explanation": {"overall": "血液培養は抗菌薬血中濃度が最も低いタイミングで採取することが望ましい。髄膜炎菌が疑われる髄液検体は冷却せず速やかに搬送する。尿培養は採尿ポートから採取する。白色または透明の喀痰はMiller&Jones分類でMに分類される。", "each": {"1": "髄膜炎菌は低温に弱いため、髄液検体は冷却せず速やかに搬送するため誤り。", "2": "尿培養検体は採尿バッグ排液口ではなく、採尿ポートから無菌的に採取するため誤り。", "3": "白色または透明の喀痰はMiller&Jones分類でMに分類され、P3ではないため誤り。", "4": "抗菌薬投与中は血中濃度が最も低い時期に血液培養を採取するため正しい。"}}, "category": "微生物検査", "subcategory": "検体採取", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "16": {"question_no": "16", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "手術部位感染予防策として、正しいのはどれか。", "choices": {"1": "手術後は、バンコマイシンを投与する。", "2": "黄色ブドウ球菌やA群連鎖球菌を保菌している職員は、日常的に業務から除外する。", "3": "手術室内圧は周囲に対して陰圧に保つ。", "4": "一次閉鎖した切開創は、術後24～48時間、滅菌された被覆剤で保護する。"}, "answer": "4", "explanation": {"overall": "一次閉鎖創は術後24～48時間、滅菌被覆材で保護する。SSI予防目的でのルーチンなバンコマイシン投与は推奨されない。保菌職員もルーチンに業務制限しない。手術室は陽圧管理とする。", "each": {"1": "SSI予防目的でルーチンにバンコマイシンを投与することは推奨されないため誤り。", "2": "黄色ブドウ球菌やA群連鎖球菌保菌のみで日常的に業務から除外することは推奨されないため誤り。", "3": "手術室は周囲に対して陽圧管理とするため誤り。", "4": "一次閉鎖した切開創は術後24～48時間、滅菌被覆材で保護するため正しい。"}}, "category": "手術部位感染", "subcategory": "SSI予防", "difficulty": "easy", "source_file": "第30回認定看護師認定審査.docx"}, "17": {"question_no": "17", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "血液透析室における感染予防策に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "透析装置外装は、透析が終了するたびに0.01%（100ppm）次亜塩素酸ナトリウム液を用いて消毒する。", "b": "HBs抗原陽性の患者を個室管理できない場合は、隣にHBs抗体陽性の患者を配置する。", "c": "インフルエンザ患者に接触した血液透析患者には、抗インフルエンザ薬の予防投与を行う。", "d": "血液透析患者に対する肺炎球菌ワクチン接種は禁忌である。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "HBs抗原陽性患者を個室管理できない場合は、HBs抗体陽性患者を隣接配置する対応が行われる。インフルエンザ曝露後の血液透析患者には予防投与を検討する。透析装置外装消毒にはより高濃度の消毒薬が必要であり、肺炎球菌ワクチン接種は禁忌ではない。", "each": {"a": "透析装置外装消毒には0.01%ではなく、0.05～0.1%次亜塩素酸ナトリウムなどを使用するため誤り。", "b": "HBs抗原陽性患者を個室管理できない場合は、HBs抗体陽性患者を隣接配置する対応があり正しい。", "c": "インフルエンザ患者接触後の血液透析患者には抗インフルエンザ薬の予防投与を検討するため正しい。", "d": "血液透析患者に対する肺炎球菌ワクチン接種は推奨されており、禁忌ではないため誤り。"}}, "category": "透析感染対策", "subcategory": "血液透析", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "18": {"question_no": "18", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "消毒薬の適応に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "B型肝炎患者の血液で汚染した床は、0.1%ベンザルコニウム塩化物液で清拭する。", "b": "創傷部位の消毒は、1%クロルヘキシジングルコン酸塩液を用いる。", "c": "腸管出血性大腸菌O-157感染症患者が使用した便座は、アルコールで清拭する。", "d": "流行性角結膜炎患者に使用したスリーミラーレンズ（拡大鏡）は、洗浄後に0.1%（1,000ppm）次亜塩素酸ナトリウム液に30分間浸漬する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "腸管出血性大腸菌O-157に対してアルコール消毒は有効である。流行性角結膜炎患者に使用した器具は、次亜塩素酸ナトリウムによる消毒を行う。血液汚染には次亜塩素酸ナトリウムを使用し、創傷部位には高濃度クロルヘキシジンは使用しない。", "each": {"a": "血液汚染にはベンザルコニウム塩化物ではなく、次亜塩素酸ナトリウムを使用するため誤り。", "b": "創傷部位に1%クロルヘキシジングルコン酸塩液は刺激性が強く通常使用しないため誤り。", "c": "腸管出血性大腸菌O-157にはアルコール消毒が有効であり正しい。", "d": "流行性角結膜炎患者に使用した器具は、0.1%次亜塩素酸ナトリウム液による浸漬消毒を行うため正しい。"}}, "category": "消毒・滅菌", "subcategory": "消毒薬", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "19": {"question_no": "19", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "疫学に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "迅速検査の感度が90%とは、疾患を持つ人の10%が陰性と判定される可能性があることを意味する。", "b": "迅速検査の特異度が90%とは、検査で陽性であった場合に、疾患を有する確率が90%であることを意味する。", "c": "症例・対照研究では、リスク因子に曝露した群と曝露しない群における罹患率の差を明らかにすることができる。", "d": "致命率は、特定の疾患により死亡するリスクを表す指標である。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "2", "explanation": {"overall": "感度90%とは、疾患を持つ人のうち10%が偽陰性となる可能性があることを示す。致命率は特定疾患に罹患した患者がその疾患で死亡する割合を表す。特異度は疾患を持たない人が陰性となる割合であり、症例対照研究では罹患率を直接求めることはできない。", "each": {"a": "感度90%とは、疾患を持つ人の10%が陰性となる可能性があることを意味し正しい。", "b": "特異度90%は、疾患を持たない人が陰性となる割合を示すため誤り。", "c": "症例対照研究では罹患率を直接算出できず、オッズ比を用いて関連を推定するため誤り。", "d": "致命率は特定疾患により死亡するリスクを示す指標であり正しい。"}}, "category": "疫学", "subcategory": "疫学指標", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "20": {"question_no": "20", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "アスペルギルス症対策に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "侵襲性アスペルギルス症は、アスペルギルス胞子の吸入により起こるが、胞子は環境中に常在しているため、移植病棟では定期的な環境の細菌検査が必要である。", "b": "粉じんの飛散が予想される改修工事を行う病棟では、工事期間中は、移植患者など侵襲性アスペルギルス症のリスクが高い患者の入院を制限する。", "c": "工事の際に行うインフェクション・コントロール・リスクアセスメント（Infection Control Risk Assessment）とは、工事内容と工事区域に応じた感染リスクを評価し、求められる対策を明らかにする活動である。", "d": "造血細胞移植患者の病室では、生花を活ける花瓶の水は毎日交換する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "改修工事時には、侵襲性アスペルギルス症高リスク患者への配慮が必要であり、ICRAを実施して感染リスク評価と対策を行う。定期的な環境細菌検査は routine に推奨されず、造血細胞移植患者病室への生花持ち込みは避ける。", "each": {"a": "移植病棟で routine の定期的環境細菌検査は推奨されていないため誤り。", "b": "粉じん飛散が予想される工事期間中は、高リスク患者の入院制限などを検討するため正しい。", "c": "ICRAは工事内容や区域に応じた感染リスクを評価し、必要対策を明確化する活動であり正しい。", "d": "造血細胞移植患者病室では生花の持ち込みを避けるため誤り。"}}, "category": "真菌感染対策", "subcategory": "アスペルギルス症", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}}, "section2": {"title": "問題2", "cases": {"case1": {"case_no": "1", "description": "事例1\n次の文を読み、問21から問23に対する適切な答えを一つ選んでください。あなたは病院の感染管理認定看護師です。1月10日に地域の高齢者施設から「複数の入所者がインフルエンザを発症し、職員の中にも体調不良の者がいる。指導を仰ぎたい」と連絡がありました。あなたが施設を訪問すると以下のことが分かりました。\n・入所者のA氏とB氏が1月6日に外泊から戻った後、1月7日から発熱し、1月8日にインフルエンザと診断された。\n・A氏とB氏の同室のC氏が1月8日に発熱し、インフルエンザと診断された。\n・個室のD氏は1月9日夜に37.8度の発熱があり、本日検査したがインフルエンザは陰性であった。\n・1月8日から勤務している職員のE氏が本日出勤してきたが、昼頃より体調不良となり帰宅した。近医でインフルエンザの検査をした結果は陰性であった。\n・施設の入所者は20名で、通所サービスで毎日15名を受け入れている。", "assets": {}, "questions": {"21": {"question_no": "21", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "1", "type": "single_best", "question": "1月10日の時点で入所者に行う対策として、正しいのはどれか。", "choices": {"1": "直ちにA氏、B氏、C氏、D氏以外の入所者にインフルエンザ迅速診断検査キットによる検査を実施する。", "2": "直ちにA氏、B氏、C氏以外の入所者に抗ウイルス薬の予防投与を行う。", "3": "A氏、B氏、C氏は同室のままとし、食事は室内とし集合イベントの参加は控える。", "4": "D氏は今まで通り食堂での食事や集合イベントの参加を可能とする。"}, "answer": "3", "explanation": {"overall": "インフルエンザ患者はコホート管理し、食事は室内対応とし、集合イベントへの参加を控える。無症状者への一斉迅速検査や、全入所者への一律の予防投与は適切ではない。D氏は発熱があり、迅速検査が陰性でも偽陰性の可能性があるため通常通りの集団活動は避ける。", "each": {"1": "無症状者全員に直ちに迅速検査を行う対応は適切ではないため誤り。", "2": "抗ウイルス薬の予防投与は適応を検討して行うものであり、全員に一律で投与する対応は適切ではないため誤り。", "3": "インフルエンザ患者を同室でコホート管理し、食事を室内対応、集合イベントを控える対応は適切であり正しい。", "4": "D氏は発熱があり迅速検査陰性でも偽陰性の可能性があるため、食堂や集合イベントへの参加は避ける必要があり誤り。"}}, "category": "高齢者施設感染対策", "subcategory": "インフルエンザ", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "22": {"question_no": "22", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "1", "type": "single_best", "question": "この高齢者施設の対策として、正しい組み合わせはどれか。", "stem_items": {"a": "施設内でインフルエンザが発生していることは伝えず、面会者の症状の確認を行う。", "b": "通所者は利用前に必ず検温や体調の確認を行い、発熱がある人のサービス利用は断る。", "c": "入所者、通所者、面会者や職員など全ての人の手指衛生を強化する。", "d": "インフルエンザを発症した通所者は利用を控えてもらうが、熱が下がればすぐにサービスの利用を可能とする。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "高齢者施設でインフルエンザが発生した場合は、利用者・面会者・職員への感染対策を強化する必要がある。通所者の体調確認や手指衛生の徹底は重要である。一方、発生状況を隠す対応や、解熱直後に通所を再開させる対応は不適切である。", "each": {"a": "施設内での発生状況は必要に応じて周知し、感染拡大防止に努める必要があるため誤り。", "b": "通所前の検温や体調確認を行い、発熱者の利用を控えてもらう対応は正しく、感染拡大防止に有効である。", "c": "入所者、通所者、面会者、職員を含めた全ての人に対する手指衛生の強化は重要であり正しい。", "d": "インフルエンザは解熱後も感染性を有するため、解熱後すぐの利用再開は不適切であり誤り。"}}, "category": "高齢者施設感染対策", "subcategory": "インフルエンザ", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "23": {"question_no": "23", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "1", "type": "single_best", "question": "この高齢者施設の職員に対する対策として、正しい組み合わせはどれか。", "stem_items": {"a": "職員のE氏は体調が改善すれば、1月12日から勤務可能とする。", "b": "体調がすぐれない職員は直ちに受診し、インフルエンザ迅速診断検査を行い、陰性の場合のみ勤務可能とする。", "c": "職員のインフルエンザ様症状の有無を確認する。", "d": "A氏、B氏、C氏のケアを担当した職員に対し、抗ウイルス薬の予防投与を検討する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "高齢者施設でインフルエンザが発生した場合は、職員の健康観察を強化し、インフルエンザ様症状の有無を確認する。また、濃厚接触した職員には抗ウイルス薬の予防投与を検討する。迅速検査陰性のみを根拠に勤務可能と判断することは適切ではなく、発症早期は偽陰性の可能性がある。", "each": {"a": "インフルエンザは解熱後も感染性を有するため、体調改善のみで早期復帰を判断することは適切ではなく誤り。", "b": "迅速検査は発症早期に偽陰性となる可能性があり、陰性のみを根拠に勤務可能と判断することは不適切であるため誤り。", "c": "職員のインフルエンザ様症状の有無を継続的に確認することは感染拡大防止に重要であり正しい。", "d": "濃厚接触した職員に対して抗ウイルス薬の予防投与を検討することは適切であり正しい。"}}, "category": "高齢者施設感染対策", "subcategory": "インフルエンザ", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}}}, "case2": {"case_no": "2", "description": "事例2\n次の文を読み、問24から問26に対する適切な答えを一つ選んでください。\nあなたの勤務する病院では、集中治療室（ICU）において尿道カテーテル関連尿路感染（CAUTI）サーベイランスを実施しています。2021年度の結果は表1の通りでした。また、表1の結果を表2・表3のベンチマークと比較しました。", "assets": {"tables": {"table1_summary": {"title": "表1 CAUTIサーベイランス結果 2021年度", "data": [{"CAUTI発生件数": 7, "尿道カテーテル使用日数": 1300, "延べ入院患者数": 3000, "CAUTI発生密度率": "(a)", "カテーテル使用比": "(b)"}]}, "table2_benchmark_rate": {"title": "表2 尿道カテーテル関連尿路感染率（期間及び病床種類別）", "data": [{"集計期間": "①", "感染": "UTI", "病床種類": "ICU（1層）", "病棟数": 79, "感染件数": 94, "尿道カテーテル使用日": 61217, "感染率": 1.5, "p10": 0, "p25": 0, "median": 0.6, "p75": 2.6, "p90": 4.1}, {"集計期間": "②", "感染": "UTI", "病床種類": "ICU（1層）", "病棟数": 93, "感染件数": 491, "尿道カテーテル使用日": 355072, "感染率": 1.4, "p10": 0, "p25": 0.5, "median": 1.1, "p75": 1.9, "p90": 3.4}]}, "table3_benchmark_utilization": {"title": "表3 尿道留置カテーテル・器具使用比（期間及び病床種類別）", "data": [{"集計期間": "①", "病床種類": "ICU（1層）", "病棟数": 79, "尿道カテーテル使用日": 61217, "延べ入院患者数": 87585, "器具使用比": 0.7, "p10": 0.37, "p25": 0.62, "median": 0.78, "p75": 0.9, "p90": 0.93}, {"集計期間": "②", "病床種類": "ICU（1層）", "病棟数": 93, "尿道カテーテル使用日": 355072, "延べ入院患者数": 510986, "器具使用比": 0.69, "p10": 0.32, "p25": 0.58, "median": 0.79, "p75": 0.88, "p90": 0.91}]}}}, "questions": {"24": {"question_no": "24", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "2", "type": "single_best", "question": "表1の（a）に当てはまる数値として、正しいのはどれか。", "choices": {"1": "5.4", "2": "2.3", "3": "0.5", "4": "0.2"}, "answer": "1", "explanation": {"overall": "CAUTI発生密度率は、『CAUTI発生件数 ÷ 尿道カテーテル使用日数 × 1,000』で算出する。7 ÷ 1300 × 1000 = 5.38となり、小数第1位で四捨五入すると5.4となる。", "each": {"1": "7 ÷ 1300 × 1000 = 5.4であり正しい。", "2": "計算結果と一致しないため誤り。", "3": "計算結果と一致しないため誤り。", "4": "計算結果と一致しないため誤り。"}}, "category": "サーベイランス", "subcategory": "CAUTI", "difficulty": "easy", "source_file": "第30回認定看護師認定審査.docx"}, "25": {"question_no": "25", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "2", "type": "single_best", "question": "表1の（b）に当てはまる数値として、正しいのはどれか。", "choices": {"1": "0.2", "2": "0.4", "3": "0.5", "4": "2.3"}, "answer": "2", "explanation": {"overall": "カテーテル使用比は、『尿道カテーテル使用日数 ÷ 延べ入院患者数』で算出する。1300 ÷ 3000 = 0.433…となり、小数第1位で四捨五入すると0.4となる。", "each": {"1": "1300 ÷ 3000 の計算結果と一致しないため誤り。", "2": "1300 ÷ 3000 = 0.43 → 0.4であり正しい。", "3": "計算結果と一致しないため誤り。", "4": "計算結果と一致しないため誤り。"}}, "category": "サーベイランス", "subcategory": "CAUTI", "difficulty": "easy", "source_file": "第30回認定看護師認定審査.docx"}, "26": {"question_no": "26", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "2", "type": "single_best", "question": "表1のデータを表2・表3のベンチマークと比較した結果に関する説明として、正しいのはどれか。", "choices": {"1": "感染率と尿道カテーテル使用比が高いことから、不要な尿道カテーテルを速やかに抜去する取り組みが必要である。", "2": "感染率が高く尿道カテーテル使用比が低いことから、尿道カテーテル使用に不慣れと考え、挿入手技や管理方法の見直し、感染対策を振り返る必要がある。", "3": "感染率が低く尿道カテーテル使用比が高いことから、尿道カテーテルの使用頻度を下げることができれば、感染率も更に減少することができる。", "4": "感染率と尿道カテーテル使用比が低いことから、尿道カテーテルの使用頻度が上がった時に感染率も上がる可能性があり、日頃からマニュアルの整備する必要がある。"}, "answer": "2", "explanation": {"overall": "表1のCAUTI発生密度率は5.4であり、表2のベンチマーク（90パーセンタイル4.1）より高い。一方、カテーテル使用比は0.43であり、表3の中央値や75パーセンタイルより低い。このことから、カテーテル使用頻度そのものよりも、挿入手技や管理方法など感染対策上の問題が考えられる。", "each": {"1": "カテーテル使用比は高くなく、不要カテーテルの多さを示す状況ではないため誤り。", "2": "感染率が高く、カテーテル使用比が低いことから、手技や管理方法など感染対策を見直す必要があり正しい。", "3": "感染率は低くなく高値であるため誤り。", "4": "感染率とカテーテル使用比はいずれも低い状況ではないため誤り。"}}, "category": "サーベイランス", "subcategory": "CAUTI", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}}}, "case3": {"case_no": "3", "description": "事例3\n次の文を読み、問27から問29に対する適切な答えを一つ選んでください。\nあなたは病院の感染管理認定看護師です。2021年1月15日に近隣の介護老人保健施設から、「ノロウイルスによる胃腸炎の入居者が複数いるので、感染対策について指導をして欲しい」と言われました。この施設で情報収集を行ったところ、以下のことがわかりました。\n・入居者F氏、G氏、H氏の3名に2日前から嘔吐や下痢の症状が出現した。\n・本日3名の便検査を実施したところノロウイルス抗原陽性であった。\n・F氏、G氏は同室（4人室）、H氏は個室である。F氏、G氏はおむつを使用している。\n・H氏の個室にはトイレはなく、介助にて共有トイレを使用している。\n・F氏とG氏と同室であるI氏とJ氏に消化器症状はみられていない。\n・その他の入居者と職員に、消化器症状がある者はいない。\n・I氏は、今朝、あなたが勤務する病院の眼科病棟に入院した。", "assets": {}, "questions": {"27": {"question_no": "27", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "3", "type": "single_best", "question": "ノロウイルス感染症に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "ヒトの大腸に感染し、増殖する。", "b": "確定診断には、ウイルス培養検査が有効である。", "c": "効果のある抗ウイルス薬はない。", "d": "感染力は強く、100コピー程度の摂取でも感染する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "ノロウイルスは小腸で増殖し、感染力が非常に強いウイルスである。特異的な抗ウイルス薬はなく、治療は対症療法が中心となる。", "each": {"a": "ノロウイルスはヒトの小腸で増殖するため誤り。", "b": "迅速抗原検査が有用であり、一般的にウイルス培養検査は行わない。", "c": "特異的な抗ウイルス薬はなく、治療は対症療法のみ。", "d": "少量のウイルスでも感染が成立するため正しい。"}}, "category": "感染症", "subcategory": "ノロウイルス", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "28": {"question_no": "28", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "type": "single_best", "question": "この施設の感染対策の指導として、正しいのはどれか。", "stem_items": {"1": "おむつ交換時はアルコール手指消毒剤による手指衛生を徹底する。", "2": "F氏とG氏の部屋のベッド柵やドアノブは、次亜塩素酸ナトリウム液で清拭する。", "3": "J氏は、他の4床室の部屋に移動させる。", "4": "嘔吐物や下痢便で汚染したリネンは、他の入居者のリネンとまとめて洗濯する。"}, "choices": {"1": "おむつ交換時はアルコール手指消毒剤による手指衛生を徹底する", "2": "F氏とG氏の部屋のベッド柵やドアノブは、次亜塩素酸ナトリウム液で清拭する", "3": "J氏は、他の4床室の部屋に移動させる", "4": "嘔吐物や下痢便で汚染したリネンは、他の入居者のリネンとまとめて洗濯する"}, "answer": "2", "explanation": {"overall": "ノロウイルス対策では、接触感染対策と環境消毒が重要である。環境表面は次亜塩素酸ナトリウムによる消毒を行う。", "each": {"1": "ノロウイルスにはアルコール抵抗性があるため、流水と石鹸による手洗いを行う。", "2": "ノロウイルス汚染環境には次亜塩素酸ナトリウムによる消毒が有効であり正しい。", "3": "J氏は潜伏期の可能性があり、他室へ移動させない。", "4": "汚染リネンは他と分けて適切に処理する必要がある。"}}, "category": "感染管理", "subcategory": "ノロウイルス", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "29": {"question_no": "29", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "3", "type": "single_best", "question": "I氏は眼科病棟の個室に入院しており、1月18日に白内障の手術が予定されている。眼科病棟の看護師に指導する内容として、正しいのはどれか。", "choices": {"1": "スタッフの混乱を避けるため、眼科病棟内で情報を共有する職員を限定する。", "2": "I氏の部屋への入室時には、N95微粒子用マスク、手袋、エプロンを着用する。", "3": "I氏の嘔吐や下痢の症状に注意し、スタッフの手指衛生を強化する。", "4": "I氏に嘔吐や下痢の症状が出現した時は、便検査でノロウイルス抗原検査を行い、陰性が確認できれば予定通り手術を行う。"}, "answer": "3", "explanation": {"overall": "I氏はノロウイルス患者と同室であったため、発症していなくても潜伏期間中の可能性がある。眼科病棟では情報共有を行い、嘔吐・下痢などの症状出現に注意し、スタッフの手指衛生を強化する必要がある。", "each": {"1": "感染拡大防止のため、必要な職員間で情報共有する必要があり、情報共有を限定する対応は不適切である。", "2": "ノロウイルスは空気感染ではないため、N95微粒子用マスクは不要である。", "3": "I氏は潜伏期間中の可能性があるため、嘔吐や下痢の症状に注意し、手指衛生を強化する対応は正しい。", "4": "ノロウイルス抗原検査は偽陰性の可能性があり、陰性のみを根拠に予定通り手術を行う判断は不適切である。下痢や嘔吐が治まるまでは手術延期を検討する。"}}, "category": "感染管理", "subcategory": "ノロウイルス", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}}}, "case4": {"case_no": "4", "description": "事例4\n次の文を読み、問30から問32に対する適切な答えを一つ選んでください。\nあなたは病院の感染管理認定看護師です。2021年6月15日、細菌検査室から、ICUに入院している患者K氏の喀痰と血液培養から、薬剤耐性アシネトバクター・バウマニ（Multiple drug resistant Acinetobacter baumannii：MDR-Ab）が検出されたと連絡が入りました。喀痰は6月12日に気管挿管チューブから吸引して採取したものでした。\nICUを訪問したところ、以下のことがわかりました。\n・K氏は、6月12日に発熱、呼吸不全、意識障害があり、他院で気管挿管され人工呼吸器を装着した状態で、当院のICUに転院となった。\n・K氏は6月12日の胸部X線検査で両肺野に浸潤影が認められ、肺炎と診断された。\n・ICUには2つの個室があるが、K氏はカーテンで仕切られた8床のオープンフロアーのベッドに入院していた。\n・6月12日～6月15日までにICUに入室していた患者は15名であった。", "assets": {}, "questions": {"30": {"question_no": "30", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "4", "type": "single_best", "question": "MDR-Abに関する説明として、正しいのはどれか。", "choices": {"1": "グラム陽性菌である。", "2": "肺炎、血流感染症、創部感染症など多彩な感染症を引き起こす。", "3": "バイオフィルムを形成しない。", "4": "コリスチンに耐性を示すAcinetobacter baumanniiの報告はない。"}, "answer": "2", "explanation": {"overall": "MDR-Ab（薬剤耐性Acinetobacter baumannii）はグラム陰性桿菌であり、人工呼吸器関連肺炎（VAP）、血流感染、創部感染症など多彩な院内感染を引き起こす。バイオフィルム形成能を持ち、コリスチン耐性株も報告されている。", "each": {"1": "Acinetobacter baumanniiはグラム陰性桿菌であり誤り。", "2": "肺炎、血流感染症、創部感染症など多彩な感染症を引き起こし正しい。", "3": "バイオフィルム形成能を有するため誤り。", "4": "コリスチン耐性Acinetobacter baumanniiの報告は存在するため誤り。"}}, "category": "薬剤耐性菌", "subcategory": "MDR-Ab", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "31": {"question_no": "31", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "4", "type": "single_best", "question": "K氏への対応として、正しい組み合わせはどれか。", "stem_items": {"a": "個室管理とし、入室時は手袋とガウンを着用する。", "b": "薬剤耐性アシネトバクター感染症として届け出をする。", "c": "ケアに使用した個人防護具は、病室を出てから外し、室外に設置した感染性廃棄物容器に廃棄する。", "d": "発熱や呼吸不全などの肺炎症状が改善したら、接触予防策を解除する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "1", "explanation": {"overall": "MDR-Abは接触感染対策が必要であり、可能であれば個室管理を行う。入室時には手袋・ガウンを着用する。また、薬剤耐性アシネトバクター感染症は5類全数把握疾患であり届出対象である。", "each": {"a": "接触予防策として個室管理、手袋・ガウン着用を行うため正しい。", "b": "薬剤耐性アシネトバクター感染症は5類全数把握疾患であり届出対象であるため正しい。", "c": "個人防護具は病室内で外して廃棄するため誤り。", "d": "症状改善のみでは解除せず、保菌状態などを考慮して接触予防策解除を検討するため誤り。"}}, "category": "薬剤耐性菌", "subcategory": "MDR-Ab", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "32": {"question_no": "32", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "4", "type": "single_best", "question": "6月15日のスクリーニング検査の結果を受けて、今後あなたが実施する必要があると考える対策として、正しい組み合わせはどれか。", "stem_items": {"a": "MDR-Abは乾燥した環境で生息できないため、水回りの清浄化を強化する。", "b": "K氏とL氏を担当する看護師は、他の患者を担当しないようにする。", "c": "ICUで継続的に監視培養を実施する。", "d": "L氏に対してムピロシンを投与し、除菌する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "MDR-Abは乾燥環境でも長期間生存可能であり、ICU内での接触感染対策とサーベイランス強化が重要となる。保菌患者が確認された場合は、担当スタッフの固定化や継続的な監視培養を検討する。", "each": {"a": "MDR-Abは乾燥環境でも生存可能であり、この説明は誤り。", "b": "交差感染防止のため、担当看護師を固定化する対応は適切であり正しい。", "c": "ICU内での伝播状況確認のため、継続的な監視培養を実施することは適切であり正しい。", "d": "ムピロシンは主にMRSAの鼻腔除菌に使用され、MDR-Abの除菌目的には使用しないため誤り。"}}, "category": "薬剤耐性菌", "subcategory": "MDR-Ab", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}}}, "case5": {"case_no": "5", "description": "事例5\n次の文を読み、問33から問35に対する適切な答えを一つ選んでください。\nあなたは病院の感染管理認定看護師です。2021年3月10日、救命救急センターから「昨夜搬送され、入院した患者M氏が結核を発病している可能性がある」と連絡がありました。あなたは以下のような状況を確認しました。\n・搬送時に撮影したM氏の胸部X線上、右肺上葉に異常陰影を認めた。\n・M氏の呼吸状態は悪く、初療室で気管挿管が行われた。\n・初療の担当は医師1名、研修医1名、看護師1名で、全員がサージカルマスクを着用していた。\n・現在M氏は、人工呼吸器管理中で救命救急センターの個室に入室している。\n・気管挿管時に提出した喀痰塗抹検査の結果、抗酸菌が陽性（1+）であった。\n・M氏は1か月前から咳をしていたが、病院を受診していなかった。\n・核酸増幅検査（PCR法）の結果は3月12日に判明する予定である。", "assets": {}, "questions": {"33": {"question_no": "33", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "5", "type": "single_best", "question": "3月10日の状況に基づく判断として、正しい組み合わせはどれか。", "stem_items": {"a": "結核の発生届を3月10日から7日以内に提出する必要がある。", "b": "喀痰塗抹検査で「抗酸菌陽性（1+）」であることから、M氏は結核菌を排菌している。", "c": "核酸増幅検査（PCR法）が陰性であったとしても、偽陰性の可能性を疑う必要がある。", "d": "結核菌の耐性化を避けるため、作用点の異なる抗結核薬を複数組み合わせた多剤併用療法を少なくとも6か月間継続する必要がある。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "抗酸菌陽性のみでは結核菌とは断定できず、非結核性抗酸菌症の可能性もある。一方、PCR陰性でも偽陰性の可能性があり、臨床所見から結核を否定できない場合がある。また、結核治療では耐性化防止のため多剤併用療法を行う。", "each": {"a": "結核の届出は診断後直ちに行うため、「7日以内」という記載は誤り。", "b": "抗酸菌陽性のみでは結核菌とは断定できず、非結核性抗酸菌の可能性もあるため誤り。", "c": "PCR陰性でも偽陰性の可能性があり、結核を完全には否定できないため正しい。", "d": "結核治療では耐性化防止のため多剤併用療法を行い、通常6か月以上継続するため正しい。"}}, "category": "結核", "subcategory": "診断・治療", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "34": {"question_no": "34", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "5", "type": "single_best", "question": "救命救急センターの職員に対して指導する内容として、正しいのはどれか。", "choices": {"1": "M氏が使用した初療室内の床や壁は、結核に有効な薬剤を用いて消毒する。", "2": "ツベルクリン反応陽性の看護師を優先的にM氏の担当にする。", "3": "N95微粒子用マスクの着用のたびに、ユーザーシールチェックを実施する。", "4": "M氏は人工呼吸器を装着しているため、陰圧室に収容する必要はない。"}, "answer": "3", "explanation": {"overall": "結核患者対応では空気予防策を実施し、N95微粒子用マスク着用時には毎回ユーザーシールチェックを行う必要がある。結核菌は環境表面からの感染リスクは低く、通常の環境清掃で対応する。人工呼吸器装着中であっても陰圧室管理が推奨される。", "each": {"1": "結核菌は主に空気感染であり、床や壁に対して特別な消毒は通常不要であるため誤り。", "2": "ツベルクリン反応陽性のみでは免疫の有無を十分判断できず、優先的担当とする根拠にはならないため誤り。", "3": "N95微粒子用マスクは着用のたびにユーザーシールチェックを実施する必要があり正しい。", "4": "人工呼吸器装着中であっても、結核が疑われる場合は陰圧室収容が必要であり誤り。"}}, "category": "結核", "subcategory": "空気予防策", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "35": {"question_no": "35", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "5", "type": "single_best", "question": "3月12日に核酸増幅検査（PCR法）の結果から結核菌陽性であると判明したため、「感染症法に基づく結核の接触者健康診断の手引き（改訂第5版）」に従い、M氏との接触者に対して健診を行うこととなった。接触者健診に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "M氏の初療を担当した3名は「濃厚接触者」と定義される。", "b": "M氏の感染性期間の始期は結核診断日の3か月前とする。", "c": "接触者には、4月初旬にインターフェロンγ遊離試験（Interferon-gamma release-assay，IGRA）を実施する。", "d": "接触者健診でIGRAの結果が「陽性」であった場合は、直ちに就業制限を行う。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "1", "explanation": {"overall": "M氏は1か月前から咳があり、結核診断時点から3か月前までを感染性期間の始期として接触者健診を考える。また、初療を担当した医師・研修医・看護師の3名は、気管挿管時にサージカルマスクのみで対応しており、空気感染対策が不十分な濃厚接触者として扱う。IGRAは接触直後ではなく、最終接触から8週経過後に実施するのが基本であり、4月初旬では時期が早い。IGRA陽性のみで直ちに就業制限とはならない。したがってaとbが正しい。", "each": {"a": "初療を担当した3名は、気管挿管時にサージカルマスクのみで対応しており、空気感染対策が不十分な濃厚接触者として扱うため正しい。", "b": "M氏は1か月前から咳があり、結核診断時点から3か月前までを感染性期間の始期として評価するため正しい。", "c": "IGRAは感染成立までの期間を考慮し、最終接触から8週経過後に実施するのが基本であり、4月初旬では早すぎるため誤り。", "d": "IGRA陽性のみでは直ちに就業制限とはならず、活動性結核の有無を評価する必要があるため誤り。"}}, "category": "結核", "subcategory": "接触者健診", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}}}, "case6": {"case_no": "6", "description": "事例6\n次の文を読み、問36から問38に対する適切な答えを一つ選んでください。\nあなたは病院の感染管理認定看護師です。2021年4月10日に、細菌検査室から、メタロ-β-ラクタマーゼ産生Enterobacter cloacae（以下、MBL-EC）が3階病棟に入院中の患者N氏から検出されたとの報告を受けました。N氏は4人部屋の301号室に入院中で、同室にO氏とP氏が入院しています。また、この日以前にMBL-ECが検出されたことはありません。2021年4月30日までの間に、さらにO氏と303号室に入院中のQ氏からMBL-ECが検出されました。2021年4月30日現在、MBL-EC検出患者一覧は下表の通りです。\nまた、3階病棟における2021年4月1日から4月30日までの入院患者数は合計300人でした。", "questions": {"36": {"question_no": "36", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "6", "type": "single_best", "question": "あなたは3階病棟に勤務する職員に、MBL-ECについて説明することになりました。本菌に関する説明として、正しい組み合わせはどれか。", "assets": {"tables": [{"title": "メタロ-β-ラクタマーゼ産生E.cloacae検出者一覧", "subtitle": "2021年4月30日現在　3階病棟", "headers": ["検出患者", "入院日", "検査日", "材料", "移動情報"], "rows": [["患者N", "2020/12/15", "2021/4/5", "吸引痰", "入院中"], ["患者O", "2021/3/27", "2021/4/10", "吸引痰", "入院中"], ["患者Q", "2021/4/15", "2021/4/15", "吸引痰", "入院中"]]}]}, "stem_items": {"a": "MBL-ECは薬剤耐性菌であるが、すべてのβ-ラクタム系抗菌薬に対して感受性がある。", "b": "カルバペネム分解酵素（カルバペネマーゼ）は、IMP型やNDM型を含むメタロβ-ラクタマーゼと、KPC型やOXA-48型を含むセリン型カルバペネマーゼに大別される。", "c": "カルバペネム耐性Enterobacter属菌には、カルバペネマーゼを産生せず、染色体性のクラスC型β-ラクタマーゼ産生と膜の透過性低下により、カルバペネム耐性を示すものが多い。", "d": "メロペネムのMIC値が2μg/ml未満の腸内細菌科細菌は、カルバペネマーゼ非産生株と判断される。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "カルバペネマーゼにはメタロβ-ラクタマーゼ型とセリン型があり、薬剤感受性はCREであってもカルバペネマーゼを産生している菌種も存在する。", "each": {"a": "感受性ではなく耐性があるため誤り。", "b": "IMP型・NDM型はメタロβ-ラクタマーゼ、KPC型・OXA-48型はセリン型カルバペネマーゼであり正しい。", "c": "カルバペネマーゼ非産生でもAmpC産生や膜透過性低下により耐性化することがあり正しい。", "d": "カルバペネマーゼ産生している可能性もある（nonCRE-CPE）。薬剤感受性はCREではないがカルバペネマーゼ産生している菌種もあるため誤り。"}}, "category": "薬剤耐性菌", "subcategory": "MBL-EC", "difficulty": "hard", "source_file": "第30回認定看護師認定審査.docx"}, "37": {"question_no": "37", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "6", "type": "single_best", "question": "N氏からのMBL-EC検出の連絡を受けて、2021年4月10日時点で行う対策として、正しいのはどれか。", "choices": {"1": "N氏を陰圧室に隔離する。", "2": "3階病棟に入院中の患者を対象にしたMBL-ECのスクリーニング培養検査の実施を提案する。", "3": "301号室の床を0.01%（100ppm）の次亜塩素酸ナトリウム溶液で消毒する。", "4": "血圧計は患者N氏、O氏、P氏で共有し、301号室から持ち出さない。"}, "answer": "2", "explanation": {"overall": "MBL-EC検出時には接触予防策を基本とし、アウトブレイク対策として接触患者へのスクリーニング培養を検討する。陰圧室は不要であり、環境消毒濃度や共有物品管理にも注意が必要である。", "each": {"1": "MBL-ECは空気感染ではないため陰圧室は不要である。", "2": "アウトブレイク対応としてスクリーニング培養検査を実施することは適切である。", "3": "100ppmでは低濃度であり不十分。通常はより高濃度で実施する。", "4": "共有は避け、専用化または患者ごとの消毒が必要である。"}}, "category": "薬剤耐性菌", "subcategory": "MBL-EC", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "38": {"question_no": "38", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "6", "type": "single_best", "question": "あなたの病院では、入院4日目以降に検出された薬剤耐性菌を院内獲得と判定しています。3階病棟における2021年4月のMBL-EC発生状況に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "院内獲得のMBL-ECの発生率（incidence rate）は、2%である。", "b": "薬剤耐性菌の発生率（incidence rate）は、観察期間に存在するすべての保菌者数を分子として計算する。", "c": "MBL-ECの有病率（prevalence rate）は、1%である。", "d": "薬剤耐性菌の有病率（prevalence rate）は、耐性菌の伝播の起こりやすさを表す指標である。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "有病率（prevalence）は観察時点・期間内に存在する全保菌者数を対象とし、伝播状況の把握に用いられる。一方、発生率（incidence）は新規発生例のみを分子として算出する。", "each": {"a": "院内獲得例は患者N・Oの2例であり、2/300×100＝0.67%であるため誤り。", "b": "発生率（incidence）は新規発生例数を分子として計算するため誤り。", "c": "有病率は全保菌者数3例を用いて、3/300×100＝1%となるため正しい。", "d": "有病率は耐性菌の伝播状況や病棟内での広がりを評価する指標として用いられるため正しい。"}}, "category": "薬剤耐性菌", "subcategory": "MBL-EC", "difficulty": "hard", "source_file": "第30回認定看護師認定審査.docx"}}}, "case7": {"case_no": "7", "description": "事例7\n次の文を読み、問39から問40に対する適切な答えを一つ選んでください。\nあなたは病院の感染管理認定看護師です。ある日、血液内科病棟の師長から「移植件数が普段より多く、防護環境（移植室）が足りない。ベッド配置をどのようにすれば良いか」との相談がありました。当該病棟には防護環境が2床しかありません。あなたが、確認したところ、以下のような状況でした。\n・現在防護環境には、20日前に同種造血細胞移植を受けたR氏と、35日前に同種造血細胞移植を受けたS氏の2人が入院している。\n・R氏は移植後、移植片対宿主病（Graft-versus-host Disease：以下GVHD）を発症しており、好中球減少も遷延している。\n・S氏はGVHDの発症はなく、好中球の回復も順調である。\n・翌週からT氏、U氏の2名が移植治療を受ける予定である。\n・T氏は同種造血細胞移植、U氏は自家移植を実施する予定である。", "questions": {"39": {"question_no": "39", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "7", "type": "single_best", "question": "防護環境に優先的に入室する必要がある患者は誰か。", "choices": {"1": "R氏とS氏", "2": "R氏とT氏", "3": "R氏とU氏", "4": "T氏とU氏"}, "answer": "2", "explanation": {"overall": "防護環境は、重度免疫抑制状態やGVHDを伴う同種造血細胞移植患者を優先する。R氏はGVHDと好中球減少遷延があり高リスクであり、T氏も同種造血細胞移植予定であるため優先度が高い。", "each": {"1": "S氏はGVHDなく好中球回復も順調であり、優先度は低下する。", "2": "GVHDを発症しているR氏と、同種造血細胞移植予定のT氏が優先的に入室するため正しい。", "3": "U氏は自家移植であり、同種移植患者より優先度は低い。", "4": "R氏はGVHDと好中球減少遷延があり、防護環境継続が必要である。"}}, "category": "防護環境", "subcategory": "造血細胞移植", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "40": {"question_no": "40", "exam_year": 2022, "exam_name": "第30回", "section": "問題2", "case_no": "7", "type": "single_best", "question": "病棟スタッフより、防護環境に入る面会者の基準が曖昧なので、面会基準を見直したいと相談された。防護環境に入室する面会者への指導内容として、正しいのはどれか。", "choices": {"1": "上気道炎症状がある場合は、サージカルマスクを着用する。", "2": "防護環境内での飲食は禁止する。", "3": "水痘生ワクチン接種後6週間以内に水痘様発疹が認められる場合でも、面会は可能である。", "4": "自宅で洗濯した寝衣は、病室に持ち込まない。"}, "answer": "2", "explanation": {"overall": "防護環境では、免疫抑制患者への感染持ち込み防止が重要である。上気道症状や水痘様発疹がある場合は面会を避け、防護環境内での飲食は禁止する。", "each": {"1": "上気道症状がある場合は、マスク着用ではなく面会を控える必要がある。", "2": "防護環境内での飲食は禁止されており正しい。", "3": "水痘様発疹が認められる場合は面会不可であり誤り。", "4": "自宅で洗濯した寝衣の持ち込み自体は禁止されていない。"}}, "category": "防護環境", "subcategory": "面会基準", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}}}}}}};
