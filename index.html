<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>感染管理認定看護師問題アプリ 全文検索 スマホ版 ver9</title>
<style>
:root{
  --bg:#f4f5f7;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --line:#e5e7eb;
  --main:#111827;
  --accent:#2563eb;
  --ok:#16a34a;
  --ng:#dc2626;
  --warn:#d97706;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic","Meiryo",sans-serif;
  line-height:1.65;
  font-size:16px;
}
#app{
  max-width:980px;
  margin:0 auto;
  padding:24px;
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:22px;
  box-shadow:0 6px 20px rgba(0,0,0,.06);
}
h1,h2,h3{margin:0 0 10px;line-height:1.35}
h1{font-size:24px}
h2{font-size:22px}
h3{font-size:18px;margin-top:18px}
.small{color:var(--muted);font-size:13px}
.meta{
  display:inline-block;
  background:#f3f4f6;
  border:1px solid var(--line);
  border-radius:999px;
  padding:3px 8px;
  margin:2px 3px 2px 0;
  font-size:12px;
  color:#374151;
}
button{
  min-height:44px;
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px 14px;
  margin:6px 0;
  background:#fff;
  color:var(--text);
  font-weight:700;
  font-size:15px;
  text-align:center;
  cursor:pointer;
}
button.primary{background:var(--main);color:#fff;border-color:var(--main)}
button.danger{background:#fff1f2;color:#be123c;border-color:#fecdd3}
button.choice{
  display:block;
  width:100%;
  text-align:left;
  font-weight:500;
  background:#fff;
}
button.choice b{font-size:18px;margin-right:4px}
button.correct{border-color:var(--ok);background:#dcfce7}
button.wrong{border-color:var(--ng);background:#fee2e2}
.box{
  background:#f9fafb;
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px;
  margin:10px 0;
  overflow-wrap:anywhere;
}
.prebox{white-space:pre-wrap}
.result-ok{color:var(--ok);font-weight:800}
.result-ng{color:var(--ng);font-weight:800}
.result-warn{color:var(--warn);font-weight:800}
.row{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  margin:10px 0;
}
.number-grid{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:8px;
}
.header{
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:flex-start;
}
.header button{
  min-width:78px;
  margin:0;
  padding:8px 10px;
  font-size:14px;
}
.tablewrap{
  overflow-x:auto;
  margin:10px 0;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
  min-width:unset;
  table-layout:fixed;
}
caption{
  text-align:left;
  font-weight:800;
  padding:8px;
}
th,td{
  border-bottom:1px solid var(--line);
  padding:4px 6px;
  text-align:left;
  vertical-align:top;
  white-space:normal;
  word-break:break-word;
}
th{background:#f3f4f6;font-weight:800}
pre{white-space:pre-wrap;font-family:inherit;margin:0}
.footer{
  border-top:1px solid var(--line);
  margin-top:14px;
  padding-top:12px;
}
@media(max-width:700px){
  #app{padding:12px}
  .row{grid-template-columns:1fr}
  .number-grid{grid-template-columns:repeat(4,1fr)}
}

.stem-mark{
  min-height:32px;
  min-width:36px;
  padding:4px 8px;
  margin:0;
  border-radius:999px;
  font-weight:800;
  font-size:14px;
  background:#fff;
}
.stem-mark-ok.selected{
  background:#dcfce7;
  border-color:#16a34a;
  color:#166534;
}
.stem-mark-maybe.selected{
  background:#fef3c7;
  border-color:#d97706;
  color:#92400e;
}
.stem-mark-ng.selected{
  background:#fee2e2;
  border-color:#dc2626;
  color:#991b1b;
}

.stem-box{white-space:normal;}
.stem-row{display:flex;gap:8px;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--line);padding:8px 0;}
.stem-row:last-child{border-bottom:none;}
.stem-text{flex:1;min-width:0;}
.stem-mark-wrap{display:flex;gap:4px;flex:0 0 auto;}
.stem-mark{min-height:32px;min-width:36px;padding:4px 8px;margin:0;border-radius:999px;font-weight:800;font-size:14px;background:#fff;}
.stem-mark-ok.selected{background:#dcfce7;border-color:#16a34a;color:#166534;}
.stem-mark-maybe.selected{background:#fef3c7;border-color:#d97706;color:#92400e;}
.stem-mark-ng.selected{background:#fee2e2;border-color:#dc2626;color:#991b1b;}
@media(max-width:700px){.stem-row{flex-direction:column}.stem-mark-wrap{width:100%}.stem-mark{flex:1}}



/* ===== 全文検索 ===== */
.searchbar{display:grid;grid-template-columns:1fr auto;gap:8px;margin:14px 0 8px}
.search-input{width:100%;min-height:44px;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:16px;background:#fff;color:var(--text)}
.search-meta{font-size:13px;color:var(--muted);margin:12px 0}
.search-result-card{border:1px solid var(--line);border-radius:14px;background:#fff;padding:14px;margin:14px 0;box-shadow:0 3px 12px rgba(0,0,0,.04)}
.search-result-head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;margin-bottom:10px}
.search-result-head button{min-height:36px;margin:0;padding:7px 10px;font-size:13px;white-space:nowrap}
.hit-box{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:10px;margin:8px 0;font-size:13px;line-height:1.7}
.hit-line{border-bottom:1px dashed #e5e7eb;padding:3px 0}.hit-line:last-child{border-bottom:none}
.search-section-title{font-size:12px;font-weight:800;color:#6b7280;margin:12px 0 5px;letter-spacing:.04em}
.search-choice{padding:5px 8px;border-bottom:1px solid #f3f4f6;font-size:14px}.search-choice:last-child{border-bottom:none}
.answer-choice{background:#dcfce7;border-radius:8px;color:#166534;font-weight:700}
.search-answer{margin-top:8px;font-size:14px;color:#166534}
.search-explanation{background:#f9fafb;border-left:4px solid #16a34a;border-radius:10px;padding:10px;font-size:14px;line-height:1.8;white-space:pre-wrap}
mark{background:#fef08a;border-radius:3px;padding:0 2px}
.empty-mini{padding:20px;text-align:center;color:var(--muted)}
@media(max-width:700px){.searchbar{grid-template-columns:1fr}.search-result-head{flex-direction:column}.search-result-head button{width:100%}}

/* ===== スマホ版追加調整 ver7 ===== */
@media(max-width:760px){
  html, body{height:100%;overflow:hidden}
  body{font-size:16px}
  .app{height:100vh;display:flex;flex-direction:column}
  .sidebar{
    width:100%;
    height:auto;
    max-height:132px;
    border-right:none;
    border-bottom:1px solid #ddd;
    overflow-x:auto;
    overflow-y:hidden;
    display:block;
    white-space:nowrap;
  }
  .logo{display:inline-block;vertical-align:top;width:170px;height:60px;padding:8px 10px;border-bottom:none;border-right:1px solid #eee}
  .logo h1{font-size:12px;line-height:1.25}
  .logo small{font-size:9px}
  .nav-sec{display:none}
  .nav{
    display:inline-flex;
    padding:10px 12px;
    height:44px;
    border-left:none;
    border-bottom:3px solid transparent;
    font-size:13px;
    white-space:nowrap;
  }
  .nav.on{border-left:none;border-bottom-color:#1a56c4}
  .sf{display:none}
  .main{height:calc(100vh - 104px);min-height:0}
  .topbar{padding:8px 10px}
  .topbar-title{font-size:16px}
  .content{padding:10px;overflow-y:auto}
  .card{padding:12px;margin-bottom:10px;border-radius:12px}
  button,.btn,.btn-sm{font-size:15px;min-height:36px}
  .btn-sm{padding:6px 10px}
  select,input,textarea{font-size:16px!important}
  .question-card,.qcard{padding:12px!important}
  .question-text,.qcard-q{font-size:16px!important;line-height:1.75!important}
  .choice,.choices-wrap{font-size:15px!important;line-height:1.8!important}
  .explanation,.explain-box{font-size:14px!important;line-height:1.8!important}
  .search-row{display:flex;gap:6px}
  .search-input{font-size:16px;padding:10px 12px}
  .filter-row{font-size:12px;gap:6px}
  .browse-layout{display:block;height:auto}
  .browse-list{border-right:none;border-bottom:1px solid #ddd;max-height:260px}
  .browse-detail{padding:10px}
  .browse-q-item{padding:10px}
  .browse-q-text{-webkit-line-clamp:3}
  .ref-card,.qcard{border-radius:12px}
  .qcard-head,.ref-head{display:block}
  .qcard-meta{margin-bottom:8px}
  .tag-cl{font-size:12px}
}


/* ===== ver8 スクロール修正 ===== */
html, body{
  height:auto !important;
  min-height:100% !important;
  overflow:auto !important;
  overscroll-behavior:auto !important;
}
.app{
  height:auto !important;
  min-height:100vh !important;
  overflow:visible !important;
}
.main{
  height:auto !important;
  min-height:0 !important;
  overflow:visible !important;
}
.content{
  height:auto !important;
  min-height:0 !important;
  overflow:visible !important;
  padding-bottom:110px !important;
}
.search-results,
.results,
#searchResults,
#fullSearchResults,
.result-list,
.fullsearch-results{
  height:auto !important;
  max-height:none !important;
  overflow:visible !important;
}
@media(max-width:760px){
  html, body{
    height:auto !important;
    min-height:100% !important;
    overflow:auto !important;
  }
  .app{
    display:block !important;
    height:auto !important;
    min-height:100vh !important;
    overflow:visible !important;
  }
  .sidebar{
    position:sticky !important;
    top:0 !important;
    z-index:50 !important;
    max-height:none !important;
  }
  .main{
    display:block !important;
    height:auto !important;
    min-height:0 !important;
    overflow:visible !important;
  }
  .content{
    height:auto !important;
    min-height:0 !important;
    overflow:visible !important;
    padding-bottom:120px !important;
  }
  .bottom-nav,
  .mobile-bottom-nav,
  nav.fixed-bottom{
    position:fixed !important;
    bottom:0 !important;
    left:0 !important;
    right:0 !important;
    z-index:100 !important;
  }
}


/* ===== ver9 全文検索結果 折りたたみ表示 ===== */
.search-result-card{
  padding:0 !important;
  overflow:hidden;
}
.search-result-card > summary.search-summary{
  list-style:none;
  cursor:pointer;
  padding:14px;
  display:block;
}
.search-result-card > summary.search-summary::-webkit-details-marker{
  display:none;
}
.search-summary-top{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
  margin-bottom:8px;
}
.search-summary-title{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  align-items:center;
}
.search-summary-open{
  font-size:13px;
  font-weight:700;
  color:#0f172a;
  background:#f8fafc;
  border:1px solid #e5e7eb;
  border-radius:999px;
  padding:5px 10px;
  white-space:nowrap;
}
.search-summary-open::after{
  content:" 開く";
}
.search-result-card[open] .search-summary-open::after{
  content:" 閉じる";
}
.search-summary-q{
  font-size:15px;
  font-weight:700;
  line-height:1.65;
  color:#111827;
  margin:8px 0;
}
.search-summary-hit{
  background:#f8fafc;
  border:1px solid #e5e7eb;
  border-radius:12px;
  padding:10px;
  font-size:13px;
  line-height:1.7;
}
.search-detail-body{
  padding:0 14px 14px;
  border-top:1px solid #e5e7eb;
}
.search-detail-actions{
  padding:12px 0 8px;
}
.search-detail-actions button{
  width:100%;
}
@media(max-width:760px){
  .search-summary-top{
    align-items:flex-start;
  }
  .search-summary-open{
    font-size:12px;
    padding:5px 9px;
  }
  .search-summary-q{
    font-size:16px;
  }
  .search-detail-body{
    padding-bottom:18px;
  }
}

</style>
</head>

window.EXAM_DATA_29 = {"第29回": {"meta": {"title": "第29回認定看護師認定審査", "year": 2021, "course": "感染管理(B課程)"}, "questions": {"1": {"question_no": "1", "exam_year": 2021, "exam_name": "第29回", "section": "問題1", "type": "single_best", "question": "手術部位感染(SSI)と糖尿病罹患歴の関連を調査するため、SSIを起こした患者100人と起こさなかった患者300人を選択し、過去にさかのぼり糖尿病罹患歴の有無を確認した。オッズ比は2.7、95%信頼区間は1.3~15.7(p=0.02)であった。この疫学研究の説明として、正しい組み合わせはどれか。", "stem_items": {"a": "この疫学研究は、症例対照研究である。", "b": "95%信頼区間から、SSIと糖尿病罹患歴の間には統計学的に有意な関連があるといえない。", "c": "オッズ比が2.7とは、SSIを起こさなかった患者の確率が、SSIを起こした糖尿病罹患歴のある患者の2.7倍であることを意味する。", "d": "p値が0.02ということは、同じ検定を100回行った場合、誤った結果を得る確率が2回あると判断できる。"}, "choices": {"1": "a,b", "2": "a,d", "3": "b,c", "4": "c,d"}, "answer": "2", "explanation": {"overall": "症例対照研究なのでaは正しい。95%信頼区間が1をまたがないためbは誤り。cはオッズ比の解釈として不適切。試験問題としてはdを正しい選択肢として扱い、正答は2となる。", "each": {"a": "先にSSIあり群とSSIなし群を選び、過去の曝露歴を確認しているため症例対照研究である。", "b": "95%信頼区間1.3〜15.7は1をまたがないため、有意な関連があると判断する。", "c": "オッズ比の説明として不適切である。", "d": "試験上は正しい扱いとして選ばれている。"}}, "category": "疫学", "subcategory": "研究デザイン・統計", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "2": {"question_no": "2", "exam_year": 2021, "exam_name": "第29回", "section": "問題1", "type": "single_best", "question": "人工呼吸器関連肺炎予防の対策として、正しいのはどれか。", "choices": {"1": "医学的に禁忌でない場合、経鼻気管挿管より経口気管挿管を優先的に選択する。", "2": "人工呼吸器装着中は、過鎮静を維持する。", "3": "人工呼吸器装着中は、仰臥位を保つ。", "4": "人工呼吸器の回路は、中水準消毒を行う。"}, "answer": "1", "explanation": {"overall": "VAP予防では経口挿管が推奨される。過鎮静はリスクとなり、体位は頭部挙上が基本。回路は定期交換ではなく必要時交換である。", "each": {"1": "経鼻挿管は副鼻腔炎リスクがあり、経口挿管が推奨される。", "2": "過鎮静はVAPリスクを上げるため誤り。", "3": "仰臥位ではなく頭部挙上（30〜45°）が推奨される。", "4": "回路は中水準消毒ではなく、汚染時交換が原則。"}}, "category": "デバイス関連感染", "subcategory": "VAP", "difficulty": "easy", "source_file": "第29回認定看護師認定審査.docx"}, "3": {"question_no": "3", "exam_year": 2021, "exam_name": "第29回", "section": "問題1", "type": "single_best", "question": "滅菌に関する説明として、正しいのはどれか。", "choices": {"1": "ボウィー・ディックテストは、高圧蒸気滅菌器内の滅菌効果を確認するものである。", "2": "過酸化水素低温ガスプラズマ滅菌には残留毒性があるため、滅菌処理工程が終了した後にエアレーションを行う。", "3": "高圧蒸気滅菌を行う場合、滅菌温度121℃で5分間の保持時間が必要である。", "4": "過酸化水素低温ガスプラズマ滅菌は、セルロースやパルプを含む製品は滅菌には不向きである。"}, "answer": "4", "explanation": {"overall": "ボウィー・ディックテストは空気除去確認であり滅菌効果の確認ではない。過酸化水素低温ガスプラズマ滅菌はエアレーション不要。高圧蒸気滅菌は121℃で通常15〜20分必要。セルロース製品はガスプラズマ滅菌に不適であるため4が正しい。", "each": {"1": "ボウィー・ディックテストは空気除去や真空性能の確認であり、滅菌効果の確認ではない。", "2": "過酸化水素低温ガスプラズマ滅菌は残留毒性が少なくエアレーションは不要。", "3": "121℃では通常15〜20分の保持が必要であり5分は不十分。", "4": "セルロースや紙製品はガスプラズマ滅菌に適さないため正しい。"}}, "category": "消毒・滅菌", "subcategory": "滅菌法", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "4": {"question_no": "4", "exam_year": 2021, "exam_name": "第29回", "section": "問題1", "type": "single_best", "question": "ウイルスが引き起こす疾患として、正しい組み合わせはどれか。", "stem_items": {"a": "Epstein-Barrウイルス(EBウイルス)―伝染性単核球症", "b": "ライノウイルス―伝染性紅斑", "c": "ヒトアデノウイルス11型、21型―カポジ肉腫", "d": "コクサッキーウイルスA16型、エンテロウイルス71型―手足口病"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "2", "explanation": {"overall": "EBウイルスは伝染性単核球症を引き起こす。ライノウイルスは感冒であり伝染性紅斑ではない。カポジ肉腫はHHV-8が原因。コクサッキーA16やEV71は手足口病の原因であるため、aとdが正しい。", "each": {"a": "EBウイルスは伝染性単核球症の原因ウイルスである。", "b": "伝染性紅斑はパルボウイルスB19であり誤り。", "c": "カポジ肉腫はヒトヘルペスウイルス8型（HHV-8）が原因であり誤り。", "d": "コクサッキーA16やエンテロウイルス71は手足口病の原因である。"}}, "category": "微生物", "subcategory": "ウイルス", "difficulty": "easy", "source_file": "第29回認定看護師認定審査.docx"}, "5": {"question_no": "5", "exam_year": 2021, "exam_name": "第29回", "section": "問題1", "type": "single_best", "question": "感染経路別予防策に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "伝染性紅斑の小児に対して、飛沫予防策を行う。", "b": "気管カニューレから気道分泌物を頻回に吸引するMRSA肺炎の患者に対して、飛沫予防策を行う。", "c": "血液内科病棟に入院したレジオネラ肺炎の患者に対して、空気予防策を行う。", "d": "髄膜炎菌による敗血症に対して、効果的な治療を開始後24時間が経過するまで飛沫予防策を行う。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "2", "explanation": {"overall": "伝染性紅斑は飛沫予防策が必要。MRSA肺炎は接触予防策であり飛沫ではない。レジオネラはヒトからヒトへの感染がなく標準予防策のみ。髄膜炎菌は有効な抗菌薬投与後24時間まで飛沫予防策が必要であるためaとdが正しい。", "each": {"a": "伝染性紅斑（パルボウイルスB19）は飛沫感染のため正しい。", "b": "MRSAは接触感染であり飛沫予防策は不要。", "c": "レジオネラはヒトからヒトへの感染がなく標準予防策で対応するため誤り。", "d": "髄膜炎菌は治療開始後24時間まで飛沫予防策が必要であり正しい。"}}, "category": "感染経路別予防策", "subcategory": "接触・飛沫・空気予防策", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "6": {"question_no": "6", "exam_year": 2021, "exam_name": "第29回", "section": "問題1", "type": "single_best", "question": "ワクチンに関する説明として、正しいのはどれか。", "choices": {"1": "水痘ワクチンは、任意接種のワクチンである。", "2": "麻疹ワクチン接種後に水痘ワクチン接種をする場合は、27日以上間隔をあける。", "3": "麻疹ワクチンでは接種3日後から抗体が出現し、2週間後に抗体価がピークとなる。", "4": "医療従事者の水痘に対する免疫を確認するための抗体検査は、補体結合試験(CF法)で行うことが推奨されている。"}, "answer": "2", "explanation": {"overall": "水痘ワクチンは定期接種である。生ワクチン同士は27日以上間隔をあける必要がある。麻疹ワクチンの抗体は接種後数日ではなく約2週間で上昇する。水痘抗体はEIA法での測定が推奨される。", "each": {"1": "水痘ワクチンは現在定期接種であり誤り。", "2": "生ワクチン同士は27日以上間隔をあける必要があり正しい。", "3": "抗体出現は接種後約2週間であり誤り。", "4": "水痘抗体検査はEIA法が推奨されCF法は適さないため誤り。"}}, "category": "ワクチン", "subcategory": "予防接種", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "7": {"question_no": "7", "exam_year": 2021, "exam_name": "第29回", "section": "問題1", "type": "single_best", "question": "消毒薬に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "低水準消毒は、抗酸菌を含む細菌を殺滅する。", "b": "10%ポビドンヨードは、腹腔や胸腔の洗浄に使用可能である。", "c": "0.05%ベンザルコニウム塩化物は、膣の消毒に使用可能である。", "d": "大量の血液で汚染された箇所に次亜塩素酸ナトリウム溶液を使用する場合は、有効塩素濃度0.5~1.0%(5,000~10,000ppm)の溶液で消毒する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "低水準消毒は抗酸菌に無効。ポビドンヨードは体腔内には使用しない。ベンザルコニウムは粘膜に使用可能。血液汚染時は高濃度次亜塩素酸ナトリウムを使用するためcとdが正しい。", "each": {"a": "低水準消毒では抗酸菌は殺滅できないため誤り。", "b": "ポビドンヨードは腹腔・胸腔など体腔内には使用しないため誤り。", "c": "ベンザルコニウム塩化物は粘膜にも使用可能であり正しい。", "d": "血液汚染には0.5〜1.0%の次亜塩素酸ナトリウムを使用するため正しい。"}}, "category": "消毒・滅菌", "subcategory": "消毒薬", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "8": {"question_no": "8", "exam_year": 2021, "exam_name": "第29回", "section": "問題1", "type": "single_best", "question": "インフルエンザ迅速診断検査キット「α」の感度は70%、特異度は99%であり、インフルエンザ流行期における陰性的中率は58%である。「α」を用いて検査を行った場合の説明として、正しい組み合わせはどれか。", "stem_items": {"a": "インフルエンザに罹患した患者の30%は陰性と判定される可能性がある。", "b": "インフルエンザ流行期は、陰性と判定される患者の58%はインフルエンザに罹患している可能性がある。", "c": "インフルエンザに罹患した患者の99%は陰性と判定される可能性がある。", "d": "インフルエンザ流行期は、陰性と判定される患者の42%はインフルエンザに罹患している可能性がある。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "2", "explanation": {"overall": "感度70%より30%が偽陰性となる。陰性的中率58%は陰性のうち非感染者が58%であることを示し、感染している可能性は42%となるためaとdが正しい。", "each": {"a": "感度70%のため30%は偽陰性となる可能性があり正しい。", "b": "陰性的中率58%は非感染者の割合であり誤り。", "c": "特異度99%は非感染者に対する指標であり誤り。", "d": "陰性でも42%は感染している可能性があり正しい。"}}, "category": "疫学", "subcategory": "検査特性（感度・特異度）", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "9": {"question_no": "9", "exam_year": 2021, "exam_name": "第29回", "section": "問題1", "type": "single_best", "question": "感染症に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "MERSコロナウイルス(MERS-CoV)によって引き起こされる中東呼吸器症候群(MERS)は、医療機関におけるヒトーヒト感染は報告されていない。", "b": "ペストは、コウモリを介して伝播するウイルス疾患で、感染経路や臨床像によって腺ペスト、肺ペスト、敗血症型ペストに分類される。", "c": "ジカウイルス感染症は、フラビウイルス科フラビウイルス属のジカウイルスによる蚊媒介感染症であり、ジカウイルス病と先天性ジカウイルス感染症に分類される。", "d": "重症熱性血小板減少症候群(SFTS)は、マダニが媒介するブニヤウイルス科フレボウイルス属に分類されるSFTSウイルスによる感染症である。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "MERSは医療機関内でのヒトーヒト感染が報告されているためaは誤り。ペストは細菌感染症でありウイルス疾患ではないためbは誤り。ジカウイルス感染症の分類と、SFTSの病原体・媒介に関する記載は正しいため、cとdが正しい。", "each": {"a": "MERSは院内感染事例が報告されており誤り。", "b": "ペストはYersinia pestisによる細菌感染症であり誤り。", "c": "ジカウイルス感染症の分類として正しい。", "d": "SFTSはマダニ媒介で、ブニヤウイルス科フレボウイルス属のSFTSウイルスによるため正しい。"}}, "category": "感染症各論", "subcategory": "新興・再興感染症", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "10": {"question_no": "10", "exam_year": 2021, "exam_name": "第29回", "section": "問題1", "type": "single_best", "question": "インフルエンザに関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "学校保健安全法において、インフルエンザを発症した場合の出席停止期間は、解熱後2日を経過するまでとされている。", "b": "感染症法において、鳥インフルエンザA(H5N1)とA(H7N9)は二類感染症に位置づけられている。", "c": "インフルエンザウイルスは、エンベロープを有するRNAウイルスである。", "d": "インフルエンザと診断された患者は、陰圧個室に隔離しなければならない。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "出席停止は発症後5日かつ解熱後2日でありaは不十分。鳥インフルエンザA(H5N1)、A(H7N9)は二類感染症である。インフルエンザウイルスはエンベロープを持つRNAウイルス。通常のインフルエンザは飛沫予防策であり陰圧個室は不要。", "each": {"a": "出席停止は発症後5日かつ解熱後2日であり誤り。", "b": "鳥インフルエンザA(H5N1)、A(H7N9)は二類感染症であり正しい。", "c": "インフルエンザウイルスはエンベロープを有するRNAウイルスであり正しい。", "d": "通常のインフルエンザは飛沫予防策で対応するため誤り。"}}, "category": "感染症各論", "subcategory": "インフルエンザ", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "11": {"question_no": "11", "exam_year": 2021, "exam_name": "第29回", "section": "問題1", "type": "single_best", "question": "血液への職業曝露に関する説明として、正しいのはどれか。", "choices": {"1": "HBs抗原陽性・HBe抗原陽性の血液で針刺し切創が起きた場合、HBVに感染するリスクは約30%である。", "2": "HIV抗体陽性血液の粘膜曝露により、HIVに感染するリスクは約3%である。", "3": "HIV抗体陽性血液に曝露した後の抗HIV薬の予防内服は、10週間継続することが推奨されている。", "4": "HIV抗体陽性血液で汚染された針による経皮的曝露が発生した場合、曝露後7日以内に抗HIV薬の予防内服を行う。"}, "answer": "1", "explanation": {"overall": "HBVはHBe抗原陽性の場合感染リスクが高く約30%とされる。HIVの粘膜曝露リスクは約0.09%であり3%ではない。PEPは28日間であり、開始はできるだけ早く（72時間以内）が推奨される。", "each": {"1": "HBe抗原陽性ではHBV感染リスクは約30%であり正しい。", "2": "粘膜曝露でのHIV感染リスクは約0.09%であり誤り。", "3": "PEPは約28日間であり誤り。", "4": "PEPは72時間以内に開始する必要があり誤り。"}}, "category": "職業感染対策", "subcategory": "血液曝露", "difficulty": "high", "source_file": "第29回認定看護師認定審査.docx"}, "12": {"question_no": "12", "exam_year": 2021, "exam_name": "第29回", "section": "問題1", "type": "single_best", "question": "ファシリティ・マネジメント(廃棄物等)に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "注射針などの鋭利なものを廃棄する容器には、赤色のバイオハザードマークを貼付する。", "b": "医療機関は、感染性廃棄物の処理を業者に委託する場合、産業廃棄物管理票(マニフェスト)を交付する。", "c": "血液等が付着していない鋭利なものは、感染性廃棄物と同等の取り扱いとする。", "d": "リネン類は60℃で10分間以上の洗濯処理を行う。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "鋭利物は黄色容器で管理するためaは誤り。感染性廃棄物の委託にはマニフェストが必要でありbは正しい。鋭利物は血液付着の有無に関わらず感染性廃棄物扱いでありcは正しい。リネンの熱水消毒は80℃10分以上が基準でありdは誤り。", "each": {"a": "鋭利物は黄色容器で管理するため誤り。", "b": "マニフェスト交付は義務であり正しい。", "c": "鋭利物は血液付着の有無に関係なく感染性廃棄物扱いであり正しい。", "d": "熱水消毒は80℃10分以上が基準であり誤り。"}}, "category": "環境管理", "subcategory": "廃棄物管理", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "13": {"question_no": "13", "exam_year": 2021, "exam_name": "第29回", "section": "問題1", "type": "single_best", "question": "母子感染症に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "風疹に対する免疫のない妊婦には、妊娠15週までに風疹ワクチンを接種する。", "b": "母乳中にHIVは移行しないため、HIV感染者の母乳は児に与えてもよい。", "c": "妊婦が梅毒に感染した場合、経胎盤感染により胎児が先天性梅毒を発症することがある。", "d": "分娩前日に妊婦が水痘を発症した場合、水痘・帯状疱疹ウイルスの経胎盤的感染により新生児が水痘を発症することがある。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "風疹ワクチンは生ワクチンであり妊娠中は禁忌。HIVは母乳を介して感染するため授乳は行わない。梅毒は経胎盤感染により先天性梅毒を引き起こす。分娩前後の水痘感染は新生児水痘の原因となるためcとdが正しい。", "each": {"a": "風疹ワクチンは生ワクチンであり妊娠中は接種禁忌であるため誤り。", "b": "HIVは母乳を介して感染するため誤り。", "c": "梅毒は経胎盤感染により先天性梅毒を引き起こすため正しい。", "d": "分娩前後の水痘感染は新生児水痘のリスクとなるため正しい。"}}, "category": "感染症各論", "subcategory": "母子感染", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "14": {"question_no": "14", "exam_year": 2021, "exam_name": "第29回", "section": "問題1", "type": "single_best", "question": "結核の接触者健診に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "インターフェロンγ遊離試験(IGRA)は、感染の有無を確認するために最終接触から4週間後に実施する。", "b": "接触者健診でIGRAの結果が陽性の場合、直ちに就業制限を行う。", "c": "感染症法に基づく結核の接触者健康診断の手引き(改訂第5版)では、IGRAを乳幼児の接触者健診の基本項目の1つとしている。", "d": "肺病変を伴わない肺外結核患者の接触者健診は必要ないが、小児結核及び若年者の一次結核症の患者では、感染源の探求目的で接触者調査及び健診が必要である。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "IGRAは最終接触から4週間後ではなく、通常は最終接触から2〜3か月後に実施するためaは誤り。IGRA陽性のみで直ちに就業制限を行うわけではないためbは誤り。乳幼児・未就学児ではIGRA単独ではなくツベルクリン反応との併用が望ましいため、IGRAは接触者健診で用いられる検査の一つと考えられる。肺病変を伴わない肺外結核では原則として接触者健診は不要だが、小児結核・若年者の一次結核症では感染源探索目的で接触者調査・健診が必要である。したがってcとdが正しい。", "each": {"a": "最終接触から4週間後ではなく、2〜3か月後の実施が基本となるため誤り。", "b": "IGRA陽性は感染を示唆するが、直ちに就業制限とはならないため誤り。", "c": "乳幼児ではIGRA単独ではなくツベルクリン反応との併用が望ましいため、接触者健診で用いられる検査の一つとして正しい。", "d": "肺外結核では原則接触者健診は不要だが、小児結核・若年者の一次結核症では感染源探索のため接触者調査・健診が必要であり正しい。"}}, "category": "感染症各論", "subcategory": "結核", "difficulty": "high", "source_file": "第29回認定看護師認定審査.docx"}, "15": {"question_no": "15", "exam_year": 2021, "exam_name": "第29回", "section": "問題1", "type": "single_best", "question": "ファシリティ・マネジメント(給食・空調等)に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "調理後の食品は、調理終了後から4時間以内に喫食することが望ましい。", "b": "空気感染隔離室は、1時間に6~12回の換気を行う。", "c": "手術室では、高性能以上のフィルターを使用する。", "d": "レジオネラ菌対策として、給湯設備の貯湯温度は50℃以上を保つ。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "調理後食品は2時間以内が原則でありaは誤り。空気感染隔離室は6〜12回/時の換気でありbは正しい。手術室ではHEPAフィルターが使用されるためcは正しい。レジオネラ対策では60℃以上が必要でありdは誤り。", "each": {"a": "調理後食品は2時間以内の喫食が望ましく誤り。", "b": "空気感染隔離室は6〜12回/時の換気が必要であり正しい。", "c": "手術室ではHEPAフィルターが使用され正しい。", "d": "レジオネラ対策は60℃以上が必要であり誤り。"}}, "category": "環境管理", "subcategory": "空調・給食管理", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "16": {"question_no": "16", "exam_year": 2021, "exam_name": "第29回", "section": "問題1", "type": "single_best", "question": "手術部位感染予防のため実施が推奨されている対策として、正しい組み合わせはどれか。", "stem_items": {"a": "手術前の除毛は、切開部あるいは周辺の体毛が手術の邪魔にならないかぎり行わない。", "b": "滅菌被覆材で覆われた一次閉鎖した創から、出血や浸出液がある場合でも術後48時間が過ぎるまで被覆材を交換しない。", "c": "不潔または汚染手術を行った手術室は、高水準消毒薬を用いた清掃と消毒が必要である。", "d": "手術室から廊下や隣接区域に向かう換気は陽圧に維持する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "2", "explanation": {"overall": "除毛は必要な場合のみ行うためaは正しい。創部から出血や浸出液がある場合は適宜交換するためbは誤り。手術室清掃は通常清掃で十分であり高水準消毒は不要のためcは誤り。手術室は陽圧管理であるためdは正しい。", "each": {"a": "除毛は必要最小限とするため正しい。", "b": "出血や浸出液があれば交換するため誤り。", "c": "高水準消毒は不要であり誤り。", "d": "手術室は陽圧管理であり正しい。"}}, "category": "SSI対策", "subcategory": "手術環境・術前管理", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "17": {"question_no": "17", "exam_year": 2021, "exam_name": "第29回", "section": "問題1", "type": "single_best", "question": "感染管理の関係法規に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "予防接種法において、小児の定期接種となっている肺炎球菌ワクチンは、23価肺炎球菌莢膜ポリサッカライドワクチン(ニューモバックス®NP)である。", "b": "感染症法において、結核は診断から2日以内に届け出る必要がある。", "c": "学校保健安全法における流行性耳下腺炎の出席停止期間は、「耳下腺、顎下腺又は舌下腺の腫脹が発現した後5日を経過し、かつ、全身状態が良好になるまで」である。", "d": "感染症法において、腸管出血性大腸菌感染症は、三類感染症に分類されている。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "小児の定期接種はPCVであり23価ではないためaは誤り。結核は直ちに届出であり2日以内ではないためbは誤り。流行性耳下腺炎の出席停止期間の記載は正しくcは正しい。腸管出血性大腸菌感染症は三類感染症でありdは正しい。", "each": {"a": "小児定期接種はPCVであり誤り。", "b": "結核は直ちに届出であり誤り。", "c": "出席停止期間の規定として正しい。", "d": "三類感染症であり正しい。"}}, "category": "法規", "subcategory": "感染症法・学校保健安全法", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "18": {"question_no": "18", "exam_year": 2021, "exam_name": "第29回", "section": "問題1", "type": "single_best", "question": "細菌培養検査の検体採取として、正しいのはどれか。", "choices": {"1": "血液検体は、好気性菌用ボトル、嫌気性菌用ボトルの順に血液を注入する。", "2": "喀痰の肉眼的品質評価Miller&Jonesの分類でM1に該当する喀痰検体は、検査に適さない。", "3": "髄液検体は、採取後直ちに冷蔵庫に保管する。", "4": "尿道カテーテルを留置している患者の尿検体は、採尿バッグの廃液口から採取する。"}, "answer": "2", "explanation": {"overall": "血液培養は嫌気ボトル→好気ボトルの順が原則であり1は誤り。M1は唾液主体で不適切検体のため2は正しい。髄液は冷蔵せず速やかに提出するため3は誤り。尿は採尿ポートから無菌的に採取するため4は誤り。", "each": {"1": "血液培養は嫌気→好気の順であり誤り。", "2": "M1は不適切検体であり正しい。", "3": "髄液は冷蔵せず速やかに提出するため誤り。", "4": "採尿バッグからは採取せずポートから採取するため誤り。"}}, "category": "検査", "subcategory": "微生物検査", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "19": {"question_no": "19", "exam_year": 2021, "exam_name": "第29回", "section": "問題1", "type": "single_best", "question": "疫学的指標に関する説明として、正しいのはどれか。", "choices": {"1": "2020年3月1日0時時点で、ある病棟の入院患者に占めるMRSA陽性患者の割合は、発生率(incidence rate)の一例である。", "2": "2020年3月1日0時から同月31日0時までの間に、新たにClostridioides difficile感染症を起こした入院患者の割合は、有病率(prevalence rate)の一例である。", "3": "中心ラインを大腿静脈に挿入した患者と、鎖骨下静脈に挿入した患者における血流感染発生率の比は、オッズ比の一例である。", "4": "2019年12月10日に開催された忘年会の参加者のうち、生カキを食べてノロウイルス感染症に罹患した人の割合は、発病率(attack rate)の一例である。"}, "answer": "4", "explanation": {"overall": "ある時点の割合は有病率であり1は誤り。一定期間中に新たに発生した割合は発生率に関する指標であり2は誤り。発生率の比は率比でありオッズ比ではないため3は誤り。特定集団での食中毒アウトブレイク時の発症割合は発病率（attack rate）であり4が正しい。", "each": {"1": "一時点でのMRSA陽性患者割合は有病率であり誤り。", "2": "新規発生例の割合は有病率ではなく発生に関する指標であり誤り。", "3": "発生率の比はオッズ比ではなく率比であり誤り。", "4": "集団発生時の発症割合はattack rateであり正しい。"}}, "category": "疫学", "subcategory": "疫学指標", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "20": {"question_no": "20", "exam_year": 2021, "exam_name": "第29回", "section": "問題1", "type": "single_best", "question": "内視鏡の管理に関する説明として、正しいのはどれか。", "choices": {"1": "生検鉗子は、高水準消毒を行った後に使用する。", "2": "送水ボトルは、週に1回程度、洗浄したのち乾燥させ使用する。", "3": "1日の検査終了後に、スコープの吸引・鉗子チャンネルにアルコールフラッシュを行う。", "4": "スコープは、送気・送水ボタン、吸引ボタン、鉗子栓などを装着した状態で保管庫に保管する。"}, "answer": "3", "explanation": {"overall": "生検鉗子は滅菌が必要であり1は誤り。送水ボトルは毎日交換・洗浄が必要であり2は誤り。アルコールフラッシュは乾燥促進のため行うため3は正しい。保管時は部品を外して乾燥させるため4は誤り。", "each": {"1": "生検鉗子は滅菌が必要であり誤り。", "2": "送水ボトルは毎日交換・洗浄が必要であり誤り。", "3": "アルコールフラッシュは乾燥促進のため正しい。", "4": "部品は外して保管するため誤り。"}}, "category": "消毒・滅菌", "subcategory": "内視鏡管理", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}}, "section2": {"title": "問題2", "cases": {"case1": {"case_no": "1", "description": "次の文を読み、問21から問23に対する適切な答えを一つ選んでください。あなたは、A病院の感染管理認定看護師です。心臓血管外科B病棟の感染管理担当者から、「病棟内に感染患者が増加しているようだ」と相談を受けました。あなたがB病棟に行き情報収集したところ、以下のことがわかりました。1月5日~10日の間に、手術部位の開放膿から新規にMRSAが検出された患者が2名(C氏、D氏)、Pseudomonas aeruginosaが検出された患者が2名(E氏、F氏)いた。C氏、D氏、E氏、F氏は同室であった。C氏は喀痰からもMRSAが検出された。E氏、F氏のPseudomonas aeruginosaの感受性結果は以下の通りであった。", "assets": {"tables": {"pseudomonas_sensitivity": [{"patient": "E", "organism": "Pseudomonas aeruginosa", "count": "10^8 CFU/ml", "IPM": "MIC≧4 μg/ml", "AMK": "MIC≧16 μg/ml", "CPFX": "MIC≧2 μg/ml"}, {"patient": "F", "organism": "Pseudomonas aeruginosa", "count": "10^8 CFU/ml", "IPM": "MIC≧16 μg/ml", "AMK": "MIC≧32 μg/ml", "CPFX": "MIC≧4 μg/ml"}]}}, "questions": {"21": {"question_no": "21", "exam_year": 2021, "exam_name": "第29回", "section": "問題2", "case_no": "1", "type": "single_best", "question": "あなたがB病棟で指導する内容として、正しい組み合わせはどれか。", "stem_items": {"a": "感染の拡大を防ぐため、C氏、D氏、E氏、F氏の病室の移動は行わない。", "b": "B病棟に勤務する職員の鼻腔培養を実施する。", "c": "MRSA陽性患者の病室内で着用していた個人防護具は、病室内で外す。", "d": "MRSA陽性患者の高頻度接触環境表面を、低水準消毒薬を含むクロスで1日1回以上拭く運用を開始する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "接触予防策では個人防護具は退室前に病室内で外す。MRSA陽性患者周囲の高頻度接触環境表面は少なくとも1日1回以上の清拭・消毒強化が重要である。一方、アウトブレイク時にはコホーティングや病室移動を検討しうるため『移動は行わない』は不適切であり、職員の鼻腔培養も通常は第一選択ではない。", "each": {"a": "コホーティングや配置変更を検討しうるため誤り。", "b": "職員スクリーニングは通常第一選択ではなく誤り。", "c": "個人防護具は病室内で外すため正しい。", "d": "高頻度接触面の少なくとも毎日の清拭・消毒は重要であり正しい。"}}, "category": "感染経路別予防策", "subcategory": "MRSA・アウトブレイク対応", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "22": {"question_no": "22", "exam_year": 2021, "exam_name": "第29回", "section": "問題2", "case_no": "1", "type": "single_best", "question": "B病棟に入院中の患者に関するアセスメントとして、正しいのはどれか。", "choices": {"1": "B病棟に入院中の患者はMRSAを獲得する可能性が高いため、入院患者全員にムピロシンを投与する。", "2": "C氏の痰をグラム染色したところ、貪食像は認められず呼吸状態も安定していたが、MRSAが検出されていることから、C氏は肺炎を起こしていると考えられる。", "3": "D氏にバンコマイシンを投与した後、上半身に紅潮・紅斑が認められたためレッドマン症候群を疑い、担当医に報告した。", "4": "E氏は多剤耐性緑膿菌が検出されていると考えられる。"}, "answer": "3", "explanation": {"overall": "MRSAは保菌と感染の区別が重要であり、予防的ムピロシン投与は行わない。グラム染色で貪食像がなく臨床症状も安定している場合は感染とは判断しない。バンコマイシン投与後の紅潮・紅斑はレッドマン症候群として典型的であり正しい。提示された感受性からは多剤耐性緑膿菌とは判断できない。", "each": {"1": "ムピロシンの予防投与は耐性化の問題があり routine では行わないため誤り。", "2": "MRSA検出のみでは感染とはいえず、臨床症状と貪食像が重要であり誤り。", "3": "バンコマイシンによるレッドマン症候群の典型であり正しい。", "4": "MDRPの定義（IPM・AMK・CPFXなど複数系統耐性）を満たすとは言えず誤り。"}}, "category": "感染症各論", "subcategory": "MRSA・薬剤副作用", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "23": {"question_no": "23", "exam_year": 2021, "exam_name": "第29回", "section": "問題2", "case_no": "1", "type": "single_best", "question": "MRSAサーベイランスの方法に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "部署別に新規MRSA陽性患者数を比較することにより、感染予防策を評価する。", "b": "分母に延べ医療器具使用日数を使用し、新規MRSA陽性患者の発生密度率を計算する。", "c": "入院患者に占めるMRSA陽性患者の割合を計算し、MRSAの保菌圧を明らかにする。", "d": "分母に延べ入院患者数を使用し、新規MRSA陽性患者の発生密度率を計算する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "MRSAサーベイランスでは、保菌圧と発生密度率の把握が重要である。単純な件数比較では評価として不十分であり、器具使用日数はMRSAの指標として適切ではない。", "each": {"a": "単純な患者数比較ではリスク調整されておらず評価として不十分であり誤り。", "b": "器具使用日数はCLABSIなどには用いるがMRSAには適切ではなく誤り。", "c": "MRSA陽性患者割合は保菌圧の指標であり正しい。", "d": "延べ入院患者数を分母とした発生密度率は基本指標であり正しい。"}}, "category": "サーベイランス", "subcategory": "MRSA", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}}}, "case2": {"case_no": "2", "description": "次の文を読み、問24から問26に対する適切な答えを一つ選んでください。あなたは、G病院の感染管理認定看護師です。血液内科病棟の看護師長から「移植件数が普段より多く、防護環境(移植室)が足りない」と相談がありました。あなたが情報収集したところ、以下のことがわかりました。血液内科病棟には防護環境は2床あり、現在、30日前に同種造血細胞移植を受けたH氏と、25日前に同種造血細胞移植を受けたI氏が入院している。H氏は移植後移植片対宿主病(Graft-versus-host Disease:以下GVHD)の発症もなく、好中球の回復も順調である。I氏はGVHDを発症し、好中球減少も遷延している。翌週からJ氏が同種造血細胞移植、K氏が自家移植の予定である。", "assets": {}, "questions": {"24": {"question_no": "24", "exam_year": 2021, "exam_name": "第29回", "section": "問題2", "case_no": "2", "type": "single_best", "question": "防護環境に優先的に入室する必要がある患者として、正しいのはどれか。", "choices": {"1": "J氏とK氏", "2": "H氏とJ氏", "3": "I氏とJ氏", "4": "H氏とI氏"}, "answer": "3", "explanation": {"overall": "防護環境は高度な免疫抑制状態の患者に優先される。GVHDを発症し好中球減少が遷延しているI氏と、新たに同種造血細胞移植を受けるJ氏が最もリスクが高く優先される。", "each": {"1": "自家移植のK氏は同種移植に比べ感染リスクが低く優先度は下がるため誤り。", "2": "H氏は回復が順調であり優先度は低いため誤り。", "3": "I氏（GVHD＋好中球減少遷延）とJ氏（同種移植予定）は最も高リスクであり正しい。", "4": "H氏は状態が安定しており優先度が低いため誤り。"}}, "category": "造血幹細胞移植", "subcategory": "防護環境", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "25": {"question_no": "25", "exam_year": 2021, "exam_name": "第29回", "section": "問題2", "case_no": "2", "type": "single_best", "question": "病棟を訪問していたあなたに、看護師長からI氏に関する感染対策について質問があった。看護師長への説明として、正しいのはどれか。", "choices": {"1": "上気道症状がある面会者には、サージカルマスクを着用して面会してもらう。", "2": "アスペルギルス肺炎予防のため、定期的にI氏の部屋の細菌検査を実施する。", "3": "I氏の部屋の生花を活ける花瓶の水は毎日交換する。", "4": "I氏の室内での面会者の飲食は禁止する。"}, "answer": "4", "explanation": {"overall": "防護環境では外来微生物の持ち込みを防ぐことが重要であり、室内での飲食は禁止する。上気道症状がある場合は面会自体を控えるべきであり、マスク着用での面会は適切ではない。環境の細菌検査は routine では不要であり、生花は持ち込み自体を避ける。", "each": {"1": "上気道症状がある場合は面会自体を控えるべきであり誤り。", "2": "環境の細菌検査は routine では行わないため誤り。", "3": "生花は持ち込み自体を避けるべきであり誤り。", "4": "室内での飲食は禁止することが推奨され正しい。"}}, "category": "造血幹細胞移植", "subcategory": "防護環境", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "26": {"question_no": "26", "exam_year": 2021, "exam_name": "第29回", "section": "問題2", "case_no": "2", "type": "single_best", "question": "H氏に発疹が出現し、播種性帯状疱疹と診断された。H氏への対応として、正しい組み合わせはどれか。", "stem_items": {"a": "ガンシクロビルの投与を開始する。", "b": "空気予防策を実施する。", "c": "接触予防策を実施する。", "d": "帯状疱疹ワクチンを接種する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "播種性帯状疱疹では空気予防策と接触予防策の両方を実施する。治療はアシクロビルでありガンシクロビルではない。発症後にワクチン接種は行わない。", "each": {"a": "第一選択はアシクロビルであり誤り。", "b": "播種性帯状疱疹では空気予防策が必要であり正しい。", "c": "接触予防策も併用するため正しい。", "d": "発症後にワクチン接種は行わないため誤り。"}}, "category": "感染症各論", "subcategory": "水痘・帯状疱疹", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}}}, "case3": {"case_no": "3", "description": "次の文を読み、問27から問29に対する適切な答え一つ選んでください。\nあなたは、L病院の感染管理認定看護師です。10月17日に併設する介護療養型施設の病棟看護師長から、病棟内に嘔吐や下痢のある患者と職員が数名発生していると連絡がありました。あなたが情報収集したところ、以下のことがわかりました。\n・10月15日に801号室(6床室)に入院しているM氏が、昼食後に自室の洗面所で嘔吐し、その後、下痢を認めた。\n・10月16日午後に、同室のN氏とO氏に嘔吐と下痢が出現した。M氏、N氏、O氏にノロウイルス迅速診断検査を実施したところ、M氏とO氏はノロウイルス抗原陽性であったが、N氏は陰性であった。病棟では、この結果を受けてM氏とO氏を個室に移動させ、接触予防策を開始した。\n・M氏の嘔吐と下痢は、10月17日昼ごろに消失した。\n・801号室には、M氏、N氏、O氏以外に3人の同室者が入院していたが、10月17日の時点でこれらの患者に消化器症状はみられていない。\n・10月17日朝から病棟の看護師3名に、嘔吐と下痢が出現した。", "assets": {}, "questions": {"27": {"question_no": "27", "exam_year": 2021, "exam_name": "第29回", "section": "問題2", "case_no": "3", "type": "single_best", "question": "この病棟で行う感染対策として、正しいのはどれか。", "choices": {"1": "N氏は、M氏、O氏以外の3人の同室者とともに801号室で慎重に経過を観察する。", "2": "下痢と嘔吐を認める看護師3名は、症状消失後48時間まで就業停止とする。", "3": "M氏にはノロウイルス迅速診断検査を3回連続して実施し、すべての検査結果が陰性であることを確認した後に隔離を解除する。", "4": "接触者対策を行うため、M氏の発症2日前からM氏と接触した者を確認する。"}, "answer": "2", "explanation": {"overall": "ノロウイルス感染症では、症状消失後も一定期間ウイルス排泄が続くため、職員は症状消失後少なくとも48時間は就業停止とする。迅速検査の陰性確認で隔離解除は行わず、また接触者追跡は通常発症後の接触を対象とする。", "each": {"1": "症状のある患者が発生している場合、同室での経過観察のみでは不十分であり、隔離やコホーティングなどの対策が必要であるため誤り。", "2": "ノロウイルスでは症状消失後48時間の就業停止が推奨されており正しい。", "3": "隔離解除は臨床症状で判断し、迅速検査の陰性確認は不要であるため誤り。", "4": "ノロウイルスは発症後の接触が主であり、発症前2日からの接触者追跡は通常行わないため誤り。"}}, "category": "感染経路別予防策", "subcategory": "ノロウイルス", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "28": {"question_no": "28", "exam_year": 2021, "exam_name": "第29回", "section": "問題2", "case_no": "3", "type": "single_best", "question": "この病棟で行う環境対策として、正しいのはどれか。", "choices": {"1": "高頻度接触環境表面の培養検査を実施し、感染源を特定する。", "2": "衣類に便や嘔吐物が付着している場合は、周囲を汚染しないようそのまま消毒薬に浸漬する。", "3": "患者が使用した食器は、熱水(80℃10秒)で処理を行った場合、消毒薬への浸漬は必要ない。", "4": "嘔吐物の飛散による感染を防ぐため、高性能空気清浄機を導入する。"}, "answer": "2", "explanation": {"overall": "ノロウイルス対策では、環境表面の培養検査は通常ルーチンに実施しない。日本環境感染学会の吐物・汚物処理手順では、『先に吐物・汚物を処理してから消毒する方法』と『先に消毒してから処理する方法』の両方が示されており、汚染衣類を周囲へ飛散させないよう消毒薬に浸漬する方法は成立し得る。食器の熱水処理については、現在は85℃1分間などが基準として示されており、80℃10秒では不十分である。空気清浄機の導入は標準的なノロウイルス対策ではない。", "each": {"1": "環境培養は通常のノロウイルスアウトブレイク対応ではルーチンに実施しないため誤り。", "2": "日本環境感染学会の吐物・汚物処理手順では、『先に消毒してから処理する方法』も示されており、周囲を汚染しないよう消毒薬に浸漬する方法は成立し得るため正しい。", "3": "食器・調理器具の熱水消毒は85℃1分間などが目安であり、80℃10秒では不十分であるため誤り。", "4": "ノロウイルス対策の基本は接触予防策、手洗い、環境清拭・消毒であり、高性能空気清浄機の導入は標準的対策ではないため誤り。"}}, "category": "環境管理", "subcategory": "ノロウイルス", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "29": {"question_no": "29", "exam_year": 2021, "exam_name": "第29回", "section": "問題2", "case_no": "3", "type": "single_best", "question": "あなたはこの病棟の職員にノロウイルスついて説明することになった。説明する内容として、正しい組み合わせはどれか。", "stem_items": {"a": "ノロウイルスに効果のある抗ウイルス薬はない。", "b": "近年は、ノロウイルスGIVの変異株が確認されている。", "c": "ノロウイルス感染症の特徴として、白色水様便を高頻度で認める。", "d": "ノロウイルスに感染した場合でも、無症状のままウイルスを排泄することがある。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "2", "explanation": {"overall": "ノロウイルスに対する特異的な抗ウイルス薬は存在せず対症療法が中心である。また無症状でもウイルス排泄は起こりうる。一方、流行の中心はGII系でありGIVの変異株が問題となっているわけではない。白色水様便はロタウイルスの特徴である。", "each": {"a": "ノロウイルスに対する特異的治療薬はなく対症療法が基本であり正しい。", "b": "主に流行しているのはGIIでありGIVではないため誤り。", "c": "白色水様便はロタウイルスの特徴であり誤り。", "d": "無症状でもウイルス排泄があるため正しい。"}}, "category": "感染症各論", "subcategory": "ノロウイルス", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}}}, "case4": {"case_no": "4", "description": "次の文を読み、問30から問32に対する適切な答えを一つ選んでください。\nP病院では集中治療室(ICU)において中心ライン関連血流感染(CLABSI)サーベイランスを実施しています。臨床的敗血症は判定していません。2020年度の結果は表1の通りでした。また、表1の結果は、表2·表3のベンチマークと比較しました。", "assets": {"tables": {"table1_summary": {"title": "表1 CLABSIサーベイランス結果（I病院 ICU 2020年度）", "data": [{"CLABSI件数": 5, "中心ライン使用日数": 600, "延べ入院患者数": 3000, "CLABSI発生密度率": "(あ)", "中心ライン使用比": "(い)"}]}, "table2_benchmark_rate": {"title": "表2 ベンチマークデータ（中心ライン関連血流感染率）", "data": [{"期間": "①", "感染": "LCBI", "病床種類": "ICU（2種）", "病床数": 73, "感染件数": 67, "中心ライン使用日": 40037, "感染率": 1.7, "p10": 0.0, "p25": 0.0, "median": 0.0, "p75": 2.9, "p90": 5.8}, {"期間": "②", "感染": "LCBI", "病床種類": "ICU（2種）", "病床数": 133, "感染件数": 972, "中心ライン使用日": 613058, "感染率": 1.6, "p10": 0.0, "p25": 0.5, "median": 1.2, "p75": 2.2, "p90": 4.2}]}, "table3_benchmark_utilization": {"title": "表3 ベンチマークデータ（中心ライン・器具使用比）", "data": [{"期間": "①", "病床種類": "ICU（2種）", "病床数": 73, "中心ライン使用日": 40037, "延べ入院患者数": 81745, "器具使用比": 0.49, "p10": 0.17, "p25": 0.32, "median": 0.49, "p75": 0.63, "p90": 0.78}, {"期間": "②", "病床種類": "ICU（2種）", "病床数": 133, "中心ライン使用日": 613068, "延べ入院患者数": 1334667, "器具使用比": 0.46, "p10": 0.21, "p25": 0.34, "median": 0.48, "p75": 0.6, "p90": 0.69}]}}}, "questions": {"30": {"question_no": "30", "exam_year": 2021, "exam_name": "第29回", "section": "問題2", "case_no": "4", "type": "single_best", "question": "表1の(あ)に当てはまる数値・単位として、正しいのはどれか。", "choices": {"1": "0.83%", "2": "0.83件/1,000device-days", "3": "8.3%", "4": "8.3件/1,000device-days"}, "answer": "4", "explanation": {"overall": "CLABSI発生密度率は、CLABSI発生件数を中心ライン使用日数で除し、1,000device-daysあたりで表す。5件÷600日×1,000＝8.3件/1,000device-daysとなる。", "each": {"1": "割合（％）ではなく発生密度率で表すため誤り。", "2": "計算値が誤っているため誤り。", "3": "割合ではなく発生密度率で表すため誤り。", "4": "5÷600×1,000＝8.3件/1,000device-daysであり正しい。"}}, "category": "サーベイランス", "subcategory": "CLABSI", "difficulty": "easy", "source_file": "第29回認定看護師認定審査.docx"}, "31": {"question_no": "31", "exam_year": 2021, "exam_name": "第29回", "section": "問題2", "case_no": "4", "type": "single_best", "question": "表1の(い)に当てはまる数値として、正しいのはどれか。", "choices": {"1": "0.2", "2": "0.5", "3": "0.8", "4": "1.6"}, "answer": "1", "explanation": {"overall": "中心ライン使用比は、中心ライン使用日数を延べ入院患者数で除して求める。600÷3000＝0.2となる。", "each": {"1": "600÷3000＝0.2であり正しい。", "2": "計算値が誤っているため誤り。", "3": "計算値が誤っているため誤り。", "4": "計算値が誤っているため誤り。"}}, "category": "サーベイランス", "subcategory": "CLABSI", "difficulty": "easy", "source_file": "第29回認定看護師認定審査.docx"}, "32": {"question_no": "32", "exam_year": 2021, "exam_name": "第29回", "section": "問題2", "case_no": "4", "type": "single_best", "question": "表1のデータを表2・表3のベンチマークと比較した結果に関する説明として、正しいのはどれか。", "choices": {"1": "感染率と中心ライン使用比がともに高いことから、ICU患者がCLABSIのリスクを増大させると考えられる。不要な中心ラインを速やかに抜去する取り組みが必要である。", "2": "感染率が高く中心ライン使用比が低いことから、中心ライン使用に不慣れであるため、感染率が高い可能性がある。挿入手技や管理方法の見直し、感染対策を振り返る必要がある。", "3": "感染率が低く中心ライン使用比が高いことから、中心ラインの使用頻度を下げることができれば、感染率も更に減少することができる。", "4": "感染率と中心ライン使用比がともに低いことから、中心ラインの使用頻度が上がった時に感染率も上がる可能性がある。日頃からマニュアルの整備する必要がある。"}, "answer": "2", "explanation": {"overall": "表1ではCLABSI発生密度率は8.3件/1,000device-days、中心ライン使用比は0.2である。ベンチマークと比較すると、感染率は高く、中心ライン使用比は低い。したがって、中心ライン使用頻度は低いにもかかわらず感染率が高いため、挿入手技や管理方法、感染対策を振り返る必要がある。", "each": {"1": "中心ライン使用比は0.2であり高くないため誤り。", "2": "感染率は高く、中心ライン使用比は低いため正しい。", "3": "感染率は低くないため誤り。", "4": "感染率は低くないため誤り。"}}, "category": "サーベイランス", "subcategory": "CLABSI", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}}}, "case5": {"case_no": "5", "description": "次の文を読み、問33から問34に対する適切な答えを一つ選んでください。\nあなたは、Q病院に勤務する感染管理認定看護師です。8月31日に病棟師長から看護師Rが麻疹を発症して入院していると報告がありました。看護師Rについて情報収集を行ったところ、以下のことがわかりました。\n8月15日 姪の幼稚園のイベントに参加した。\n8月27日 38℃の発熱、咳、鼻汁が出現したが、風邪と考え、マスクを着用して日勤勤務を行った。\n8月28日 休暇。38℃の発熱が続いた。\n8月29日 休暇。37℃まで解熱した。\n8月30日 40℃の発熱と発疹が出現したため、救急外来を受診した。医師が麻疹の可能性を疑い入院となった。\n8月31日 前日の血液検査の結果を確認したところ、麻疹IgM抗体およびIgG抗体は陰性であった。幼少期にMR(麻疹・風疹混合)ワクチンを1回のみ接種していた。", "assets": {}, "questions": {"33": {"question_no": "33", "exam_year": 2021, "exam_name": "第29回", "section": "問題2", "case_no": "5", "type": "single_best", "question": "入院時の対応として、正しい組み合わせはどれか。", "stem_items": {"a": "看護師Rを直ちに陰圧室に隔離する。", "b": "看護師Rに対しMRワクチンを接種する。", "c": "麻疹の治療のため、ダルナビルの投与を開始する。", "d": "直ちに保健所に麻疹の発生届を提出する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "2", "explanation": {"overall": "麻疹は空気感染するため陰圧室での隔離が必要であり、直ちに届出が必要な感染症である。ワクチンは発症後の治療には用いず、ダルナビルはHIV治療薬であり麻疹には無効である。", "each": {"a": "麻疹は空気感染するため陰圧室隔離が必要であり正しい。", "b": "発症後の治療としてワクチン接種は行わないため誤り。", "c": "ダルナビルはHIV治療薬であり麻疹には無効であるため誤り。", "d": "麻疹は全数把握疾患であり直ちに届出が必要であるため正しい。"}}, "category": "感染症各論", "subcategory": "麻疹", "difficulty": "easy", "source_file": "第29回認定看護師認定審査.docx"}, "34": {"question_no": "34", "exam_year": 2021, "exam_name": "第29回", "section": "問題2", "case_no": "5", "type": "single_best", "question": "8月31日に得られた情報に基づく判断として、正しいのはどれか。", "choices": {"1": "8月27日以降に接触した医療従事者に対し緊急麻疹ワクチンを接種する。", "2": "8月30日に行った看護師Rの血液検査結果から、麻疹を発症していない可能性が高いと考えられるため、接触者への対応は実施しない。", "3": "看護師Rが麻疹を発症したのは8月30日と判断し、感染性が出現したと考えられる8月29日以降の接触者の麻疹抗体価やワクチン接種歴を確認する。", "4": "看護師Rは、発疹出現から7日目の9月6日まで就業停止とする。"}, "answer": "invalid", "is_invalid": true, "score_mode": "full", "auto_correct": true, "accepted_answers": ["1", "2", "3", "4"], "explanation": {"overall": "この問題は現在の基準では不適切問題として扱う。麻疹曝露後の感受性者へのワクチン接種は曝露後72時間以内が有効とされるが、選択肢1は『8月27日以降に接触した医療従事者』を一律対象としており、8月31日時点では72時間を超える接触者も含まれるため適切とは言い切れない。選択肢2は、発症初期では麻疹IgM抗体・IgG抗体が陰性となることがあり、麻疹を否定できないため誤り。選択肢3は、感染性出現を8月29日以降としているが、麻疹は発疹出現前から感染性があるため接触者確認期間として不十分。選択肢4は、現在の医療従事者の就業停止目安は発疹出現後4日間であり、9月6日までの7日間停止とは一致しない。したがって現行基準では正答なしとして自動正解扱いとする。", "each": {"1": "曝露後72時間以内のワクチン接種は有効だが、8月31日時点で8月27日の接触者は72時間を超えている可能性があり、一律に正しいとはいえない。", "2": "発症初期では麻疹IgM抗体・IgG抗体が陰性となることがあり、麻疹を否定できないため誤り。", "3": "麻疹は発疹出現前から感染性があるため、8月29日以降だけの接触者確認では不十分。", "4": "現在の医療従事者の就業停止目安は発疹出現後4日間であり、9月6日までの7日間とは一致しない。"}}, "category": "感染症各論", "subcategory": "麻疹", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}}}, "case6": {"case_no": "6", "description": "次の文を読み、問35から問37に対する適切な答えを一つ選んでください。\nあなたは、500床の急性期病院に勤務する感染管理認定看護師です。消化器内科病棟の看護師長から「入院患者S氏、T氏、U氏の3名に下痢症状がある。Clostridioides difficileの検査結果は3名とも陽性であった。S氏とT氏はともに4床室の210号室に入院中である。U氏は3週間前にもC. difficile感染症を起こし、それ以来個室に入院している」と連絡がありました。状況を確認したところ、以下のことがわかりました。\n・C. difficile毒素抗原検査の結果、S氏とT氏はトキシンA陰性、トキシンB陽性、U氏はトキシンA陽性、トキシンB陽性であった。\n・S氏には2日前より1日に10回程度の水様便を認めている。\n・210号室にはトイレがあり、同室患者4名が使用している。\n・V氏には昨日から水様便を認めている。\n・W氏には現時点で下痢を認めていない。\n・医師がV氏のC. difficile毒素抗原検査を指示している。\n・U氏はメトロニダゾールによる治療終了後、一週間ほど下痢が治まっていたが、昨日から再び水様便がみられるようになった。\n・211号室(4床室)には、現在下痢を認めない患者が2名入院している。", "assets": {}, "questions": {"35": {"question_no": "35", "exam_year": 2021, "exam_name": "第29回", "section": "問題2", "case_no": "6", "type": "single_best", "question": "210号室の患者のC.difficile毒素抗原検査に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "S氏とT氏のC. difficileの病原性はトキシンBに由来すると考えられる。", "b": "U氏のC. difficileは、トキシンAとトキシンBの両方を産生するが、毒素を産生しないC. difficile株も存在する。", "c": "V氏の便検体は、3時間前に採取し、室温で保管していたため、すぐに提出するように促した。", "d": "C. difficile感染症を否定する目的で、W氏の固形便を採取し、C. difficile毒素抗原検査を行う必要がある。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "1", "explanation": {"overall": "トキシンA陰性・トキシンB陽性株も病原性を持つためaは正しい。C. difficileには非毒素産生株も存在するためbは正しい。便検体は速やかに提出または冷蔵保存が必要であり室温放置は不適切であるためcは誤り。検査は下痢便に対して行うものであり固形便では実施しないためdは誤り。", "each": {"a": "トキシンB単独産生株でも病原性があり正しい。", "b": "非毒素産生株の存在は知られており正しい。", "c": "便は速やかに提出または冷蔵が必要であり室温放置は不適切で誤り。", "d": "固形便では検査適応とならず誤り。"}}, "category": "感染症各論", "subcategory": "Clostridioides difficile", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "36": {"question_no": "36", "exam_year": 2021, "exam_name": "第29回", "section": "問題2", "case_no": "6", "type": "single_best", "question": "210号室の患者に使用する抗菌薬に関する説明として、正しいのはどれか。", "choices": {"1": "下痢症状の強いS氏には、メトロニダゾールと止瀉薬を併用することが推奨される。", "2": "T氏にメトロニダゾールを使用したところ、服用開始から3日後に下痢症状が治まったため速やかに投与を中止するのが望ましい。", "3": "W氏には、予防的にメトロニダゾールを投与する。", "4": "U氏には、バンコマイシンの使用が推奨される。"}, "answer": "4", "explanation": {"overall": "CDIでは止瀉薬の併用は推奨されず、治療は規定期間継続する必要がある。無症状者への予防投与も行わない。再発例や重症例ではバンコマイシンが推奨されるため4が正しい。", "each": {"1": "止瀉薬は毒素排泄を妨げるため併用は推奨されず誤り。", "2": "症状改善後も通常は10日程度の治療継続が必要であり誤り。", "3": "無症状者への予防投与は行わないため誤り。", "4": "再発例や重症例ではバンコマイシンが推奨され正しい。"}}, "category": "感染症各論", "subcategory": "Clostridioides difficile", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "37": {"question_no": "37", "exam_year": 2021, "exam_name": "第29回", "section": "問題2", "case_no": "6", "type": "single_best", "question": "V氏のC. difficile毒素抗原検査結果はトキシンA、トキシンBともに陰性であった。消化器内科病棟で実施するC. difficile感染症対策として、正しい組み合わせはどれか。", "stem_items": {"a": "消化器内科病棟で他に下痢症状を認める患者はいないか確認する。", "b": "210号室のトイレは0.5%(5,000ppm)の次亜塩素酸ナトリウム溶液で1日1回以上消毒する。", "c": "擦式アルコール製剤を用いた手指衛生を強化する。", "d": "V氏とW氏を早急に211号室に移動させる。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "1", "explanation": {"overall": "CDIが疑われる場合は他の有症状患者の確認などサーベイランスを強化する。環境消毒は芽胞に有効な高濃度次亜塩素酸ナトリウムを使用する。アルコールは芽胞に無効であり不適切。陰性でも症状があれば安易な病室移動は行わず、接触予防策を継続する。", "each": {"a": "アウトブレイク評価のために有症状患者の把握は重要であり正しい。", "b": "芽胞対策として0.5%次亜塩素酸ナトリウムでの消毒は適切であり正しい。", "c": "アルコールは芽胞に無効であり誤り。", "d": "症状がある患者の安易な移動は感染拡大リスクとなるため誤り。"}}, "category": "感染経路別予防策", "subcategory": "Clostridioides difficile", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}}}, "case7": {"case_no": "7", "description": "次の文を読み、問38から問40に対する適切な答えを一つ選んでください。\nあなたは、X病院の感染管理認定看護師です。ある日、産科病棟のY看護師から、妊娠39週の患者Z氏の採血に使用した針を針捨て容器に捨てようとしたところ、その針で指を刺してしまったと連絡がありました。あなたが状況を確認すると以下の事項がわかりました。\n・Z氏は1カ月前に行った血液検査の結果、HBs抗原陽性、HCV抗体陽性、HIV抗体陰性であった。\n・採血針には多量の血液が付着していた。\n・Y看護師は針を指に深く刺し、出血を認めた。\n・Y看護師はB型肝炎ワクチンの接種を1シリーズ(3回)終了した後にHBs抗体が産生されなかったため、2シリーズ目を3カ月前に終了していたが、その後のHBs抗体検査は実施していなかった。", "assets": {}, "questions": {"38": {"question_no": "38", "exam_year": 2021, "exam_name": "第29回", "section": "問題2", "case_no": "7", "type": "single_best", "question": "Y看護師のHBs抗体検査を実施したところ、HBs抗体価は5mIU/mLであった。Y看護師に対して行う必要があるB型肝炎の予防策として、正しいのはどれか。", "choices": {"1": "抗HBsヒト免疫グロブリン(HBIG)を投与し、1カ月後に再度HBIGを投与する。", "2": "HBIGを投与し、B型肝炎ワクチン接種の3シリーズ目を開始する。", "3": "HBIGは投与せず、B型肝炎ワクチン接種の3シリーズ目を開始する。", "4": "HBIGを1回投与して終了する。"}, "answer": "1", "explanation": {"overall": "Y看護師はB型肝炎ワクチンを2シリーズ終了後、HBs抗体価が5mIU/mLであり、10mIU/mL未満のため免疫獲得は確認できない。2シリーズでも抗体陽性化しない場合はワクチン不応者として扱い、HBs抗原陽性血液への曝露後はHBIGを直後と1か月後の2回投与する対応が推奨される。したがって正答は1である。", "each": {"1": "2シリーズ後もHBs抗体価が10mIU/mL未満であり、ワクチン不応者としてHBIGを直後と1か月後に投与するため正しい。", "2": "2シリーズ後も抗体が上昇していないため、3シリーズ目のワクチン接種開始ではなく、ワクチン不応者としてHBIG対応を行うため誤り。", "3": "HBs抗原陽性血液への曝露であり、HBIGを投与しない対応は不適切で誤り。", "4": "HBIG単回のみではなく、直後と1か月後の2回投与が必要と考えられるため誤り。"}}, "category": "職業感染対策", "subcategory": "血液曝露（HBV）", "difficulty": "high", "source_file": "第29回認定看護師認定審査.docx"}, "39": {"question_no": "39", "exam_year": 2021, "exam_name": "第29回", "section": "問題2", "case_no": "7", "type": "single_best", "question": "Y看護師のHCV抗体検査を実施したところ、HCV抗体は陰性であった。Y看護師への対応として、正しいのはどれか。", "choices": {"1": "インターフェロンを投与する。", "2": "C型肝炎ワクチンを接種する。", "3": "C型肝炎ウイルスに感染するリスクは、0.3%程度であると説明する。", "4": "HCV抗体またはHCV-RNAの追跡調査を行う。"}, "answer": "4", "explanation": {"overall": "HCV曝露後は有効なワクチンや予防投与が存在しないため、基本は経過観察（フォローアップ検査）となる。抗体陰性でもウィンドウ期の可能性があるため、HCV抗体やHCV-RNAの定期的な追跡が必要である。", "each": {"1": "曝露後の予防的インターフェロン投与は推奨されておらず誤り。", "2": "C型肝炎ワクチンは存在しないため誤り。", "3": "HCVの針刺し感染リスクは約1.8%程度であり0.3%ではないため誤り。", "4": "ウィンドウ期を考慮し、抗体またはRNAの追跡検査を行うため正しい。"}}, "category": "職業感染対策", "subcategory": "血液曝露（HCV）", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}, "40": {"question_no": "40", "exam_year": 2021, "exam_name": "第29回", "section": "問題2", "case_no": "7", "type": "single_best", "question": "Z氏から出生する児に対して行うB型肝炎感染予防策に関する説明として、正しいのはどれか。", "choices": {"1": "出生直後に、0.01%(100ppm)の次亜塩素酸ナトリウム溶液で沐浴を行う。", "2": "母親からの移行抗体があるため、児に対するB型肝炎ワクチン接種は不要である。", "3": "Z氏の母乳には感染性があるため、児には与えない。", "4": "HBIGおよびB型肝炎ワクチンを出生後できるだけ早期に投与し、さらに生後1カ月と生後6カ月の時点でB型肝炎ワクチンを投与する。"}, "answer": "4", "explanation": {"overall": "HBs抗原陽性母体から出生した児に対しては、出生後できるだけ早期（通常は12時間以内）にHBIGとB型肝炎ワクチンを投与し、その後も定期的にワクチン接種を行うことで母子感染を予防する。沐浴や母乳制限は不要である。", "each": {"1": "新生児に次亜塩素酸ナトリウムで沐浴を行うことは推奨されておらず誤り。", "2": "母体由来の移行抗体では防御不十分でありワクチン接種は必要であるため誤り。", "3": "適切な予防策を行えば母乳栄養は可能であり誤り。", "4": "HBIGとワクチンの早期併用および追加接種が推奨されており正しい。"}}, "category": "感染症各論", "subcategory": "B型肝炎", "difficulty": "medium", "source_file": "第29回認定看護師認定審査.docx"}}}}}}};


window.EXAM_DATA_30 = {"第30回": {"meta": {"title": "第30回認定看護師認定審査", "year": 2022, "course": "感染管理(B課程)"}, "questions": {"1": {"question_no": "1", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "エンベロープを有するウイルスとして、正しい組み合わせはどれか。", "stem_items": {"a": "ポリオウイルス", "b": "コロナウイルス", "c": "インフルエンザウイルス", "d": "ノロウイルス"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "コロナウイルスとインフルエンザウイルスはエンベロープを有する。ポリオウイルスとノロウイルスはノンエンベロープウイルスであるため、bとcが正しい。", "each": {"a": "ポリオウイルスはノンエンベロープウイルスであり誤り。", "b": "コロナウイルスはエンベロープを有するため正しい。", "c": "インフルエンザウイルスはエンベロープを有するため正しい。", "d": "ノロウイルスはノンエンベロープウイルスであり誤り。"}}, "category": "微生物", "subcategory": "ウイルス", "difficulty": "easy", "source_file": "第30回認定看護師認定審査.docx"}, "2": {"question_no": "2", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "「カテーテル関連尿路感染の予防のためのCDCガイドライン2009」において、尿道留置カテーテルの適正使用例として、誤っているのはどれか。", "choices": {"1": "尿量の正確な測定を必要とする重篤な患者", "2": "患者が随意的に排尿可能な場合の培養検査の採尿手段", "3": "失禁患者の仙骨部または会陰部の開放創の治癒の促進", "4": "終末期ケアにおける快適さの改善"}, "answer": "2", "explanation": {"overall": "CDC 2009 CAUTIガイドラインでは、尿量の厳密な測定が必要な重症患者、仙骨部・会陰部創傷管理、終末期ケアでの快適性向上は適正使用例である。一方、随意排尿可能な患者の培養検査目的のみでのカテーテル留置は不適切使用である。", "each": {"1": "重篤患者の正確な尿量測定は適正使用例であり正しい。", "2": "培養検査目的のみでの留置は不適切使用であり誤り。", "3": "失禁による創部汚染防止目的は適正使用例であり正しい。", "4": "終末期ケアにおける快適性向上は適正使用例であり正しい。"}}, "category": "デバイス関連感染", "subcategory": "CAUTI", "difficulty": "easy", "source_file": "第30回認定看護師認定審査.docx"}, "3": {"question_no": "3", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "血液曝露に関する説明として、正しいのはどれか。", "choices": {"1": "B型肝炎ワクチンにより免疫が獲得できなかった看護師が、HBs抗原陽性血液に曝露した場合、曝露後24時間以内に抗HBsヒト免疫グロブリン（HBIG）の投与を行う。", "2": "HIV抗体陽性血液の粘膜曝露により、HIVに感染するリスクは約3%である。", "3": "HIV抗体陽性血液に曝露した後の抗HIV薬の予防内服は、10週間継続することが推奨されている。", "4": "HIV抗体陽性血液で汚染された針による経皮的曝露が発生した場合、曝露後7日以内に抗HIV薬の予防内服を行う。"}, "answer": "1", "explanation": {"overall": "HBs抗原陽性血液への曝露時、B型肝炎ワクチン無効者にはHBIG投与を速やかに行う。HIV曝露後予防はできるだけ早期に開始し、通常4週間継続する。", "each": {"1": "HBIGは曝露後できるだけ早期（24時間以内が望ましい）に投与するため正しい。", "2": "HIV粘膜曝露による感染リスクは約0.3%であり、3%ではないため誤り。", "3": "HIV曝露後予防内服は通常4週間継続であり、10週間ではないため誤り。", "4": "曝露後予防は可能な限り早期（72時間以内が望ましい）に開始するため、7日以内では遅すぎ誤り。"}}, "category": "職業感染対策", "subcategory": "血液曝露", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "4": {"question_no": "4", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "統計学に関する説明として、正しいのはどれか。", "choices": {"1": "ASAスコアの分布をヒストグラムで表した。", "2": "2つの病棟の手指衛生遵守率の差の検定にt検定を用いた。", "3": "入院患者の年齢が正規分布を示していたので代表値として平均値を用いた。", "4": "対象数10人と1,000人のデータでは、信頼区間の幅は10人の方が小さい。"}, "answer": "3", "explanation": {"overall": "ASAスコアのような順序尺度は棒グラフで表す。手指衛生遵守率のような割合の差の検定にはχ2乗検定またはFisherの正確確率検定を用いる。正規分布であれば代表値として平均値を用いることが適切である。対象数が多いほど信頼区間の幅は小さくなるため、正答は3である。", "each": {"1": "ASAスコアは順序尺度であり、ヒストグラムではなく棒グラフが適切であるため誤り。", "2": "割合の差の検定には、t検定ではなくχ2乗検定またはFisherの正確確率検定を用いるため誤り。", "3": "正規分布であれば代表値として平均値を用いることが適切であるため正しい。", "4": "対象数が多いほど信頼区間の幅は小さくなるため、10人の方が小さいという記載は誤り。"}}, "category": "疫学", "subcategory": "統計学", "difficulty": "medium", "source_file": "第30回認定看護師認定審査.docx"}, "5": {"question_no": "5", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "流行性角結膜炎に関する説明として、正しいのはどれか。", "choices": {"1": "症状出現日からウイルスが排出される。", "2": "原因ウイルスは、エンベロープを持つウイルスである。", "3": "潜伏期は、1～2週間である。", "4": "コクサッキーウイルスによる感染である。"}, "answer": "3", "explanation": {"overall": "流行性角結膜炎はアデノウイルスによる感染症であり、潜伏期間は約1～2週間である。アデノウイルスはノンエンベロープウイルスであり、原因ウイルスはコクサッキーウイルスではない。", "each": {"1": "ウイルス排出は発症前からみられるため、「症状出現日から」という記載は誤り。", "2": "アデノウイルスはノンエンベロープウイルスであり誤り。", "3": "潜伏期間は一般的に1～2週間程度であり正しい。", "4": "原因はアデノウイルスであり、コクサッキーウイルスではないため誤り。"}}, "category": "感染症", "subcategory": "ウイルス感染症", "difficulty": "easy", "source_file": "第30回認定看護師認定審査.docx"}, "6": {"question_no": "6", "exam_year": 2022, "exam_name": "第30回", "section": "問題1", "type": "single_best", "question": "飛沫予防策に関する説明として、正しい組み合わせはどれか。",
