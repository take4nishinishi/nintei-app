<script>
window.EXAM_DATA_31 = {"第31回":{"meta":{"title":"第31回認定看護師認定審査","year":2023,"course":"感染管理(B課程)"},"questions":{"1":{"question_no":"1","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"感染症に関する説明として、正しい組み合わせはどれか。","stem_items":{"a":"MERSコロナウイルス(MERS-CoV)によって引き起こされる中東呼吸器症候群(MERS)の、医療機関におけるヒトーヒト感染は、報告されていない。","b":"ペストは、コウモリを介して伝播するウイルス疾患である。","c":"ジカウイルス感染症は、フラビウイルス科フラビウイルス属のウイルスによる蚊媒介感染症である。","d":"重症熱性血小板減少症候群は、ブニヤウイルス科フレボウイルス属のSFTSウイルスによるマダニが媒介する感染症である。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"4","explanation":{"overall":"ジカウイルス感染症はフラビウイルス科フラビウイルス属の蚊媒介感染症であり正しい。SFTSはブニヤウイルス科フレボウイルス属のSFTSウイルスをマダニが媒介する感染症であり正しい。MERSの医療機関内でのヒト－ヒト感染は複数報告されており、ペストはノミを介して伝播する細菌性疾患である。","each":{"a":"MERSの医療機関内ヒト－ヒト感染は報告されているため誤り。","b":"ペストはコウモリではなくノミを介して伝播する細菌性（Yersinia pestis）疾患であるため誤り。","c":"ジカウイルス感染症はフラビウイルス科フラビウイルス属の蚊媒介感染症であり正しい。","d":"SFTSはブニヤウイルス科フレボウイルス属のSFTSウイルスをマダニが媒介する感染症であり正しい。"}},"category":"感染症","subcategory":"新興・再興感染症","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"2":{"question_no":"2","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"消毒薬の濃度と適用として、正しい組み合わせはどれか。","stem_items":{"a":"膣炎患者の膣内は、1%クロルヘキシジングルコン酸塩液で洗浄する。","b":"ノロウイルス患者の吐物汚染を受けた床の消毒には、0.1%(1,000ppm)次亜塩素酸ナトリウムを使用する。","c":"腸管出血性大腸菌O26感染症患者が使用した便座は、アルコールで清拭する。","d":"手術に使用した膀胱鏡は、フタラールで消毒する。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"3","explanation":{"overall":"ノロウイルス患者の吐物で汚染された床の消毒には0.1%(1,000ppm)次亜塩素酸ナトリウムを使用する。腸管出血性大腸菌O26はアルコール感受性があり、便座の清拭にアルコールを使用できる。一方、1%クロルヘキシジングルコン酸塩液の膣内洗浄は適切ではない。また、手術に使用した膀胱鏡はクリティカル器材として滅菌が必要であり、フタラールによる高水準消毒では不十分である。","each":{"a":"クロルヘキシジングルコン酸塩1%の膣内洗浄は適切ではないため誤り。","b":"ノロウイルス患者の吐物で汚染された床には0.1%(1,000ppm)次亜塩素酸ナトリウムを使用するため正しい。","c":"腸管出血性大腸菌O26はアルコール感受性があり、アルコール清拭は有効であるため正しい。","d":"手術に使用した膀胱鏡はクリティカル器材として滅菌が必要であり、フタラールによる高水準消毒では不十分であるため誤り。"}},"category":"消毒・滅菌","subcategory":"消毒薬","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"3":{"question_no":"3","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"血液への職業曝露に関する説明として、正しいのはどれか。","choices":{"1":"B型肝炎ワクチンを1シリーズ接種し抗体獲得した看護師の抗体力価が10mIU/ml未満となった場合、追加接種を行う。","2":"HIV抗体陽性血液の粘膜曝露により、HIVに感染するリスクは約0.3%である。","3":"HIV抗体陽性血液に曝露した後の抗HIV薬の予防内服は、10週間継続することが推奨されている。","4":"HIV抗体陽性血液で汚染された針による経皮的曝露が発生した場合、曝露後5日以内に抗HIV薬の予防内服を行う。"},"answer":"1","explanation":{"overall":"B型肝炎ワクチンで抗体獲得後に抗体価が10mIU/ml未満に低下した場合は追加接種が推奨される。HIV粘膜曝露のリスクは約0.09%であり0.3%は経皮的曝露のリスク、予防内服は4週間継続、開始は72時間以内が原則である。","each":{"1":"抗体獲得後に抗体価が10mIU/ml未満に低下した場合は追加接種が推奨されるため正しい。","2":"HIV陽性血液の粘膜曝露による感染リスクは約0.09%であり、0.3%は経皮的曝露のリスクであるため誤り。","3":"HIV曝露後予防内服は4週間継続が推奨されており、10週間ではないため誤り。","4":"曝露後予防内服は72時間以内に開始することが推奨されており、5日以内では遅すぎるため誤り。"}},"category":"職業感染対策","subcategory":"血液曝露","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"4":{"question_no":"4","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"感染管理の関係法規に関する説明として、正しい組み合わせはどれか。","stem_items":{"a":"破傷風トキソイドは3～8週間間隔で2回接種し、初回免疫後6か月以上の間隔をおいて1回追加接種する。","b":"小児で接種する肺炎球菌ワクチンは、23価莢膜ポリサッカライドワクチンである。","c":"劇症型溶血性レンサ球菌感染症は、定点把握対象の感染症である。","d":"梅毒は、診断した場合は7日以内に届出する。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"2","explanation":{"overall":"破傷風トキソイドは3〜8週間隔で2回接種後、6か月以上あけて追加1回接種が正しい。梅毒は全数把握対象疾患であり、診断後7日以内の届出が必要である。小児の肺炎球菌ワクチンは13価結合型ワクチンであり、劇症型溶血性レンサ球菌感染症は全数把握対象である。","each":{"a":"破傷風トキソイドは3〜8週間隔で2回、その後6か月以上あけて追加1回接種であり正しい。","b":"小児に接種する肺炎球菌ワクチンは13価結合型（PCV13）であり、23価は成人向けであるため誤り。","c":"劇症型溶血性レンサ球菌感染症は定点把握ではなく全数把握対象疾患であるため誤り。","d":"梅毒は全数把握対象疾患であり、診断後7日以内に届出が必要であるため正しい。"}},"category":"感染症法","subcategory":"届出・ワクチン","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"5":{"question_no":"5","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"手術部位感染予防に有効性が認められている対策として、正しい組み合わせはどれか。","stem_items":{"a":"手術当日朝にシャワー浴を行う。","b":"感染症患者の手術を行った手術室は、高水準消毒薬を用いて消毒する。","c":"手術時手洗いは、水道水より滅菌水を用いた方が有効である。","d":"「手術部位感染予防のためのCDCガイドライン2017」では、周術期の血糖コントロールを行い200mg/dl未満を目標とするとしている。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"2","explanation":{"overall":"手術当日朝のシャワー浴はSSI予防に有効と認められている。CDC2017ガイドラインでは周術期血糖コントロールの目標値として200mg/dl未満を推奨している。感染症患者の手術室は通常の清掃・消毒で対応可能であり、手術時手洗いは水道水と滅菌水で有効性に差はない。","each":{"a":"手術当日朝のシャワー浴はSSI予防に有効であり正しい。","b":"感染症患者使用後の手術室に高水準消毒薬は不要であり、通常の環境清掃で対応するため誤り。","c":"手術時手洗いにおいて滅菌水と水道水の有効性に差はないとされているため誤り。","d":"CDC2017ではすべての手術患者で周術期血糖200mg/dl未満を目標とすることが推奨されており正しい。"}},"category":"手術部位感染","subcategory":"SSI予防","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"6":{"question_no":"6","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"小児の感染症に関する説明として、正しい組み合わせはどれか。","stem_items":{"a":"手足口病は、口腔粘膜および手や足などに現れる水疱性の発疹を主症状とした急性細菌感染症である。","b":"乳幼児に急性胃腸炎を引き起こすロタウイルスは、ノンエンベロープウイルスである。","c":"ヘルパンギーナの感染経路は、接触感染、飛沫感染、糞口感染である。","d":"咽頭結膜熱(プール熱)は、学校保健安全法で、主要症状が消退するまで出席停止とされている。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"3","explanation":{"overall":"ロタウイルスはノンエンベロープウイルスであり正しい。ヘルパンギーナの感染経路は接触・飛沫・糞口感染であり正しい。手足口病はウイルス性疾患であり細菌感染症ではない。咽頭結膜熱の出席停止基準は主要症状消退後2日を経過するまでである。","each":{"a":"手足口病はエンテロウイルス属によるウイルス性疾患であり、細菌感染症ではないため誤り。","b":"ロタウイルスはノンエンベロープウイルスであり正しい。","c":"ヘルパンギーナの感染経路は接触感染・飛沫感染・糞口感染であり正しい。","d":"咽頭結膜熱の出席停止基準は主要症状消退後2日を経過するまでであり、『消退するまで』では不十分であるため誤り。"}},"category":"感染症","subcategory":"小児感染症","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"7":{"question_no":"7","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"ファシリティマネジメントに関する説明として、正しい組み合わせはどれか。","stem_items":{"a":"レジオネラ属菌に対する熱消毒は50℃以上で行う。","b":"リネン類は80℃で10分間以上の洗濯処理を行う。","c":"「大量調理施設衛生管理マニュアル」では、調理従事者の検便には腸管出血性大腸菌の検査を含めることとしている。","d":"「大量調理施設衛生管理マニュアル」では、調理従事者がノロウイルス保有者と判明した場合、症状消失後48時間経過するまでの間、調理に直接従事しないこととしている。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"3","explanation":{"overall":"リネン類は80℃10分間以上の熱水洗濯が標準的な処理方法として正しい。大量調理施設衛生管理マニュアルでは調理従事者の検便に腸管出血性大腸菌検査を含めることが規定されている。レジオネラの熱消毒は50℃では不十分であり、ノロウイルス保有者の就業制限は症状消失後48時間のみではない。","each":{"a":"レジオネラ属菌の熱消毒は50℃では不十分であるため誤り。","b":"リネン類は80℃10分間以上の洗濯処理が推奨されており正しい。","c":"大量調理施設衛生管理マニュアルでは調理従事者の検便に腸管出血性大腸菌検査を含めることが規定されており正しい。","d":"ノロウイルス保有者の調理従事制限は症状消失後48時間のみを基準とするものではないため誤り。"}},"category":"ファシリティマネジメント","subcategory":"環境管理・給食管理","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"8":{"question_no":"8","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"image_question","question":"あるホテルで5月1日に朝食で提供されたサラダの喫食に由来する腸管出血性大腸菌O157による食中毒が発生した。このような単一の感染源による事例の典型的な流行曲線として、正しいのはどれか。","answer":"invalid","explanation":{"overall":"原問題は流行曲線の図を参照して解答する形式であるが、引用元の図が存在しないため判定不能。不適切問題として全員正解扱いとする。","each":{}},"category":"疫学","subcategory":"流行曲線","difficulty":"excluded","source_file":"第31回認定看護師認定審査.docx","note":"図欠落のため全員正解扱い","is_invalid":true,"score_mode":"full","auto_correct":true,"accepted_answers":["1"],"choices":{"1":"図欠落のため全員正解扱いで進む"}},"9":{"question_no":"9","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"統計学に関する説明として、正しいのはどれか。","choices":{"1":"ASAスコアの分布をヒストグラムで表した。","2":"二群の平均値の差の検定にt検定を用いた。","3":"入院患者の年齢が正規分布を示していたため、代表値として中央値を用いた。","4":"対象数10人と1,000人のデータでは、信頼区間の幅は10人の方が小さい。"},"answer":"2","explanation":{"overall":"二群の平均値の差の検定にはt検定を用いるのが適切である。ASAスコアは順序尺度でありヒストグラムではなく棒グラフが適切、正規分布では代表値として平均値を用い、対象数が多いほど信頼区間の幅は小さくなる。","each":{"1":"ASAスコアは順序尺度であり、ヒストグラムではなく棒グラフで表すのが適切であるため誤り。","2":"二群の平均値の差の検定にはt検定を用いるため正しい。","3":"正規分布を示す場合の代表値は中央値ではなく平均値を用いるため誤り。","4":"対象数が多いほど信頼区間の幅は小さくなるため、10人の方が小さいという記載は誤り。"}},"category":"疫学","subcategory":"統計学","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"10":{"question_no":"10","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"ノロウイルスに関する説明として、正しい組み合わせはどれか。","stem_items":{"a":"嘔吐物で汚染されたリネンの消毒は、85℃で1分間以上、熱水消毒する。","b":"消化器症状がある場合は、飛沫予防策を実施する。","c":"ヒトの大腸に感染し、増殖する。","d":"ノンエンベロープのRNAウイルスである。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"2","explanation":{"overall":"ノロウイルス汚染リネンの熱水消毒は85℃1分間以上が推奨されており正しい。ノロウイルスはノンエンベロープのRNAウイルスであり正しい。ノロウイルスは接触・経口感染が主であり飛沫予防策は通常不要、感染部位は大腸ではなく小腸である。","each":{"a":"ノロウイルス汚染リネンは85℃1分間以上の熱水消毒が推奨されており正しい。","b":"ノロウイルスは接触予防策が主体であり、飛沫予防策は通常適応されないため誤り。","c":"ノロウイルスはヒトの小腸で増殖するため誤り。","d":"ノロウイルスはノンエンベロープのRNAウイルスであり正しい。"}},"category":"感染症","subcategory":"ノロウイルス","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"11":{"question_no":"11","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"人工呼吸器関連肺炎予防の対策として、正しいのはどれか。","choices":{"1":"医学的に禁忌でなければ、経鼻気管挿管よりも、経口気管挿管を優先的に選択する。","2":"人工呼吸器装着中は、過鎮静を維持する。","3":"人工呼吸器の回路は、定期的に交換することが推奨されている。","4":"人工呼吸器の回路は、中水準消毒を行う。"},"answer":"1","explanation":{"overall":"経口気管挿管は経鼻に比べて副鼻腔炎リスクが低くVAP予防上優先される。過鎮静は人工呼吸器離脱を遅らせVAPリスクを高めるため避けるべきであり、回路の定期交換は推奨されず、回路は高水準消毒または滅菌が必要である。","each":{"1":"経口気管挿管は副鼻腔炎リスクが低くVAP予防上推奨されており正しい。","2":"過鎮静は人工呼吸器装着期間を延長しVAPリスクを高めるため誤り。","3":"人工呼吸器回路の定期交換はVAP予防効果がなく推奨されていないため誤り。","4":"人工呼吸器回路は高水準消毒または滅菌が必要であり、中水準消毒では不十分であるため誤り。"}},"category":"医療関連感染","subcategory":"VAP","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"12":{"question_no":"12","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"薬剤耐性菌に関する説明として、正しい組み合わせはどれか。","stem_items":{"a":"基質拡張型β-ラクタマーゼ(ESBL)産生大腸菌は、家畜類から分離され、食肉を介してヒトに伝播する可能性が指摘されている。","b":"感染症法において、薬剤耐性アシネトバクター(MDRA)感染症は定点把握対象疾患である。","c":"感染症法において、カルバペネム耐性腸内細菌目細菌感染症は、広域β-ラクタム薬、アミノ配糖体、フルオロキノロンの3系統の薬剤に対して耐性を示す腸内細菌目細菌による感染症と定義付けられている。","d":"バンコマイシン耐性腸球菌(VRE)のvanC型は、自然耐性菌である。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"2","explanation":{"overall":"ESBL産生大腸菌は家禽類から分離され食肉を介したヒトへの伝播が指摘されており正しい。VREのvanC型は自然耐性であり正しい。MDRAは定点把握ではなく全数把握対象疾患であり、3系統耐性の定義はCREではなく薬剤耐性緑膿菌（MDRP）の定義である。","each":{"a":"ESBL産生大腸菌は家畜類から分離され、食肉を介してヒトに伝播する可能性が指摘されており正しい。","b":"薬剤耐性アシネトバクター感染症は定点把握ではなく5類全数把握対象疾患であるため誤り。","c":"広域β-ラクタム薬・アミノ配糖体・フルオロキノロンの3系統耐性の定義は薬剤耐性緑膿菌（MDRP）の定義であり、CREの定義ではないため誤り。","d":"VREのvanC型はEnterococcus casseliflavus等が本来保有する自然耐性であり正しい。"}},"category":"薬剤耐性菌","subcategory":"AMR","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"13":{"question_no":"13","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"微生物に関する説明として、正しい組み合わせはどれか。","stem_items":{"a":"つつが虫病は、ヒトスジシマカを介してヒトに感染する感染症である。","b":"水痘は、単純ヘルペスウイルス(herpes simplex virus:HSV)によって起こる感染症である。","c":"ポリオウイルスは、ノンエンベロープウイルスである。","d":"流行性角結膜炎(EKC)は、アデノウイルスによる感染症である。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"4","explanation":{"overall":"ポリオウイルスはノンエンベロープウイルスであり正しい。流行性角結膜炎はアデノウイルスによる感染症であり正しい。つつが虫病はツツガムシを介した感染症であり、水痘は水痘・帯状疱疹ウイルス（VZV）による感染症である。","each":{"a":"つつが虫病はヒトスジシマカではなくツツガムシを介して感染するため誤り。","b":"水痘は単純ヘルペスウイルスではなく水痘・帯状疱疹ウイルス（VZV）による感染症であるため誤り。","c":"ポリオウイルスはノンエンベロープウイルスであり正しい。","d":"流行性角結膜炎はアデノウイルスによる感染症であり正しい。"}},"category":"微生物","subcategory":"ウイルス・媒介感染症","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"14":{"question_no":"14","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"感染経路別予防策に関する説明として、正しい組み合わせはどれか。","stem_items":{"a":"髄膜炎菌による敗血症には、効果的な治療を開始後24時間が経過するまで飛沫予防策を実施する。","b":"播種性病変がみられる帯状疱疹の患者には、空気予防策と接触予防策を行う。","c":"多剤耐性緑膿菌(MDRP)による肺炎患者には、飛沫予防策を行う。","d":"B型肝炎の治療中の患者には、接触予防策を行う。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"1","explanation":{"overall":"髄膜炎菌感染症は効果的な治療開始後24時間まで飛沫予防策を実施する。播種性帯状疱疹は空気予防策と接触予防策の両方が必要である。MDRPは接触予防策が主体であり飛沫予防策は不要、B型肝炎は標準予防策で対応し接触予防策は不要である。","each":{"a":"髄膜炎菌感染症は効果的な治療開始後24時間まで飛沫予防策を実施するため正しい。","b":"播種性帯状疱疹は空気感染と接触感染のリスクがあるため、空気予防策と接触予防策の両方を実施するため正しい。","c":"MDRPによる肺炎には飛沫予防策ではなく接触予防策を実施するため誤り。","d":"B型肝炎治療中の患者には接触予防策ではなく標準予防策で対応するため誤り。"}},"category":"感染経路別予防策","subcategory":"標準予防策・感染経路別予防策","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"15":{"question_no":"15","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"手指衛生について、正しい組み合わせはどれか。","stem_items":{"a":"芽胞形成菌保有者のケアの後は、擦式アルコール手指消毒薬で手指衛生を行う。","b":"エンベロープを有するウイルス保有者のケアの後は、擦式アルコール手指消毒薬で手指衛生を行う。","c":"手指衛生の直接観察法は、観察者の影響を受け、遵守率が高くなる可能性があることが欠点である。","d":"手術時手洗いのラビング法は、ブラシと石鹸を用いた手洗い後、擦式アルコール手指消毒薬で消毒する方法である。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"3","explanation":{"overall":"エンベロープを有するウイルスはアルコールで不活化可能であり擦式アルコール手指消毒薬が有効である。手指衛生の直接観察法はホーソン効果により遵守率が実態より高く観察される可能性があることが欠点として知られている。芽胞形成菌にはアルコールが無効であり流水と石鹸による手洗いが必要で、ラビング法はブラシを使用しない。","each":{"a":"芽胞形成菌にはアルコールが無効であるため、流水と石鹸による手洗いが必要であり誤り。","b":"エンベロープを有するウイルスはアルコールで不活化可能であり、擦式アルコール手指消毒薬が有効であるため正しい。","c":"直接観察法はホーソン効果により遵守率が実態より高く評価される可能性があることが欠点であり正しい。","d":"ラビング法はブラシや石鹸を使用せず、擦式アルコール手指消毒薬を用いる方法であるため誤り。"}},"category":"手指衛生","subcategory":"WHO・手術時手洗い","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"16":{"question_no":"16","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"防護環境に関する説明として、正しいのはどれか。","choices":{"1":"防護環境は、廊下に対して等圧でなければならない。","2":"防護環境は、レジオネラへの曝露予防に有効である。","3":"自家造血幹細胞移植を受けた患者は、防護環境に入室させる必要がある。","4":"防護環境では、室内の換気回数を12回/時間以上とする。"},"answer":"4","explanation":{"overall":"防護環境は陽圧管理、HEPAフィルター、12回/時間以上の換気を備えた環境であり、主にアスペルギルスなど空気中真菌から易感染患者を保護することを目的とする。自家造血幹細胞移植患者には通常推奨されず、主な対象は同種造血幹細胞移植患者である。","each":{"1":"防護環境は廊下に対して陽圧管理が必要であり、等圧では不十分であるため誤り。","2":"防護環境の主目的はアスペルギルスなど空気中真菌からの保護であり、レジオネラ予防を主目的とした環境ではないため誤り。","3":"防護環境はCDCガイドラインで同種造血幹細胞移植患者に推奨されており、自家移植患者には通常不要であるため誤り。","4":"防護環境では12回/時間以上の換気、HEPAフィルター、陽圧管理が求められるため正しい。"}},"category":"環境管理","subcategory":"防護環境","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"17":{"question_no":"17","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"滅菌に関する説明として、正しいのはどれか。","choices":{"1":"ボウィー・ディックテストは、高圧蒸気滅菌器内の滅菌効果を確認するものである。","2":"過酸化水素低温ガスプラズマ滅菌には残留毒性があるため、滅菌処理工程が終了した後にエアレーションを行う。","3":"高圧蒸気滅菌を行う場合、滅菌温度121℃で5分間の保持時間が必要である。","4":"過酸化水素低温ガスプラズマ滅菌は、セルロースやパルプを含む製品の滅菌には不向きである。"},"answer":"4","explanation":{"overall":"過酸化水素低温ガスプラズマ滅菌はセルロース・パルプ・リネン類を含む製品には不向きであり正しい。ボウィー・ディックテストは蒸気浸透性の確認であり滅菌効果の確認ではない。エアレーションが必要なのはEOG滅菌であり、高圧蒸気滅菌121℃では15分間以上の保持が必要である。","each":{"1":"ボウィー・ディックテストは高圧蒸気滅菌器内の空気残留や蒸気浸透性を確認するものであり、滅菌効果の確認ではないため誤り。","2":"エアレーションが必要なのは酸化エチレンガス（EOG）滅菌であり、過酸化水素低温ガスプラズマ滅菌には残留毒性がなくエアレーション不要であるため誤り。","3":"高圧蒸気滅菌121℃では15分間以上の保持時間が必要であり、5分間では不十分であるため誤り。","4":"過酸化水素低温ガスプラズマ滅菌はセルロースやパルプを含む製品には不向きであるため正しい。"}},"category":"滅菌・消毒","subcategory":"滅菌法","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"18":{"question_no":"18","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"ワクチンに関する説明として、正しいのはどれか。","choices":{"1":"水痘ワクチンは、定期接種のワクチンである。","2":"インフルエンザワクチン接種後に水痘ワクチン接種をする場合は、6日以上間隔をあける。","3":"MRワクチンとは、麻疹と水痘の混合ワクチンである。","4":"医療従事者の水痘に対する免疫を確認するための抗体検査は、補体結合試験(CF法)で行うことが推奨されている。"},"answer":"1","explanation":{"overall":"水痘ワクチンは2014年より定期接種に追加されており正しい。インフルエンザワクチンは不活化ワクチンであるため、その後に生ワクチンを接種する場合でも間隔制限は不要である。MRワクチンは麻疹と風疹の混合ワクチンであり、水痘抗体検査はCF法ではなくEIA法が推奨されている。","each":{"1":"水痘ワクチンは2014年より定期接種に追加されており正しい。","2":"インフルエンザワクチンは不活化ワクチンであり、その後に生ワクチンを接種する場合でも間隔制限は不要であるため誤り。","3":"MRワクチンは麻疹（Measles）と風疹（Rubella）の混合ワクチンであり、水痘ではないため誤り。","4":"水痘抗体検査はCF法ではなくEIA法が推奨されているため誤り。"}},"category":"ワクチン","subcategory":"予防接種","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"19":{"question_no":"19","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"インフルエンザに関する説明として、正しい組み合わせはどれか。","stem_items":{"a":"学校保健安全法において、インフルエンザを発症した場合の出席停止期間は、解熱後2日を経過するまでとされている。","b":"感染症法において、鳥インフルエンザA(H5N1)と鳥インフルエンザA(H7N9)は、二類感染症に位置づけられている。","c":"インフルエンザウイルスは、エンベロープを有するRNAウイルスである。","d":"インフルエンザと診断された患者は、陰圧個室に隔離しなければならない。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"3","explanation":{"overall":"鳥インフルエンザA(H5N1)とA(H7N9)はともに二類感染症に分類されている。インフルエンザウイルスはエンベロープを有するRNAウイルスである。学校保健安全法での出席停止期間は発症後5日かつ解熱後2日（幼児は3日）を経過するまでであり、インフルエンザ対策の基本は飛沫予防策である。","each":{"a":"学校保健安全法ではインフルエンザの出席停止期間は『発症後5日かつ解熱後2日（幼児は3日）を経過するまで』であり、解熱後2日のみでは不十分であるため誤り。","b":"鳥インフルエンザA(H5N1)およびA(H7N9)は感染症法上の二類感染症に分類されており正しい。","c":"インフルエンザウイルスはエンベロープを有するRNAウイルスであり正しい。","d":"インフルエンザの標準的な感染対策は飛沫予防策であり、陰圧個室への隔離は必須ではないため誤り。"}},"category":"感染症","subcategory":"インフルエンザ","difficulty":"easy","source_file":"第31回認定看護師認定審査.docx"},"20":{"question_no":"20","exam_year":2023,"exam_name":"第31回","section":"問題1","type":"single_best","question":"細菌培養検査の検体採取として、正しいのはどれか。","choices":{"1":"血液検体は、好気性菌用ボトル、嫌気性菌用ボトルの順に血液を注入する。","2":"喀痰の肉眼的品質評価Miller & Jonesの分類でPⅠに該当する喀痰検体は、唾液、完全な喀痰であるため検査に適さない。","3":"髄液検体は、室温または37℃保存とする。","4":"尿道カテーテルを留置している患者の尿検体は、採尿バッグの廃液口から採取する。"},"answer":"3","explanation":{"overall":"髄液検体は低温に弱い菌を含む可能性があるため室温または37℃保存が推奨される。血液培養のボトル注入順は採血方法によって異なり、喀痰は品質評価を行う。尿道カテーテル留置患者の尿検体は採尿ポートから無菌的に採取する。","each":{"1":"血液培養のボトル注入順は採血方法によって異なり、常に好気性菌用ボトルを先に注入するわけではないため誤り。","2":"Miller & Jones分類では品質評価を行うが、記載内容は不正確であり誤り。","3":"髄液検体は低温に弱い菌を含む可能性があるため室温または37℃保存が推奨されており正しい。","4":"尿道カテーテル留置患者の尿検体は採尿バッグ廃液口ではなく採尿ポートから無菌的に採取するため誤り。"}},"category":"微生物検査","subcategory":"検体採取","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"}},"section2":{"title":"問題2","cases":{"case1":{"case_no":"1","description":"事例1\n次の文を読み、問21から問23に対する適切な答えを一つ選んでください。\nあなたは病院の感染管理認定看護師です。2020年8月10日に臨床検査技師より内科病棟でメチシリン耐性黄色ブドウ球菌（MRSA）が検出された患者について連絡がありました。\n院内獲得の判定は、入院48時間以降に起こった感染症としています。\n・A氏は4人部屋に入院しており、同室にB氏、C氏、D氏がいる。\n・A氏の褥瘡からMRSAが検出されている。\n・A氏は、褥瘡の感染を発症しており治療が開始されている。\n\n8月12日に、同室者のB氏、C氏の2名と、別の個室に入院中のE氏から新たにMRSAが検出されました。MRSAが検出された4名の状況は、以下の通りです。","assets":{"tables":{"table1_mrsa_patients":{"title":"表1 MRSA検出患者一覧","data":[{"患者":"A氏","入院日":"8/6","検査日":"8/7","検出検体":"褥瘡滲出液"},{"患者":"B氏","入院日":"7/27","検査日":"8/8","検出検体":"褥瘡滲出液"},{"患者":"C氏","入院日":"8/1","検査日":"8/9","検出検体":"喀痰"},{"患者":"E氏","入院日":"8/1","検査日":"8/10","検出検体":"喀痰"}]}}},"questions":{"21":{"question_no":"21","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"1","question":"MRSAに関する説明として、正しい組み合わせはどれか。","stem_items":{"a":"MRSAの指定届出医療機関は、月毎に保健所に届けなければならない。","b":"MRSAのメシチリン耐性は、mecA遺伝子にコードされたバンコマイシン低親和性の細胞壁合成酵素PBP2'による。","c":"MRSA保菌患者に対して、除菌を目的とした抗MRSA薬の投与を行う。","d":"薬剤耐性(AMR)対策アクションプランのヒトに関しての成果指標は、黄色ブドウ球菌のメチシリン耐性率を20％以下に低下させることである。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"2","explanation":{"overall":"MRSA感染症は感染症法上の定点把握対象疾患であり、指定届出医療機関は月ごとに報告する。また、AMR対策アクションプランでは黄色ブドウ球菌のメチシリン耐性率20％以下が成果指標として設定されている。mecA遺伝子はβ-ラクタム薬低親和性PBP2aをコードし、保菌者に対する抗MRSA薬による除菌は推奨されない。","each":{"a":"MRSA感染症は定点把握対象疾患であり、指定届出医療機関は月ごとに保健所へ報告するため正しい。","b":"mecA遺伝子がコードするのはβ-ラクタム薬低親和性PBP2aであり、バンコマイシン低親和性ではないため誤り。","c":"MRSA保菌のみを理由とした抗MRSA薬による除菌は推奨されないため誤り。","d":"AMR対策アクションプランでは黄色ブドウ球菌のメチシリン耐性率を20％以下に低下させることが成果指標となっており正しい。"}},"category":"薬剤耐性菌","subcategory":"MRSA","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"22":{"question_no":"22","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"1","type":"single_best","question":"連絡を受けたあなたが実施する対策として、正しい組み合わせはどれか。","stem_items":{"a":"高頻度接触表面を低水準消毒薬を含むクロスで清拭する。","b":"D氏を別室に移動し、A氏、B氏、C氏、E氏でコホート隔離する。","c":"A氏とD氏は同室のため、血圧計を共有する。","d":"C氏とE氏は、飛沫予防策を実施する。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"1","explanation":{"overall":"MRSA対策では高頻度接触表面を低水準消毒薬含有クロスで清拭することは標準的な環境整備として正しい。またMRSA検出患者をコホート隔離し未検出のD氏を別室に移動する対応は適切である。MRSAは接触予防策が基本であり飛沫予防策は不要、医療器具は患者間で共有せず専用化が原則である。","each":{"a":"高頻度接触表面を低水準消毒薬含有クロスで清拭することは接触予防策の環境整備として正しい。","b":"未検出のD氏を別室に移動し、MRSA検出患者でコホート隔離する対応は適切であり正しい。","c":"血圧計等の医療器具は患者間で共有せず専用化または使用後消毒が必要であるため誤り。","d":"MRSAの感染経路は接触感染であり、喀痰からの検出であっても飛沫予防策は通常適応されないため誤り。"}},"category":"薬剤耐性菌","subcategory":"MRSAアウトブレイク対応","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"23":{"question_no":"23","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"1","type":"single_best","question":"当該内科病棟の8月のMRSAに関する説明として、正しいのはどれか。","choices":{"1":"院内獲得の発生率(incidence rate)は、10%である。","2":"内科病棟の致死率(case fatality rate)は、33.3%である。","3":"内科病棟の発生密度率(incidence density rate)は、1.0%である。","4":"内科病棟の有病率は、1.3%である。"},"answer":"4","explanation":{"overall":"有病率はMRSA発症患者4名を8月1日から8月31日までの入院患者数300名で割り、4÷300×100=1.33%となるため1.3%である。致死率は死亡1名を発症患者4名で割るため25%であり、院内獲得発生率はB氏、C氏、E氏の3名を300名で割るため1.0%である。発生密度率は人日を分母とする指標であり、%表記で1.0%とする記述は不適切である。","each":{"1":"院内獲得はB氏、C氏、E氏の3名であり、3÷300×100=1.0%であるため誤り。","2":"致死率の分母は発症者全員4名であり、死亡1名÷発症4名×100=25%となるため33.3%は誤り。","3":"発生密度率は人日を分母とする指標であり、%表記での1.0%という記述は不適切であるため誤り。","4":"有病率はMRSA発症患者4名÷入院患者300名×100=1.3%であり正しい。"}},"category":"サーベイランス","subcategory":"発生率・発生密度率・有病率","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"}}},"case2":{"case_no":"2","description":"事例2\n次の文を読み、問24から問26に対する適切な答えを一つ選んでください。\n\nあなたは病院の感染管理認定看護師です。3月10日、内科一般病棟から「3月8日に入院した患者F氏が、肺結核の可能性がある」と連絡がありました。あなたが病棟で確認すると以下の事がわかりました。\n・入院時に撮影した胸部X線の放射線科読影結果で、F氏に結節影と空洞影が確認された。\n・F氏は微熱と頻繁な咳嗽があり、肺炎疑いで4人部屋に入院している。\n・F氏と接触した職員は、担当医師2名と担当の看護チーム、胸部X線を撮影した技師のみである。\n・3月10日に採取した喀痰塗抹検査(チール・ニールセン染色)の結果、抗酸菌が陽性(1+)であった。\n・同室患者は他に3名いるが、F氏の入院時から部屋を移動した患者はいない。\n・F氏の喀痰の核酸増幅検査(PCR)の結果は、3月12日に判明する予定である。","questions":{"24":{"question_no":"24","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"2","type":"single_best","question":"3月10日の状況に基づく判断として、正しい組み合わせはどれか。","stem_items":{"a":"感染症法の規定による結核の届出を行う。","b":"2回目以降の喀痰抗酸菌塗抹検査は、前回の検体採取から8～24時間以上の間隔を空ける。","c":"F氏を空気感染隔離室(陰圧室)へ移動する。","d":"F氏と接触した職員を就業制限とする。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"3","explanation":{"overall":"抗酸菌塗抹陽性の時点で結核を強く疑い、空気感染隔離室への移動は直ちに実施すべきである。複数回の喀痰検査は8～24時間以上の間隔をあけて採取するのが標準的手順である。結核の届出は確定診断後に行うものであり塗抹陽性のみでは届出不要、接触職員の就業制限はこの時点では不要である。","each":{"a":"結核の届出は確定診断後に行うものであり、塗抹陽性のみでは届出の要件を満たさないため誤り。","b":"2回目以降の喀痰抗酸菌塗抹検査は前回採取から8～24時間以上の間隔をあけて採取するため正しい。","c":"抗酸菌塗抹陽性で結核を強く疑う状況であり、直ちに空気感染隔離室へ移動する必要があるため正しい。","d":"接触職員の就業制限はこの時点では不要であり、確定診断後に接触者健診を実施して判断するため誤り。"}},"category":"結核","subcategory":"空気予防策・接触者対応","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"25":{"question_no":"25","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"2","type":"single_best","question":"当該内科一般病棟の職員に対して指導する内容として、正しいのはどれか。","choices":{"1":"F氏が滞在していたベッド周囲の床や壁は、次亜塩素酸ナトリウムを用いて消毒する。","2":"F氏の病室へ入る際は、N95レスピレーター着用時に毎回ユーザーシールチェックを実施する。","3":"飛沫核拡散防止のため、F氏にはN95レスピレーターを着用してもらう。","4":"空気感染隔離室使用時は、差圧の確認を週1回実施する。"},"answer":"2","explanation":{"overall":"N95レスピレーターは着用のたびにユーザーシールチェックを実施することが必須である。結核菌は環境表面からの感染リスクは低く床・壁への次亜塩素酸消毒は不要、患者にはサージカルマスクを着用させるのが正しく、空気感染隔離室の差圧確認は週1回ではなく毎日実施する。","each":{"1":"結核菌は空気感染であり床・壁の次亜塩素酸消毒は通常不要であるため誤り。","2":"N95レスピレーターは着用のたびにユーザーシールチェックを実施する必要があり正しい。","3":"飛沫核拡散防止のため患者にはサージカルマスクを着用させるのが正しく、N95レスピレーターは医療者が着用するものであるため誤り。","4":"空気感染隔離室の差圧確認は週1回ではなく毎日実施する必要があるため誤り。"}},"category":"結核","subcategory":"空気予防策","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"26":{"question_no":"26","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"2","type":"single_best","question":"3月12日、F氏の喀痰のPCRの結果で結核菌と判明したため、「感染症法に基づく結核の接触者健康診断の手引き(改訂第6版)」に従い、F氏との接触者に対して健康診断を行うことになりました。接触者の健康診断に関する説明として、正しい組み合わせはどれか。","stem_items":{"a":"医療従事者とF氏の合計接触時間は8時間を超えていないため、同室患者のみ濃厚接触者と判断する。","b":"F氏の感染性期間の始期は、診断の3か月前とする。","c":"濃厚接触者には、最終接触から2〜3か月後にインターフェロンγ遊離試験（IGRA）を実施する。","d":"IGRAの結果が陽性であった接触者は、無症状であれば受診を見送る。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"3","explanation":{"overall":"結核の感染性期間の始期は診断の3か月前とするのが原則である。IGRAは最終接触から2〜3か月後に実施する。医療従事者は累積接触時間にかかわらず濃厚接触者として扱われる場合があり、IGRA陽性者は無症状でも受診・精査が必要である。","each":{"a":"医療従事者は接触時間が8時間未満でも感染リスクがあり濃厚接触者として扱うため誤り。","b":"感染性期間の始期は診断の3か月前とするため正しい。","c":"IGRAは最終接触から2〜3か月後に実施するため正しい。","d":"IGRA陽性者は無症状であっても活動性結核の除外のために受診・精査が必要であるため誤り。"}},"category":"結核","subcategory":"接触者健診","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"}}},"case3":{"case_no":"3","description":"事例3\n次の文を読み、問27から問29に対する適切な答えを一つ選んでください。\nあなたは病院の感染管理認定看護師です。集中治療室（ICU）において中心ライン関連血流感染（CLABSI）サーベイランスを実施しています。臨床的敗血症は判定していません。2022年度の結果は表1の通りでした。また、表1の結果は表2、3のベンチマークと比較しました。","assets":{"tables":{"table1_clabsi_surveillance":{"title":"表1 CLABSIサーベイランス結果 ICU 2022年度","columns":["CLABSI発生件数","延べ中心ライン使用日数","延べ入院患者日数","入院患者数","CLABSI発生密度率","中心ライン使用比"],"data":[{"CLABSI発生件数":10,"延べ中心ライン使用日数":2500,"延べ入院患者日数":4000,"入院患者数":3000,"CLABSI発生密度率":"a","中心ライン使用比":"b"}]},"table2_clabsi_benchmark":{"title":"表2 中心ライン関連血流感染率（期間及び病床種類別）","note":"集計期間：①2022/07/01～2022/12/31、②2020/01/01～2022/12/31","columns":["集計期間","感染","病床種類","病棟数","感染件数","中心ライン使用日","Pooled mean","10%","25%","50%(median)","75%","90%"],"data":[{"集計期間":"①","感染":"LCBI","病床種類":"ICU(2層)","病棟数":87,"感染件数":71,"中心ライン使用日":49223,"Pooled mean":1.4,"10%":0,"25%":0,"50%(median)":0,"75%":2.3,"90%":3.8},{"集計期間":"②","感染":"LCBI","病床種類":"ICU(2層)","病棟数":96,"感染件数":421,"中心ライン使用日":255404,"Pooled mean":1.6,"10%":0,"25%":0.4,"50%(median)":1.4,"75%":2.3,"90%":3.7}]},"table3_central_line_utilization_ratio":{"title":"表3 中心ライン・器具使用比（期間及び病床種類別）","note":"集計期間：①2022/07/01～2022/12/31、②2020/01/01～2022/12/31","columns":["集計期間","病床種類","病棟数","中心ライン使用日","延べ入院患者数","Pooled mean","10%","25%","50%(median)","75%","90%"],"data":[{"集計期間":"①","病床種類":"ICU(2層)","病棟数":87,"中心ライン使用日":49223,"延べ入院患者数":104613,"Pooled mean":0.47,"10%":0.13,"25%":0.32,"50%(median)":0.49,"75%":0.61,"90%":0.73},{"集計期間":"②","病床種類":"ICU(2層)","病棟数":96,"中心ライン使用日":255404,"延べ入院患者数":529579,"Pooled mean":0.48,"10%":0.15,"25%":0.35,"50%(median)":0.52,"75%":0.64,"90%":0.72}]}}},"questions":{"27":{"question_no":"27","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"3","type":"single_best","question":"表1のaに当てはまる数値について、正しいのはどれか。","choices":{"1":"0.3","2":"0.4","3":"3.3","4":"4.0"},"answer":"4","explanation":{"overall":"CLABSI発生密度率はCLABSI発生件数÷延べ中心ライン使用日数×1,000で算出する。10÷2,500×1,000=4.0となる。","each":{"1":"0.3は計算結果と一致しないため誤り。","2":"0.4は計算結果と一致しないため誤り。","3":"3.3は計算結果と一致しないため誤り。","4":"10÷2,500×1,000=4.0であり正しい。"}},"category":"サーベイランス","subcategory":"CLABSI発生密度率","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"28":{"question_no":"28","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"3","type":"single_best","question":"表1のbに当てはまる数値について、正しいのはどれか。","choices":{"1":"0.75","2":"0.83","3":"0.63","4":"1.60"},"answer":"3","explanation":{"overall":"中心ライン使用比は延べ中心ライン使用日数÷延べ入院患者日数で算出する。2,500÷4,000=0.625≒0.63となる。","each":{"1":"0.75は計算結果と一致しないため誤り。","2":"0.83は計算結果と一致しないため誤り。","3":"2,500÷4,000=0.625≒0.63であり正しい。","4":"1.60は計算結果と一致しないため誤り。"}},"category":"サーベイランス","subcategory":"中心ライン使用比","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"29":{"question_no":"29","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"3","type":"single_best","question":"表1のデータを表2・表3のベンチマークデータと比較した結果に関する説明として、正しいのはどれか。","choices":{"1":"感染率と中心ライン使用比がともに高いことから、不要な中心ラインを速やかに抜去する取り組みが必要である。","2":"感染率が高く中心ライン使用比が低いことから、中心ライン使用に不慣れと考え、挿入手技や管理方法の見直し、感染対策を振り返る必要がある。","3":"感染率が低く中心ライン使用比が高いことから、中心ラインの使用頻度を下げることができれば、感染率も更に減少することができる。","4":"感染率と中心ライン使用比が低いことから、中心ラインの使用頻度が上がった時に感染率も上がる可能性があり、日頃からマニュアルを整備する必要がある。"},"answer":"1","explanation":{"overall":"自院のCLABSI発生密度率は4.0であり、ベンチマーク②の90パーセンタイル3.7を超えているため感染率は高い。中心ライン使用比は0.63であり、ベンチマーク②の中央値0.52より高く、75パーセンタイル0.64付近であるため高めと判断する。したがって感染率と中心ライン使用比がともに高く、不要な中心ラインを速やかに抜去する取り組みが必要である。","each":{"1":"感染率4.0は90パーセンタイルを超えており、中心ライン使用比0.63も中央値より高く75パーセンタイル付近であるため正しい。","2":"感染率は高いが、中心ライン使用比は低くないため誤り。","3":"感染率は低くなく高値であるため誤り。","4":"感染率と中心ライン使用比はいずれも低いとはいえないため誤り。"}},"category":"サーベイランス","subcategory":"CLABSIベンチマーク比較","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"}}},"case4":{"case_no":"4","description":"事例4\n次の文を読み、問30から問31に対する適切な答えを一つ選んでください。\nあなたは病院の感染管理認定看護師です。7月8日に小児病棟の師長から、入院中の患児G氏に麻疹の疑いがあると報告がありました。あなたが情報収集したところ、G氏について以下のことがわかりました。\n・7月3日　38℃の発熱、脱水のため4人部屋に入院した。\n・7月5日　37℃に解熱した。\n・7月6日　39℃の発熱と発疹が出現したため、医師は麻疹を疑い抗体検査を行った。\n・7月8日　麻疹抗体検査の結果、麻疹IgM陽性、IgG陰性であった。\n同室者の情報は以下の通りでした。\n・すべての患児が、7月3日以前から入院しており、麻疹罹患歴はなかった。また、麻疹ワクチンの接種歴は以下の通りであった。\nH氏（7歳）　0歳時と7歳時に接種\nI氏（6歳）　1歳時に接種\nJ氏（7歳）　接種歴なし","assets":{},"questions":{"30":{"question_no":"30","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"4","type":"single_best","question":"7月8日現在のG氏への対応として、正しいのはどれか。","choices":{"1":"G氏を陰圧室に収容する。","2":"G氏にMRワクチンを接種する。","3":"G氏に72時間以内にγ-グロブリンを投与する。","4":"感染症法五類の全数把握のため、7日以内に保健所へ麻疹発生届を提出する。"},"answer":"1","explanation":{"overall":"G氏は発熱・発疹があり、麻疹IgM陽性、IgG陰性で麻疹が強く疑われるため、空気予防策として陰圧室に収容する対応が必要である。発症後のG氏本人にMRワクチンやγ-グロブリンを投与する対応ではない。麻疹は感染症法上の五類全数把握対象疾患であるが、診断後は7日以内ではなく直ちに届出が必要である。","each":{"1":"麻疹は空気感染するため、G氏を陰圧室に収容し空気予防策を実施する必要があり正しい。","2":"G氏はすでに麻疹を発症している状況であり、本人へのMRワクチン接種は対応として適切ではないため誤り。","3":"γ-グロブリンは主に麻疹曝露後の感受性者への発症予防として検討するものであり、発症しているG氏本人への対応ではないため誤り。","4":"麻疹は五類全数把握対象疾患であるが、届出は7日以内ではなく直ちに行う必要があるため誤り。"}},"category":"感染症","subcategory":"麻疹","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"31":{"question_no":"31","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"4","type":"single_best","question":"7月8日現在の同室者への対応として、正しいものを2つ選択しなさい。","stem_items":{"a":"H氏、I氏、J氏の麻疹IgG検査を行う。","b":"H氏、I氏、J氏に緊急麻疹ワクチンを接種する。","c":"J氏にγ-グロブリンの投与は必要ない。","d":"H氏、I氏、J氏を発症する可能性のある期間は、個室に移動する。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"2","explanation":{"overall":"同室者全員の麻疹IgG検査で免疫状態を確認することは適切である。麻疹の潜伏期間は8〜12日であり発症可能性のある期間は個室隔離が必要である。緊急ワクチンは曝露後72時間以内が有効であり全員への一律接種は不適切、J氏は接種歴なし・罹患歴なしのため免疫がなくγ-グロブリンが必要な可能性がある。","each":{"a":"同室者全員の麻疹IgG検査で免疫状態を確認することは適切であり正しい。","b":"緊急ワクチンは曝露後72時間以内が対象であり、免疫状態確認前の全員への一律接種は不適切であるため誤り。","c":"J氏は接種歴・罹患歴ともになく免疫がないためγ-グロブリン投与が必要な可能性があり誤り。","d":"麻疹の潜伏期間を考慮し、発症可能性のある期間は個室隔離が必要であり正しい。"}},"category":"感染症","subcategory":"麻疹曝露後対応","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"}}},"case5":{"case_no":"5","description":"事例5\n次の文を読み、問32から問34に対する適切な答えを一つ選んでください。\nあなたは病院の感染管理認定看護師です。3月24日に内科病棟の看護師長から「昨日入院したK氏に発疹が出現し風疹の疑いがあると言われた。どうしたらいいか」と相談を受けました。情報収集を行ったところ、以下のことがわかりました。\n・K氏は43歳男性で個室に入院した。\n・入院時より耳介後部の腫脹があり、微熱（37.2℃）があった。\n・3月24日、顔に発疹が出現し皮膚科を受診した。","assets":{},"questions":{"32":{"question_no":"32","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"5","type":"single_best","question":"当該内科病棟で行う感染対策として、正しいものを2つ選択しなさい。","stem_items":{"a":"K氏に対して空気予防策を実施する。","b":"内科病棟に入院している患者全員の風疹IgMを測定する。","c":"K氏へのケアは、ウイルスに対して十分量の特異抗体価を有する者が優先して行う。","d":"K氏が病室の外へ出る際は、K氏にサージカルマスクを着用してもらう。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"4","explanation":{"overall":"風疹は飛沫感染であり空気予防策は不要でサージカルマスクで対応可能、ケアは風疹抗体を有する者が優先して行うことで医療者への感染リスクを下げられる。入院患者全員のIgM測定は不要であり、K氏が病室外に出る際はサージカルマスク着用が適切である。","each":{"a":"風疹の感染経路は飛沫感染であり空気予防策は不要であるため誤り。","b":"接触者を特定した上で対応すべきであり、入院患者全員のIgM測定は過剰対応であるため誤り。","c":"風疹に対して十分な抗体価を有する者がケアを優先して行うことは適切であり正しい。","d":"K氏が病室外に出る際はサージカルマスクを着用させることで飛沫拡散を防止でき正しい。"}},"category":"感染症","subcategory":"風疹","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"33":{"question_no":"33","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"5","type":"single_best","question":"検査の結果、K氏は風疹と診断された。当該内科病棟の職員への対応として、正しいものを2つ選択しなさい。","stem_items":{"a":"K氏に接触した職員をリストアップし、風疹IgG抗体とワクチン接種歴を確認する。","b":"K氏に接触した職員のうち風疹特異抗体価陰性者は、最終接触後5日目から14日目まで就業制限とする。","c":"K氏に接触した職員のうち風疹特異抗体価陰性者に、緊急風疹ワクチンを接種する。","d":"風疹ウイルスの潜伏期間は14日～21日である。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"2","explanation":{"overall":"接触職員のリストアップと抗体価・接種歴確認は接触者対応の基本手順として正しい。風疹の潜伏期間は14〜21日であり正しい。就業制限は最終接触後5日目からではなく潜伏期間を考慮した期間が必要であり、緊急ワクチンは曝露後効果が限定的で一律接種は推奨されない。","each":{"a":"接触職員のリストアップと風疹IgG抗体・接種歴確認は標準的な接触者対応であり正しい。","b":"風疹の就業制限は最終接触後5日目からではなく潜伏期間（14〜21日）を考慮した期間に設定するため誤り。","c":"曝露後の緊急風疹ワクチン接種は発症予防効果が限定的であり一律接種は推奨されないため誤り。","d":"風疹の潜伏期間は14〜21日であり正しい。"}},"category":"感染症","subcategory":"風疹接触者対応","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"34":{"question_no":"34","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"5","type":"single_best","question":"内科病棟の看護師長から「妊娠30週の看護師Lが勤務している。どうしたらいいか」と相談された。看護師Lの勤務を確認したところ、看護師Lの勤務は3月23日が日勤、24日と25日は休みであり、看護師Lの風疹特異抗体価やワクチン接種歴は不明でした。看護師長と看護師Lへの説明として、正しいものを2つ選択しなさい。","stem_items":{"a":"看護師Lは妊娠30週であり、一般的に先天性風疹症候群の発生頻度は高いと伝える。","b":"先天性風疹症候群の三大症状は、先天性心疾患、難聴、白内障であると伝える。","c":"看護師Lの風疹特異抗体価、ワクチン接種歴を確認するよう伝える。","d":"看護師Lは3月24日以降休みのため、感染の危険性はないと伝える。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"3","explanation":{"overall":"妊婦が風疹に感染した場合、特に妊娠初期では先天性風疹症候群（CRS）のリスクが高くなるため、まず風疹特異抗体価とワクチン接種歴を確認する必要がある。先天性風疹症候群の三大症状は先天性心疾患、難聴、白内障である。妊娠30週では一般的にCRS発生リスクは高くなく、休みであったことだけでは感染リスクを否定できない。","each":{"a":"先天性風疹症候群のリスクが最も高いのは妊娠初期であり、妊娠30週では一般的に発生頻度は高くないため誤り。","b":"先天性風疹症候群の三大症状は、先天性心疾患、難聴、白内障であり正しい。","c":"風疹曝露時には風疹特異抗体価およびワクチン接種歴を確認する必要があり正しい。","d":"3月24日以降が休みであっても、3月23日に接触している可能性があり感染リスクは否定できないため誤り。"}},"category":"感染症","subcategory":"風疹・妊婦対応","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"}}},"case6":{"case_no":"6","description":"事例6\n次の文を読み、問35から問37に対する適切な答えを一つ選んでください。\nあなたは病院の感染管理認定看護師です。現在、市中では新型コロナウイルス感染症が流行しています。1月10日に病棟の看護師長から「新型コロナウイルス感染症の患者が複数出た。指示を仰ぎたい」と連絡がありました。あなたが病棟で確認すると以下のことがわかりました。\n・M氏は、前年の12月中旬から入院している。1月9日から発熱し、1月10日に新型コロナウイルス感染症と診断された。\n・同室のN氏は、1月5日に入院し、1月10日から発熱し、同日新型コロナウイルス感染症と診断された。\n・同室のO氏は、1月5日に入院し、1月7日から発熱、咳、咽頭痛が出現したが、同日の新型コロナウイルス抗原定性検査は陰性であった。\n・同室のP氏は、1月8日に入院し、1月10日時点で、発熱や上気道症状は認めていない。\nなお、院内では核酸増幅検査と抗原定性検査の実施が可能です。","questions":{"35":{"question_no":"35","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"6","type":"single_best","question":"1月10日の時点で行う対策として、正しい組み合わせはどれか。","stem_items":{"a":"M氏とN氏はコホート隔離とする。","b":"P氏は、他の4人部屋に移動する。","c":"M氏とN氏に対し、接触予防策のみを講じる。","d":"他の病室の患者と、当該病棟の職員の症状を確認する。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"2","explanation":{"overall":"確定診断のM氏とN氏をコホート隔離することは適切である。アウトブレイク発生時は他病室の患者と職員の症状確認が必要である。P氏は無症状だが同室で曝露しており他の4人部屋への移動は感染拡大リスクがあり不適切、新型コロナウイルスは接触予防策のみでなく飛沫・空気予防策も必要である。","each":{"a":"確定診断のM氏とN氏をコホート隔離することは適切であり正しい。","b":"P氏は無症状だが同室曝露者であり他の4人部屋へ移動させると感染拡大リスクがあるため誤り。","c":"新型コロナウイルスは飛沫・空気感染もあり接触予防策のみでは不十分であるため誤り。","d":"アウトブレイク発生時は他病室患者と職員の症状確認が必要であり正しい。"}},"category":"感染症","subcategory":"新型コロナウイルス感染症アウトブレイク対応","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"36":{"question_no":"36","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"6","type":"single_best","question":"新型コロナウイルス検査について、正しいのはどれか。","choices":{"1":"O氏は、新型コロナウイルス感染症を否定できる。","2":"P氏に新型コロナウイルス検査を行う場合は、抗原定性検査を第一優先とする。","3":"患者に、唾液を用いて検査する場合は、歯磨き後すぐに検体採取するよう指導する。","4":"M氏とN氏は、PCR検査で陰性化を確認しなくても隔離解除ができる。"},"answer":"4","explanation":{"overall":"新型コロナウイルス感染症の隔離解除は発症日からの経過日数や症状改善で判断可能であり、PCR陰性確認は必須ではない。O氏は抗原定性検査陰性だが発症後早期は偽陰性があり否定できない。無症状のP氏には感度の高い核酸増幅検査が優先される。唾液検体採取前の歯磨きは避けるべきである。","each":{"1":"抗原定性検査は発症早期に偽陰性となることがあるため、O氏の感染を否定できないため誤り。","2":"無症状のP氏には感度の高い核酸増幅検査（PCR）が優先されるため誤り。","3":"唾液検体採取前の歯磨き・飲食・うがいは検体に影響するため避けるよう指導するため誤り。","4":"新型コロナウイルス感染症の隔離解除はPCR陰性確認ではなく発症からの日数と症状改善で判断可能であり正しい。"}},"category":"感染症","subcategory":"新型コロナウイルス検査","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"37":{"question_no":"37","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"6","type":"single_best","question":"1月11日に、別の病室の患者や職員から有症状者がいると報告があり、最終的に患者5名、職員3名が新型コロナウイルス感染症と診断された。この病棟での対策として、正しい組み合わせはどれか。","stem_items":{"a":"新型コロナウイルス感染症を疑う症状がある職員は、新型コロナウイルス検査を行い、陰性の場合のみ勤務可とする。","b":"陽性の患者を担当した職員については、曝露予防のためのモルヌピラビル（ラゲブリオ®）の予防投与を検討する。","c":"病棟単位でゾーニングする場合は、病室内をウイルスがいるエリア、廊下をウイルスがいないエリアとし、廊下に出る前に手袋、ガウン、フェイスシールドを脱いで廃棄する。","d":"入院患者には、症状の有無に関わらず、可能な限りマスク着用の協力を依頼する。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"4","explanation":{"overall":"病棟内で新型コロナウイルス感染症のアウトブレイクが発生した場合は、ゾーニングを実施し、適切なPPEの着脱を徹底する。また、患者にも可能な限りマスク着用を依頼し感染拡大を防止する。有症状職員は検査陰性のみで勤務可とは判断せず、モルヌピラビルは曝露後予防には使用しない。","each":{"a":"有症状職員は検査陰性であっても偽陰性の可能性があり、陰性のみを理由に勤務可とはしないため誤り。","b":"モルヌピラビル（ラゲブリオ®）は治療薬であり、曝露後予防投与の適応はないため誤り。","c":"病棟単位でゾーニングする場合は、病室内を汚染区域、廊下を清潔区域とし、区域外へ出る前にPPEを脱衣するため正しい。","d":"入院患者にも可能な限りマスク着用を依頼することは感染拡大防止に有効であり正しい。"}},"category":"感染症","subcategory":"新型コロナウイルス感染症アウトブレイク対応","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"}}},"case7":{"case_no":"7","description":"事例7\n次の文を読み、問38から問40に対する適切な答えを一つ選んでください。\nあなたは、急性期病院の感染管理認定看護師です。消化器内科病棟の看護師長から「入院患者Q氏、R氏、S氏の3名に下痢症状がある。Clostridioides difficileの検査結果は3名とも陽性であった。Q氏とR氏はともに4人部屋の210号室に入院中である。S氏は3週間前にもClostridioides difficile感染症を起こし、それ以来個室に入院している」と連絡がありました。状況を確認したところ、以下のことがわかりました。\n・Clostridioides difficile毒素抗原検査の結果、Q氏とR氏はトキシンA陰性、トキシンB陽性、S氏はトキシンA陽性、トキシンB陽性であった。\n・Q氏には2日前より1日に10回程度の水様便を認めている。\n・210号室にはトイレがあり、同室患者4名が使用している。\n・210号室にはQ氏とR氏以外にT氏とU氏が入院している。\n・T氏には昨日から水様便を認めている。\n・U氏には現時点で下痢を認めていない。\n・医師がT氏のClostridioides difficile毒素抗原検査を指示している。\n・S氏はメトロニダゾールによる治療終了後、一週間ほど下痢が治まっていたが、昨日から再び水様便がみられるようになった。\n・211号室（4人部屋）には、現在下痢を認めない患者が2名入院しており、2名分のベッドの空きがある。","questions":{"38":{"question_no":"38","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"7","type":"single_best","question":"210号室の患者および個室のS氏のC.difficile毒素抗原検査に関する説明として、正しいものを2つ選択しなさい。","stem_items":{"a":"T氏の便検体は、3時間前に採取し、室温で保管していたため、すぐに提出するように促した。","b":"S氏のC.difficileは、トキシンAとトキシンBの両方を産生するが、毒素を産生しないC.difficile株も存在する。","c":"Q氏とR氏のC.difficileの病原性はトキシンBに由来すると考えられる。","d":"U氏の固形便を採取し、C.difficile毒素抗原検査を行う必要がある。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"3","explanation":{"overall":"C. difficileにはトキシンを産生しない非毒素産生株が存在しており、S氏の説明として正しい。Q氏とR氏はトキシンA陰性・トキシンB陽性であり病原性はトキシンBに由来すると考えられる。便検体は採取後2時間以内の提出が推奨されており3時間室温保管は不適切、U氏は下痢がなく固形便でのC. difficile毒素抗原検査は推奨されない。","each":{"a":"C. difficile検体は採取後速やかに（2時間以内）提出が必要であり、3時間室温保管後の提出促しは不適切であるため誤り。","b":"C. difficileには毒素を産生しない非毒素産生株が存在しており正しい。","c":"Q氏とR氏はトキシンA陰性・トキシンB陽性であり病原性はトキシンBに由来すると考えられるため正しい。","d":"C. difficile毒素抗原検査は下痢便で実施するものであり、固形便での検査は推奨されないため誤り。"}},"category":"感染症","subcategory":"C.difficile検査","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"39":{"question_no":"39","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"7","type":"single_best","question":"210号室の患者および個室のS氏に使用する抗菌薬に関する説明として、正しいのはどれか。","choices":{"1":"下痢症状の強いQ氏には、メトロニダゾールと止瀉薬を併用することが推奨される。","2":"R氏にメトロニダゾールを使用したところ、服用開始から3日後に下痢症状が治まったため速やかに投与を中止するのが望ましい。","3":"U氏には、予防的にメトロニダゾールを投与する。","4":"S氏には、バンコマイシン塩酸塩の使用が推奨される。"},"answer":"4","explanation":{"overall":"C. difficile感染症では止瀉薬の併用は推奨されず、症状が改善しても抗菌薬は必要な治療期間を継続する。無症状のU氏に予防的抗菌薬投与は行わない。S氏はメトロニダゾール治療後に一度改善した後、再び水様便が出現しており再発例と考えられるため、バンコマイシン塩酸塩の使用が推奨される。","each":{"1":"C. difficile感染症では止瀉薬により毒素や菌が腸管内に停滞し重症化する可能性があるため誤り。","2":"下痢症状が改善しても速やかに中止せず、推奨される治療期間を継続する必要があるため誤り。","3":"U氏は現時点で下痢を認めておらず、予防的なメトロニダゾール投与は推奨されないため誤り。","4":"S氏はC. difficile感染症の再発が疑われるため、バンコマイシン塩酸塩の使用が推奨され正しい。"}},"category":"感染症","subcategory":"C.difficile治療","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"},"40":{"question_no":"40","exam_year":2023,"exam_name":"第31回","section":"問題2","case_no":"7","type":"single_best","question":"T氏のC.difficile毒素抗原検査結果はトキシンA、トキシンBともに陰性であった。当該消化器内科病棟で実施するC.difficile感染症対策として、正しい組み合わせはどれか。","stem_items":{"a":"消化器内科病棟で他に下痢症状を認める患者はいないか確認する。","b":"210号室のトイレは0.5％（5,000ppm）の次亜塩素酸ナトリウム溶液で1日1回以上消毒する。","c":"擦式アルコール製剤を用いた手指衛生を強化する。","d":"T氏とU氏を早急に211号室に移動させる。"},"choices":{"1":"a, b","2":"a, d","3":"b, c","4":"c, d"},"answer":"1","explanation":{"overall":"アウトブレイク時は病棟全体の下痢患者の把握が必要である。C. difficile芽胞は次亜塩素酸ナトリウムが有効であり0.5%（5,000ppm）での環境消毒は適切である。C. difficile芽胞にはアルコールが無効であり流水と石鹸による手洗いが必要、T氏は陰性だが下痢症状があり211号室（非感染患者2名入室）への移動は感染拡大リスクがある。","each":{"a":"アウトブレイク時は病棟全体で下痢症状のある患者を確認することが必要であり正しい。","b":"C. difficile芽胞には0.5%（5,000ppm）次亜塩素酸ナトリウムによる環境消毒が有効であり正しい。","c":"C. difficile芽胞はアルコールに抵抗性があるため、擦式アルコール製剤では不十分であり流水石鹸手洗いが必要であるため誤り。","d":"T氏は下痢症状があり211号室の非感染患者への感染拡大リスクがあるため移動は不適切であり誤り。"}},"category":"感染症","subcategory":"C.difficile感染対策","difficulty":"medium","source_file":"第31回認定看護師認定審査.docx"}}}}}}};
</script>
<script>
window.EXAM_DATA_32 = {"第32回": {"meta": {"title": "第32回認定看護師認定審査", "year": 2024, "course": "感染管理(B課程)"}, "questions": {"1": {"question_no": "1", "exam_year": 2024, "exam_name": "第32回", "section": "問題1", "type": "image_question", "question": "問題文欠落のため判定不能", "answer": "invalid", "explanation": {"overall": "原問題が欠落しているため判定不能とした。採点上はどの選択肢を選んでも正解扱いとする。", "each": {"1": "問題文欠落のため正誤判定対象外。", "2": "問題文欠落のため正誤判定対象外。", "3": "問題文欠落のため正誤判定対象外。", "4": "問題文欠落のため正誤判定対象外。"}}, "category": "不明", "subcategory": "問題欠落", "difficulty": "excluded", "source_file": "第32回認定看護師認定審査.docx", "note": "問題欠落のため全員正解扱い", "choices": {"1": "問題文欠落のため全員正解", "2": "問題文欠落のため全員正解", "3": "問題文欠落のため全員正解", "4": "問題文欠落のため全員正解"}, "is_invalid": true, "score_mode": "full", "auto_correct": true, "accepted_answers": ["1", "2", "3", "4"]}, "2": {"question_no": "2", "exam_year": 2024, "exam_name": "第32回", "section": "問題1", "type": "single_best", "question": "統計学に関する説明として、正しいのはどれか。", "choices": {"1": "マキシマルバリアプリコーションの実践の有無とCLABSI発生の関連性をt検定で行った。", "2": "有意水準を0.05に設定しカイ二乗検定を行ったところ、p＝0.21であり有意差がみられた。", "3": "四分位範囲（inter-quartile range）は、全体の25%から75%までの範囲を示す。", "4": "入院患者の年齢がゆがんだ分布を示していたため、代表値として平均値を用いた。"}, "answer": "3", "explanation": {"overall": "四分位範囲は全体の25%から75%までの範囲（第1四分位数〜第3四分位数）を示し正しい。マキシマルバリアプリコーションの有無とCLABSI発生の関連性はカテゴリ変数同士の関連であり、t検定ではなくカイ二乗検定が適切である。p=0.21は有意水準0.05より大きいため有意差なしと判定する。ゆがんだ（歪んだ）分布では代表値として平均値ではなく中央値を用いる。", "each": {"1": "CLABSI発生（有無）とプリコーション実践（有無）はともにカテゴリ変数であり、t検定ではなくカイ二乗検定が適切であるため誤り。", "2": "p=0.21は有意水準0.05より大きいため『有意差なし』と判定すべきであり、『有意差がみられた』は誤り。", "3": "四分位範囲は第1四分位数（25%）〜第3四分位数（75%）の範囲を示すため正しい。", "4": "歪んだ（非対称な）分布では代表値として中央値を用いるべきであり、平均値は外れ値の影響を受けやすいため誤り。"}}, "category": "疫学", "subcategory": "統計学", "difficulty": "easy", "source_file": "第32回認定看護師認定審査.docx"}, "3": {"question_no": "3", "exam_year": 2024, "exam_name": "第32回", "section": "問題1", "type": "single_best", "question": "グラム染色法に関する説明として、正しいのはどれか。", "choices": {"1": "グラム染色により、菌種が同定できる。", "2": "細菌が発育する際に必要な酸素需要度の違いによって、グラム陽性とグラム陰性が分類される。", "3": "髄膜炎菌は、赤色に染まる。", "4": "ウイルスの存在を確認できる。"}, "answer": "3", "explanation": {"overall": "髄膜炎菌（Neisseria meningitidis）はグラム陰性球菌であり赤色（淡赤色）に染まるため正しい。グラム染色は染色性による細菌の大まかな分類（陽性・陰性）と形態確認はできるが菌種の同定はできず、グラム染色は細胞壁構造の違いによる分類であり酸素需要度とは無関係、ウイルスはグラム染色では確認できない。", "each": {"1": "グラム染色は染色性（陽性・陰性）と形態の確認はできるが、菌種までの同定はできないため誤り。", "2": "グラム陽性・陰性の分類は細胞壁構造（ペプチドグリカン層の厚さ）の違いによるものであり、酸素需要度とは無関係であるため誤り。", "3": "髄膜炎菌はグラム陰性球菌であり赤色（淡赤色）に染まるため正しい。", "4": "ウイルスは細胞構造を持たないためグラム染色では確認できないため誤り。"}}, "category": "微生物", "subcategory": "グラム染色", "difficulty": "easy", "source_file": "第32回認定看護師認定審査.docx"}, "4": {"question_no": "4", "exam_year": 2024, "exam_name": "第32回", "section": "問題1", "type": "single_best", "question": "廃棄物処理法に基づく『感染性廃棄物処理マニュアル（令和5年5月）』に記述されている医療廃棄物に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "感染症患者の使用済み紙おむつは、全て感染性廃棄物として廃棄する。", "b": "血漿分画製剤（アルブミン製剤）は、非感染性廃棄物として廃棄する。", "c": "集中治療室において治療・検査に使用された廃棄物は、感染性廃棄物として廃棄する。", "d": "血液等が付着していない鋭利なものは、非感染性廃棄物の扱いとする。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "血漿分画製剤（アルブミン製剤等）は感染性のリスクがなく非感染性廃棄物として扱われ正しい。集中治療室等の感染症患者に対する治療・検査に使用された廃棄物は感染性廃棄物として扱われ正しい。感染症患者の紙おむつは血液等の付着がない場合は感染性廃棄物としなくてよく、鋭利物は血液等の付着がなくても感染性廃棄物として扱う原則がある。", "each": {"a": "感染症患者の紙おむつであっても、血液等の付着がない場合は感染性廃棄物としなくてよいため誤り。", "b": "血漿分画製剤（アルブミン製剤等）は感染性廃棄物処理マニュアルにおいて非感染性廃棄物として扱われるため正しい。", "c": "集中治療室など特定の感染症に対する治療・検査に使用された廃棄物は感染性廃棄物として扱われるため正しい。", "d": "鋭利なものは血液等の付着がなくても感染性廃棄物として扱う原則があるため誤り。"}}, "category": "感染性廃棄物", "subcategory": "廃棄物処理法", "difficulty": "medium", "source_file": "第32回認定看護師認定審査.docx"}, "5": {"question_no": "5", "exam_year": 2024, "exam_name": "第32回", "section": "問題1", "type": "single_best", "question": "診断後、届出を直ちに行う必要がある感染症として、正しい組み合わせはどれか。", "stem_items": {"a": "腸管出血性大腸菌感染症", "b": "梅毒", "c": "劇症型溶血性レンサ球菌感染症", "d": "レジオネラ症"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "2", "explanation": {"overall": "腸管出血性大腸菌感染症は3類感染症であり診断後直ちに届出が必要である。梅毒および劇症型溶血性レンサ球菌感染症は5類全数把握疾患であり届出期限は7日以内である。レジオネラ症は5類全数把握疾患であるが診断後直ちに届出が必要である。", "each": {"a": "腸管出血性大腸菌感染症は3類感染症であり診断後直ちに届出が必要であるため正しい。", "b": "梅毒は5類全数把握疾患であり届出期限は7日以内であるため誤り。", "c": "劇症型溶血性レンサ球菌感染症は5類全数把握疾患であり届出期限は7日以内であるため誤り。", "d": "レジオネラ症は5類全数把握疾患だが診断後直ちに届出が必要な疾患に指定されているため正しい。"}}, "category": "感染症法", "subcategory": "届出基準", "difficulty": "medium", "source_file": "第32回認定看護師認定審査.docx"}, "6": {"question_no": "6", "exam_year": 2024, "exam_name": "第32回", "section": "問題1", "type": "single_best", "question": "アスペルギルスに関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "環境中には、常在しない。", "b": "造血幹細胞移植患者の日和見感染の原因微生物となる。", "c": "アスペルギルス症の高リスク患者では、病室を密閉しHEPAフィルタを設置する。", "d": "造血細胞移植患者の病室では、定期的な環境の細菌検査が必要である。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "アスペルギルスは造血幹細胞移植患者など免疫抑制状態の患者における日和見感染の原因微生物であり正しい。高リスク患者には病室を密閉しHEPAフィルタを設置した防護環境が必要であり正しい。アスペルギルスは環境中（土壌・空気中等）に常在する真菌であり、造血幹細胞移植患者の病室では定期的な環境細菌検査ではなく真菌対策（HEPAフィルタ管理等）が重視される。", "each": {"a": "アスペルギルスは土壌・空気中など環境中に常在する真菌であるため誤り。", "b": "アスペルギルスは造血幹細胞移植患者など免疫抑制患者における日和見感染の原因微生物であるため正しい。", "c": "アスペルギルス症の高リスク患者には病室を密閉しHEPAフィルタを設置した防護環境が必要であるため正しい。", "d": "造血幹細胞移植患者の病室では定期的な環境細菌検査ではなく、HEPAフィルタの管理など真菌対策が重視されるため誤り。"}}, "category": "真菌感染", "subcategory": "アスペルギルス", "difficulty": "medium", "source_file": "第32回認定看護師認定審査.docx"}, "7": {"question_no": "7", "exam_year": 2024, "exam_name": "第32回", "section": "問題1", "type": "single_best", "question": "薬剤耐性菌に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "メロペネムのMIC値が2㎍/mL以上の腸内細菌目細菌による感染症であっても、カルバペネマーゼを産生していなければ届出の必要はない。", "b": "基質特異性拡張型βラクタマーゼ（ESBL）産生菌は、βラクタマーゼのAmblerクラス分類でクラスAに分類される。", "c": "メチシリン耐性黄色ブドウ球菌（MRSA）のメチシリン耐性は、mecA遺伝子にコードされたペニシリン低親和性の細胞壁合成酵素PBP2'による。", "d": "バンコマイシン耐性腸球菌（VRE）のバンコマイシン耐性遺伝子のvanAとvanBは、染色体上にコードされている。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "ESBL産生菌はβラクタマーゼのAmblerクラス分類でクラスAに分類され正しい。MRSAのメチシリン耐性はmecA遺伝子にコードされたPBP2'によるものであり正しい。CREの届出基準はメロペネムMIC値2μg/ml以上またはカルバペネマーゼ産生のいずれかを満たせば対象となり、VREのvanA・vanB遺伝子は染色体ではなくプラスミド上にコードされる。", "each": {"a": "CREの届出基準はメロペネムMIC値2μg/ml以上、またはカルバペネマーゼ産生のいずれかを満たせば対象となり、カルバペネマーゼ非産生でも届出が必要であるため誤り。", "b": "ESBL産生菌はβラクタマーゼのAmblerクラス分類でクラスAに分類されるため正しい。", "c": "MRSAのメチシリン耐性はmecA遺伝子にコードされたペニシリン低親和性の細胞壁合成酵素PBP2'によるため正しい。", "d": "VREのvanA・vanB耐性遺伝子はプラスミド上にコードされ、伝達性を持つため誤り。"}}, "category": "薬剤耐性菌", "subcategory": "CRE・ESBL・MRSA・VRE", "difficulty": "medium", "source_file": "第32回認定看護師認定審査.docx"}, "8": {"question_no": "8", "exam_year": 2024, "exam_name": "第32回", "section": "問題1", "type": "single_best", "question": "Clostridioides difficileに関する説明として、正しいのはどれか。", "choices": {"1": "患者が退室した後の病室は、0.01%の次亜塩素酸ナトリウム溶液で清拭する。", "2": "下痢症状のある患者で、GDH陽性・トキシン陰性・NAAT検査陰性の場合、Clostridioides difficile感染症は否定的と考えてよい。", "3": "検査には、Bristol stool scale 4以上の糞便を提出する。", "4": "患者の接触予防策は、下痢症状が消失した後から最低72時間経過するまで継続する。"}, "answer": "2", "explanation": {"overall": "GDH陽性・トキシン陰性の場合はNAAT等の確認検査を追加し、それも陰性であればC. difficile感染症は否定的と考えてよい。退室後の病室消毒には0.01%ではなく0.1%以上（高濃度）の次亜塩素酸ナトリウムが必要であり、検体はBristol 5以上（軟便〜水様便）の下痢便を提出し、接触予防策は症状消失後48時間（72時間ではない）まで継続するのが一般的である。", "each": {"1": "C. difficile芽胞の不活化には0.1%以上の次亜塩素酸ナトリウムが必要であり、0.01%では濃度不足であるため誤り。", "2": "GDH陽性・トキシン陰性の場合はNAAT等の確認検査を行い、それも陰性であればCDIは否定的と判断してよいため正しい。", "3": "検体はBristol stool scale 5以上（軟便〜水様便）の下痢便を提出するものであり、4（やや軟らかい便）では不適切であるため誤り。", "4": "接触予防策は下痢症状消失後48時間経過するまで継続するのが一般的であり、72時間という記載は誤り。"}}, "category": "Clostridioides difficile", "subcategory": "CDI", "difficulty": "medium", "source_file": "第32回認定看護師認定審査.docx"}, "9": {"question_no": "9", "exam_year": 2024, "exam_name": "第32回", "section": "問題1", "type": "single_best", "question": "病院空調の清浄度クラスと換気条件に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "清浄度クラス1は、高性能フィルタを使用する。", "b": "一般手術室は、全風量を12回／時間以上で換気する。", "c": "気管支鏡を行う検査室の室内圧は、陰圧とする。", "d": "ICUの病室は、全風量を6回／時間以上で換気する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "気管支鏡検査では結核等の感染性飛沫核が発生するため室内圧は陰圧が必要であり正しい。ICUの病室は全風量6回/時間以上の換気が標準とされ正しい。清浄度クラス1（バイオクリーンルーム）は超高性能フィルタ（HEPA以上）を使用するため「高性能フィルタ」という表現は不十分であり、一般手術室の換気回数は12回/時間以上ではなく15回/時間以上が標準とされる。", "each": {"a": "清浄度クラス1はHEPAフィルタを超える超高性能フィルタ（ULPA等）を使用するため、「高性能フィルタ」という表現は不正確であり誤り。", "b": "一般手術室の換気回数は15回/時間以上が標準とされており、12回/時間以上では不十分であるため誤り。", "c": "気管支鏡検査室は感染性飛沫核の拡散防止のため陰圧が必要であり正しい。", "d": "ICUの病室は全風量6回/時間以上の換気が標準とされるため正しい。"}}, "category": "病院空調", "subcategory": "清浄度クラス・換気条件", "difficulty": "medium", "source_file": "第32回認定看護師認定審査.docx"}, "10": {"question_no": "10", "exam_year": 2024, "exam_name": "第32回", "section": "問題1", "type": "single_best", "question": "小児の感染症に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "ロタウイルスは、エンベロープウイルスである。", "b": "RSウイルスの主な感染経路は、飛沫感染である。", "c": "百日咳の予防には、3種混合ワクチンの接種が有効である。", "d": "学校保健安全法における咽頭結膜熱は、症状消失後、出席可能である。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "RSウイルスの主な感染経路は飛沫感染（接触感染も含む）であり正しい。百日咳の予防には3種混合（DPT：ジフテリア・百日咳・破傷風）ワクチンの接種が有効であり正しい。ロタウイルスはノンエンベロープウイルスであり、咽頭結膜熱（プール熱）の出席停止基準は症状消失後ではなく主要症状消退後2日を経過するまでである。", "each": {"a": "ロタウイルスはノンエンベロープウイルスであるため誤り。", "b": "RSウイルスの主な感染経路は飛沫感染（接触感染も関与）であるため正しい。", "c": "百日咳の予防には3種混合（DPT）ワクチンの接種が有効であるため正しい。", "d": "咽頭結膜熱の出席停止基準は症状消失後ではなく、主要症状消退後2日を経過するまでであるため誤り。"}}, "category": "小児感染症", "subcategory": "RSウイルス・ロタウイルス・百日咳", "difficulty": "medium", "source_file": "第32回認定看護師認定審査.docx"}, "11": {"question_no": "11", "exam_year": 2024, "exam_name": "第32回", "section": "問題1", "type": "single_best", "question": "滅菌に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "消化管用生検子を再利用する際の最終工程は、滅菌である。", "b": "過酸化水素低温ガスプラズマ滅菌は、クロイツフェルト・ヤコブ病の原因となる異常プリオン蛋白を不活化する。", "c": "高圧蒸気滅菌には、滅菌温度126°Cで3分間の保持時間が必要である。", "d": "ボウィー・ディックテスト用インジケータは、滅菌条件の達成を確認できる。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "1", "explanation": {"overall": "消化管用生検子（クリティカル器材）は粘膜下組織等に接触するため最終工程は滅菌が必要であり正しい。過酸化水素低温ガスプラズマ滅菌は異常プリオン蛋白の不活化に有効とされており正しい。高圧蒸気滅菌126℃では3分間では保持時間が不十分であり誤り。ボウィー・ディックテストは「滅菌条件の達成」を確認するものではなく、高圧蒸気滅菌器の空気除去および蒸気浸透の適格性を確認する試験であるため誤り。", "each": {"a": "消化管用生検子はクリティカル器材であり、再利用の最終工程は滅菌であるため正しい。", "b": "過酸化水素低温ガスプラズマ滅菌は異常プリオン蛋白の不活化に有効とされており正しい。", "c": "高圧蒸気滅菌126℃では10分間以上の保持時間が必要であり、3分間では不十分であるため誤り。", "d": "ボウィー・ディックテストは高圧蒸気滅菌器の空気除去および蒸気浸透の適格性を確認する試験であり、「滅菌条件の達成」を確認するものではないため誤り。"}}, "category": "滅菌", "subcategory": "高圧蒸気滅菌・Bowie-Dickテスト", "difficulty": "medium", "source_file": "第32回認定看護師認定審査.docx"}, "12": {"question_no": "12", "exam_year": 2024, "exam_name": "第32回", "section": "問題1", "type": "single_best", "question": "薬剤耐性（AMR）対策アクションプラン（2023-2027）で掲げられている成果指標として、正しい組み合わせはどれか。", "stem_items": {"a": "バンコマイシン耐性腸球菌感染症の罹患数が、新たに追加された。", "b": "黄色ブドウ球菌のメチシリン耐性率は、10%以下である。", "c": "緑膿菌のカルバペネム耐性率は、10%以下である。", "d": "大腸菌のフルオロキノロン耐性率は、30%以下である。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "緑膿菌のカルバペネム耐性率は10%以下を目標としており正しい。大腸菌のフルオロキノロン耐性率は30%以下を目標としており正しい。AMR対策アクションプラン2023-2027ではVRE感染症罹患数の新規追加項目はなく、黄色ブドウ球菌のメチシリン耐性率の目標値は20%以下である。", "each": {"a": "AMR対策アクションプラン2023-2027にバンコマイシン耐性腸球菌感染症の罹患数が新規成果指標として追加されたという事実はないため誤り。", "b": "黄色ブドウ球菌のメチシリン耐性率の目標値は20%以下であり、10%以下ではないため誤り。", "c": "緑膿菌のカルバペネム耐性率は10%以下を目標としており正しい。", "d": "大腸菌のフルオロキノロン耐性率は30%以下を目標としており正しい。"}}, "category": "AMR", "subcategory": "AMR対策アクションプラン2023-2027", "difficulty": "medium", "source_file": "第32回認定看護師認定審査.docx"}, "13": {"question_no": "13", "exam_year": 2024, "exam_name": "第32回", "section": "問題1", "type": "single_best", "question": "優先的に擦式手指消毒剤による手指衛生を選択する場面として、正しい組み合わせはどれか。", "stem_items": {"a": "中心静脈カテーテル刺入部確認のため、ドレッシング材に触れる前。", "b": "下痢症状のある患者のおむつ交換をした後。", "c": "流行性角結膜炎の患者の点眼の後。", "d": "新型コロナウイルス感染症患者のバイタルサイン測定の後。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "2", "explanation": {"overall": "中心静脈カテーテル刺入部のドレッシング材に触れる前は通常の患者ケアであり擦式アルコール手指消毒剤が優先される。新型コロナウイルス（エンベロープウイルス）はアルコールに感受性があり擦式アルコール手指消毒剤が有効である。下痢症状（CDI等の芽胞形成菌リスク）のあるおむつ交換後はアルコールが無効な可能性があり流水と石鹸での手洗いが優先され、流行性角結膜炎（アデノウイルス：ノンエンベロープ）はアルコール抵抗性があり流水と石鹸での手洗いが優先される。", "each": {"a": "通常の患者ケア場面であり擦式アルコール手指消毒剤が優先されるため正しい。", "b": "下痢症状のある患者ではC. difficile等の芽胞形成菌の可能性があり、アルコールが無効なため流水と石鹸による手洗いが優先されるため誤り。", "c": "アデノウイルス（流行性角結膜炎の原因）はノンエンベロープウイルスでアルコール抵抗性があり、流水と石鹸による手洗いが優先されるため誤り。", "d": "新型コロナウイルスはエンベロープウイルスでアルコール感受性があり、擦式アルコール手指消毒剤が優先されるため正しい。"}}, "category": "手指衛生", "subcategory": "擦式アルコール手指消毒剤", "difficulty": "medium", "source_file": "第32回認定看護師認定審査.docx"}, "15": {"question_no": "15", "exam_year": 2024, "exam_name": "第32回", "section": "問題1", "type": "single_best", "question": "ワクチンに関する説明として、正しいのはどれか。", "choices": {"1": "B型肝炎ワクチンは、1シリーズで免疫獲得ができなかった場合、追加接種を1回行う。", "2": "流行性耳下腺炎のワクチンは、定期接種である。", "3": "麻疹ワクチン接種後の抗体保有率は、1回接種で約95%、2回接種で約99%である。", "4": "新型コロナウイルスワクチンは、不活化ワクチンである。"}, "answer": "3", "explanation": {"overall": "麻疹ワクチンの抗体保有率は1回接種で約95%、2回接種で約99%とされ正しい。B型肝炎ワクチンで1シリーズ後に抗体獲得できなかった場合は追加接種1回ではなくもう1シリーズ（3回）の再接種が推奨される。流行性耳下腺炎（おたふくかぜ）ワクチンは任意接種であり定期接種ではない。新型コロナウイルスワクチンの主流（mRNAワクチン等）は不活化ワクチンではない。", "each": {"1": "B型肝炎ワクチンで1シリーズ後に抗体獲得できなかった場合は、追加接種1回ではなく再度1シリーズ（3回）の接種が推奨されるため誤り。", "2": "流行性耳下腺炎ワクチンは任意接種であり、定期接種ではないため誤り。", "3": "麻疹ワクチンの抗体保有率は1回接種で約95%、2回接種で約99%とされ正しい。", "4": "新型コロナウイルスワクチンの主流であるmRNAワクチンは不活化ワクチンではなく、新しい作用機序のワクチンであるため誤り。"}}, "category": "ワクチン", "subcategory": "麻疹・B型肝炎・COVID-19", "difficulty": "medium", "source_file": "第32回認定看護師認定審査.docx"}, "14": {"question_no": "14", "exam_year": 2024, "exam_name": "第32回", "section": "問題1", "type": "single_best", "question": "ウイルスが引き起こす感染症として、正しい組み合わせはどれか。", "stem_items": {"a": "ヒトパルボウイルスB19 ― 伝染性紅斑", "b": "Epstein-Barrウイルス（EBウイルス） ― 伝染性単核球症", "c": "コクサッキーウイルスA16型 ― 突発性発疹", "d": "SFTSウイルス ― 重症急性呼吸器症候群"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "1", "explanation": {"overall": "ヒトパルボウイルスB19は伝染性紅斑（リンゴ病）の原因ウイルスであり正しい。Epstein-Barrウイルスは伝染性単核球症の原因ウイルスであり正しい。コクサッキーウイルスA16型は手足口病の原因ウイルスであり突発性発疹はヒトヘルペスウイルス6・7型による疾患である。SFTSウイルスは重症熱性血小板減少症候群の原因ウイルスであり重症急性呼吸器症候群（SARS）はSARSコロナウイルスによる疾患である。", "each": {"a": "ヒトパルボウイルスB19は伝染性紅斑（リンゴ病）の原因ウイルスであり正しい。", "b": "Epstein-Barrウイルスは伝染性単核球症の原因ウイルスであり正しい。", "c": "コクサッキーウイルスA16型は手足口病の原因ウイルスであり、突発性発疹はヒトヘルペスウイルス6・7型による疾患であるため誤り。", "d": "SFTSウイルスは重症熱性血小板減少症候群（SFTS）の原因ウイルスであり、重症急性呼吸器症候群（SARS）はSARSコロナウイルスによる疾患であるため誤り。"}}, "category": "ウイルス感染症", "subcategory": "EBウイルス・パルボウイルス・SFTS", "difficulty": "medium", "source_file": "第32回認定看護師認定審査.docx"}, "16": {"question_no": "16", "exam_year": 2024, "exam_name": "第32回", "section": "問題1", "type": "single_best", "question": "透析室における感染対策に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "50歳以上の透析患者には、帯状疱疹ワクチン接種を勧める。", "b": "透析患者は年に1回、HBs抗原、HBs抗体、HBc抗体、HCV抗体の検査を行うことが推奨されている。", "c": "透析用水・透析液は、1回/年以上の生物学的汚染物質測定により品質を保証する。", "d": "HBV感染患者のベッド配置は、HBs抗体陰性患者との間に、HBs抗体陽性患者を配置する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "2", "explanation": {"overall": "50歳以上の透析患者は免疫低下リスクがあり帯状疱疹ワクチン接種が推奨され正しい。HBV感染患者のベッド配置は、HBs抗原陽性患者とHBs抗体陰性患者の間にHBs抗体陽性患者を緩衝として配置するのが標準的であり正しい。透析患者のHBs抗原・HBs抗体・HBc抗体・HCV抗体検査は年1回ではなく6か月に1回が厚労省ガイドラインで推奨されている。透析用水・透析液の生物学的汚染物質測定は年1回ではなく月1回以上の頻度で実施することが推奨されている。", "each": {"a": "50歳以上の透析患者は免疫低下状態にあり帯状疱疹ワクチン接種が推奨されるため正しい。", "b": "透析患者のHBs抗原・HBs抗体・HBc抗体・HCV抗体検査は厚労省ガイドラインで6か月に1回の実施が推奨されており、年1回では頻度が不十分であるため誤り。", "c": "透析用水・透析液の生物学的汚染物質測定は月1回以上の頻度で実施することが推奨されており、年1回では不十分であるため誤り。", "d": "HBV感染患者（HBs抗原陽性）のベッド配置は、HBs抗体陰性患者との間にHBs抗体陽性患者を緩衝として配置することで感染拡大を防ぐ標準的な配置方法であり正しい。"}}, "category": "透析感染対策", "subcategory": "HBV・透析液管理", "difficulty": "medium", "source_file": "第32回認定看護師認定審査.docx"}, "17": {"question_no": "17", "exam_year": 2024, "exam_name": "第32回", "section": "問題1", "type": "single_best", "question": "母子感染症に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "風疹に対する免疫のない妊婦には、妊娠15週までに風疹ワクチンを接種する。", "b": "先天梅毒は、梅毒抗体が母体から胎盤を通過して、胎児に感染する感染症である。", "c": "抗ウイルス薬によりHBs抗原が陰性化した妊婦から出生した児も、「B型肝炎母子感染防止対策」の対象である。", "d": "妊婦が水痘に罹患すると、流産や早産、乳児期帯状疱疹を発症することがある。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "抗ウイルス薬でHBs抗原が陰性化した妊婦から出生した児も母子感染リスクがあるためB型肝炎母子感染防止対策の対象となり正しい。妊婦の水痘罹患は流産・早産・先天性水痘症候群、出生後の乳児期帯状疱疹のリスクがあり正しい。風疹ワクチンは生ワクチンであり妊娠中の接種は禁忌（妊娠前に接種）、先天梅毒は梅毒抗体ではなく梅毒トレポネーマ自体が胎盤を通過して胎児に感染する。", "each": {"a": "風疹ワクチンは生ワクチンであり妊娠中の接種は禁忌で、妊娠前に接種すべきであるため誤り。", "b": "先天梅毒は梅毒抗体ではなく梅毒トレポネーマ（病原体自体）が胎盤を通過して胎児に感染する疾患であるため誤り。", "c": "抗ウイルス薬でHBs抗原が陰性化した妊婦から出生した児も母子感染リスクがあり対策の対象であるため正しい。", "d": "妊婦の水痘罹患は流産・早産・先天性水痘症候群、出生後の乳児期帯状疱疹のリスクがあるため正しい。"}}, "category": "母子感染", "subcategory": "HBV・梅毒・風疹・水痘", "difficulty": "medium", "source_file": "第32回認定看護師認定審査.docx"}, "18": {"question_no": "18", "exam_year": 2024, "exam_name": "第32回", "section": "問題1", "type": "single_best", "question": "免疫機構に関する説明として、正しい組み合わせはどれか。", "stem_items": {"a": "好中球は、病原体の貪食と殺傷を行う。", "b": "B細胞は、受容体が認識する特定の病原体が侵入した際に、抗体産生形質細胞へと分裂分化する。", "c": "ヘルパーT細胞は、ウイルスや細菌に感染した細胞を殺傷する。", "d": "ナチュラルキラー（NK）細胞は、ウイルス感染に対応する獲得免疫を担う細胞である。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "1", "explanation": {"overall": "好中球は病原体の貪食と殺傷を行う自然免疫の主要な細胞であり正しい。B細胞は受容体が特定の病原体（抗原）を認識すると抗体産生形質細胞へ分化するため正しい。ウイルスや細菌に感染した細胞を殺傷するのはヘルパーT細胞ではなくキラーT（細胞傷害性T）細胞であり、NK細胞は獲得免疫ではなく自然免疫を担う細胞である。", "each": {"a": "好中球は病原体の貪食と殺傷を行う自然免疫の主要な細胞であるため正しい。", "b": "B細胞は特定の抗原を受容体が認識すると抗体産生形質細胞へ分化するため正しい。", "c": "感染細胞を殺傷するのはヘルパーT細胞ではなくキラーT（細胞傷害性T）細胞であるため誤り。", "d": "NK細胞は獲得免疫ではなく自然免疫を担う細胞であるため誤り。"}}, "category": "免疫", "subcategory": "自然免疫・獲得免疫", "difficulty": "medium", "source_file": "第32回認定看護師認定審査.docx"}, "19": {"question_no": "19", "exam_year": 2024, "exam_name": "第32回", "section": "問題1", "type": "single_best", "question": "細菌培養検査の検体採取として、正しいのはどれか。", "choices": {"1": "体温が上がりきった後に血液培養検体を採取すると、陽性率は上がる。", "2": "喀痰培養検体採取前には、含嗽するよう患者に指導する。", "3": "髄液検体は、氷水で冷やしながら検査室に搬送する。", "4": "淋菌による尿道炎を疑う時は、中間尿を採取する。"}, "answer": "2", "explanation": {"overall": "喀痰培養検体採取前には含嗽（うがい）により口腔内常在菌の混入を減らすことが推奨され正しい。血液培養は体温上昇前の悪寒戦慄期に採取する方が菌血症の検出率が高く、髄液検体は低温に弱い菌が含まれる可能性があるため室温または37℃保存・搬送が必要であり、淋菌による尿道炎では中間尿ではなく初尿（first-voided urine）を採取する。", "each": {"1": "血液培養は体温が上がりきった後ではなく、悪寒戦慄期（体温上昇前）に採取する方が菌血症の検出率が高いため誤り。", "2": "喀痰培養検体採取前の含嗽は口腔内常在菌の混入を減らすため推奨されており正しい。", "3": "髄液検体は低温に弱い菌（髄膜炎菌等）が含まれる可能性があり、室温または37℃で保存・搬送するため誤り。", "4": "淋菌による尿道炎を疑う場合は中間尿ではなく初尿（先端尿）を採取するため誤り。"}}, "category": "検体採取", "subcategory": "細菌培養", "difficulty": "medium", "source_file": "第32回認定看護師認定審査.docx"}, "20": {"question_no": "20", "exam_year": 2024, "exam_name": "第32回", "section": "問題1", "type": "single_best", "question": "疫学的指標に関する説明として、正しいのはどれか。", "choices": {"1": "新型コロナウイルスに感染した患者のうち、検査により陽性と判定される割合が高い検査法は、特異度が高い。", "2": "生カキを食べてノロウイルス感染症に罹患した人の割合は、罹患率（cumulative incidence rate）である。", "3": "一定の期間内に入院した患者が同じ期間に発生したCLABSIの割合は、リスク調整された指標である。", "4": "患者群と非患者群について原因と思われる因子割合を比較するため、オッズ比を求めた。"}, "answer": "2", "explanation": {"overall": "生カキを食べてノロウイルス感染症に罹患した人の割合（一定期間内に新規に発症した者の割合）は罹患率（cumulative incidence rate）であり正しい。感染者のうち陽性と判定される割合が高いのは感度であり特異度ではない、CLABSI発生率は単純な割合であればリスク調整された指標ではない、患者群と非患者群の原因因子の比較にはオッズ比ではなく通常リスク比やオッズ比が使われるが「原因と思われる因子割合の比較」という文脈ではコホート研究的なリスク比の説明に近く誤りとなる。", "each": {"1": "感染者のうち検査陽性と判定される割合が高いのは感度であり、特異度ではないため誤り。", "2": "一定期間内に新規罹患した人の割合は罹患率（cumulative incidence rate）であり正しい。", "3": "単純な発生割合であればリスク調整された指標とは言えないため誤り。", "4": "オッズ比は症例対照研究で用いられる指標であり、原因因子の有無を患者群・非患者群で比較する際に適切だが、文脈上『割合の比較』という表現がリスク比的なニュアンスのため正確性に欠け、選択肢2がより明確に正しいため誤り。"}}, "category": "疫学", "subcategory": "疫学指標", "difficulty": "medium", "source_file": "第32回認定看護師認定審査.docx"}}, "section2": {"title": "問題2", "cases": {"case1": {"case_no": "1", "description": "事例1\n次の文を読み、問21から問23に対する適切な答えを一つ選んでください。\n\nあなたは病院の感染管理認定看護師です。5月23日に地域の高齢者施設から『入居者の3名と介護士1名が疥癬を発症しており、指導を仰ぎたい』と依頼がありました。翌日、施設を訪問すると、以下のことがわかりました。\n・C氏は、4月1日に他の施設から転居してきた。入居前から慢性湿疹と掻痒感があり、ステロイド軟膏を処方されており、疥癬治療していた。\n・毎月、レクリエーションを実施しており、入居者が集まって物づくりを開催していた。発症した入居者3名はレクリエーションに参加し、介護士1名も関わっていた。\n・高齢者施設では皮膚科医師が週1回訪問し、入居者の診察を行っていた。\n・C氏のみ、角化型疥癬だった。\n・4名それぞれの診断日にイベルメクチンを処方されていた。", "assets": {"tables": {"table1_1": {"title": "表1", "data": [{"発症者": "介護士", "居室": "発症フロアのみ担当", "発症日": "5月7日", "診断日": "5月9日"}, {"発症者": "A氏", "居室": "205（多床室）", "発症日": "5月13日", "診断日": "5月16日"}, {"発症者": "B氏", "居室": "205（多床室）", "発症日": "5月15日", "診断日": "5月16日"}, {"発症者": "C氏", "居室": "208（多床室）", "発症日": "不明", "診断日": "5月23日"}]}}}, "questions": {"21": {"question_no": "21", "type": "single_best", "question": "疥癬と診断された入居者と介護士の対策として、正しい組み合わせはどれか。", "answer": "1", "explanation": {"overall": "通常疥癬（A氏）のリネンは毎日交換し疥癬虫の駆除に努めることが推奨され正しい。角化型疥癬（C氏）は感染力が非常に強いため個室隔離が必要であり正しい。A氏とB氏は同室で経過観察可能だが、C氏（角化型疥癬）は他患者と同室管理は不適切である。介護士の就業制限は治療開始後12時間ではなく、適切な治療を2回程度行い症状改善を確認後とするのが原則である。", "each": {"a": "通常疥癬患者のリネンは毎日交換し疥癬虫の駆除に努めることが推奨されるため正しい。", "b": "角化型疥癬は感染力が非常に強く、個室隔離・接触予防策の徹底が必要であるため正しい。", "c": "選択肢の組み合わせとしては誤りだが、A氏とB氏（通常疥癬）が同室で経過観察すること自体は不適切ではない。ただしbが優先されるため誤り。", "d": "介護士の就業制限は治療開始後12時間という基準はなく、適切な治療と症状改善確認後に判断するため誤り。"}}, "stem_items": {"a": "A氏のリネンは、毎日交換する。", "b": "C氏は、個室隔離する。", "c": "A氏とB氏は、205号室で経過観察する。", "d": "介護士の就業は、適切な治療開始後12時間経過後とする。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "exam_year": 2024, "exam_name": "第32回", "section": "問題2", "case_no": "1", "category": "疥癬", "subcategory": "接触予防策", "difficulty": "medium", "source_file": "第32回認定看護師認定審査.docx"}, "22": {"question_no": "22", "type": "single_best", "question": "発症者と接触した人に対し、予防的治療を実施することになりました。高齢者施設の管理者から、今後のために再発防止策を教えてほしいと依頼がありました。", "answer": "invalid", "explanation": {"overall": "問題文・選択肢が欠落しているため判定不能とした。採点上は全員正解扱いとする。", "each": {"1": "問題文欠落のため正誤判定対象外。", "2": "問題文欠落のため正誤判定対象外。", "3": "問題文欠落のため正誤判定対象外。", "4": "問題文欠落のため正誤判定対象外。"}}, "category": "疥癬", "subcategory": "問題欠落", "difficulty": "excluded", "note": "問22は問題文・選択肢欠落のため全員正解扱い", "is_invalid": true, "score_mode": "full", "auto_correct": true, "accepted_answers": ["1", "2", "3", "4"]}, "23": {"question_no": "23", "type": "single_best", "question": "再発防止策の説明として、誤っているものはどれか。", "choices": {"1": "皮膚症状のある利用者の衣類やリネン類は、各フロアで一次洗浄する。", "2": "レクリエーションを行う前に、参加者の症状を確認する。", "3": "夜間に皮膚の掻痒感が強い場合は、疥癬を疑う。", "4": "疥癬が疑われる場合は、医師にできるだけ早く診察を依頼する。"}, "answer": "1", "explanation": {"overall": "疥癬の再発防止では早期発見・早期診断が重要であり、レクリエーション前の症状確認や、夜間の強い掻痒感への注意、速やかな受診が推奨される。皮膚症状のある利用者の衣類・リネン類は各フロアで一次洗浄するのではなく、専用に分別した上で適切な洗濯処理（高温乾燥等）を行う必要がある。", "each": {"1": "皮膚症状のある利用者の衣類・リネン類を各フロアで一次洗浄すると疥癬虫の感染拡大リスクがあり、専用の分別洗濯（高温乾燥処理等）が必要であるため誤り（誤っている＝この問の正解）。", "2": "集団活動前に皮膚症状を確認することは再発防止に有効であり正しい。", "3": "夜間の強い掻痒感は疥癬を疑う重要な所見であり正しい。", "4": "疥癬が疑われる場合は早期診断・早期治療のため速やかに受診を依頼するため正しい。"}}, "category": "疥癬", "subcategory": "再発防止", "difficulty": "medium"}}}, "case2": {"case_no": "2", "description": "事例2\n次の文を読み、問24から問26に対する適切な答えを一つ選んでください。\n\nあなたはD病院の感染管理認定看護師です。2月13日、保健所より『本日、病院で麻疹と診断された20歳代の患者が、2月5日に病院の救急外来を受診している』と報告がありました。患者は、1月20日に東南アジアから帰国していました。\n・患者は、2月3日から発熱、咳、結膜充血が出現した。\n・救急外来で、インフルエンザと新型コロナウイルスの抗原検査を実施し、全て陰性であった。症状があるため、点滴を行い、解熱剤が処方され、自宅療養を指示されていた。\n・受診時に、患者はサージカルマスクを着用していなかったが、関わった職員は全員サージカルマスクを着用していた。\n・あなたは、患者と接触した職員・患者をリストアップした。抗体検査とワクチン接種は、入職時に提出された資料あるいは入職後に実施した情報から収集した。", "assets": {"tables": {"table1_2": {"title": "表1", "data": [{"職種": "医師", "生年月日": "1992年8月8日", "年齢": "32", "検査法": "EIA法", "抗体検査年月日": "2016年4月1日（入職時）", "抗体価": "30.6", "ワクチン接種年月日": "不明"}, {"職種": "看護師F", "生年月日": "1999年6月20日", "年齢": "25", "検査法": "―", "抗体検査年月日": "未検査", "抗体価": "", "ワクチン接種年月日": "2001年5月7日、2001年6月30日"}, {"職種": "看護師G", "生年月日": "1995年7月5日", "年齢": "29", "検査法": "EIA法", "抗体検査年月日": "2017年4月1日（入職時）", "抗体価": "10.3", "ワクチン接種年月日": "不明"}, {"職種": "受付事務職員", "生年月日": "1974年5月15日", "年齢": "50", "検査法": "―", "抗体検査年月日": "未検査", "抗体価": "", "ワクチン接種年月日": "不明"}, {"職種": "患者", "生年月日": "1954年4月1日", "年齢": "70", "検査法": "―", "抗体検査年月日": "未検査", "抗体価": "", "ワクチン接種年月日": "不明"}]}}}, "questions": {"24": {"question_no": "24", "type": "single_best", "question": "接触者リストに基づき行う対応として、正しいものはどれか。", "choices": {"1": "医師に、麻疹ワクチンを接種する。", "2": "看護師は、患者との接触から21日目まで、就業を制限する。", "3": "受付の事務職員に、抗体検査を行う。", "4": "患者に来院してもらい、免疫グロブリン製剤を投与する。"}, "answer": "3", "explanation": {"overall": "受付事務職員は抗体検査未実施・ワクチン接種歴不明であり、免疫の有無を確認するため抗体検査を行うことが適切である。医師は抗体価30.6と十分な免疫を有しており追加接種は不要、看護師の就業制限は接触者全員に一律適用するものではなく個々の免疫状態で判断する、免疫グロブリン製剤は曝露後72時間以内に投与する必要があり2月13日時点では期間を過ぎている。", "each": {"1": "医師は抗体価30.6と十分な免疫を有しており、追加のワクチン接種は不要であるため誤り。", "2": "就業制限は接触者全員に一律で課すものではなく、各人の抗体価・接種歴に基づいて個別に判断するため誤り。", "3": "受付事務職員は抗体検査未実施・接種歴不明であり、免疫状態確認のため抗体検査を行うことが適切であり正しい。", "4": "免疫グロブリン製剤は曝露後72時間以内の投与が必要であり、2月5日の曝露から2月13日まで既に8日経過しているため適応外であり誤り。"}}, "category": "麻疹", "subcategory": "接触者対応"}, "25": {"question_no": "25", "type": "single_best", "lead_text": "2月15日、看護師Gより「今朝から37.5℃の発熱と、上半身に軽度の発疹が出現したので、外来を受診したい」と電話連絡がありました。", "question": "外来受診時に行う対策として、正しい組み合わせはどれか。", "answer": "2", "explanation": {"overall": "麻疹が疑われる患者は空気感染対策として陰圧個室で診察する。接触者対策では感染可能期間に接触した者を把握するため行動調査を行うことが重要である。麻疹ウイルス遺伝子検査では便は標準的検体ではなく、また届出には1つ以上の臨床症状と検査診断の両方が必要である。", "each": {"a": "麻疹は空気感染するため、陰圧個室で診察することが適切である。", "b": "麻疹（修飾麻疹を含む）の届出は臨床症状のみで確定せず、1つ以上の臨床症状と検査診断（PCR等）の両方が必要であるため、臨床症状のみで直ちに発生届を提出するという記載は不適切である。", "c": "麻疹ウイルス遺伝子検査では咽頭ぬぐい液・尿・血液などが用いられ、便は標準的検体ではないため誤り。", "d": "感染可能期間の接触者を把握するため行動調査を行うことは重要であり正しい。"}}, "category": "麻疹", "subcategory": "接触者対応", "stem_items": {"a": "陰圧個室で診察する。", "b": "臨床症状から修飾麻疹と診断した場合は、保健所へ直ちに発生届を提出する。", "c": "麻疹ウイルス遺伝子検査のため、血液・尿・便を採取する。", "d": "発症1日前からの行動調査を行い、感染可能期間に接触した者を把握する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}}, "26": {"question_no": "26", "type": "single_best", "question": "再発予防のために見直す対策として、誤っているものはどれか。", "choices": {"1": "全ての受診者の問診項目に、1か月以内の海外渡航歴の確認を含める。", "2": "呼吸器症状のある患者には、サージカルマスク着用を促すよう職員教育を行う。", "3": "全職員が十分な免疫を獲得した上で業務できるよう、ワクチン接種プログラムを検討する。", "4": "受付の事務職員を除く救急外来のスタッフが、感染症のトリアージを行うためのチェックリストを作成する。"}, "answer": "4", "explanation": {"overall": "受付事務職員は患者と最初に接触する機会が多く、感染症トリアージのチェックリスト作成は救急外来スタッフ全体（事務職員を含む）が対象となるべきであり、『事務職員を除く』という限定は不適切である。海外渡航歴の問診確認、呼吸器症状患者へのマスク着用促進教育、全職員のワクチン接種プログラム検討はいずれも適切な再発予防策である。", "each": {"1": "海外渡航歴の確認は輸入感染症の早期発見に有効であり適切な対策である。", "2": "呼吸器症状のある患者へのマスク着用促進教育は飛沫拡散防止に有効であり適切な対策である。", "3": "全職員の十分な免疫獲得を目指したワクチン接種プログラムの検討は適切な対策である。", "4": "受付事務職員も患者と最初に接触する機会が多く、感染症トリアージのチェックリスト作成から除外するのは不適切であるため誤り（誤っている＝この問の正解）。"}}, "category": "麻疹", "subcategory": "再発予防", "difficulty": "medium"}}}, "case3": {"case_no": "3", "description": "事例3\n次の文を読み、問27から問29に対する適切な答えを一つ選んでください。\n\nあなたは病院の感染管理認定看護師です。3月4日、外科病棟の師長から、本日勤務中に看護師Hが39.0°Cの発熱と全身倦怠感を認めたため、外来受診しインフルエンザA型の診断を受けたと報告を受けました。\n・あなたが、病棟で情報収集を行ったところ、以下のことがわかりました。\n・看護師Hの3月の勤務状況を確認すると、3月1日と3月2日は休みで、3月3日と3月4日は日勤勤務であった。\n・3月2日に505号室J氏を担当していた看護師Pは今朝から咽頭違和感がある。\n・病院では、感染対策期間を学校保健安全法に準じて決めている。\n・看護師が担当していた病室の患者の状況を、以下の通りまとめた。", "assets": {"tables": {"table1_3": {"title": "表1", "data": [{"病室": "505", "患者": "I", "発症状況": "3月4日、発熱と咳が出現。同日、インフルエンザ迅速検査でA型と判明", "看護師Hの担当日": "3月3日、4日"}, {"病室": "505", "患者": "J", "発症状況": "3月1日、発熱出現。3月4日、インフルエンザ迅速検査でA型と判明", "看護師Hの担当日": "3月3日、4日"}, {"病室": "505", "患者": "K", "発症状況": "症状なし", "看護師Hの担当日": "無"}, {"病室": "505", "患者": "L", "発症状況": "症状なし", "看護師Hの担当日": "無"}, {"病室": "506", "患者": "M", "発症状況": "3月4日、咽頭違和感あり", "看護師Hの担当日": "3月3日、4日"}, {"病室": "506", "患者": "N", "発症状況": "症状なし", "看護師Hの担当日": "無"}, {"病室": "507", "患者": "O", "発症状況": "症状なし", "看護師Hの担当日": "3月3日、4日"}]}}}, "questions": {"27": {"question_no": "27", "type": "single_best", "question": "外科病棟におけるインフルエンザ対策として、正しい組み合わせはどれか。", "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "2", "explanation": {"overall": "I氏とJ氏はともにインフルエンザA型と確定診断されており、同室でのコホート管理が可能である。看護師Hが感染性を有していた可能性のある期間（3月3日以降）に接触した患者・職員に対して潜伏期間中の症状観察を行うことは適切な対応である。", "each": {"a": "I氏とJ氏はともにインフルエンザA型確定であり、同室でのコホート管理が可能であるため正しい。", "b": "M氏とO氏への一律の予防投与は推奨されず、まず症状観察や診断が優先されるため誤り。", "c": "K氏とL氏は看護師Hの担当ではなく、飛沫予防策開始の根拠に乏しいため誤り。", "d": "看護師Hと接触した患者・職員に対して潜伏期間中の症状観察を行うことは適切であるため正しい。"}}, "category": "インフルエンザ", "subcategory": "院内感染対策", "difficulty": "medium", "stem_items": {"a": "I氏とJ氏は、2人部屋へ移し同室にする。", "b": "M氏とO氏に、予防投与を行う。", "c": "K氏とL氏に対し、飛沫予防策を開始する。", "d": "3月3日以降、看護師Hとの接触があった者と職員に対して、潜伏期間の症状観察を行う。"}}, "28": {"question_no": "28", "type": "single_best", "question": "外科病棟における職員の就業に関する説明として、正しい組み合わせはどれか。", "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "2", "explanation": {"overall": "看護師Hの就業制限は学校保健安全法に準じ、発症後5日かつ解熱後2日を経過した後とするのが標準的対応であり正しい。職員は症状がないことを確認した上で就業を継続・開始するのが基本であり正しい。看護師Pは現時点で確定診断されておらず、予防投与を前提とした就業開始は時期尚早であり、就業前の迅速検査陰性確認は感度の問題（偽陰性のリスク）から就業可否の判断基準としては不十分である。", "each": {"a": "インフルエンザの就業制限は学校保健安全法に準じ発症後5日かつ解熱後2日経過後とするため正しい。", "b": "看護師Pは現時点で確定診断されておらず、予防投与を前提とした就業開始は時期尚早であるため誤り。", "c": "インフルエンザ迅速検査は発症初期に偽陰性となりやすく、陰性確認のみで就業可否を判断するのは不十分であるため誤り。", "d": "症状（インフルエンザ様症状）がないことを確認してから就業開始とする対応は基本的かつ適切であるため正しい。"}}, "category": "インフルエンザ", "subcategory": "就業制限", "difficulty": "medium", "stem_items": {"a": "看護師Hは、発症後5日、かつ、解熱後2日を経過した後に就業開始する。", "b": "看護師Pには、オセルタミビルリン酸塩の予防投与を行い就業開始とする。", "c": "外科病棟職員は、就業前にインフルエンザ迅速検査で陰性を確認する。", "d": "外科病棟職員は、インフルエンザ様症状がないことを確認してから就業開始とする。"}}, "29": {"question_no": "29", "type": "single_best", "question": "インフルエンザのアウトブレイクの再発防止策として、正しい組み合わせはどれか。", "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "インフルエンザに関する職員研修会の計画的実施は再発防止策として有効であり正しい。インフルエンザを疑う症状がある患者には飛沫予防策の実施を検討することが標準的対応であり正しい。インフルエンザ迅速検査は感度が高くなく発症初期は偽陰性となりやすいため陰性のみで否定はできず、インフルエンザは飛沫感染であり空気感染対策であるN95マスクのフィットテストは本疾患の対策としては直接関連しない。", "each": {"a": "インフルエンザ迅速検査は感度が高くなく、特に発症初期は偽陰性となりやすいため陰性のみで否定的と判断するのは不適切であり誤り。", "b": "N95マスクは空気感染対策であり、飛沫感染であるインフルエンザの対策としては直接的な関連性が低いため誤り。", "c": "インフルエンザに関する職員研修会の計画的実施は再発防止策として有効であり正しい。", "d": "インフルエンザを疑う症状がある患者には飛沫予防策の実施を検討することが標準的対応であり正しい。"}}, "category": "インフルエンザ", "subcategory": "再発防止", "difficulty": "medium", "stem_items": {"a": "上気道症状が出現した患者が、インフルエンザ迅速検査で陰性であれば、インフルエンザは否定的と考えて対応する。", "b": "定期的にN95マスクのフィットテストを行う。", "c": "インフルエンザに関する職員研修会を計画的に行う。", "d": "患者にインフルエンザを疑う症状がある場合は、飛沫予防策の実施を検討する。"}}}}, "case4": {"case_no": "4", "description": "事例4\n次の文を読み、問30から問31に対する適切な答えを一つ選んでください。\n\nあなたは病院の感染管理認定看護師です。1月20日に細菌検査室から、『Q病棟に入院している患者R氏の1月16日の喀痰から、多剤耐性アシネトバクター（MDRA）と多剤耐性緑膿菌（MDRP）が検出された』との報告を受けました。あなたがQ病棟に行き情報収集したところ、以下のことがわかりました。\n・R氏は1月15日に発熱、呼吸不全があり、他院からICUに転院してきた患者で、人工呼吸器を装着中である。\n・R氏は胸部X線検査で肺炎と診断されていた。\n・1月15日～1月20日までにICUに入室していた患者は12名で、そのうち5名は既に一般病棟に転棟していた。\n・ICUは22床あり、オープンフロアーでのベッド数が18床、2床室が2室となっている。", "assets": {}, "questions": {"30": {"question_no": "30", "type": "single_best", "question": "あなたは微生物検査室からの連絡を受けて、R氏を隔離するために2床室を1床として個室管理し、接触予防策を開始することにしました。R氏に対して実施する対策として、誤っているものはどれか。", "choices": {"1": "体温計や聴診器は、R氏専用とする。", "2": "エアロゾル発生手技では、N95マスクを着用する。", "3": "接触予防策を行う期間は、患者の状況に応じて病院が判断する。", "4": "病室に入る前は、エプロンと手袋を着用する。"}, "answer": "2", "explanation": {"overall": "MDRP・MDRAの感染経路は接触感染であり、N95マスク（空気予防策）は本来不要である。エアロゾル発生手技であっても、接触感染対策としてはサージカルマスク・眼の保護で対応するのが基本であり、N95マスク着用は過剰かつ不適切な対策である。", "each": {"1": "体温計・聴診器の専用化は接触予防策として適切な対応。", "2": "MDRP・MDRAは接触感染であり、N95マスク（空気予防策）の着用は本疾患の感染経路に対して不要かつ不適切であるため誤り（誤っている＝この問の正解）。", "3": "接触予防策の終了期間は培養結果や臨床状況に応じて病院が判断するのが標準的であり正しい対応。", "4": "病室に入る前にPPE（エプロン・手袋）を着用するのは標準的な接触予防策の手順であり正しい対応。"}}, "category": "薬剤耐性菌", "subcategory": "MDRP・MDRA", "difficulty": "medium"}, "31": {"question_no": "31", "type": "single_best", "question": "ICUで実施する感染予防策として、正しい組み合わせはどれか。", "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "3", "explanation": {"overall": "MDRAは接触感染対策が重要であり、1月15日以降にICU入室歴のある患者全員を遡って保菌調査することは適切である。また、R氏とS氏が使用したエリアの清拭消毒とカーテン交換は環境対策として適切である。S氏をR氏と同室に移動して接触予防策を開始する根拠はなく、人工呼吸器回路の定期交換は推奨されない。", "each": {"a": "S氏をR氏と同室に移動する根拠はなく、接触予防策は患者ごとに適切に実施する必要があるため誤り。", "b": "1月15日以降にICU入室歴のある患者全員を遡って保菌調査することは、接触者調査として適切であり正しい。", "c": "R氏とS氏が使用したエリアの清拭消毒とカーテン交換は、環境汚染対策として適切であり正しい。", "d": "人工呼吸器回路の定期交換は感染予防目的では推奨されず、汚染や破損など必要時交換が原則であるため誤り。"}}, "lead_text": "1月20日頃よりICUに入院中の患者に、保菌調査を行いました。その結果、人工呼吸器を装着している患者5名の呼吸器から、MDRAが検出されました。", "stem_items": {"a": "S氏はR氏と同室に移動し、接触予防策を開始する。", "b": "1月15日以降にICUに入室歴のある患者全員を遡り、保菌調査を実施する。", "c": "R氏とS氏が2床室に転室する前に使用したエリアは、清拭消毒とカーテンを交換する。", "d": "感染拡大が終息するまでは、定期的に人工呼吸器の回路を交換する。"}}}}, "case5": {"case_no": "5", "description": "事例5\n次の文を読み、問32から問34に対する適切な答えを一つ選んでください。\n\nあなたは病院の感染管理認定看護師です。病院では、消化器外科で結腸手術を受ける患者を対象に手術部位感染（SSI）サーベイランスを実施しています。\nサーベイランスから得られたデータと日本環境感染学会JHAIS委員会のデータを表1にまとめました。", "assets": {"tables": {"table1_5": {"title": "表1 結腸手術（COLO）・SSIサーベイランスのまとめ", "notes": ["COLOでは、内視鏡使用の場合はJHAISリスクインデックスからマイナス1"], "data": [{"RIカテゴリー": "-1", "SSI発生件数": "1", "手術件数": "15", "JHAIS SSI発生率(%)": "3.72", "期待されるSSI件数": "0.56"}, {"RIカテゴリー": "0", "SSI発生件数": "2", "手術件数": "20", "JHAIS SSI発生率(%)": "7.54", "期待されるSSI件数": "1.51"}, {"RIカテゴリー": "1", "SSI発生件数": "6", "手術件数": "35", "JHAIS SSI発生率(%)": "11.71", "期待されるSSI件数": "4.10"}, {"RIカテゴリー": "2", "SSI発生件数": "7", "手術件数": "20", "JHAIS SSI発生率(%)": "26.77", "期待されるSSI件数": "5.35"}, {"RIカテゴリー": "3", "SSI発生件数": "6", "手術件数": "15", "JHAIS SSI発生率(%)": "36.36", "期待されるSSI件数": "5.45"}, {"RIカテゴリー": "合計", "SSI発生件数": "22", "手術件数": "105", "JHAIS SSI発生率(%)": "8.10", "期待されるSSI件数": "16.97"}]}}}, "questions": {"32": {"question_no": "32", "type": "single_best", "question": "病院のRI別のSSI発生率として、正しい組み合わせはどれか。", "stem_items": {"a": "RI0: 10.0%", "b": "RI1: 1.7%", "c": "RI2: 3.5%", "d": "RI3: 40.0%"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "2", "explanation": {"overall": "RI0は2/20=10.0%、RI1は6/35=17.1%、RI2は7/20=35.0%、RI3は6/15=40.0%である。したがってaとdが正しい。", "each": {"a": "2÷20×100=10.0%で正しい。", "b": "6÷35×100=17.1%であり1.7%ではないため誤り。", "c": "7÷20×100=35.0%であり3.5%ではないため誤り。", "d": "6÷15×100=40.0%で正しい。"}}}, "33": {"question_no": "33", "type": "single_best", "question": "SIRの解釈について正しいのはどれか。", "choices": {"1": "病院のSSIは、JHAISの水準より1.3倍多く発生している。", "2": "病院のSSIは、JHAISの水準より0.5倍多く発生している。", "3": "病院のSSIは、JHAISの水準より8.1%多く発生している。", "4": "病院のSSIは、JHAISの水準より9件多く発生している。"}, "answer": "1", "explanation": {"overall": "SIRは実際の感染件数を期待される感染件数で割った値であり、22÷16.97≒1.30となる。SIRが1.3ということは、JHAISの期待値（基準）よりも1.3倍多くSSIが発生していることを意味する。", "each": {"1": "SIR＝22÷16.97≒1.30であり、JHAIS水準より1.3倍多く発生していることを示すため正しい。", "2": "SIRの値が0.5倍という記載は計算結果と一致しないため誤り。", "3": "8.1%という数値は表中のJHAIS SSI発生率（8.10%）を指しているが、SIRの解釈としては不適切であるため誤り。", "4": "実際の発生件数（22件）と期待件数（16.97件）の差は約5件であり、9件という記載は計算結果と一致しないため誤り。"}}}, "34": {"question_no": "34", "type": "single_best", "lead_text": "SSI事例を整理したところ、以下のことが分かりました。\n・表層切開創のSSIが最も多い。\n・表層切開創SSIの発生日は術後7日以内である。\n・糖尿病患者が多い。\n・創部培養からは、メチシリン耐性黄色ブドウ球菌（MRSA）、表皮ブドウ球菌、腸球菌が検出されている。あなたはサーベイランスの結果について外科医師と看護師に報告し、改善策を提案することにしました。", "question": "外科医師と看護師に提案する改善策として、正しい組み合わせはどれか。", "stem_items": {"a": "周術期は、血糖の目標レベルを200mg/dl未満にする。", "b": "表層切開創のSSI防止のために、手術終了時に創部を消毒する。", "c": "結腸手術を受ける患者には、ムピロシンによるMRSA除菌を行う。", "d": "医師と看護師の手指衛生の実施状況や、個人防護具の使用状況を確認する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "2", "explanation": {"overall": "糖尿病患者が多く、術後早期の表層切開創SSIが多い状況では、周術期血糖管理として血糖値200mg/dl未満を目標にすることは適切である。また、手指衛生や個人防護具の使用状況を確認し、手術創管理や接触による汚染リスクを評価することも改善策として適切である。手術終了時の創部消毒はSSI防止策として標準的ではなく、結腸手術患者全員にムピロシンによるMRSA除菌を行うことも適切ではない。", "each": {"a": "糖尿病患者が多い状況では、周術期の血糖管理として血糖値200mg/dl未満を目標にすることは適切であり正しい。", "b": "表層切開創SSI防止のために手術終了時に創部を消毒することは標準的な改善策とはいえず誤り。", "c": "MRSAが検出されていても、結腸手術を受ける患者全員にムピロシンによるMRSA除菌を行う対応は適切ではないため誤り。", "d": "医師と看護師の手指衛生や個人防護具の使用状況を確認することは、SSI改善策として適切であり正しい。"}}, "category": "SSI", "subcategory": "サーベイランス結果に基づく改善策", "difficulty": "medium"}}}, "case6": {"case_no": "6", "description": "事例6\n次の文を読み、問35から問37に対する適切な答えを一つ選んでください。\nあなたは病院の感染管理認定看護師です。\nICTでの環境ラウンドで内視鏡室を訪問したところ、以下の場面を確認しました。\n・看護師は、検査に使用した手袋、ガウンを着用し内視鏡を洗浄室に搬送している。\n・内視鏡検査には、過酢酸を使用し、自動洗浄・消毒装置で処理している。\n・漏水検知は、全ての検査が終了してから実施している。", "assets": {}, "questions": {"35": {"question_no": "35", "type": "single_best", "question": "内視鏡室職員に指導する内容として、正しい組み合わせはどれか。", "stem_items": {"a": "内視鏡検査前の感染症検査を行うことで、内視鏡洗浄・消毒を簡略化できる。", "b": "自動洗浄・消毒装置による洗浄・消毒は、ベッドサイドでの前処理工程を省くことができる。", "c": "症例ごとにベッドとその手すりは、消毒用エタノールで清拭する。", "d": "検査に使用していたPPEを脱いでから検査室を出る。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "標準予防策の考え方では感染症の有無にかかわらず同じ洗浄・消毒レベルを維持するため、感染症検査結果による簡略化は行わない。また自動洗浄・消毒装置を使用する場合でも、ベッドサイドでの前処理は必要である。患者ごとの環境清拭と、PPEを脱いでから検査室を退出することは適切である。", "each": {"a": "感染症検査結果によって内視鏡の洗浄・消毒を簡略化することはできないため誤り。", "b": "自動洗浄・消毒装置を使用しても、使用直後の前処理は必要であるため誤り。", "c": "患者ごとにベッドや手すりを消毒用エタノールで清拭することは適切であり正しい。", "d": "汚染したPPEは検査室内で脱ぎ、退出前に外すため正しい。"}}, "category": "内視鏡", "subcategory": "洗浄・消毒", "difficulty": "medium"}, "36": {"question_no": "36", "type": "single_best", "question": "内視鏡と内視鏡付属品の洗浄・消毒と管理方法として、正しい組み合わせはどれか。", "stem_items": {"a": "透水ボトルは使用後、毎日洗浄後に乾燥させ、1週間に1回は滅菌する。", "b": "高水準消毒薬を用いてリユーザブル処置具の再生処理は行わない。", "c": "使用前に過酢酸の濃度が、0.1%を維持していることを確認する必要がある。", "d": "検査終了直後、内視鏡の外表面は過酢酸で清拭する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "1", "explanation": {"overall": "送水ボトルは毎日の洗浄・乾燥に加えて週1回の滅菌が推奨されており正しい。リユーザブル処置具はクリティカル器材であり、高水準消毒ではなく滅菌処理が必要であるため、高水準消毒薬を用いた再生処理は行わない。一方、過酢酸製剤の最小有効濃度（実用下限濃度）は0.1%ではなく0.2%以上が必要であり、検査終了直後の内視鏡外表面は過酢酸ではなく洗浄剤等で予備洗浄する。", "each": {"a": "送水ボトルは毎日の洗浄・乾燥に加えて週1回の滅菌が推奨されており正しい。", "b": "リユーザブル処置具はクリティカル器材であり滅菌が必要で、高水準消毒では再生処理を行わないため正しい。", "c": "過酢酸製剤の最小有効濃度（実用下限濃度）は0.1%ではなく0.2%以上が必要であるため誤り。", "d": "検査終了直後の内視鏡外表面は過酢酸ではなく、洗浄剤や酵素洗浄剤等を用いた予備洗浄を行うため誤り。"}}, "category": "内視鏡", "subcategory": "洗浄・消毒・管理", "difficulty": "medium"}, "37": {"question_no": "37", "type": "single_best", "lead_text": "微生物検査室より、「入院患者2名から多剤耐性緑膿菌（MDRP）が検出された」と報告があった。患者情報を調べたところ、病棟及び診療科が異なる患者で、同日に下部内視鏡検査を受けていることが分かった。\nそこで、内視鏡を確認したところ、内視鏡表面に損傷箇所があることがわかった。", "question": "今後の対応として、正しい組み合わせはどれか。", "stem_items": {"a": "年1回以上、内視鏡機器と処置具の表面や鉗子チャンネルなどの薬剤耐性菌の培養検査を行う。", "b": "内視鏡消毒後は乾燥させ、丸めて平らな容器に入れ保管する。", "c": "検査終了毎に、漏水チェックを行い損傷の有無を確認する。", "d": "内視鏡の洗浄・消毒に関する履歴を管理する。"}, "choices": {"1": "a, b", "2": "a, d", "3": "b, c", "4": "c, d"}, "answer": "4", "explanation": {"overall": "内視鏡に損傷があると洗浄・消毒不良や薬剤耐性菌伝播のリスクがあるため、検査終了ごとに漏水チェックを行い損傷の有無を確認することが重要である。また、感染事例が疑われる場合には使用した内視鏡、洗浄・消毒状況、使用患者などの履歴管理が必要である。定期的な培養検査を年1回以上実施することは標準的な管理としては必須ではなく、内視鏡は消毒後に乾燥させ、丸めて平らな容器ではなく適切に吊り下げ保管する。", "each": {"a": "内視鏡機器や鉗子チャンネルの薬剤耐性菌培養検査を年1回以上行うことは標準的な必須管理ではないため誤り。", "b": "内視鏡は消毒後に乾燥させた上で、丸めて平らな容器に入れるのではなく、汚染や再湿潤を避けて適切に吊り下げ保管するため誤り。", "c": "検査終了ごとに漏水チェックを行い、損傷の有無を確認することは適切であり正しい。", "d": "内視鏡の洗浄・消毒に関する履歴を管理することは、感染発生時の追跡と再発防止に重要であり正しい。"}}, "category": "内視鏡", "subcategory": "洗浄・消毒履歴管理", "difficulty": "medium"}}}, "case7": {"case_no": "7", "description": "事例7\n次の文を読み、問38から問40に対する適切な答えを一つ選んでください。\nあなたは病院の感染管理認定看護師です。連携医療機関の感染対策担当看護師から「脳神経外科病棟の尿道留置カテーテル関連の尿路感染対策を強化したい」と相談がありました。そこで、昨年度のサーベイランス結果（表1）を踏まえ、対策を強化することにした。なお、表1の結果は、表2・3のベンチマークと比較しました。", "assets": {"tables": {"table1_7": {"title": "表1　カテーテル関連尿路感染（CAUTI）サーベイランス結果　脳神経外科病棟　2023年度", "data": [{"感染件数": "15", "尿道留置カテーテル使用日数": "2,700", "延べ入院患者数": "6,700", "CAUTI発生密度率": "（あ）", "尿道留置カテーテル使用比": "（い）"}]}, "table2_7": {"title": "表
