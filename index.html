    return `<button onclick="afterChooseExam('${examId}','${nextMode}')">${EXAM_FILES[examId].label}（全${count}問）</button>`;
  }).join("");

  html(`
    <div class="card">
      <div class="header">
        <h2>回を選択</h2>
        <button onclick="renderStartMenu()">戻る</button>
      </div>
      ${buttons}
    </div>
  `);
}

function afterChooseExam(examId, nextMode){
  if(nextMode === "fresh") startExam(examId, loadQuestions(examId), 0, "normal");
  if(nextMode === "number") renderNumberSelect(examId);
  if(nextMode === "category") renderCategorySelect(examId);
}

function renderNumberSelect(examId){
  const qs = loadQuestions(examId);
  html(`
    <div class="card">
      <div class="header">
        <h2>問題番号を選ぶ</h2>
        <button onclick="renderStartMenu()">戻る</button>
      </div>
      <div class="number-grid">
        ${qs.map((q,i)=>`<button onclick="startExam('${examId}', loadQuestions('${examId}'), ${i}, 'number')">${esc(q._subject ? q._subject + ' ' : '')}問${esc(q._display_no || q.question_no)}</button>`).join("")}
      </div>
    </div>
  `);
}

function renderCategorySelect(examId){
  const qs = loadQuestions(examId);
  const cats = [...new Set(qs.map(q => q.category || "未分類"))].sort();
  html(`
    <div class="card">
      <div class="header">
        <h2>分野別</h2>
        <button onclick="renderStartMenu()">戻る</button>
      </div>
      ${cats.map(cat => `<button onclick="startCategory('${examId}', '${esc(cat)}')">${esc(cat)}</button>`).join("")}
    </div>
  `);
}

function startCategory(examId, catEsc){
  const ta = document.createElement("textarea");
  ta.innerHTML = catEsc;
  const cat = ta.value;
  const qs = loadQuestions(examId).filter(q => (q.category || "未分類") === cat);
  startExam(examId, qs, 0, "category");
}

function startExam(examId, questions, index, mode){
  state = {
    examId,
    questions,
    currentIndex:index || 0,
    mode:mode || "normal",
    answered:false
  };
  renderQuestion();
}

function resumeExam(){
  const p = loadProgress();
  if(!p.has_progress){
    alert("再開できるデータがありません。");
    return;
  }
  startExam(p.exam_id || "29", loadQuestions(p.exam_id || "29"), p.question_index || 0, p.mode || "normal");
}

function getQuestionRate(examId, qNo){
  const st = loadScores()[examId]?.question_stats?.[qNo];
  if(!st || !st.attempts) return "未実施";
  return `${(st.correct / st.attempts * 100).toFixed(1)}%（${st.correct}/${st.attempts}）`;
}

function normalizeForCompare(s){
  return clean(s)
    .replace(/[ \t\r\n　]/g, "")
    .replace(/[。．.、，,]/g, "");
}

function stemItemsDuplicateChoices(q){
  if(!q || !q.stem_items || !q.choices) return false;

  const stemEntries = Object.entries(q.stem_items);
  const choiceEntries = Object.entries(q.choices);
  if(stemEntries.length === 0 || choiceEntries.length === 0) return false;

  const choiceMap = Object.fromEntries(
    choiceEntries.map(([k,v]) => [String(k), normalizeForCompare(v)])
  );

  return stemEntries.every(([k,v]) => {
    const key = String(k).replace(/[.．]/g, "");
    return choiceMap[key] && normalizeForCompare(v) === choiceMap[key];
  });
}



function renderStemItemsWithMarks(q){
  if(!q || !q.stem_items || stemItemsDuplicateChoices(q)) return "";
  const entries = Object.entries(q.stem_items);
  if(entries.length === 0) return "";

  const rows = entries.map(([k,v]) => {
    const key = String(k).replace(/[.．]/g, "");
    return `
      <div class="stem-row">
        <div class="stem-text">${esc(key)}. ${esc(clean(v))}</div>
        <div class="stem-mark-wrap">
          ${stemMarkButton(key, "〇", "ok")}
          ${stemMarkButton(key, "△", "maybe")}
          ${stemMarkButton(key, "×", "ng")}
        </div>
      </div>`;
  }).join("");

  return `<div class="box stem-box"><b>【選択肢文】</b>${rows}</div>`;
}

function stemMarkButton(itemKey, mark, kind){
  return `<button type="button" class="stem-mark stem-mark-${kind}" data-stem="${esc(itemKey)}" data-mark="${esc(mark)}">${esc(mark)}</button>`;
}

function bindStemMarkEvents(){
  document.querySelectorAll(".stem-mark").forEach(btn => {
    btn.addEventListener("click", function(ev){
      ev.preventDefault();
      ev.stopPropagation();
      const itemKey = this.dataset.stem;
      document.querySelectorAll('.stem-mark[data-stem="' + itemKey + '"]').forEach(b => b.classList.remove("selected"));
      this.classList.add("selected");
    });
  });
}

function renderQuestion(){
  const q = state.questions[state.currentIndex];

  if(!q){
    clearProgress();
    html(`
      <div class="card">
        <h2>全問終了しました</h2>
        <button class="primary" onclick="home()">ホーム</button>
        <button onclick="renderData()">データを見る</button>
      </div>
    `);
    return;
  }

  state.answered = false;

  saveProgress({
    has_progress:true,
    exam_id:state.examId,
    mode:state.mode,
    question_index:state.currentIndex
  });

  const caseBox = q._case_description
    ? `<div class="box prebox"><b>【事例】</b>\n${esc(clean(q._case_description))}</div>`
    : "";

  const assetsBox = renderAssets(q._assets);

  const leadTextBox = q.lead_text
    ? `<div class="box prebox">${esc(clean(q.lead_text))}</div>`
    : "";

  const stem = renderStemItemsWithMarks(q);

  const choices = Object.keys(q.choices || {}).length === 0
    ? `<div class="box prebox">この問題は元資料の図表が不足しているため、全員正解扱いです。</div>`
    : Object.entries(q.choices || {}).map(([k,v]) =>
      `<button class="choice" id="choice_${k}" onclick="selectAnswer('${k}')"><b>${k}.</b> ${esc(clean(v))}</button>`
    ).join("");

  html(`
    <div class="card">
      <div class="header">
        <div>
          <h2>${EXAM_FILES[state.examId].label}　問${esc(q._display_no || q.question_no)}</h2>
          ${q._subject ? `<span class="meta">${esc(q._subject)}</span>` : ""}
          ${q._unit_title ? `<span class="meta">${esc(q._unit_no)} ${esc(q._unit_title)}</span>` : ""}
          <span class="meta">${esc(q.category || "未分類")}</span>
          <span class="meta">${esc(q.subcategory || "未分類")}</span>
          <span class="meta">正答率：${getQuestionRate(state.examId, q._id || q.question_no)}</span>
        </div>
        <button onclick="home()">ホーム</button>
      </div>

      ${caseBox}
      ${assetsBox}
      ${leadTextBox}

      <h3 id="questionBlock">【問題】</h3>
      <div class="box prebox">${esc(clean(q.question))}</div>

      ${stem}

      <h3>【選択肢】</h3>
      ${choices}

      <div id="answerArea"></div>
    </div>
  `);

  bindStemMarkEvents();

  if((q.is_invalid && q.auto_correct) || Object.keys(q.choices || {}).length === 0){
    state.answered = true;
    updateScore(state.examId, q, true);
    renderAnswer(q, true, true);
  }
}

function selectAnswer(ans){
  if(state.answered) return;
  state.answered = true;

  const q = state.questions[state.currentIndex];
  const invalid = q.is_invalid && q.auto_correct;

  let correct = false;
  if(invalid) correct = true;
  else if(Array.isArray(q.accepted_answers)) correct = q.accepted_answers.includes(ans);
  else correct = ans === q.answer;

  Object.keys(q.choices || {}).forEach(k => {
    const el = document.getElementById("choice_" + k);
    if(!el) return;

    if(invalid){
      el.classList.add("correct");
    }else{
      if(k === q.answer) el.classList.add("correct");
      if(k === ans && !correct) el.classList.add("wrong");
    }
  });

  updateScore(state.examId, q, correct);
  renderAnswer(q, correct, invalid);
}

function renderAnswer(q, correct, invalid){
  const exp = q.explanation || {};
  const each = exp.each ? Object.entries(exp.each).map(([k,v])=>`${k}: ${v}`).join("\n") : "";

  document.getElementById("answerArea").innerHTML = `
    <div class="box prebox">
      ${invalid ? '<p class="result-warn">⚠ 図表欠落または採点対象外のため全員正解扱いです。</p>' :
        correct ? '<p class="result-ok">✅ 正解です。</p>' : '<p class="result-ng">❌ 不正解です。</p>'}
      <p><b>正答：</b>${esc(q.answer)}</p>
      <h3>【解説】</h3>
      <p>${esc(clean(exp.overall || ""))}</p>
      ${each ? `<h3>【選択肢ごとの解説】</h3><pre>${esc(each)}</pre>` : ""}
    </div>
    <div class="footer row">
      <button class="primary" onclick="nextQuestion()">次に進む</button>
      <button onclick="stopHere()">今日はここまで</button>
      <button onclick="home()">ホーム</button>
    </div>
  `;
}

function nextQuestion(){
  const prev = state.questions[state.currentIndex];
  state.currentIndex++;
  const next = state.questions[state.currentIndex];
  const sameCase = prev && next && prev._case_no && next._case_no && prev._case_no === next._case_no;

  renderQuestion();

  setTimeout(() => {
    const target = sameCase ? document.getElementById("questionBlock") : document.querySelector(".card");
    if(target) target.scrollIntoView({behavior:"auto", block:"start"});
    else window.scrollTo(0, 0);
  }, 0);
}

function stopHere(){
  saveProgress({
    has_progress:true,
    exam_id:state.examId,
    mode:state.mode,
    question_index:state.currentIndex + 1
  });
  alert("ここまで保存しました。");
  home();
}

function updateScore(examId, q, correct){
  if(q.is_invalid && q.auto_correct) correct = true;

  const scores = loadScores();
  if(!scores[examId]){
    scores[examId] = {
      total_attempts:0,
      correct_attempts:0,
      wrong_questions:{},
      category_stats:{},
      question_stats:{}
    };
  }

  const s = scores[examId];
  const no = q._id || q.question_no;
  const displayNo = q._display_no || q.question_no;
  const cat = q.category || "未分類";
  const sub = q.subcategory || "未分類";

  s.total_attempts++;
  if(correct) s.correct_attempts++;

  if(!s.category_stats[cat]) s.category_stats[cat] = {attempts:0, correct:0, wrong:0};
  s.category_stats[cat].attempts++;
  if(correct) s.category_stats[cat].correct++;
  else s.category_stats[cat].wrong++;

  if(!s.question_stats[no]) s.question_stats[no] = {attempts:0, correct:0, wrong:0};
  s.question_stats[no].attempts++;
  if(correct) s.question_stats[no].correct++;
  else s.question_stats[no].wrong++;

  if(!correct){
    s.wrong_questions[no] = {
      question_no:displayNo,
      key:no,
      category:cat,
      subcategory:sub,
      wrong_count:s.question_stats[no].wrong
    };
  }

  saveScores(scores);
}

function renderData(){
  const scores = loadScores();
  let body = "";

  if(Object.keys(scores).length === 0){
    body = "<p>まだ学習データがありません。</p>";
  }else{
    body = Object.entries(scores).map(([id,d]) => {
      const total = d.total_attempts || 0;
      const correct = d.correct_attempts || 0;
      const rate = total ? (correct / total * 100).toFixed(1) : "0.0";
      const cats = Object.entries(d.category_stats || {})
        .sort((a,b)=>(b[1].wrong || 0) - (a[1].wrong || 0))
        .map(([cat,st]) => `<tr><td>${esc(cat)}</td><td>${st.wrong || 0}</td><td>${st.attempts || 0}</td></tr>`)
        .join("");

      return `
        <h2>${EXAM_FILES[id]?.label || id}</h2>
        <div class="box prebox">総回答数：${total}\n正解数：${correct}\n得点率：${rate}%</div>
        <h3>不正解が多い分野</h3>
        <div class="tablewrap">
          <table>
            <thead><tr><th>分野</th><th>不正解</th><th>回答</th></tr></thead>
            <tbody>${cats}</tbody>
          </table>
        </div>
      `;
    }).join("");
  }

  html(`
    <div class="card">
      <div class="header">
        <h1>データを見る</h1>
        <button onclick="home()">ホーム</button>
      </div>
      ${body}
      <div class="row">
        <button onclick="retryWrong()">間違えの多い問題に再チャレンジ</button>
        <button class="danger" onclick="resetLearningData()">学習データをリセット</button>
      </div>
    </div>
  `);
}

function retryWrong(){
  const scores = loadScores();
  const examIds = Object.keys(scores).filter(id => Object.keys(scores[id]?.wrong_questions || {}).length > 0);

  if(examIds.length === 0){
    alert("間違えた問題はありません。");
    return;
  }

  if(examIds.length === 1){
    retryWrongExam(examIds[0]);
    return;
  }

  html(`
    <div class="card">
      <div class="header">
        <h2>再チャレンジする回を選択</h2>
        <button onclick="renderData()">戻る</button>
      </div>
      ${examIds.map(id => `<button onclick="retryWrongExam('${id}')">${EXAM_FILES[id]?.label || id}</button>`).join("")}
    </div>
  `);
}

function retryWrongExam(examId){
  const wrong = loadScores()[examId]?.wrong_questions || {};
  const set = new Set(Object.keys(wrong));
  const qs = loadQuestions(examId).filter(q => set.has(q._id || q.question_no));
  qs.sort((a,b)=>(wrong[b._id || b.question_no]?.wrong_count || 0) - (wrong[a._id || a.question_no]?.wrong_count || 0));
  startExam(examId, qs, 0, "wrong_only");
}



// ===== 全文検索（過去問＋eラーニング＋manifest追加ファイル） =====
function flattenTextParts(q){
  const parts = [];
  if(q._case_description) parts.push(["事例", q._case_description]);
  if(q.lead_text) parts.push(["導入文", q.lead_text]);
  if(q.question) parts.push(["問題文", q.question]);
  if(q.stem_items) Object.entries(q.stem_items).forEach(([k,v]) => parts.push([`選択肢${k}`, v]));
  if(q.choices) Object.entries(q.choices).forEach(([k,v]) => parts.push([`選択肢${k}`, v]));
  if(q.answer) parts.push(["正答", q.answer]);
  if(q.explanation?.overall) parts.push(["解説", q.explanation.overall]);
  if(q.explanation?.each) Object.entries(q.explanation.each).forEach(([k,v]) => parts.push([`解説${k}`, v]));
  if(q.category) parts.push(["カテゴリ", q.category]);
  if(q.subcategory) parts.push(["サブカテゴリ", q.subcategory]);
  if(q._subject) parts.push(["科目", q._subject]);
  if(q._unit_title) parts.push(["単元", q._unit_title]);
  return parts;
}

function buildSearchIndex(){
  const index = [];
  Object.entries(EXAM_FILES).forEach(([examId, info]) => {
    let qs=[];
    try{ qs = loadQuestions(examId); }catch(e){ console.warn('loadQuestions failed', examId, e); return; }
    qs.forEach((q, i) => {
      const parts = flattenTextParts(q);
      index.push({
        examId,
        index:i,
        q,
        label:info.label || examId,
        sourceFile:info.file || '',
        fullText:parts.map(p=>p[1]).join(' '),
        parts
      });
    });
  });
  return index;
}

function highlightText(text, kws){
  let out = esc(text || '');
  (kws||[]).filter(Boolean).forEach(k => {
    const safe = esc(k).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    try{ out = out.replace(new RegExp(safe, 'gi'), m => `<mark>${m}</mark>`); }catch(e){}
  });
  return out;
}

function fieldHasAllKeywords(parts, kws){
  const joined = parts.map(p=>String(p[1]||'')).join(' ').toLowerCase();
  return kws.every(k => joined.includes(k.toLowerCase()));
}

function matchedFields(parts, kws){
  return parts.filter(([name, text]) => kws.some(k => String(text||'').toLowerCase().includes(k.toLowerCase())));
}

function renderFullSearch(){
  const total = buildSearchIndex().length;
  html(`
    <div class="card">
      <div class="header">
        <div>
          <h1>全文検索</h1>
          <p class="small">過去問・eラーニングの問題文、選択肢、正答、解説、カテゴリを横断検索します。</p>
          <p class="small">検索対象：${esc(String(total))}問</p>
        </div>
        <button onclick="home()">ホーム</button>
      </div>
      <div class="searchbar">
        <input id="fullSearchInput" class="search-input" placeholder="例：MRSA　内視鏡　高水準消毒　抗菌薬" onkeydown="if(event.key==='Enter')runFullSearch()">
        <button class="primary" onclick="runFullSearch()">検索</button>
      </div>
      <div class="small">スペース区切りでAND検索。結果には問題文・選択肢・正答・解説を表示します。</div>
      <div id="fullSearchMeta" class="search-meta"></div>
      <div id="fullSearchResults"></div>
    </div>
  `);
  setTimeout(()=>document.getElementById('fullSearchInput')?.focus(),0);
}

function runFullSearch(){
  const input = document.getElementById('fullSearchInput');
  const meta = document.getElementById('fullSearchMeta');
  const list = document.getElementById('fullSearchResults');
  if(!input || !meta || !list) return;
  const raw = input.value.trim();
  if(!raw){ meta.textContent=''; list.innerHTML='<div class="empty-mini">検索語を入力してください。</div>'; return; }
  const kws = raw.split(/[\s　]+/).filter(Boolean);
  const idx = buildSearchIndex();
  const results = idx.filter(item => fieldHasAllKeywords(item.parts, kws));
  meta.textContent = `「${raw}」：${results.length}件 / ${idx.length}問`;
  if(!results.length){ list.innerHTML='<div class="empty-mini">該当なし</div>'; return; }
  list.innerHTML = results.slice(0,200).map(item => buildSearchResultCard(item, kws)).join('')
    + (results.length>200 ? `<div class="small">200件まで表示しています。</div>` : '');
}

function buildSearchResultCard(item, kws){
  const q = item.q;
  const matched = matchedFields(item.parts, kws).slice(0,6);
  const hits = matched.map(([name,text]) => {
    const s = String(text||'');
    const firstHit = Math.min(...kws.map(k => {
      const pos = s.toLowerCase().indexOf(k.toLowerCase());
      return pos < 0 ? 999999 : pos;
    }));
    const start = Math.max(0, (firstHit===999999?0:firstHit) - 45);
    const snip = s.slice(start, start + 160);
    return `<div class="hit-line"><b>${esc(name)}：</b>${start>0?'…':''}${highlightText(snip,kws)}${s.length>start+160?'…':''}</div>`;
  }).join('');

  let stemHtml = '';
  if(q.stem_items && !stemItemsDuplicateChoices(q)){
    stemHtml = `<div class="search-section-title">選択肢文</div>` + Object.entries(q.stem_items).map(([k,v]) =>
      `<div class="search-choice"><b>${esc(k)}.</b> ${highlightText(clean(v),kws)}</div>`
    ).join('');
  }
  const choicesHtml = q.choices ? `<div class="search-section-title">選択肢</div>` + Object.entries(q.choices).map(([k,v]) =>
    `<div class="search-choice ${String(k)===String(q.answer)?'answer-choice':''}"><b>${esc(k)}.</b> ${highlightText(clean(v),kws)}${String(k)===String(q.answer)?' ✓':''}</div>`
  ).join('') : '';
  const each = q.explanation?.each ? Object.entries(q.explanation.each).map(([k,v]) => `<div><b>${esc(k)}：</b>${highlightText(clean(v),kws)}</div>`).join('') : '';
  const expHtml = q.explanation?.overall || each ? `<div class="search-section-title">解説</div><div class="search-explanation">${q.explanation?.overall ? highlightText(clean(q.explanation.overall),kws) : ''}${each}</div>` : '';

  const questionPreview = clean(q.question || '').slice(0,95) + (clean(q.question || '').length > 95 ? '…' : '');
  const firstHitBox = hits || '<span class="small">一致箇所なし</span>';
  const cardId = `sr_${item.examId}_${item.index}`.replace(/[^a-zA-Z0-9_]/g,'_');

  return `
    <details class="search-result-card" id="${cardId}">
      <summary class="search-summary">
        <div class="search-summary-top">
          <div class="search-summary-title">
            <span class="meta">${esc(item.label)}</span>
            <span class="meta">問${esc(q._display_no || q.question_no)}</span>
            ${q._subject ? `<span class="meta">${esc(q._subject)}</span>` : ''}
            ${q._unit_title ? `<span class="meta">${esc(q._unit_no || '')} ${esc(q._unit_title)}</span>` : ''}
            ${q.category ? `<span class="meta">${esc(q.category)}</span>` : ''}
            ${q.subcategory ? `<span class="meta">${esc(q.subcategory)}</span>` : ''}
          </div>
          <span class="search-summary-open">詳細</span>
        </div>
        <div class="search-summary-q">${highlightText(questionPreview,kws)}</div>
        <div class="search-summary-hit">${firstHitBox}</div>
      </summary>

      <div class="search-detail-body">
        <div class="search-detail-actions">
          <button onclick="startExam('${esc(item.examId)}', loadQuestions('${esc(item.examId)}'), ${item.index}, 'search')">この問題を開く</button>
        </div>
        ${q._case_description ? `<div class="search-section-title">事例</div><div class="box prebox">${highlightText(clean(q._case_description),kws)}</div>` : ''}
        ${q.lead_text ? `<div class="box prebox">${highlightText(clean(q.lead_text),kws)}</div>` : ''}
        <div class="search-section-title">問題文</div>
        <div class="box prebox">${highlightText(clean(q.question),kws)}</div>
        ${stemHtml}
        ${choicesHtml}
        <div class="search-answer"><b>正答：</b>${esc(q.answer || '')}</div>
        ${expHtml}
      </div>
    </details>
  `;
}

function loadScriptFile(src){
  return new Promise((resolve,reject)=>{
    if(document.querySelector(`script[data-dynamic="${src}"]`)){ resolve(); return; }
    const s=document.createElement('script');
    s.src=src; s.dataset.dynamic=src;
    s.onload=()=>resolve();
    s.onerror=()=>reject(new Error(src+' を読み込めませんでした'));
    document.body.appendChild(s);
  });
}

async function initManifestFiles(){
  // PC版用：data_manifest.jsonに書かれた同一フォルダ内のjson/jsを検索対象に追加する。
  // file://直開きではブラウザ制限でfetchできない場合がある。その場合は、既にscriptタグで読み込まれた内蔵データだけで動く。
  try{
    const res = await fetch('data_manifest.json', {cache:'no-store'});
    if(!res.ok) return;
    const manifest = await res.json();
    const files = Array.isArray(manifest.files) ? manifest.files : [];
    for(const item of files){
      const file = typeof item === 'string' ? item : item.file;
      if(!file) continue;
      const id = (typeof item === 'object' && item.id) ? item.id : file.replace(/\.[^.]+$/,'');
      const label = (typeof item === 'object' && item.label) ? item.label : id;
      const kind = (typeof item === 'object' && item.kind) ? item.kind : (file.includes('elearning')?'elearning':'exam');
      const globalName = typeof item === 'object' ? item.global : null;
      try{
        if(file.endsWith('.js')){
          if(globalName && !window[globalName]) await loadScriptFile(file);
          const data = globalName ? window[globalName] : null;
          if(data && !EXAM_FILES[id]) EXAM_FILES[id] = {label, data, kind, file};
        }else if(file.endsWith('.json')){
          const r = await fetch(file, {cache:'no-store'});
          if(!r.ok) continue;
          const data = await r.json();
          if(!EXAM_FILES[id]) EXAM_FILES[id] = {label, data, kind, file};
        }
      }catch(e){ console.warn('manifest file skipped:', file, e); }
    }
  }catch(e){ console.warn('data_manifest.json skipped:', e); }
}

async function initApp(){
  await initManifestFiles();
  home();
}

initApp();

</script>
